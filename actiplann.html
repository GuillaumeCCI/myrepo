// ── Sound engine (même architecture que simulateur-handicap) ───────────────
let _audioCtx = null;
const getCtx = () => {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
};
const playSound = (type) => {
  try {
    const ctx = getCtx();
    const master = ctx.createGain();
    master.gain.setValueAtTime(0, ctx.currentTime);
    master.gain.linearRampToValueAtTime(0.16, ctx.currentTime + 0.02);
    master.connect(ctx.destination);
    const note = (freq, start, dur) => {
      const osc = ctx.createOscillator();
      const g   = ctx.createGain();
      osc.connect(g); g.connect(master);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
      g.gain.setValueAtTime(1, ctx.currentTime + start);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur + 0.05);
    };
    if (type === 'success') {
      note(330, 0, .35); note(415, .1, .30); note(494, .22, .40);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + .75);
    } else if (type === 'neutral') {
      note(370, 0, .30);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + .45);
    } else if (type === 'fail') {
      note(370, 0, .28); note(294, .18, .35);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + .60);
    } else if (type === 'badge') {
      note(523, 0, .30); note(659, .08, .28); note(784, .16, .30); note(1047, .26, .40);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + .80);
    } else if (type === 'msg') {
      master.gain.linearRampToValueAtTime(0.07, ctx.currentTime + .01);
      note(620, 0, .12);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + .18);
    } else if (type === 'click') {
      master.gain.linearRampToValueAtTime(0.06, ctx.currentTime + .005);
      note(520, 0, .08);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + .12);
    } else if (type === 'sms_alert') {
      note(440, 0, .15); note(554, .18, .15); note(440, .36, .15);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + .60);
    } else if (type === 'conf_up') {
      note(440, 0, .40); note(554, .20, .45);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + .80);
    } else if (type === 'conf_down') {
      note(349, 0, .40); note(277, .22, .45);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + .80);
    } else if (type === 'validate') {
      note(440, 0, .20); note(523, .15, .25); note(659, .32, .35);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + .70);
    } else if (type === 'step') {
      master.gain.linearRampToValueAtTime(0.08, ctx.currentTime + .01);
      note(480, 0, .10); note(560, .10, .12);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + .26);
    }
  } catch(e) {}
};

function analyzeResponse(text, kw) {
  const n = text.toLowerCase().normalize("NFD").replace(/\p{Diacritic}/gu,"").replace(/[^a-z0-9\s]/g," ");
  const hits = kw.required.map(k => {
    const kn = k.toLowerCase().normalize("NFD").replace(/\p{Diacritic}/gu,"");
    if (n.includes(kn)) return true;
    return (kw.synonyms[k]||[]).some(s => n.includes(s.toLowerCase().normalize("NFD").replace(/\p{Diacritic}/gu,"")));
  });
  const r = hits.filter(Boolean).length / kw.required.length;
  return r >= 0.75 ? "complete" : r >= 0.4 ? "partial" : "missing";
}

function scoreComposite(assignments, justifications) {
  let score = 0; const details = {};
  POSTES_DEF.forEach(p => {
    const pid = assignments[p.id]; const justif = justifications[p.id];
    if (!pid) return;
    const pd = p.profils[pid]; if (!pd) return;
    let pts = pd.score;
    if (justif && justif.length > 15) {
      const nj = justif.toLowerCase().normalize("NFD").replace(/\p{Diacritic}/gu,"");
      if (p.competencesCles.some(c => nj.includes(c.toLowerCase().normalize("NFD").replace(/\p{Diacritic}/gu,"")))) pts = Math.min(pts+1,4);
    }
    score += pts; details[p.id] = { pts, feedback:pd.feedback, type:pd.type };
  });
  return { score, details };
}

// ── CA chart ───────────────────────────────────────────────────────────────
const CAChart = ({ history, baseCA }) => {
  if (history.length < 1) return null;
  const pts = [{ label:'Départ', v:baseCA }];
  let cur = baseCA;
  history.forEach(h => { cur += h.impact; pts.push({ label:h.title, v:cur, impact:h.impact }); });
  const W=380,H=70,PX=20,PY=8,IW=W-PX*2,IH=H-PY*2,n=pts.length;
  const toX = i => PX + (i/(n-1))*IW;
  const toY = v => PY + IH - ((v/baseCA)*IH);
  const lp  = pts.map((p,i) => `${i===0?'M':'L'}${toX(i).toFixed(1)},${toY(Math.max(0,p.v)).toFixed(1)}`).join(' ');
  const ap  = `${lp} L${toX(n-1).toFixed(1)},${H-PY} L${PX},${H-PY} Z`;
  const col = cur >= baseCA ? '#10b981' : cur > baseCA/2 ? '#f59e0b' : '#ef4444';
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} className="overflow-visible">
      <defs><linearGradient id="cag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={col} stopOpacity=".2"/><stop offset="100%" stopColor={col} stopOpacity="0"/></linearGradient></defs>
      <line x1={PX} y1={toY(baseCA)} x2={W-PX} y2={toY(baseCA)} stroke="#d1d5db" strokeWidth="1" strokeDasharray="4,3"/>
      <path d={ap} fill="url(#cag)"/>
      <path d={lp} fill="none" stroke={col} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i) => <circle key={i} cx={toX(i)} cy={toY(Math.max(0,p.v))} r="3" fill="white" stroke={col} strokeWidth="1.5"/>)}
    </svg>
  );
};

// ── AudioStep ──────────────────────────────────────────────────────────────
function AudioStep({ sc, ad, onDone }) {
  const [phase, setPhase] = useState("listen");
  const [inp,   setInp]   = useState({ absence:"", commande:"" });
  const [res,   setRes]   = useState({ absence:null, commande:null });
  const [att,   setAtt]   = useState({ absence:0, commande:0 });
  const MAX = 3;

  const submit = (key) => {
    const r  = analyzeResponse(inp[key], ad.keywords[key]);
    const na = { ...att, [key]: att[key]+1 };
    setAtt(na);
    if (r === "complete" || na[key] >= MAX) {
      const nr = { ...res, [key]: r };
      setRes(nr);
    } else {
      setRes(p => ({ ...p, [key]: r }));
    }
  };

  const bothDone = res.absence !== null && res.commande !== null;

  useEffect(() => {
    if (bothDone) playSound('validate');
  }, [bothDone]);

  return (
    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden anim-fadeInUp">
      <div className="bg-blue-600 px-5 py-3 flex items-center gap-2">
        <Mic size={15} className="text-blue-200"/>
        <h2 className="font-semibold text-white text-sm">Messagerie Vocale — Écoute active</h2>
        <span className="ml-auto text-[10px] text-blue-300 uppercase tracking-wider">Laurent Garnier · Dir. Zone</span>
      </div>
      <div className="p-6">
        <div className="p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 leading-relaxed whitespace-pre-line mb-5 shadow-sm">
          <div className="flex items-center gap-2 mb-2 pb-2 border-b border-slate-200">
            <Mic size={12} className="text-blue-500"/>
            <span className="font-semibold text-slate-500 text-xs">Transcript — Dir. Zone</span>
          </div>
          {ad?.audio}
        </div>
        {phase !== "listen" && (
          <div className="max-w-2xl space-y-5">
            <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg text-xs text-blue-800">
              <strong>Exercice :</strong> Synthétisez les deux informations clés du message. Soyez précis sur les noms, les jours et les horaires.
            </div>
            {["absence","commande"].map(key => {
              const kd = ad.keywords[key];
              const r  = res[key];
              const a  = att[key];
              const locked = r === "complete" || a >= MAX;
              return (
                <div key={key} className="border border-slate-200 rounded-xl p-4">
                  <label className="text-xs font-bold uppercase tracking-wider text-slate-500 block mb-2">
                    {kd.label} <span className="text-slate-400 font-normal normal-case">— {kd.hint}</span>
                  </label>
                  <div className="flex gap-2">
                    <input type="text" value={inp[key]}
                      onChange={e => !locked && setInp(p=>({...p,[key]:e.target.value}))}
                      onKeyDown={e => e.key==="Enter" && !locked && submit(key)}
                      disabled={locked}
                      placeholder="Votre synthèse..."
                      className={`flex-1 p-2.5 text-sm border rounded-lg focus:outline-none transition-colors ${locked?"bg-slate-100 text-slate-400 cursor-not-allowed border-slate-200":"bg-white focus:border-blue-500 border-slate-300"}`}/>
                    {!locked && (
                      <button onClick={()=>{playSound('click');submit(key);}} className="px-4 py-2 bg-blue-600 text-white text-sm font-semibold rounded-md hover:bg-blue-700 flex items-center gap-1.5">
                        <Send size={13}/>Valider
                      </button>
                    )}
                  </div>
                  {r && (
                    <div className={`mt-2 text-xs p-2.5 rounded-lg border flex items-start gap-2 ${r==="complete"?"bg-emerald-50 border-emerald-200 text-emerald-800":r==="partial"?"bg-amber-50 border-amber-200 text-amber-800":"bg-red-50 border-red-200 text-red-800"}`}>
                      {r==="complete" && <CheckCircle size={12} className="shrink-0 mt-0.5"/>}
                      {r==="partial"  && <AlertTriangle size={12} className="shrink-0 mt-0.5"/>}
                      {r==="missing"  && <XCircle size={12} className="shrink-0 mt-0.5"/>}
                      <span>
                        {r==="complete" && "Bonne identification. Éléments clés couverts."}
                        {r==="partial"  && `Incomplet — tentative ${a}/${MAX}. ${a<MAX?"Précisez : "+kd.hint:"Maximum atteint."}`}
                        {r==="missing"  && `Éléments manquants — tentative ${a}/${MAX}. ${a<MAX?"Réessayez en précisant : "+kd.hint:"Passez à la suite."}`}
                      </span>
                    </div>
                  )}
                </div>
              );
            })}
            {bothDone && (
              <div className="flex justify-end pt-2 border-t border-slate-100">
                <button onClick={()=>{playSound('step');onDone();}} className="px-5 py-2.5 bg-blue-600 text-white font-semibold text-sm rounded-md hover:bg-blue-700 flex items-center gap-2">
                  Accéder au planning <ChevronRight size={15}/>
                </button>
              </div>
            )}
          </div>
        )}
        {phase === "listen" && (
          <button onClick={()=>{playSound('click');setPhase("input");}} className="px-5 py-2.5 bg-blue-600 text-white font-semibold text-sm rounded-md hover:bg-blue-700 flex items-center gap-2">
            Message lu — Synthétiser les informations clés <ChevronRight size={15}/>
          </button>
        )}
      </div>
    </div>
  );
}

                            <h4 className="font-bold text-slate-800 text-sm">{p.name}</h4>
                            <span className="text-[10px] font-semibold uppercase text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded">{p.role}</span>
                            {p.isAbsent && <span className="text-[10px] font-bold bg-red-50 border border-red-200 text-red-600 px-1.5 py-0.5 rounded">Absent</span>}
                          </div>
                          {p.isAbsent
                            ? <p className="text-xs text-slate-400 italic">Ses horaires de fermeture doivent être couverts.</p>
                            : <div>
                                <p className="text-xs text-slate-700"><strong>Compétences :</strong> {p.competences.join(", ")}</p>
                                <p className="text-xs text-slate-500 mt-0.5"><strong>Contexte :</strong> {p.contexte}</p>
                              </div>
                          }
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="mt-6 pt-4 border-t border-slate-100">
                  <button onClick={()=>goStep(3)} className="px-5 py-2.5 bg-blue-600 text-white font-semibold text-sm rounded-md hover:bg-blue-700 transition-colors flex items-center gap-2">
                    Accéder au planning <ChevronRight size={16}/>
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ÉTAPE 3 — Planning + SMS */}
        {step===3 && (
          <div className="flex flex-col gap-5">
            <NarrationMsg text={STEP_NARRATIONS[3]}/>

            {/* Mémos */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden anim-fadeInUp">
              <div className="bg-slate-50 border-b border-slate-200 px-4 py-2.5 flex items-center gap-2"><MessageSquare size={14} className="text-blue-600"/><h2 className="text-xs font-bold uppercase tracking-wide text-slate-600">Mémos & Alertes</h2></div>
              <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-3">
                <div className="border border-blue-200 rounded-lg bg-blue-50/50 p-3">
                  <div className="flex gap-2 items-center mb-1.5"><MailWarning className="text-blue-600" size={13}/><span className="text-[10px] font-bold uppercase text-blue-800 tracking-wider">Email Direction</span></div>
                  <p className="text-xs text-slate-700">{abP?.name} est absent(e) ({sc.absenceJours.join(", ")}). Merci de couvrir ses fermetures.</p>
                </div>
                <div className="border border-amber-200 rounded-lg bg-amber-50/50 p-3">
                  <div className="flex gap-2 items-center mb-1.5"><StickyNote className="text-amber-600" size={13}/><span className="text-[10px] font-bold uppercase text-amber-800 tracking-wider">Post-it Boutique</span></div>
                  <p className="text-xs text-slate-700">Commande exceptionnelle : <strong>{sc.commande.desc}</strong> Ouverture nécessaire pour la production.</p>
                </div>
              </div>
            </div>

            {/* Tableau planning */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden anim-fadeInUp">
              <div className="bg-slate-50 border-b border-slate-200 px-4 py-2.5 flex items-center gap-2"><FileSpreadsheet size={14} className="text-blue-600"/><span className="text-xs font-semibold text-slate-700 uppercase tracking-wider">planning_semaine.xlsx</span></div>
              <div className="overflow-x-auto p-2">
                <table className="w-full text-xs border-collapse border border-slate-300">
                  <thead>
                    <tr className="bg-slate-100 text-slate-500 uppercase text-[10px] tracking-wider">
                      <th className="border border-slate-300 p-2">Jour</th><th className="border border-slate-300 p-2">Date</th>
                      <th className="border border-slate-300 p-2">Affectation</th><th className="border border-slate-300 p-2 text-center">Début</th>
                      <th className="border border-slate-300 p-2 text-center">Fin</th><th className="border border-slate-300 p-2 text-center">H</th>
                    </tr>
                  </thead>
                  <tbody>
                    {plan.map((row,idx) => {
                      const sh = SHIFTS[row.sk]||SHIFTS[""];
                      return (
                        <tr key={row.id} className="border-b border-slate-200 hover:bg-slate-50">
                          <td className="border-r border-slate-300 p-2 font-semibold text-xs">{row.day}</td>
                          <td className="border-r border-slate-300 p-2 text-slate-400 font-mono text-[10px]">{row.date}</td>
                          <td className="border-r border-slate-300 p-1">
                            {idx===6
                              ? <div className="p-1 text-slate-400 italic text-xs">Repos fixé</div>
                              : <select value={row.sk} onChange={e=>chSh(idx,e.target.value)} disabled={p2phase==="decision"}
                                  className={`w-full p-1 border text-xs outline-none focus:border-blue-500 rounded ${row.sk===""?"border-slate-300 bg-white":"border-slate-200 bg-slate-50 font-semibold"}`}>
                                  {Object.entries(SHIFTS).map(([k,s])=><option key={k} value={k}>{s.label}</option>)}
                                </select>
                            }
                          </td>
                          <td className="border-r border-slate-300 p-2 text-center font-mono text-[11px] text-slate-500">{sh.type==="repos"?"--:--":sh.start}</td>
                          <td className="border-r border-slate-300 p-2 text-center font-mono text-[11px] text-slate-500">{sh.type==="repos"?"--:--":sh.end}</td>
                          <td className="p-2 text-center font-semibold">{sh.hours>0?`${sh.hours}h`:"-"}</td>
                        </tr>
                      );
                    })}
                    <tr className="bg-slate-100 border-t-2 border-slate-300">
                      <td colSpan="5" className="p-2 text-right text-[10px] uppercase font-bold text-slate-500">Total :</td>
                      <td className="p-2 text-center font-bold">{rules.total}h</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

            {/* Métriques */}
            {p2phase==="grid" && (
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 anim-fadeInUp">
                <div className="flex justify-between items-center mb-3 pb-2 border-b border-slate-100">
                  <h3 className="text-xs font-semibold uppercase text-slate-500">Métriques & Conformité</h3>
                  {legal && (
                    <span className={`text-[10px] px-2 py-0.5 rounded font-bold uppercase flex items-center gap-1 border ${smsA.length===0?"bg-emerald-50 text-emerald-700 border-emerald-200":"bg-red-50 text-red-700 border-red-200"}`}>
                      {smsA.length===0?<><CheckCircle size={11}/> Conforme</>:<><AlertTriangle size={11}/> Non conforme</>}
                    </span>
                  )}
                </div>
                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2 mb-4">
                  <Indicator valid={legal?rules.absOk:false}    label="Absence"     subtext={legal?(rules.absOk?"Couvert":"Non couvert"):"Couvrir soirs"} mk="maxime"/>
                  <Indicator valid={legal?rules.cmdOk:false}    label="Commande"    subtext={legal?(rules.cmdOk?"OK":"Non couvert"):"Prod. matin"}        mk="commande"/>
                  <Indicator valid={legal?rules.samediOk:false} label="Affluence"   subtext={legal?(rules.samediOk?"Présente":"Absente"):"Présence Sam."} mk="samedi"/>
                  <Indicator valid={legal?rules.hoursOk:false}  label="Contrat 35h" subtext={legal?`${rules.total}h`:"Temps plein"}                      mk="heures"/>
                  <Indicator valid={legal?rules.restOk:false}   label="Repos 11h"   subtext={legal?(rules.restOk?"OK":"Violation"):"Entre shifts"}        mk="repos"/>
                  <Indicator valid={legal?rules.ouvOk:false}    label="Pénibilité"  subtext={legal?`${rules.ouvCount}/3`:"Max 3 ouv."}                    mk="penibilite"/>
                </div>
                {legal && smsA.length>0 && (
                  <div className="mb-4 space-y-2">
                    <div className="flex items-center gap-2 mb-1">
                      <div className="w-2 h-2 rounded-full bg-red-500 animate-pulse"/>
                      <span className="text-xs font-semibold text-slate-700">Notifications — correction requise avant de continuer</span>
                    </div>
                    {smsA.map((a,i)=>renderSMS(a,i))}
                    <button onClick={()=>{setLegal(false);setSmsA([]);}} className="text-xs font-semibold text-blue-600 hover:text-blue-800 mt-1">← Revenir au tableau pour corriger</button>
                  </div>
                )}
                {legal && smsA.length===0
                  ? <div>
                      <div className="p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-xs text-emerald-800 mb-3 flex items-center gap-2">
                        <CheckCircle size={13} className="text-emerald-600"/>Planning conforme. Toutes les contraintes légales et opérationnelles sont respectées.
                      </div>
                      <div className="flex justify-end">
                        <button onClick={()=>{playSound('step');setP2("decision");}} className="px-5 py-2 bg-blue-600 text-white font-semibold text-sm rounded-md hover:bg-blue-700 transition-colors">
                          Étape suivante — Décision de cycle
                        </button>
                      </div>
                    </div>
                  : !legal && (
                      <div className="flex justify-end">
                        <button onClick={validate} disabled={!rules.filled} className={`px-5 py-2 rounded-md text-sm font-semibold transition-colors ${rules.filled?"bg-blue-600 text-white hover:bg-blue-700":"bg-slate-100 text-slate-400 border border-slate-200 cursor-not-allowed"}`}>
                          Analyser la conformité
                        </button>
                      </div>
                    )
                }
              </div>
            )}

            {/* Décision de cycle */}
            {p2phase==="decision" && (
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 anim-fadeInUp">
                <div className="flex items-center gap-2 mb-3"><MessageSquare size={15} className="text-blue-600"/><h3 className="text-sm font-semibold">Action managériale : modification de cycle</h3></div>
                <p className="text-sm text-slate-600 mb-4 leading-relaxed">Planning validé. Vous avez imposé une <strong>Ouverture</strong> le <strong>{sc.commande.jour}</strong>, dérogeant au cycle habituel de Sylvie. Si ce changement devait se pérenniser, quelle démarche adopteriez-vous ?</p>
                {sylvieNotice===null
                  ? <div className="space-y-2">
                      <button onClick={()=>{playSound('fail');setSN("error");}} className="w-full text-left p-3 text-sm border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition-colors text-slate-700">
                        <strong className="mr-2">A.</strong>Je modifie son planning de fond d'une semaine sur l'autre, selon les besoins.
                      </button>
                      <button onClick={()=>{playSound('success');setSN("correct");}} className="w-full text-left p-3 text-sm border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition-colors text-slate-700">
                        <strong className="mr-2">B.</strong>Je la préviens formellement aujourd'hui — modification effective dans 2 semaines (délai légal 7 jours ouvrés).
                      </button>
                    </div>
                  : <FeedbackBox
                      title="Conséquence"
                      caImpact={sylvieNotice==="correct"?0:-2}
                      feedbackKey={sylvieNotice==="correct"?"preavis_ok":"preavis_error"}
                      desc={sylvieNotice==="correct"?"Délai de prévenance respecté. Sylvie reste engagée et performante.":"Modification sans préavis = violation du délai légal. Sylvie démotivée, efficacité en baisse."}>
                      <button onClick={()=>goStep(4)} className="px-5 py-2.5 rounded-md text-sm font-semibold bg-blue-600 text-white hover:bg-blue-700 transition-colors">Passer à l'affectation</button>
                    </FeedbackBox>
                }
              </div>
            )}
          </div>
        )}

        {/* ÉTAPE 4 — Affectation */}
        {step===4 && (
          <div className="flex flex-col gap-4">
            <NarrationMsg text={STEP_NARRATIONS[4]}/>
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col md:flex-row overflow-hidden anim-fadeInUp">
              {/* Sidebar équipe */}
              <div className="bg-slate-50 md:w-60 border-r border-slate-200 p-4">
                <h2 className="text-sm font-semibold text-slate-800 mb-1">Équipe disponible</h2>
                <p className="text-[11px] text-slate-400 mb-4 leading-relaxed">Sélectionnez un équipier par poste et justifiez en précisant la compétence mobilisée.</p>
                <div className="space-y-3">
                  {tfa.map(p => {
                    const isA = Object.values(asgn).includes(p.id);
                    return (
                      <div key={p.id} className={`p-2.5 border rounded-lg transition-opacity ${isA?"opacity-35 border-slate-200 bg-slate-100":"border-slate-300 bg-white"}`}>
                        <div className="flex items-center gap-2 mb-1">
                          <div className={`w-7 h-7 rounded-full flex items-center justify-center font-bold text-[11px] ${p.bgColor} ${p.textColor}`}>{p.name.substring(0,2).toUpperCase()}</div>
                          <div><div className="font-semibold text-slate-800 text-xs">{p.name}</div><div className="text-[10px] text-slate-400">{p.role}</div></div>
                        </div>
                        <p className="text-[10px] text-slate-500">{p.competences.join(", ")}</p>
                      </div>
                    );
                  })}
                </div>
              </div>
              {/* Grille */}
              <div className="flex-1 p-4 flex flex-col gap-4">
                <div>
                  <h2 className="text-sm font-semibold text-slate-800 mb-1">Grille d'affectation — Samedi</h2>
                  <p className="text-[11px] text-slate-400">Pour chaque poste : choisissez l'équipier <strong>ET</strong> justifiez en mentionnant la compétence mobilisée.</p>
                </div>
                {POSTES_DEF.map(poste => (
                  <div key={poste.id} className="p-4 border border-slate-200 rounded-xl bg-white">
                    <div className="mb-2">
                      <div className="font-semibold text-slate-800 text-sm">{poste.title}</div>
                      <div className="text-[11px] text-slate-400">{poste.reqDesc}</div>
                    </div>
                    <div className="flex flex-wrap gap-2 mb-3">
                      {tfa.map(t => {
                        const h = asgn[poste.id]===t.id;
                        const e = Object.values(asgn).includes(t.id) && !h;
                        return (
                          <button key={t.id} onClick={()=>doAsgn(poste.id,t.id)} disabled={asgnDone}
                            className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg border text-xs transition-colors ${h?"bg-blue-50 border-blue-500 text-blue-800 font-semibold":"bg-white border-slate-200 text-slate-600 hover:border-slate-400"} ${e?"opacity-25 grayscale":""}`}>
                            <div className={`w-4 h-4 rounded-full flex items-center justify-center font-bold text-[8px] ${h?"bg-blue-200 text-blue-900":"bg-slate-100 text-slate-500"}`}>{t.name[0]}</div>{t.name}
                          </button>
                        );
                      })}
                    </div>
                    <div>
                      <label className="text-[10px] font-semibold uppercase text-slate-400 tracking-wider block mb-1">Justification — compétence mobilisée :</label>
                      <input type="text"
                        placeholder={`Pourquoi ${asgn[poste.id]?tfa.find(t=>t.id===asgn[poste.id])?.name||"...":"..."} sur ce poste ?`}
                        value={just[poste.id]}
                        onChange={e=>!asgnDone&&setJust(p=>({...p,[poste.id]:e.target.value}))}
                        disabled={asgnDone}
                        className="w-full p-2 text-xs border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 bg-slate-50 focus:bg-white"/>
                      {asgnDone && assignResult?.details?.[poste.id] && (
                        <div className={`mt-2 text-xs p-2.5 rounded-lg border flex items-start gap-2 ${assignResult.details[poste.id].pts>=3?"bg-emerald-50 border-emerald-200 text-emerald-800":assignResult.details[poste.id].pts>=2?"bg-amber-50 border-amber-200 text-amber-800":"bg-red-50 border-red-200 text-red-800"}`}>
                          <span className={`shrink-0 text-[9px] font-bold px-1.5 py-0.5 rounded border ${TYPE_COLORS[assignResult.details[poste.id].type]||""}`}>{assignResult.details[poste.id].type}</span>
                          {assignResult.details[poste.id].feedback}
                        </div>
                      )}
                    </div>
                  </div>
                ))}
                {!asgnDone
                  ? <div className="flex justify-end pt-2 border-t border-slate-100">
                      <button onClick={()=>{
                        const r=scoreComposite(asgn,just);
                        setAR(r); setCS(r.score); setAsgnDone(true);
                        playSound(r.score>=9?'success':r.score>=5?'neutral':'fail');
                      }} disabled={!step3ok} className={`px-5 py-2.5 rounded-md text-sm font-semibold transition-colors ${step3ok?"bg-blue-600 text-white hover:bg-blue-700":"bg-slate-100 text-slate-400 border border-slate-200 cursor-not-allowed"}`}>
                        Valider la grille d'affectation
                      </button>
                    </div>
                  : <FeedbackBox
                      title="Résultat de l'affectation"
                      caImpact={assignResult.score>=9?0:assignResult.score>=5?-3:-6}
                      desc={assignResult.score>=9?"Casting optimal. Chaque équipier est positionné sur le poste qui valorise ses forces.":assignResult.score>=5?"Casting perfectible. Certains écarts réduisent la fluidité du service.":"Erreurs de casting. Boutique sous-performante pendant le rush."}>
                      <button onClick={()=>goStep(5)} className="px-5 py-2.5 rounded-lg text-sm font-semibold bg-blue-600 text-white hover:bg-blue-700 transition-colors">Gérer l'imprévu et préparer le brief</button>
                    </FeedbackBox>
                }
              </div>
            </div>
          </div>
        )}

        {/* ÉTAPE 5 — Imprévu */}
        {step===5 && (
          <div className="flex flex-col gap-4">
            <NarrationMsg text={STEP_NARRATIONS[5]}/>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              {/* Alerte */}
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden anim-fadeInUp">
                <div className="bg-slate-50 border-b border-slate-200 p-3.5 flex items-center gap-2"><AlertTriangle size={15} className="text-slate-500"/><h2 className="text-sm font-semibold">Alerte Opérationnelle</h2></div>
                <div className="p-5 flex-1 flex flex-col">
                  <div className="bg-white border border-slate-200 rounded-xl p-4 mb-4 shadow-sm">
                    <div className="flex items-center gap-2 mb-2"><div className="w-2 h-2 rounded-full bg-red-500 animate-pulse"/><span className="text-[10px] uppercase font-bold text-slate-400">SMS · Jeu. 20:45</span></div>
                    <p className="text-sm font-medium mb-2">"Empêchement familial urgent. Je serai absente Samedi." — Sylvie</p>
                    <div className="bg-slate-50 border border-slate-100 p-2 rounded-lg text-xs text-slate-500 flex justify-between">
                      <span>Prévenance légale : 7 jours</span><span className="text-red-600 font-semibold">Réel : 2 jours</span>
                    </div>
                  </div>
                  <p className="text-xs font-semibold text-slate-600 uppercase tracking-wide mb-3">Décision managériale</p>
                  {imprevuAction===null
                    ? <div className="space-y-2">
                        <button onClick={()=>{playSound('fail');setIA("error");}} className="w-full text-left p-3 text-sm border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition-colors">
                          <strong className="mr-2">A.</strong>Modifier le planning de Théo ce soir (il constatera demain matin).
                        </button>
                        <button onClick={()=>{playSound('success');setIA("correct");}} className="w-full text-left p-3 text-sm border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition-colors">
                          <strong className="mr-2">B.</strong>Appeler Théo maintenant pour lui exposer la situation et recueillir son accord exprès.
                        </button>
                      </div>
                    : <FeedbackBox
                        title="Conséquence"
                        caImpact={imprevuAction==="correct"?0:-2}
                        feedbackKey={imprevuAction==="correct"?"imprevu_ok":"imprevu_error"}
                        desc={imprevuAction==="correct"?"Accord recueilli dans les règles. Théo arrive motivé Samedi.":"Forçage du planning : infraction au Code du Travail (L.3121-47). Théo vient à reculons."}>
                        <p className="text-xs text-slate-400 italic">Poursuivez sur le brief (à droite).</p>
                      </FeedbackBox>
                  }
                </div>
              </div>

              {/* Brief */}
              <div className={`bg-white rounded-xl shadow-sm border flex flex-col transition-opacity duration-500 ${imprevuAction===null?"opacity-35 pointer-events-none border-slate-200":"border-slate-300 anim-fadeInUp"}`}>
                <div className="bg-slate-50 border-b border-slate-200 p-3.5 flex items-center gap-2"><MessageSquare size={15} className="text-slate-500"/><h2 className="text-sm font-semibold">Construction du Brief — Théo</h2></div>
                <div className="p-5 flex-1 flex flex-col">
                  <NarrationMsg text={STEP_NARRATIONS[6]}/>
                  <p className="text-sm text-slate-500 mb-4">Théo a accepté. Construisez votre "Brief 5 minutes" :</p>
                  <div className="space-y-4 flex-1">
                    {Object.entries(BRIEF_OPTS).map(([key,comp]) => (
                      <div key={key}>
                        <div className="text-xs font-semibold text-slate-700 mb-2">{comp.label}</div>
                        <div className="space-y-1.5">
                          {comp.options.map(opt => {
                            const ch = briefChoices[key]===opt.id;
                            const sf = briefDone && ch;
                            return (
                              <button key={opt.id} onClick={()=>{if(!briefDone){playSound('click');setBC(p=>({...p,[key]:opt.id}));}}}
                                className={`w-full text-left p-2.5 text-sm border rounded-lg transition-colors relative
                                  ${ch&&!sf?"border-blue-500 bg-blue-50 text-blue-900":""}
                                  ${sf&&opt.q==="good"?"border-emerald-300 bg-emerald-50 text-emerald-900":""}
                                  ${sf&&opt.q==="ok"?"border-amber-300 bg-amber-50 text-amber-900":""}
                                  ${sf&&opt.q==="poor"?"border-red-200 bg-red-50 text-red-900":""}
                                  ${!ch?"border-slate-200 bg-white text-slate-600 hover:border-slate-300":""}`}>
                                {opt.text}
                                {sf && (
                                  <span className={`absolute right-2 top-1/2 -translate-y-1/2 text-[9px] font-bold px-1.5 py-0.5 rounded border ${TYPE_COLORS[opt.type]||""}`}>{opt.type}</span>
                                )}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                  </div>
                  {!briefDone
                    ? <div className="mt-4 pt-4 border-t border-slate-100">
                        <button onClick={()=>{
                          setBD(true);
                          playSound(bScore>=6?'success':bScore>=3?'neutral':'fail');
                        }} disabled={!Object.values(briefChoices).every(Boolean)}
                          className={`w-full py-2.5 rounded-md text-sm font-semibold transition-colors ${Object.values(briefChoices).every(Boolean)?"bg-blue-600 text-white hover:bg-blue-700":"bg-slate-100 text-slate-400 cursor-not-allowed"}`}>
                          Délivrer le Brief
                        </button>
                      </div>
                    : <FeedbackBox
                        title="Résultat du brief"
                        caImpact={bScore>=6?0:bScore>=3?-2:-4}
                        desc={bScore>=6?"Brief percutant. Théo a un objectif précis et du sens dans sa mission.":bScore>=3?"Brief moyen. Théo rate des opportunités par manque de guidage.":"Brief insuffisant. Théo est en mode présence passive."}>
                        <button onClick={()=>goStep(7)} className="mt-2 w-full py-2.5 rounded-md text-sm font-semibold bg-blue-600 text-white hover:bg-blue-700 transition-colors flex items-center justify-center gap-2">
                          Consulter le bilan <Target size={15}/>
                        </button>
                      </FeedbackBox>
                  }
                </div>
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
