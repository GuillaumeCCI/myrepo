  steps.forEach((step, idx) => {
    const sel = selections[idx] || [];
    const chosen = step.options.filter(o => sel.includes(o.id));
    if (Array.isArray(ad[step.section])) {
      ad[step.section] = chosen.map(o => o.content);
    } else {
      ad[step.section] = chosen.map(o => o.content).join("\n");
    }
  });
  return ad;
}

function buildOptimalAd(steps) {
  const sel = {};
  steps.forEach((step, idx) => {
    sel[idx] = step.options.filter(o => o.isOptimal).map(o => o.id);
  });
  return buildJobAd(steps, sel);
}

// Fonction pour déterminer le style du feedback
const getFeedbackStyle = (text) => {
  if (!text) return "bg-slate-50 text-slate-700 border-slate-200";
  if (text.startsWith('✅')) return "bg-emerald-50 text-emerald-900 border-emerald-200";
  if (text.startsWith('⚠️')) return "bg-amber-50 text-amber-900 border-amber-200";
  if (text.startsWith('🚫')) return "bg-fuchsia-50 text-fuchsia-900 border-fuchsia-200";
  if (text.startsWith('❌')) return "bg-red-50 text-red-900 border-red-200";
  return "bg-slate-50 text-slate-700 border-slate-200";
};

// Hook personnalisé pour persister le state dans localStorage
function useStickyState(defaultValue, key) {
  const [value, setValue] = React.useState(() => {
    try {
      const stickyValue = window.localStorage.getItem(key);
      return stickyValue !== null ? JSON.parse(stickyValue) : defaultValue;
    } catch (err) {
      return defaultValue;
    }
  });
  React.useEffect(() => {
    try {
      window.localStorage.setItem(key, JSON.stringify(value));
    } catch (err) {
      // Ignorer les erreurs (ex: restrictions liées à l'iframe d'un LMS)
    }
  }, [key, value]);
  return [value, setValue];
}

function FullscreenButton({ id }) {
  const [isFullscreen, setIsFullscreen] = useState(false);

  useEffect(() => {
    const onFullscreenChange = () => setIsFullscreen(!!document.fullscreenElement);
    document.addEventListener('fullscreenchange', onFullscreenChange);
    return () => document.removeEventListener('fullscreenchange', onFullscreenChange);
  }, []);

  const toggle = () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(e => console.error(e));
    } else if (document.exitFullscreen) {
      document.exitFullscreen();

  return (
    <button id={id} onClick={toggle} className="w-8 h-8 bg-slate-800 hover:bg-slate-700 text-white rounded-lg flex items-center justify-center transition-colors ml-2 shadow-sm focus:outline-none focus:ring-4 focus:ring-slate-400" title={isFullscreen ? "Quitter le plein écran" : "Plein écran"}>

/* ─────────────────────────── TOUR COMPONENT ─────────────────────────── */
function TourSpotlight({ step, onNext, isLast, zoomLevel = 1 }) {
  const [rect, setRect] = useState(null);

  useEffect(() => {
    let timer;
    const updateRect = () => {
      const el = document.getElementById(step.targetId);
      if (el) {
        setRect(el.getBoundingClientRect());
        // Défilement doux vers l'élément si nécessaire
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
        // Mise à jour finale après le scroll
        timer = setTimeout(() => {
          const newEl = document.getElementById(step.targetId);
          if(newEl) setRect(newEl.getBoundingClientRect());
        }, 300);
      }
    };
    timer = setTimeout(updateRect, 50); // Petit délai pour laisser React faire le rendu
    window.addEventListener('resize', updateRect);
    return () => {
      window.removeEventListener('resize', updateRect);
      clearTimeout(timer);
    };
  }, [step]);

  if (!rect) return null;

  // Calcul des coordonnées locales par rapport au conteneur zoomé
  const tTop = rect.top / zoomLevel;
  const tLeft = rect.left / zoomLevel;
  const tWidth = rect.width / zoomLevel;
  const tHeight = rect.height / zoomLevel;
  const tBottom = rect.bottom / zoomLevel;
  const tRight = rect.right / zoomLevel;

  const tooltipWidth = 360;

  // Placement intelligent pour garder l'infobulle dans l'écran et ne pas cacher la cible
  let top = tBottom + 24;
  let left = tLeft + (tWidth / 2) - (tooltipWidth / 2);

  if (step.placement === 'right') {
    top = tTop + Math.min(tHeight / 3, 100);
    left = tRight + 32;
  } else if (step.placement === 'left') {
    top = tTop + Math.min(tHeight / 3, 100);
    left = tLeft - tooltipWidth - 32;
  } else if (step.placement === 'bottom') {
    top = tBottom + 24;
    left = tLeft + (tWidth / 2) - (tooltipWidth / 2);
  }

  // Dimensions "virtuelles" du navigateur pour sécuriser l'infobulle
  const winWidth = window.innerWidth / zoomLevel;
  const winHeight = window.innerHeight / zoomLevel;

  if (left < 24) left = 24;
  if (left + tooltipWidth > winWidth - 24) left = winWidth - tooltipWidth - 24;
  if (top < 24) top = 24;
  if (top + 200 > winHeight) top = Math.max(24, winHeight - 200);

  return (
    <div className="fixed inset-0 z-[9990]">
      {/* Bloqueur invisible cliquable pour empêcher les actions intempestives */}
      <div className="absolute inset-0 bg-transparent" onClick={(e) => { e.stopPropagation(); e.preventDefault(); }} />
      
      {/* Masque global assombri avec trou lumineux sur la zone (Spotlight) */}
      <div style={{
        position: 'absolute',
        top: tTop - 8, left: tLeft - 8,
        width: tWidth + 16, height: tHeight + 16,
        boxShadow: '0 0 0 9999px rgba(15, 23, 42, 0.7), inset 0 0 0 2px #6366f1',
        borderRadius: '12px',
        pointerEvents: 'none',
        transition: 'all 0.3s ease'
      }} />

      {/* Infobulle */}
      <div style={{ position: 'absolute', top, left, width: `${tooltipWidth}px` }} 
           className="bg-white p-6 rounded-2xl shadow-[0_20px_50px_-12px_rgba(0,0,0,0.5)] border-2 border-indigo-500 fade-in transition-all duration-300 z-[9999]">
        <h4 className="text-lg font-bold text-indigo-600 mb-3 flex items-center gap-3"><Lightbulb size={20}/> {step.title}</h4>
        <p className="text-sm text-slate-700 mb-6 leading-relaxed">{step.content}</p>
        <div className="flex justify-end">
          <button onClick={(e) => { e.stopPropagation(); onNext(); }} 
                  className="px-5 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-bold hover:bg-indigo-700 transition-colors shadow-md focus:outline-none focus:ring-4 focus:ring-indigo-400 focus:ring-offset-2">
            {step.nextLabel || (isLast ? "C'est compris !" : "Suivant")}
          </button>
        </div>
      </div>
    </div>
  );
}

              <JobAdPreview ad={optimalAd} scenario={scenario}/>
            </div>
          </div>
        </div>

        {/* Step-by-step analysis */}
        <div className="bg-white rounded-xl overflow-hidden border border-slate-200 shadow-sm">
          <div className="bg-slate-900 text-white p-6 text-center">
            <h3 className="text-xl font-bold">Analyse par étape</h3>
            <p className="text-slate-400 text-sm mt-1">Comprenez l'impact de vos choix sur la qualité de l'annonce.</p>
          </div>
          <div className="p-6 space-y-8">
            {scenario.steps.map((step, idx) => {
              const userSel = selections[idx] || [];
              const chosen = step.options.filter(o => userSel.includes(o.id));
              const optimal = step.options.filter(o => o.isOptimal);
              const allGood = chosen.length > 0 && chosen.every(o => o.isOptimal) && chosen.length >= (step.maxSelections || 1);

              return (
                <div key={idx} className="relative pl-8 border-l-2 border-slate-100 pb-6 last:pb-0">
                  <div className={`absolute -left-2 top-0 w-4 h-4 rounded-full border-2 border-white ${allGood ? "bg-emerald-500" : "bg-red-400"}`}/>
                  <div className="flex items-center justify-between mb-4">
                    <h4 className="text-sm font-bold text-slate-700">{step.title}</h4>
                    {allGood
                      ? <span className="text-xs font-bold text-emerald-700 bg-emerald-50 px-2 py-1 rounded-full border border-emerald-200 flex items-center gap-1"><CheckCircle size={12}/> Parfait</span>
                      : <span className="text-xs font-bold text-red-600 bg-red-50 px-2 py-1 rounded-full border border-red-200 flex items-center gap-1"><XCircle size={12}/> À corriger</span>}
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <p className="text-xs font-bold text-slate-400 uppercase mb-2">Vos choix</p>
                      <div className="space-y-2">
                        {chosen.length === 0 && <p className="text-sm text-slate-400 italic">Aucun choix effectué.</p>}
                        {chosen.map(o => (
                          <div key={o.id} className={`p-3 rounded-lg border text-xs ${getFeedbackStyle(o.analysis)}`}>
                            <div className="font-bold mb-1">{o.label}</div>
                            <div className="opacity-80 mb-2">{o.content}</div>
                            {!o.isOptimal && (
                              <div className="pt-2 border-t border-black/10">
                                <div className="font-bold">{o.analysis}</div>
                                <div className="opacity-90">{o.annotation}</div>
                              </div>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>
                    {!allGood && (
                      <div>
                        <p className="text-xs font-bold text-indigo-500 uppercase mb-2">Correction recommandée</p>
                        <div className="space-y-2">
                          {optimal.map(o => (
                            <div key={o.id} className="p-3 rounded-lg border border-indigo-100 bg-indigo-50/50 text-xs text-indigo-900">
                              <div className="font-bold mb-1">{o.label}</div>
                              <div className="opacity-80 mb-2">{o.content}</div>
                              <div className="pt-2 border-t border-indigo-200/50">
                                <div className="font-bold text-indigo-700">{o.analysis}</div>
                                <div className="opacity-90 text-indigo-600">{o.annotation}</div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* CTA */}
        <div className="flex justify-center gap-4">
          <button onClick={onBack} className="px-6 py-3 bg-white border-2 border-slate-200 text-slate-900 rounded-xl font-bold hover:bg-slate-50 transition-colors flex items-center gap-2 shadow-sm focus:outline-none focus:ring-4 focus:ring-slate-300">
            <ArrowLeft size={18}/> Retour au tableau de bord
          </button>
          <a href="https://1001parcours.cci.fr/experience/mod/page/view.php?id=1842"
            className="px-6 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-colors flex items-center gap-2 shadow-lg focus:outline-none focus:ring-4 focus:ring-indigo-400">
            Terminer et quitter <ArrowRight size={18}/>
          </a>
        </div>
      </div>
    </div>
  );
}

        <div className="text-sm">
          <span className="font-bold">Activité pédagogique — </span>

          <a href="https://1001parcours.cci.fr/experience/mod/page/view.php?id=1842" target="_blank" rel="noopener noreferrer" className="text-blue-600 font-bold underline hover:text-blue-800 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded">

      <div className="flex justify-between items-center mb-6">
        <div>
          <h2 className="text-xl font-bold text-slate-900">Scénarios de recrutement</h2>
          <p className="text-slate-500 text-sm">Gérez vos rédactions d'offres en cours</p>
        </div>
      </div>

      <div className="grid grid-cols-3 gap-4 mb-6">
        {[
          { label:"Scénarios au total", value: SCENARIOS.length, color:"blue", icon:<Briefcase size={18}/> },
          { label:"En cours", value: inProgressCount, color:"amber", icon:<Clock size={18}/> },

                className="hover:bg-slate-50 transition-colors cursor-pointer group focus:outline-none focus:bg-indigo-50 focus:ring-2 focus:ring-indigo-400 focus:ring-inset"

/* ─────────────────────────── APP ─────────────────────────── */
function App() {
  const [zoomLevel, setZoomLevel] = useStickyState(1.2, "sim_zoom");
  const [view, setView] = useStickyState("welcome", "sim_view"); // welcome | dashboard | editor | audit
  const [scenarioId, setScenarioId] = useStickyState(null, "sim_scenarioId");
  const scenario = SCENARIOS.find(s => s.id === scenarioId) || null;
  const setScenario = (sc) => setScenarioId(sc ? sc.id : null);
  
  const [stepIdx, setStepIdx] = useStickyState(0, "sim_stepIdx");
  const [selections, setSelections] = useStickyState({}, "sim_selections"); // stepIdx -> [optionIds]
  const [completedScenarios, setCompletedScenarios] = useStickyState([], "sim_completedScenarios");
  const [savedData, setSavedData] = useStickyState({}, "sim_savedData");
  const [stepsCollapsed, setStepsCollapsed] = useStickyState(false, "sim_stepsCollapsed");
  const [maxStepReached, setMaxStepReached] = useStickyState(0, "sim_maxStepReached");

  const [showPreview, setShowPreview] = useState(true);
  const [showContextModal, setShowContextModal] = useState(false);

  // Tour States
  const [fullscreenTourDone, setFullscreenTourDone] = useStickyState(false, "sim_fsTour");
  const [dashboardTourDone, setDashboardTourDone] = useStickyState(false, "sim_dashTour");
  const [editorTourDone, setEditorTourDone] = useStickyState(false, "sim_editorTour");
  const [editorTourStep, setEditorTourStep] = useStickyState(0, "sim_editorTourStep");

  const editorTourSteps = [
    { targetId: "editor-steps-panel", placement: "right", title: "Plan de rédaction", content: "Voici les différentes étapes pour construire votre annonce. Vous pouvez rétracter ce panneau à l'aide de la flèche pour gagner de la place." },
    { targetId: "editor-left-panel", placement: "right", title: "Panneau de sélection", content: "C'est ici que vous sélectionnez les différents éléments qui vont constituer votre annonce, étape par étape." },
    { targetId: "editor-right-panel", placement: "left", title: "Aperçu en direct", content: "L'annonce que vous rédigez se met à jour automatiquement dans ce panneau en fonction de vos choix." },
    { targetId: "btn-context", placement: "bottom", title: "Voir le contexte", content: "À tout moment, vous pouvez relire les informations clés de l'entreprise et les détails du poste ici. Les éléments mis en avant évoluent en fonction de l’étape dans laquelle vous vous trouvez." },
    { targetId: "btn-hint", placement: "bottom", title: "Indice", content: "Ce bouton indice vous donne des éléments complémentaires." }
  ];

  // Reset editor tour progression when entering the editor view
  useEffect(() => {
    if (view === "editor" && !editorTourDone) {
      setEditorTourStep(0);
    }
  }, [view, editorTourDone]);

  const userAd = scenario ? buildJobAd(scenario.steps, selections) : {};

  const resetEditor = () => {
    setStepIdx(0);
    setMaxStepReached(0);
    setSelections({});
    setShowPreview(true);
  };

  const goToDashboard = () => {
    if (scenario && view === "editor") {
      setSavedData(prev => ({ ...prev, [scenario.id]: { selections, ad: userAd } }));
      if (!completedScenarios.includes(scenario.id)) setCompletedScenarios(prev => [...prev, scenario.id]);
    }
    setView("dashboard");
    setScenario(null);
    resetEditor();
  };

  const handleBack = () => {
    goToDashboard();
  };

  const handleRestartScenario = () => {
    resetEditor();
    setView("editor");
  };

  const handleSelectScenario = (sc) => {
    setScenario(sc);
    const saved = savedData[sc.id];
    let isNew = true;
    
    if (saved && saved.selections) {
      setSelections(saved.selections);
      if (completedScenarios.includes(sc.id)) {
        setMaxStepReached(sc.steps.length - 1);
      } else {
        const maxStep = Math.max(0, ...Object.keys(saved.selections).map(Number));
        setMaxStepReached(maxStep);
      }
      setStepIdx(0);
      setShowPreview(true);
      isNew = false;
    } else {
      resetEditor();
    }
    
    setView("editor");
    // Modale contextuelle directe si nouveau scénario
    if (isNew) {
      setShowContextModal(true);
    }
  };

  const handleReview = (id) => {
    const sc = SCENARIOS.find(s => s.id === id);
    const saved = savedData[id];
    if (sc && saved) {
      setScenario(sc);
      setSelections(saved.selections || {});
      setView("audit");
    }
  };

  const handleSelect = (opt) => {
    if (!scenario) return;
    const step = scenario.steps[stepIdx];
    const current = selections[stepIdx] || [];
    let next;
    if (step.type === "single") {
      next = [opt.id];
    } else {
      if (current.includes(opt.id)) {
        next = current.filter(id => id !== opt.id);
      } else {
        if (step.maxSelections && current.length >= step.maxSelections) return;
        next = [...current, opt.id];
      }
    }
    setSelections(prev => ({ ...prev, [stepIdx]: next }));
  };

  const handleNext = () => {
    if (!scenario) return;
    if (stepIdx < scenario.steps.length - 1) {
      const nextStep = stepIdx + 1;
      setStepIdx(nextStep);
      setMaxStepReached(prev => Math.max(prev, nextStep));
    } else {
      setSavedData(prev => ({ ...prev, [scenario.id]: { selections, ad: userAd } }));
      if (!completedScenarios.includes(scenario.id)) setCompletedScenarios(prev => [...prev, scenario.id]);
      setView("audit");
    }
  };

  const canProceed = scenario ? (selections[stepIdx] || []).length > 0 : false;
  const currentStep = scenario ? scenario.steps[stepIdx] : null;

  const titles = {
    dashboard: "Tableau de bord",
    editor: `Édition : ${scenario?.title || ""}`,
    audit: "Analyse de l'annonce",
  };

  const subtitles = {
    dashboard: "Vue d'ensemble de l'activité RH",
    editor: currentStep ? `Étape ${stepIdx + 1} / ${scenario?.steps.length} — ${currentStep.title}` : "",
    audit: "Comparaison et corrections",
  };

  // Progression globale pour le Header
  let progress = null;
  if (view === "editor" && scenario) {
    progress = {
      scenario: SCENARIOS.findIndex(s => s.id === scenario.id) + 1,
      totalScenarios: SCENARIOS.length,
      step: stepIdx + 1,
      totalSteps: scenario.steps.length
    };
  }

  return (
    <div className="fixed inset-0 overflow-hidden bg-slate-50 font-sans">
      
      {/* SCALED APPLICATION CONTAINER */}
      <div style={{
        transform: `scale(${zoomLevel})`,
        transformOrigin: 'top left',
        width: `${100 / zoomLevel}%`,
        height: `${100 / zoomLevel}%`,
        display: 'flex',
        flexDirection: 'column',
        position: 'absolute',
        top: 0,
        left: 0
      }}>
        
        {/* Affichage de l'écran d'accueil */}
        {view === "welcome" && (
          <WelcomeScreen onStart={() => setView("dashboard")} />
        )}

        {/* Contenu principal */}
        {view !== "welcome" && (
          <div className="flex-1 flex flex-col overflow-hidden relative">
            <Header
              title={titles[view] || ""}
              subtitle={subtitles[view] || ""}
              onBack={(view === "editor" || view === "audit") ? handleBack : null}
              progress={progress}
              action={view === "editor" ? (
                <button id="btn-context" onClick={() => setShowContextModal(true)}
                  className="flex items-center gap-1.5 px-3 py-1.5 bg-emerald-50 text-emerald-700 rounded-lg border border-emerald-200 hover:bg-emerald-100 text-xs font-semibold transition-colors focus:outline-none focus:ring-4 focus:ring-emerald-400">
                  <Info size={13}/> Voir le contexte
                </button>
              ) : null}
            />

            <main className="flex-1 overflow-hidden relative">
              {view === "dashboard" && (
                <Dashboard
                  onSelectScenario={handleSelectScenario}
                  completedScenarios={completedScenarios}
                  savedData={savedData}
                  onReview={handleReview}
                />
              )}

              {view === "editor" && scenario && currentStep && (
                <div className="flex h-full">
                  {/* Progress sidebar */}
                  <div id="editor-steps-panel" className={`${stepsCollapsed ? "w-20" : "w-64"} bg-white border-r border-slate-100 p-4 overflow-y-auto shrink-0 z-0 transition-all duration-300 flex flex-col relative`}>
                    <div className="flex items-center justify-between mb-4 px-1">
                      {!stepsCollapsed && <div className="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Étapes</div>}
                      <button onClick={() => setStepsCollapsed(!stepsCollapsed)} className={`p-1.5 hover:bg-slate-100 rounded-lg text-slate-400 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-400 ${stepsCollapsed ? "mx-auto" : ""}`} title={stepsCollapsed ? "Agrandir le panneau" : "Réduire le panneau"}>
                        {stepsCollapsed ? <ChevronRight size={14}/> : <ChevronLeft size={14}/>}
                      </button>
                    </div>
                    <div className="flex-1 space-y-1">
                      {scenario.steps.map((s, i) => {
                        const done = (selections[i] || []).length > 0;
                        const isActive = i === stepIdx;
                        const isLocked = i > maxStepReached;
                        return (
                          <button key={i} onClick={() => !isLocked && setStepIdx(i)}
                            disabled={isLocked}
                            title={stepsCollapsed ? s.title : (isLocked ? "Terminez l'étape précédente pour y accéder" : "")}
                            className={`w-full text-left rounded-xl transition-all flex items-center focus:outline-none focus:ring-4 focus:ring-indigo-400 focus:ring-inset ${stepsCollapsed ? "justify-center p-2.5" : "px-3 py-2.5 gap-3"} ${
                              isActive ? "bg-indigo-50 text-indigo-700 font-bold" :
                              done ? "text-emerald-700 hover:bg-emerald-50" :
                              isLocked ? "text-slate-400 cursor-not-allowed" : "text-slate-500 hover:bg-slate-50"
                            }`}>
                            <div className={`w-4 h-4 rounded-full flex items-center justify-center shrink-0 ${
                              isActive ? "bg-indigo-600" :
                              done ? "bg-emerald-500" : "border-2 border-slate-300"
                            }`}>
                              {done && !isActive && <Check size={10} className="text-white"/>}
                            </div>
                            {!stepsCollapsed && <span className="leading-snug truncate">{s.title}</span>}
                          </button>
                        );
                      })}
                    </div>
                  </div>

                  {/* Editor Left Panel */}
                  <div id="editor-left-panel" className="flex-1 min-w-0 border-r border-slate-200 overflow-hidden relative z-0 bg-white">
                    <StepEditor
                      step={currentStep}
                      selected={selections[stepIdx] || []}
                      onSelect={handleSelect}
                      onNext={handleNext}
                      canProceed={canProceed}
                    />
                  </div>

                  {/* Preview toggle + Right panel */}
                  {showPreview && (
                    <div id="editor-right-panel" className="flex-1 min-w-0 bg-white overflow-hidden border-l border-slate-100 shrink-0 z-0 flex flex-col">
                      <div className="flex items-center justify-between px-4 py-2.5 border-b border-slate-100 bg-slate-50 shrink-0">
                        <span className="text-xs font-bold text-slate-500 uppercase tracking-wider flex items-center gap-1.5">
                          <FileText size={12}/> Aperçu
                        </span>
                        <button onClick={() => setShowPreview(false)} className="text-slate-400 hover:text-slate-600 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-400 rounded">
                          <X size={14}/>
                        </button>
                      </div>
                      <div className="flex-1 overflow-y-auto">
                        <JobAdPreview ad={userAd} scenario={scenario} highlight={currentStep.section}/>
                      </div>
                    </div>
                  )}
                  {!showPreview && (
                    <button onClick={() => setShowPreview(true)}
                      className="absolute right-0 top-1/2 -translate-y-1/2 bg-white border border-slate-200 py-2 px-1.5 rounded-l-lg shadow text-slate-500 hover:text-indigo-600 transition-colors text-xs writing-mode-vertical focus:outline-none focus:ring-2 focus:ring-indigo-400"
                      style={{ position:"absolute" }}>
                      <FileText size={14}/>
                    </button>
                  )}
                </div>
              )}

              {view === "audit" && scenario && (
                <AuditView scenario={scenario} selections={selections} userAd={userAd} onBack={goToDashboard} onRestart={handleRestartScenario} />
              )}
            </main>
          </div>
        )}

        {/* Modal du contexte placée à l'intérieur pour suivre l'échelle de zoom */}
        {showContextModal && scenario && (
          <ContextModal scenario={scenario} step={currentStep} onClose={() => setShowContextModal(false)}/>
        )}

        {/* Spotlights intégrés au conteneur de zoom */}
        {view === "welcome" && !fullscreenTourDone && (
          <TourSpotlight
            zoomLevel={zoomLevel}
            step={{ 
              targetId: "btn-fullscreen-welcome", 
              placement: "bottom", 
              title: "Mode Plein Écran", 
              content: "L'activité nécessite d'être en plein écran pour un confort de lecture optimal. Cliquez ici pour l'activer et commencer l'expérience.", 
              nextLabel: "Passer en plein écran" 
            }}
            onNext={() => {
              setFullscreenTourDone(true);
              if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => console.error("Erreur plein écran:", e));
              }
            }}
            isLast={true}
          />
        )}

        {view === "dashboard" && !dashboardTourDone && (
          <TourSpotlight
            zoomLevel={zoomLevel}
            step={{ targetId: "scenario-row-0", title: "À vous de jouer !", content: "Cliquez sur un scénario dans le tableau pour démarrer la rédaction de votre annonce." }}
            onNext={() => setDashboardTourDone(true)}
            isLast={true}
          />
        )}

        {view === "editor" && !editorTourDone && editorTourSteps[editorTourStep] && (
          <TourSpotlight
            zoomLevel={zoomLevel}
            step={editorTourSteps[editorTourStep]}
            onNext={() => {
              if (editorTourStep < editorTourSteps.length - 1) {
                setEditorTourStep(s => s + 1);
              } else {
                setEditorTourDone(true);
              }
            }}
            isLast={editorTourStep === editorTourSteps.length - 1}
          />
        )}

      </div>

      {/* --- ÉLÉMENTS FIXES (HORS DU CONTENEUR ZOOMÉ) --- */}
      {/* Boutons de zoom fixés en bas à droite de la fenêtre */}
      <ZoomControls zoom={zoomLevel} setZoom={setZoomLevel} />
      
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
