er / Boulangère",annotation:"La double mention masculine/féminine est l'une des façons de respecter l'obligation légale de non-discrimination dans les offres d'emploi.",analysis:"✅ Correct : l'intitulé est clair sur le métier et respecte l'égalité homme-femme avec la double mention.",isOptimal:!0},{id:"t2",label:"Boulanger (H/F)",content:"Boulanger (H/F)",annotation:"La mention « H/F » est une autre façon courante et acceptée de signifier que le poste est ouvert à tous les genres.",analysis:"✅ Également correct : la mention (H/F) remplit la même obligation légale. Les deux formulations sont valides.",isOptimal:!0},{id:"t3",label:"Boulanger",content:"Boulanger",annotation:"Un intitulé uniquement au masculin peut laisser penser que le poste n'est pas ouvert aux femmes, même si ce n'est pas l'intention.",analysis:"⚠️ Risqué : sans mention féminine ni (H/F), l'annonce peut être considérée comme discriminatoire au regard du Code du travail (article L1142-1).",isOptimal:!1},{id:"t4",label:"Artisan passionné pour notre boutique",content:"Artisan passionné pour notre boutique",annotation:"Un intitulé trop vague ou « marketing » rend l'offre difficile à trouver pour les candidats qui recherchent un poste précis.",analysis:"❌ Inadapté : l'intitulé ne mentionne ni le métier de boulanger ni le genre. Il ne sera pas trouvé dans les recherches des candidats sur les sites d'emploi.",isOptimal:!1}]},{id:1,section:"companyDescription",title:"1. Présentation de l'employeur",instruction:"Comment présenter la boulangerie ? (2 choix)",hint:"La présentation de l'employeur doit permettre au candidat de comprendre à qui il a affaire : taille, activité, identité.",spotlight:"Louise Martin est une boulangerie artisanale indépendante située en centre-ville, avec un fournil sur place. Elle existe depuis 8 ans. C'est une petite structure (5 salariés) qui fabrique tous ses produits maison. Ce n'est ni un groupe, ni une franchise, ni un CFA.",type:"multi",maxSelections:2,options:[{id:"c1",label:"Boulangerie artisanale indépendante",content:"Boulangerie artisanale indépendante, implantée en centre-ville depuis 8 ans.",annotation:"Présenter la nature de l'entreprise (artisanale, indépendante) et son ancienneté permet au candidat de se projeter concrètement.",analysis:"✅ Pertinent : décrit fidèlement l'identité de l'établissement et son ancrage local.",isOptimal:!0},{id:"c2",label:"Fabrication 100 % maison",content:"Tous nos pains, viennoiseries et pâtisseries sont fabriqués sur place, dans notre propre fournil.",annotation:"Mettre en avant le savoir-faire artisanal est un argument d'attractivité pour les candidats qui veulent exercer un vrai métier de production.",analysis:"✅ Valorisant : souligne le positionnement artisanal et la promesse d'un travail de qualité.",isOptimal:!0},{id:"c3",label:"Franchise nationale de boulangerie",content:"Franchise nationale présente dans plus de 200 points de vente en France.",annotation:"Une franchise est un réseau de magasins sous une même enseigne. Ce n'est pas le cas de Louise Martin, qui est une boutique indépendante.",analysis:"❌ Inexact : Louise Martin est une boulangerie indépendante, pas une franchise. Donner une fausse information sur l'employeur est trompeur.",isOptimal:!1},{id:"c4",label:"CFA spécialisé dans les métiers de bouche",content:"CFA spécialisé dans les métiers de bouche, formant plus de 500 apprentis par an.",annotation:"Un CFA (Centre de Formation d'Apprentis) est un organisme de formation. C'est une structure très différente d'une boulangerie qui recrute un salarié.",analysis:"❌ Erreur : Louise Martin est une boulangerie qui cherche à embaucher, pas un centre de formation.",isOptimal:!1},{id:"c5",label:"Groupe de restauration rapide",content:"Groupe de restauration rapide en pleine expansion sur le marché français.",annotation:"La restauration rapide et la boulangerie artisanale sont deux secteurs très différents, avec des métiers et des conditions de travail distincts.",analysis:"❌ Faux : Louise Martin n'est pas un groupe de restauration rapide. Le candidat serait induit en erreur.",isOptimal:!1}]},{id:2,section:"contractType",title:"2. Type de contrat",instruction:"Quel type de contrat proposer ? (2 choix)",hint:"Le type de contrat doit correspondre à la nature du besoin : un besoin permanent appelle un CDI, un besoin temporaire un CDD.",spotlight:"La boulangerie perd un salarié qui part à la retraite. Le poste existait avant et existera après : le besoin est permanent. Il ne s'agit ni d'un remplacement temporaire, ni d'un surcroît d'activité saisonnier, ni d'une mission de formation.",type:"multi",maxSelections:2,options:[{id:"ct1",label:"CDI",content:"Poste à pourvoir en CDI (contrat à durée indéterminée).",annotation:"Le CDI est le contrat de droit commun en France. Il est adapté lorsque le besoin de l'entreprise est durable et permanent.",analysis:"✅ Adapté : le départ à la retraite crée un besoin permanent. Le CDI est le contrat logique.",isOptimal:!0},{id:"ct2",label:"Temps plein (35h)",content:"Temps plein, 35 heures par semaine.",annotation:"Préciser le volume horaire permet au candidat de savoir s'il s'agit d'un temps plein ou partiel.",analysis:"✅ Important : le candidat sait exactement à quoi s'attendre en termes de volume de travail.",isOptimal:!0},{id:"ct3",label:"CDD de 3 mois",content:"CDD de 3 mois renouvelable.",annotation:"Un CDD ne peut être utilisé que pour un motif précis (remplacement, surcroît temporaire, saison). Un besoin permanent ne justifie pas un CDD.",analysis:"❌ Inadapté : le besoin est permanent suite à un départ en retraite. Un CDD n'est pas justifié légalement dans ce cas.",isOptimal:!1},{id:"ct4",label:"Contrat d'apprentissage",content:"Contrat d'apprentissage de 24 mois.",annotation:"L'apprentissage est un contrat de formation initiale, destiné à un jeune en cours de diplôme. Il n'est pas adapté pour remplacer un salarié expérimenté.",analysis:"❌ Inadapté : on cherche un professionnel autonome immédiatement, pas un apprenti en formation.",isOptimal:!1},{id:"ct5",label:"Mission d'intérim",content:"Mission d'intérim de longue durée.",annotation:"L'intérim est conçu pour des besoins temporaires et ponctuels. Il est plus coûteux qu'une embauche directe et ne fidélise pas le salarié.",analysis:"❌ Inapproprié : l'intérim ne permet pas de construire une relation durable.",isOptimal:!1}]},{id:3,section:"purpose",title:"3. Contexte et objectif du poste",instruction:"Pourquoi ce poste est-il à pourvoir ? (2 choix)",hint:"Expliquer le contexte du recrutement aide le candidat à comprendre pourquoi le poste existe et ce qu'on attend de lui.",spotlight:"Le boulanger actuel, Jean-Pierre, part à la retraite fin mars après 15 ans dans la boutique. La boulangerie a besoin de quelqu'un pour assurer la continuité de la production quotidienne. Le nouveau boulanger travaillera aux côtés de la patronne et d'un apprenti déjà en poste.",type:"multi",maxSelections:2,options:[{id:"p1",label:"Remplacement suite à un départ en retraite",content:"Nous recherchons un boulanger ou une boulangère pour remplacer notre collaborateur qui part à la retraite après 15 ans à nos côtés.",annotation:"Expliquer le motif du recrutement (ici un départ en retraite) donne de la transparence et rassure le candidat sur la stabilité du poste.",analysis:"✅ Clair et honnête : le candidat comprend immédiatement pourquoi le poste se libère.",isOptimal:!0},{id:"p2",label:"Assurer la production quotidienne",content:"Vous assurez la production quotidienne de pains, viennoiseries et pâtisseries pour notre clientèle de quartier.",annotation:"Décrire la finalité opérationnelle du poste permet au candidat de comprendre son rôle concret.",analysis:"✅ Concret : le candidat sait exactement ce qu'on attend de lui au quotidien.",isOptimal:!0},{id:"p3",label:"Ouverture d'un deuxième point de vente",content:"Dans le cadre de l'ouverture d'un deuxième point de vente, nous recrutons un boulanger pour piloter la nouvelle production.",annotation:"Si le recrutement est lié à une ouverture de magasin, il faut le dire. Mais ce n'est pas le cas ici.",analysis:"❌ Faux : il n'y a pas de projet d'ouverture d'un second point de vente.",isOptimal:!1},{id:"p4",label:"Renforcement saisonnier pour l'été",content:"Pour faire face à l'affluence estivale, nous cherchons un renfort saisonnier de juin à septembre.",annotation:"Un besoin saisonnier est un besoin temporaire lié à une période précise de l'année. Ce n'est pas la situation ici.",analysis:"❌ Inexact : le besoin est permanent (départ en retraite), pas saisonnier.",isOptimal:!1},{id:"p5",label:"Constitution d'un vivier de candidatures",content:"Nous constituons un vivier de candidatures pour nos futurs besoins en boulangerie.",annotation:"Un vivier est une base de profils pour des recrutements futurs, sans poste réel à pourvoir immédiatement.",analysis:"❌ Trompeur : le poste est réel et immédiat. Parler de « vivier » donne l'impression qu'il n'y a rien de concret.",isOptimal:!1}]},{id:4,section:"missions",title:"4. Missions principales",instruction:"Quelles sont les missions du poste ? (4 choix)",hint:"Les missions doivent refléter le quotidien réel du poste : ni trop vagues, ni trop ambitieuses par rapport à la réalité.",spotlight:"Le boulanger ou la boulangère travaille seul(e) au fournil tôt le matin (à partir de 4h), puis est rejoint(e) par l'apprenti vers 6h. Il ou elle prépare environ 150 pains, 80 viennoiseries et 30 pâtisseries chaque jour. La gestion des stocks et le respect des normes d'hygiène font aussi partie du quotidien.",type:"multi",maxSelections:4,options:[{id:"m1",label:"Fabrication des pains et viennoiseries",content:"Réaliser la fabrication quotidienne des pains, viennoiseries et pâtisseries boulangères (pétrissage, façonnage, cuisson).",annotation:"C'est le cœur du métier de boulanger : décrire les gestes techniques permet au candidat de vérifier que le poste correspond à ses compétences.",analysis:"✅ Essentiel : c'est la mission principale du poste, décrite avec les gestes techniques clés.",isOptimal:!0},{id:"m2",label:"Gestion des matières premières",content:"Gérer les approvisionnements en matières premières (farines, levures, beurre) et contrôler les stocks.",annotation:"Dans une petite structure, le boulanger participe souvent à la gestion des commandes et des stocks.",analysis:"✅ Réaliste : dans une boulangerie de 5 salariés, le boulanger gère aussi ses approvisionnements.",isOptimal:!0},{id:"m3",label:"Respect des normes d'hygiène (HACCP)",content:"Appliquer et faire respecter les règles d'hygiène et de sécurité alimentaire (normes HACCP).",annotation:"L'hygiène alimentaire est une obligation légale dans tous les établissements qui manipulent des denrées.",analysis:"✅ Obligatoire : le respect des normes HACCP est non négociable en production alimentaire.",isOptimal:!0},{id:"m4",label:"Accompagnement de l'apprenti",content:"Accompagner et transmettre le savoir-faire à l'apprenti présent dans l'équipe.",annotation:"Un apprenti est déjà en poste dans la boulangerie. Le nouveau boulanger participera à sa formation au quotidien.",analysis:"✅ Pertinent : la transmission du savoir-faire fait partie intégrante du métier.",isOptimal:!0},{id:"m5",label:"Management d'une équipe de 15 personnes",content:"Manager une équipe de 15 collaborateurs répartis sur deux sites de production.",annotation:"La boulangerie Louise Martin compte 5 salariés au total. Une mission de management de 15 personnes ne correspond pas à cette structure.",analysis:"❌ Disproportionné : l'équipe complète ne compte que 5 personnes.",isOptimal:!1},{id:"m6",label:"Création d'une gamme traiteur",content:"Développer et lancer une nouvelle gamme traiteur (quiches, sandwiches, salades).",annotation:"Le traiteur est un autre métier qui n'est pas prévu dans ce poste.",analysis:"❌ Hors périmètre : ce n'est pas une mission prévue pour ce poste.",isOptimal:!1},{id:"m7",label:"Gestion des réseaux sociaux",content:"Animer les réseaux sociaux de la boulangerie et gérer la communication digitale.",annotation:"La communication digitale est un métier à part entière. Ce n'est pas le rôle d'un boulanger.",analysis:"❌ Hors sujet : ce n'est pas une compétence de boulanger.",isOptimal:!1},{id:"m8",label:"Livraison des commandes clients",content:"Assurer les livraisons de commandes en véhicule utilitaire chez les clients professionnels.",annotation:"La boulangerie Louise Martin est une boutique de vente directe. Elle ne fait pas de livraisons.",analysis:"❌ Inadapté : la boulangerie vend en boutique, pas en livraison.",isOptimal:!1}]},{id:5,section:"workingConditions",title:"5. Conditions de travail",instruction:"Quelles conditions de travail indiquer ? (3 choix)",hint:"Les conditions de travail doivent être transparentes pour éviter les mauvaises surprises : horaires, rythme, contraintes spécifiques.",spotlight:"Le fournil ouvre à 4h du matin. Le boulanger commence tôt pour que le pain soit prêt à l'ouverture de la boutique à 7h. Il travaille du mardi au samedi, avec le dimanche et le lundi comme jours de repos.",type:"multi",maxSelections:3,options:[{id:"wc1",label:"Horaires de matin (4h – 11h)",content:"Horaires de matin : prise de poste à 4h, fin de service vers 11h.",annotation:"En boulangerie, le travail commence très tôt pour que la production soit prête à l'ouverture. C'est une contrainte forte qu'il faut annoncer clairement.",analysis:"✅ Indispensable : les horaires matinaux sont la réalité du métier. Ne pas les mentionner serait un manque de transparence.",isOptimal:!0},{id:"wc2",label:"Du mardi au samedi",content:"Du mardi au samedi, repos le dimanche et le lundi.",annotation:"Préciser les jours travaillés et les jours de repos permet au candidat de vérifier la compatibilité avec sa vie personnelle.",analysis:"✅ Clair : le candidat connaît son planning hebdomadaire.",isOptimal:!0},{id:"wc3",label:"Fournil équipé et climatisé",content:"Fournil entièrement équipé (pétrin, diviseuse, four à sole) et climatisé.",annotation:"Mentionner l'équipement du fournil rassure le candidat sur ses conditions de travail concrètes.",analysis:"✅ Attractif : un fournil bien équipé est un argument de poids pour un boulanger professionnel.",isOptimal:!0},{id:"wc4",label:"Horaires de bureau (9h – 17h)",content:"Horaires classiques de bureau, du lundi au vendredi de 9h à 17h.",annotation:"La boulangerie est un métier de production matinale. Des horaires de bureau ne correspondent pas du tout à la réalité du fournil.",analysis:"❌ Trompeur : un boulanger ne travaille pas en horaires de bureau.",isOptimal:!1},{id:"wc5",label:"Télétravail 2 jours par semaine",content:"Possibilité de télétravail 2 jours par semaine.",annotation:"Le métier de boulanger est un métier manuel qui s'exerce exclusivement dans un fournil. Le télétravail est physiquement impossible.",analysis:"❌ Impossible : on ne peut pas pétrir du pain ni enfourner depuis chez soi.",isOptimal:!1},{id:"wc6",label:"Travail uniquement le week-end",content:"Poste exclusivement le week-end (samedi et dimanche).",annotation:"Le poste est un temps plein du mardi au samedi. Un poste de week-end uniquement ne correspond pas au besoin.",analysis:"❌ Faux : le besoin est un temps plein sur 5 jours.",isOptimal:!1}]},{id:6,section:"salary",title:"6. Rémunération",instruction:"Comment présenter la rémunération ? (2 choix)",hint:"La transparence sur le salaire est un facteur clé d'attractivité. Les candidats passent souvent les annonces sans salaire.",spotlight:"Le salaire prévu est de 2 200 € brut par mois pour 35h. Des heures supplémentaires peuvent s'y ajouter, majorées selon la convention collective de la boulangerie-pâtisserie. Le salaire ne dépend ni de l'âge, ni du sexe, ni de l'origine du candidat : c'est la loi.",type:"multi",maxSelections:2,options:[{id:"s1",label:"2 200 € brut / mois",content:"Rémunération : 2 200 € brut par mois pour 35 heures hebdomadaires.",annotation:"Afficher un montant précis est le moyen le plus efficace d'attirer des candidats pertinents.",analysis:"✅ Excellent : les annonces avec salaire reçoivent jusqu'à 30 % de candidatures en plus.",isOptimal:!0},{id:"s2",label:"Heures supplémentaires majorées",content:"Heures supplémentaires rémunérées et majorées selon la convention collective.",annotation:"Mentionner les heures supplémentaires majorées informe le candidat que le salaire réel peut être supérieur au montant de base.",analysis:"✅ Transparent : le candidat comprend que sa rémunération totale pourra dépasser le salaire de base.",isOptimal:!0},{id:"s3",label:"Salaire selon profil",content:"Salaire selon profil et expérience.",annotation:"La mention « selon profil » est très courante mais souvent mal perçue par les candidats, qui y voient un manque de transparence.",analysis:"⚠️ Déconseillé : cette formulation est vague et décourage de nombreux candidats.",isOptimal:!1},{id:"s4",label:"Rémunération variable selon l'âge",content:"Rémunération variable en fonction de l'âge du candidat.",annotation:"Fixer le salaire en fonction de l'âge est une discrimination interdite par le Code du travail (sauf apprentissage).",analysis:"❌ Illégal : hors contrat d'apprentissage, conditionner le salaire à l'âge est une discrimination prohibée.",isOptimal:!1},{id:"s5",label:"Salaire non communiqué",content:"Salaire : non communiqué.",annotation:"Ne pas indiquer de salaire réduit fortement l'attractivité d'une annonce.",analysis:"❌ Contre-productif : une annonce sans information salariale perd en attractivité et en crédibilité.",isOptimal:!1}]},{id:7,section:"requirements",title:"7. Profil recherché",instruction:"Quelles compétences et qualités demander ? (3 choix)",hint:"Le profil recherché doit être réaliste : demander trop de critères réduit inutilement le nombre de candidats, surtout dans un métier en tension.",spotlight:"Le métier de boulanger est un métier en tension : il y a plus d'offres que de candidats. Il faut donc être réaliste dans les exigences. Attention à ne pas exiger des critères qui n'ont pas de lien direct avec le poste (permis, langues, etc.).",type:"multi",maxSelections:3,options:[{id:"r1",label:"Maîtrise des techniques de boulangerie",content:"Maîtriser les techniques fondamentales de boulangerie (pétrissage, fermentation, cuisson).",annotation:"C'est la compétence technique de base pour exercer le métier.",analysis:"✅ Fondamental : c'est le cœur du métier.",isOptimal:!0},{id:"r2",label:"Autonomie et rigueur",content:"Faire preuve d'autonomie, de rigueur et de ponctualité.",annotation:"Le boulanger commence seul très tôt le matin. L'autonomie et la ponctualité sont essentielles dans ce contexte.",analysis:"✅ Pertinent : ces qualités sont directement liées aux conditions de travail du poste.",isOptimal:!0},{id:"r3",label:"Expérience de 2 ans ou diplôme en boulangerie",content:"Expérience de 2 ans en boulangerie ou diplôme en boulangerie (CAP, BP ou équivalent).",annotation:"Proposer une alternative diplôme OU expérience élargit le vivier de candidats sans baisser le niveau d'exigence.",analysis:"✅ Équilibré : le « ou » ouvre le poste à des profils variés sans sacrifier la compétence.",isOptimal:!0},{id:"r4",label:"BAC+3 en gestion obligatoire",content:"Diplôme BAC+3 minimum en gestion d'entreprise ou management.",annotation:"Un diplôme en gestion n'a pas de lien avec le métier de boulanger.",analysis:"❌ Disproportionné : cette exigence n'a aucun rapport avec le poste.",isOptimal:!1},{id:"r5",label:"Permis B obligatoire",content:"Permis de conduire (catégorie B) obligatoire.",annotation:"Le permis de conduire n'est utile que si le poste implique des déplacements. Ce n'est pas le cas ici.",analysis:"❌ Inutile : le poste est sédentaire dans le fournil.",isOptimal:!1},{id:"r6",label:"Anglais courant exigé",content:"Maîtrise courante de l'anglais à l'oral et à l'écrit.",annotation:"L'anglais n'est pas nécessaire pour fabriquer du pain dans une boulangerie de quartier.",analysis:"❌ Sans rapport : exiger l'anglais pour un poste de boulanger est discriminant et injustifié.",isOptimal:!1}]},{id:8,section:"benefits",title:"8. Avantages",instruction:"Quels avantages mettre en avant ? (3 choix)",hint:"Les avantages sont un levier d'attractivité. Ils doivent être réels et vérifiables, jamais inventés.",spotlight:"La boulangerie propose des avantages réels : mutuelle d'entreprise (obligatoire), pain et viennoiseries offerts chaque jour, et prime de fin d'année. Il ne faut pas promettre d'avantages qui n'existent pas (voiture de fonction, logement...).",type:"multi",maxSelections:3,options:[{id:"b1",label:"Mutuelle d'entreprise prise en charge à 60 %",content:"Mutuelle d'entreprise prise en charge à 60 % par l'employeur.",annotation:"La mutuelle est obligatoire mais le taux de prise en charge varie. Un taux supérieur au minimum légal (50 %) est un vrai plus.",analysis:"✅ Attractif : un taux de 60 % est au-dessus du minimum légal.",isOptimal:!0},{id:"b2",label:"Pain et viennoiseries offerts chaque jour",content:"Pain et viennoiseries offerts chaque jour à emporter.",annotation:"C'est un avantage concret et quotidien, très apprécié en boulangerie.",analysis:"✅ Concret : un avantage simple mais immédiat qui fait partie de la culture du métier.",isOptimal:!0},{id:"b3",label:"Prime de fin d'année",content:"Prime de fin d'année versée en décembre.",annotation:"Les primes sont des compléments de rémunération appréciés. Il faut les mentionner uniquement si elles sont réellement versées.",analysis:"✅ Valorisant : une prime annuelle est un argument de fidélisation.",isOptimal:!0},{id:"b4",label:"Véhicule de fonction",content:"Véhicule de fonction mis à disposition.",annotation:"Un véhicule de fonction est un avantage coûteux, habituellement réservé aux postes commerciaux ou de direction.",analysis:"❌ Irréaliste : une boulangerie de 5 salariés ne fournit pas de véhicule de fonction.",isOptimal:!1},{id:"b5",label:"Logement de fonction",content:"Logement de fonction à proximité de la boutique.",annotation:"Le logement de fonction est un avantage exceptionnel, quasi inexistant dans les petites boulangeries urbaines.",analysis:"❌ Irréaliste : ce type d'avantage n'est pas proposé par cette boulangerie.",isOptimal:!1},{id:"b6",label:"Intéressement sur le chiffre d'affaires",content:"Intéressement sur le chiffre d'affaires de la boulangerie.",annotation:"L'intéressement est un dispositif légal mais rare dans les très petites entreprises car il implique des formalités complexes.",analysis:"❌ Non prévu : cet avantage n'est pas en place dans la boulangerie.",isOptimal:!1}]}],Z2=[{id:0,section:"title",title:"Intitulé du poste",instruction:"Choisissez l'intitulé le plus adapté pour cette offre d'apprentissage.",hint:"Pour une offre d'apprentissage, l'intitulé doit mentionner le statut d'apprenti et le diplôme préparé.",spotlight:"FormAvenir est un CFA qui publie cette offre pour le compte d'une boulangerie partenaire. L'offre concerne un contrat d'apprentissage pour préparer un CAP Boulanger. L'intitulé doit clairement indiquer qu'il s'agit d'une formation en alternance.",type:"single",options:[{id:"t1",label:"Apprenti Boulanger / Apprentie Boulangère – CAP en Alternance",content:"Apprenti Boulanger / Apprentie Boulangère – CAP en Alternance",annotation:"Cet intitulé est complet : il mentionne le statut (apprenti), le diplôme (CAP) et le format (alternance). La double mention assure l'inclusivité.",analysis:"✅ Parfait : le candidat comprend immédiatement qu'il s'agit d'une formation en alternance pour un CAP Boulanger, ouverte à tous.",isOptimal:!0},{id:"t2",label:"Boulanger Junior @FormAvenir",content:"Boulanger Junior @FormAvenir",annotation:"Le terme « junior » est vague et n'indique pas qu'il s'agit d'un contrat d'apprentissage ni d'une formation diplômante.",analysis:"⚠️ Imprécis : « junior » ne définit pas le statut juridique d'apprenti, et le candidat ne sait pas qu'il prépare un CAP.",isOptimal:!1},{id:"t3",label:"Boulanger CDD Formation",content:"Boulanger CDD Formation",annotation:"Un contrat d'apprentissage n'est pas un CDD classique. C'est un contrat spécifique avec des règles propres.",analysis:"❌ Juridiquement incorrect : l'apprentissage a un cadre légal distinct du CDD.",isOptimal:!1}]},{id:1,section:"companyDescription",title:"1. Présentation de l'employeur",instruction:"Comment présenter le CFA FormAvenir ? (2 choix)",hint:"C'est le CFA qui publie l'offre. Le candidat doit comprendre à qui il a affaire.",spotlight:"FormAvenir est un CFA spécialisé dans les métiers de bouche (boulangerie, pâtisserie, cuisine). Il forme environ 300 apprentis par an en Île-de-France. La formation théorique se fait 100 % à distance. Le CFA place les apprentis dans des boulangeries partenaires.",type:"multi",maxSelections:2,options:[{id:"c1",label:"CFA spécialisé dans les métiers de bouche",content:"FormAvenir, CFA spécialisé dans les métiers de bouche (boulangerie, pâtisserie, cuisine).",annotation:"Identifier clairement le CFA et son domaine de spécialisation permet au candidat de savoir exactement quel organisme le formera.",analysis:"✅ Clair : le candidat sait qu'il sera formé par un CFA expert de son futur métier.",isOptimal:!0},{id:"c2",label:"300 apprentis formés par an",content:"Plus de 300 apprentis formés chaque année en Île-de-France, avec un réseau de boulangeries partenaires.",annotation:"Donner des chiffres concrets rassure le candidat sur le sérieux et l'expérience de l'organisme.",analysis:"✅ Crédible : les chiffres montrent l'envergure et l'expertise du CFA.",isOptimal:!0},{id:"c3",label:"Boulangerie artisanale de Levallois",content:"Boulangerie artisanale de Levallois, établie depuis 15 ans dans le quartier.",annotation:"La boulangerie partenaire n'est pas l'employeur qui publie l'offre. C'est le CFA qui recrute.",analysis:"❌ Erreur : c'est le CFA qui publie l'offre, pas la boulangerie d'accueil.",isOptimal:!1},{id:"c4",label:"Agence d'intérim spécialisée",content:"Agence d'intérim spécialisée dans le recrutement des métiers de bouche.",annotation:"Un CFA n'est pas une agence d'intérim. L'un forme, l'autre place des travailleurs temporaires.",analysis:"❌ Faux : le CFA forme des apprentis sur le long terme.",isOptimal:!1},{id:"c5",label:"Cabinet de recrutement RH",content:"Cabinet de recrutement RH spécialisé dans les métiers de l'artisanat.",annotation:"Un cabinet de recrutement cherche des candidats pour des postes existants. Un CFA forme des personnes pour qu'elles obtiennent un diplôme.",analysis:"❌ Inexact : le CFA n'est pas un cabinet de recrutement.",isOptimal:!1}]},{id:2,section:"contractType",title:"2. Type de contrat",instruction:"Quel type de contrat proposer ? (2 choix)",hint:"L'apprentissage est un contrat de travail spécifique, encadré par la loi, qui combine formation théorique et pratique.",spotlight:"Le contrat d'apprentissage est un contrat de travail à part entière, mais avec un volet formation obligatoire. L'apprenti alterne entre le CFA (cours) et l'entreprise (pratique). La durée est de 12 à 24 mois pour un CAP.",type:"multi",maxSelections:2,options:[{id:"ct1",label:"Contrat d'apprentissage",content:"Contrat d'apprentissage d'une durée de 12 à 24 mois.",annotation:"Le contrat d'apprentissage est le cadre juridique prévu par la loi pour former un jeune en alternance tout en le rémunérant.",analysis:"✅ Correct : c'est le contrat adapté pour préparer un CAP en alternance.",isOptimal:!0},{id:"ct2",label:"Alternance (CFA + entreprise)",content:"Formation en alternance : cours au CFA et pratique en boulangerie partenaire.",annotation:"Préciser le fonctionnement de l'alternance aide le candidat à comprendre l'organisation de sa formation.",analysis:"✅ Pédagogique : le candidat comprend concrètement comment sa formation sera organisée.",isOptimal:!0},{id:"ct3",label:"CDI temps plein",content:"CDI à temps plein, prise de poste immédiate.",annotation:"Un CDI est un contrat de salarié classique, sans volet formation.",analysis:"❌ Inadapté : on cherche un apprenti en formation, pas un salarié en CDI.",isOptimal:!1},{id:"ct4",label:"Stage non rémunéré de 6 mois",content:"Stage conventionné non rémunéré de 6 mois.",annotation:"L'apprentissage est obligatoirement rémunéré. Un stage non rémunéré ne permet pas de préparer un CAP.",analysis:"❌ Illégal : l'apprentissage implique une rémunération obligatoire.",isOptimal:!1},{id:"ct5",label:"CDD saisonnier de 3 mois",content:"CDD saisonnier de 3 mois (juillet à septembre).",annotation:"Un CDD saisonnier dure quelques mois. La préparation d'un CAP prend au minimum 12 mois.",analysis:"❌ Incompatible : un CAP ne se prépare pas en 3 mois.",isOptimal:!1}]},{id:3,section:"purpose",title:"3. Objectif de la formation",instruction:"Quel est l'objectif principal de cette offre ? (2 choix)",hint:"L'objectif d'une offre d'apprentissage est double : obtenir un diplôme et acquérir une expérience professionnelle.",spotlight:"L'apprenti prépare un CAP Boulanger, diplôme d'État de niveau 3. L'objectif est qu'à la fin de la formation, l'apprenti soit un professionnel qualifié capable de travailler de manière autonome.",type:"multi",maxSelections:2,options:[{id:"p1",label:"Obtenir un CAP Boulanger (diplôme d'État)",content:"Préparer et obtenir un CAP Boulanger, diplôme d'État reconnu par le ministère de l'Éducation nationale.",annotation:"C'est la finalité première de l'apprentissage : obtenir un diplôme qui valide les compétences professionnelles.",analysis:"✅ Fondamental : la promesse diplômante est la raison d'être de l'offre.",isOptimal:!0},{id:"p2",label:"Apprendre le métier en conditions réelles",content:"Apprendre le métier de boulanger en conditions réelles, au sein d'une boulangerie partenaire.",annotation:"L'apprentissage en entreprise est le complément essentiel de la formation théorique.",analysis:"✅ Concret : le candidat comprend qu'il apprendra le métier sur le terrain.",isOptimal:!0},{id:"p3",label:"Occuper un poste de boulanger confirmé",content:"Occuper immédiatement un poste de boulanger confirmé avec responsabilités complètes.",annotation:"Un apprenti est en formation. Il n'a pas le statut ni les responsabilités d'un professionnel confirmé.",analysis:"❌ Trompeur : l'apprenti est là pour apprendre, pas pour assumer les responsabilités d'un boulanger expérimenté.",isOptimal:!1},{id:"p4",label:"Stage de découverte du métier",content:"Effectuer un stage de découverte pour voir si le métier vous plaît.",annotation:"Un stage de découverte dure quelques jours. L'apprentissage est un engagement de 1 à 2 ans.",analysis:"❌ Minimisant : un apprentissage est bien plus qu'un stage de découverte.",isOptimal:!1},{id:"p5",label:"Remplacer un salarié absent",content:"Remplacer temporairement un salarié absent pour congé longue durée.",annotation:"Le remplacement temporaire est un motif de CDD, pas d'apprentissage.",analysis:"❌ Erreur de motif : l'apprentissage n'est pas un outil de remplacement.",isOptimal:!1}]},{id:4,section:"missions",title:"4. Missions de l'apprenti",instruction:"Quelles seront les missions de l'apprenti ? (4 choix)",hint:"Les missions d'un apprenti doivent être progressives et adaptées à son niveau. Il est là pour apprendre.",spotlight:"L'apprenti découvrira progressivement toutes les étapes de la fabrication : pétrissage, façonnage, fermentation, cuisson. Il apprendra aussi les bases de l'hygiène alimentaire et la gestion du poste de travail. En tant que débutant, il sera accompagné par son maître d'apprentissage.",type:"multi",maxSelections:4,options:[{id:"m1",label:"Apprendre les techniques de fabrication",content:"Apprendre les techniques de fabrication du pain, des viennoiseries et des pâtisseries boulangères sous la supervision du maître d'apprentissage.",annotation:"C'est la mission principale de l'apprenti : acquérir progressivement les gestes professionnels avec un encadrement adapté.",analysis:"✅ Essentiel : c'est le cœur de l'apprentissage.",isOptimal:!0},{id:"m2",label:"Appliquer les règles d'hygiène (HACCP)",content:"Appliquer les règles d'hygiène et de sécurité alimentaire au quotidien.",annotation:"L'hygiène alimentaire est une compétence fondamentale que tout professionnel de la boulangerie doit maîtriser.",analysis:"✅ Indispensable : c'est une compétence obligatoire dans tout métier de bouche.",isOptimal:!0},{id:"m3",label:"Participer à la gestion des stocks",content:"Participer à la gestion des stocks de matières premières et aux commandes fournisseurs.",annotation:"Impliquer l'apprenti dans la gestion des stocks fait partie de la formation complète au métier.",analysis:"✅ Formateur : comprendre la gestion des stocks est essentiel pour devenir autonome.",isOptimal:!0},{id:"m4",label:"Entretenir le matériel et le poste de travail",content:"Assurer l'entretien quotidien du matériel et le nettoyage du poste de travail.",annotation:"Le nettoyage et l'entretien font partie intégrante du métier.",analysis:"✅ Réaliste : la propreté du fournil est une responsabilité partagée par toute l'équipe.",isOptimal:!0},{id:"m5",label:"Gérer seul la production de nuit",content:"Assurer seul la production complète de nuit (22h – 6h).",annotation:"Un apprenti est en formation et doit être supervisé. Le travail de nuit est en principe interdit pour les apprentis mineurs.",analysis:"❌ Interdit ou dangereux : un apprenti ne doit pas travailler seul, encore moins de nuit.",isOptimal:!1},{id:"m6",label:"Développer la stratégie marketing",content:"Développer et mettre en œuvre la stratégie marketing et digitale de la boulangerie.",annotation:"Le marketing n'a aucun rapport avec la formation CAP Boulanger.",analysis:"❌ Hors sujet : cette mission ne fait pas partie du référentiel CAP Boulanger.",isOptimal:!1},{id:"m7",label:"Encadrer les autres apprentis",content:"Encadrer et former les autres apprentis de l'équipe.",annotation:"Un apprenti est lui-même en formation. Il ne peut pas encadrer d'autres personnes.",analysis:"❌ Illogique : un apprenti n'a ni l'expérience ni le statut pour encadrer.",isOptimal:!1}]},{id:5,section:"workingConditions",title:"5. Conditions de travail",instruction:"Quelles conditions de travail présenter ? (3 choix)",hint:"Les conditions doivent être adaptées au statut d'apprenti : horaires raisonnables, alternance clairement organisée.",spotlight:"La formation théorique chez FormAvenir se fait 100 % à distance (en ligne). La pratique se fait en boulangerie partenaire, proche du domicile si possible. Le début de contrat est prévu pour février 2026.",type:"multi",maxSelections:3,options:[{id:"wc1",label:"Formation théorique 100 % à distance",content:"La partie théorique de la formation se fait 100 % à distance, en ligne.",annotation:"La formation à distance est un vrai avantage logistique : pas de déplacements vers un centre de formation.",analysis:"✅ Attractif : c'est un argument fort, surtout pour les candidats éloignés des centres de formation.",isOptimal:!0},{id:"wc2",label:"Pratique en boulangerie proche du domicile",content:"Alternance en entreprise partenaire, idéalement à proximité de votre domicile.",annotation:"Le CFA s'efforce de placer les apprentis dans des boulangeries proches de chez eux.",analysis:"✅ Rassurant : la proximité géographique est un critère important pour le confort de vie.",isOptimal:!0},{id:"wc3",label:"Début de contrat en février 2026",content:"Début de contrat prévu en février 2026.",annotation:"Donner une date de début permet au candidat de se projeter dans le temps.",analysis:"✅ Concret : le candidat sait quand il commencera.",isOptimal:!0},{id:"wc4",label:"Cours en présentiel 5 jours par semaine au CFA",content:"Cours en présentiel obligatoire 5 jours par semaine dans les locaux du CFA.",annotation:"FormAvenir est un CFA 100 % en ligne. Il n'a pas de locaux pour des cours en présentiel.",analysis:"❌ Faux : FormAvenir est un CFA en ligne. Annoncer du présentiel est mensonger.",isOptimal:!1},{id:"wc5",label:"Télétravail intégral",content:"Poste en télétravail intégral, sans présence en entreprise requise.",annotation:"L'alternance implique obligatoirement une présence en entreprise pour la partie pratique.",analysis:"❌ Impossible : l'apprenti doit être physiquement présent en boulangerie.",isOptimal:!1},{id:"wc6",label:"Mobilité internationale obligatoire",content:"Mobilité internationale obligatoire avec un séjour de 3 mois à l'étranger.",annotation:"Un séjour à l'étranger n'est pas prévu dans le cadre de ce CAP Boulanger.",analysis:"❌ Inexact : ce n'est pas prévu et cela pourrait décourager des candidats.",isOptimal:!1}]},{id:6,section:"salary",title:"6. Rémunération",instruction:"Comment présenter la rémunération de l'apprenti ? (2 choix)",hint:"La rémunération d'un apprenti est fixée par la loi selon un pourcentage du SMIC, variable selon l'âge et l'année de formation.",spotlight:"En apprentissage, le salaire est un pourcentage du SMIC qui varie selon l'âge et l'année de formation. Par exemple, un apprenti de 18 à 20 ans en 1ère année touche 43 % du SMIC. Ce barème est fixé par le Code du travail.",type:"multi",maxSelections:2,options:[{id:"s1",label:"Rémunération selon barème légal (% du SMIC)",content:"Rémunération selon le barème légal de l'apprentissage (pourcentage du SMIC selon l'âge et l'année de formation).",annotation:"C'est le cadre légal. Indiquer que le salaire suit le barème officiel montre le respect des obligations.",analysis:"✅ Conforme : c'est la réalité juridique de la rémunération en apprentissage.",isOptimal:!0},{id:"s2",label:"Fourchette indicative (492 € à 1 823 €)",content:"Rémunération comprise entre 492 € et 1 823 € brut par mois, selon l'âge et le niveau de formation.",annotation:"Donner une fourchette concrète aide le candidat à se projeter financièrement.",analysis:"✅ Transparent : le candidat peut estimer sa rémunération selon sa situation.",isOptimal:!0},{id:"s3",label:"Salaire fixe de 2 500 € net",content:"Salaire fixe de 2 500 € net par mois, quel que soit l'âge.",annotation:"Ce montant est très largement supérieur aux barèmes légaux de l'apprentissage.",analysis:"❌ Trompeur : ce montant est irréaliste pour un apprenti.",isOptimal:!1},{id:"s4",label:"Formation non rémunérée",content:"Formation non rémunérée (gratuite pour l'apprenti).",annotation:"L'apprentissage est un contrat de travail qui implique obligatoirement une rémunération.",analysis:"❌ Illégal : un apprenti a le statut de salarié. Ne pas le rémunérer est contraire au Code du travail.",isOptimal:!1},{id:"s5",label:"Rémunération au pourboire",content:"Rémunération uniquement sous forme de pourboires.",annotation:"Les pourboires ne peuvent pas remplacer un salaire. L'apprenti a droit à une rémunération fixe.",analysis:"❌ Illégal : la rémunération doit être fixe et respecter le barème légal.",isOptimal:!1}]},{id:7,section:"requirements",title:"7. Conditions d'accès",instruction:"Quels sont les prérequis pour postuler ? (3 choix)",hint:"L'apprentissage est fait pour les débutants. Les prérequis doivent rester accessibles.",spotlight:"Pour un contrat d'apprentissage, le candidat doit être éligible (16 à 29 ans, ou sans limite d'âge pour les personnes en situation de handicap). Aucune expérience n'est nécessaire. Ce qui compte, c'est la motivation.",type:"multi",maxSelections:3,options:[{id:"r1",label:"Être éligible au contrat d'apprentissage",content:"Être éligible au contrat d'apprentissage (16 à 29 ans, ou sans limite d'âge pour les personnes en situation de handicap).",annotation:"C'est une condition légale incontournable.",analysis:"✅ Obligatoire : sans éligibilité, le contrat ne peut pas être signé.",isOptimal:!0},{id:"r2",label:"Être motivé et avoir un projet en boulangerie",content:"Être motivé par le métier de boulanger et avoir un projet professionnel dans ce domaine.",annotation:"La motivation est le critère le plus important pour un apprenti.",analysis:"✅ Essentiel : la motivation est le meilleur prédicteur de réussite en apprentissage.",isOptimal:!0},{id:"r3",label:"Être autorisé à travailler en France",content:"Être autorisé à travailler en France.",annotation:"Cette condition est obligatoire pour tout contrat de travail.",analysis:"✅ Indispensable : c'est une obligation légale.",isOptimal:!0},{id:"r4",label:"CAP Boulanger déjà obtenu",content:"Être déjà titulaire d'un CAP Boulanger.",annotation:"Si le candidat a déjà le CAP, il n'a pas besoin de le préparer à nouveau.",analysis:"❌ Illogique : on ne prépare pas un CAP qu'on possède déjà.",isOptimal:!1},{id:"r5",label:"3 ans d'expérience en boulangerie",content:"Justifier d'au moins 3 ans d'expérience en boulangerie.",annotation:"L'apprentissage s'adresse à des débutants.",analysis:"❌ Contradictoire : l'apprentissage est fait pour apprendre un métier, pas pour recruter des gens qui le maîtrisent déjà.",isOptimal:!1},{id:"r6",label:"Permis B obligatoire",content:"Permis de conduire catégorie B obligatoire.",annotation:"Le permis n'est pas nécessaire pour apprendre la boulangerie.",analysis:"❌ Discriminant : beaucoup de jeunes n'ont pas le permis.",isOptimal:!1}]},{id:8,section:"benefits",title:"8. Avantages de la formation",instruction:"Quels avantages mettre en avant ? (4 choix)",hint:"Les avantages d'un apprentissage sont nombreux : diplôme, gratuité, accompagnement... Mettez en avant ce qui est réel.",spotlight:"Chez FormAvenir, l'apprenti bénéficie de : la gratuité de la formation (prise en charge par l'OPCO), un coaching personnalisé, un diplôme d'État reconnu, et une aide au permis de conduire (500 €) pour les apprentis majeurs.",type:"multi",maxSelections:4,options:[{id:"b1",label:"Formation 100 % gratuite",content:"Formation 100 % gratuite pour l'apprenti (prise en charge par l'OPCO).",annotation:"En apprentissage, c'est l'employeur (via son OPCO) qui finance la formation. L'apprenti ne paie rien.",analysis:"✅ Très attractif : la gratuité est un argument décisif.",isOptimal:!0},{id:"b2",label:"Diplôme d'État reconnu (CAP)",content:"Obtention d'un diplôme d'État reconnu : le CAP Boulanger.",annotation:"Le CAP est un diplôme national qui ouvre les portes de l'emploi.",analysis:"✅ Fondamental : c'est la promesse centrale de l'offre.",isOptimal:!0},{id:"b3",label:"Coaching personnalisé",content:"Accompagnement personnalisé par un coach dédié tout au long de la formation.",annotation:"Un coaching individuel aide l'apprenti à rester motivé et à surmonter les difficultés.",analysis:"✅ Différenciant : c'est un service à forte valeur ajoutée.",isOptimal:!0},{id:"b4",label:"Aide au permis de conduire (500 €)",content:"Aide au financement du permis de conduire à hauteur de 500 € (dispositif légal pour les apprentis majeurs).",annotation:"Cette aide est un droit ouvert à tous les apprentis de 18 ans et plus.",analysis:"✅ Concret : un avantage financier réel que beaucoup ne connaissent pas.",isOptimal:!0},{id:"b5",label:"Logement étudiant fourni",content:"Logement étudiant fourni par le CFA pendant toute la durée de la formation.",annotation:"FormAvenir est un CFA en ligne. Il ne dispose pas de logements étudiants.",analysis:"❌ Faux : le CFA ne fournit pas de logement.",isOptimal:!1},{id:"b6",label:"Voyage d'études à l'étranger",content:"Voyage d'études de 2 semaines à l'étranger offert en fin de formation.",annotation:"Aucun voyage à l'étranger n'est prévu dans le cadre de cette formation.",analysis:"❌ Inventé : cet avantage n'existe pas.",isOptimal:!1}]}],K2=[{id:0,section:"title",title:"Intitulé du poste",instruction:"Choisissez l'intitulé le plus adapté pour cette offre.",hint:"L'intitulé doit indiquer clairement qu'il s'agit d'un apprentissage.",spotlight:"Passerelle CFA est une école 100 % en ligne. Suite au départ imprévu d'un salarié dans une boulangerie partenaire, le CFA publie cette offre pour recruter un apprenti qui préparera un CAP Boulanger tout en renforçant l'équipe.",type:"single",options:[{id:"t1",label:"Apprenti Boulanger / Apprentie Boulangère (H/F) – CAP en Alternance",content:"Apprenti Boulanger / Apprentie Boulangère (H/F) – CAP en Alternance",annotation:"L'intitulé mentionne le statut (apprenti), le métier (boulanger), l'inclusivité (H/F) et le diplôme (CAP). C'est complet.",analysis:"✅ Complet et inclusif : toutes les informations essentielles sont présentes.",isOptimal:!0},{id:"t2",label:"Boulanger débutant @Passerelle",content:"Boulanger débutant @Passerelle",annotation:"Le mot « débutant » n'a pas de statut juridique. Il ne précise pas qu'il s'agit d'un apprentissage.",analysis:"⚠️ Trop vague : « débutant » ne dit pas au candidat qu'il prépare un diplôme.",isOptimal:!1},{id:"t3",label:"Aide boulanger – Poste à pourvoir immédiatement",content:"Aide boulanger – Poste à pourvoir immédiatement",annotation:"« Aide boulanger » est un poste d'exécution sans formation diplômante.",analysis:"❌ Trompeur : cet intitulé fait penser à un emploi non qualifié, pas à un parcours de formation CAP.",isOptimal:!1}]},{id:1,section:"companyDescription",title:"1. Présentation de l'employeur",instruction:"Comment présenter Passerelle CFA ? (2 choix)",hint:"Passerelle est l'organisme qui publie l'offre et assure la formation.",spotlight:"Passerelle CFA est une école 100 % en ligne, partenaire de grands médias nationaux. Elle forme des apprentis dans les métiers de bouche et les place dans des entreprises partenaires.",type:"multi",maxSelections:2,options:[{id:"c1",label:"École de formation 100 % en ligne",content:"Passerelle CFA, école de formation 100 % en ligne spécialisée dans les métiers de l'artisanat.",annotation:"Identifier Passerelle comme une école en ligne permet au candidat de comprendre le format innovant de la formation.",analysis:"✅ Clair : le candidat comprend le positionnement et la spécificité de l'école.",isOptimal:!0},{id:"c2",label:"Partenaire de médias nationaux",content:"École partenaire de grands médias nationaux pour la promotion de l'apprentissage et de la reconversion professionnelle.",annotation:"Les partenariats médiatiques renforcent la crédibilité de l'école.",analysis:"✅ Crédible : cela rassure le candidat sur le sérieux de l'organisme.",isOptimal:!0},{id:"c3",label:"Boulangerie de quartier",content:"Boulangerie de quartier indépendante, ambiance familiale.",annotation:"Passerelle est le CFA, pas la boulangerie. La boulangerie est l'entreprise d'accueil.",analysis:"❌ Confusion : l'offre est publiée par le CFA, pas par la boulangerie.",isOptimal:!1},{id:"c4",label:"Agence de placement temporaire",content:"Agence de placement temporaire dans les métiers de la restauration.",annotation:"Passerelle n'est pas une agence d'intérim. C'est un organisme de formation.",analysis:"❌ Faux : le CFA forme et diplôme, il ne « place » pas des intérimaires.",isOptimal:!1},{id:"c5",label:"Cabinet de conseil RH",content:"Cabinet de conseil en ressources humaines et en recrutement.",annotation:"Passerelle n'est pas un cabinet de conseil. C'est un centre de formation.",analysis:"❌ Inexact : cette description ne correspond pas à l'activité de Passerelle.",isOptimal:!1}]},{id:2,section:"contractType",title:"2. Type de contrat",instruction:"Quel contrat proposer ? (2 choix)",hint:"Même dans un contexte d'urgence, c'est un contrat d'apprentissage qu'il faut proposer.",spotlight:"La boulangerie partenaire a choisi de recruter un apprenti plutôt qu'un intérimaire, car le besoin va au-delà de l'urgence immédiate. Le contrat d'apprentissage est un contrat de travail spécifique.",type:"multi",maxSelections:2,options:[{id:"ct1",label:"Contrat d'apprentissage",content:"Contrat d'apprentissage, à pourvoir dès que possible.",annotation:"Même en contexte d'urgence, le contrat d'apprentissage reste adapté si l'objectif est de former un futur professionnel.",analysis:"✅ Correct : la boulangerie a choisi l'apprentissage pour investir à long terme.",isOptimal:!0},{id:"ct2",label:"Alternance (cours en ligne + pratique)",content:"Formation en alternance : cours en ligne avec Passerelle CFA et pratique en boulangerie partenaire.",annotation:"Expliquer le fonctionnement concret de l'alternance aide le candidat à se projeter.",analysis:"✅ Explicite : le candidat comprend comment s'articulent formation et pratique.",isOptimal:!0},{id:"ct3",label:"CDI",content:"CDI à temps plein avec prise de poste immédiate.",annotation:"L'objectif est de former un apprenti, pas de recruter un salarié expérimenté.",analysis:"❌ Inadapté : le CDI ne correspond pas au choix stratégique fait par la boulangerie.",isOptimal:!1},{id:"ct4",label:"Mission d'intérim de 2 semaines",content:"Mission d'intérim de 2 semaines renouvelable.",annotation:"L'intérim est un contrat très court. Il ne permet pas de suivre une formation diplômante.",analysis:"❌ Incompatible : c'est l'option que la boulangerie a justement écartée.",isOptimal:!1},{id:"ct5",label:"Stage de découverte de 2 semaines",content:"Stage de découverte de 2 semaines non rémunéré.",annotation:"Un stage de découverte est très court et non rémunéré.",analysis:"❌ Hors sujet : un stage de 2 semaines n'a rien à voir avec un apprentissage diplômant.",isOptimal:!1}]},{id:3,section:"purpose",title:"3. Objectif du poste",instruction:"Quel est l'objectif de cette offre ? (2 choix)",hint:"L'offre combine un besoin immédiat (renforcer l'équipe) et un investissement à long terme (former un futur professionnel).",spotlight:"La boulangerie a perdu un salarié de manière imprévue. Plutôt que de recruter un intérimaire, elle a choisi de recruter un apprenti pour former un futur collaborateur fidèle. L'objectif est double : renforcer l'équipe et former un boulanger diplômé.",type:"multi",maxSelections:2,options:[{id:"p1",label:"Devenir boulanger diplômé et opérationnel",content:"Devenir un boulanger ou une boulangère diplômé(e) et opérationnel(le), capable de travailler en autonomie à l'issue de la formation.",annotation:"C'est la promesse de l'apprentissage : à la fin, le candidat possède un diplôme et un vrai savoir-faire.",analysis:"✅ Ambitieux et clair : le candidat comprend qu'il va acquérir un métier complet.",isOptimal:!0},{id:"p2",label:"Renforcer l'équipe tout en se formant",content:"Intégrer l'équipe de la boulangerie partenaire et contribuer à la production tout en vous formant au métier.",annotation:"Cette formulation traduit bien la double dimension de l'apprentissage : apprendre et contribuer.",analysis:"✅ Réaliste : le candidat sait qu'il sera utile tout en étant en formation.",isOptimal:!0},{id:"p3",label:"Remplacer temporairement un salarié",content:"Assurer le remplacement temporaire d'un salarié absent pendant 3 mois.",annotation:"L'apprentissage n'est pas un remplacement temporaire. Le candidat s'engage pour 1 à 2 ans.",analysis:"❌ Faux : l'apprenti ne remplace personne temporairement.",isOptimal:!1},{id:"p4",label:"Tester le métier pendant quelques semaines",content:"Tester le métier de boulanger pendant quelques semaines avant de décider.",annotation:"L'apprentissage est un engagement ferme sur 1 à 2 ans avec un contrat de travail.",analysis:"❌ Minimisant : un apprentissage est un vrai engagement professionnel.",isOptimal:!1},{id:"p5",label:"Faire de la vente en boutique",content:"Se spécialiser dans la vente et le conseil client en boutique.",annotation:"Le CAP Boulanger forme à la production, pas à la vente.",analysis:"❌ Hors sujet : le poste concerne la production en fournil.",isOptimal:!1}]},{id:4,section:"missions",title:"4. Missions de l'apprenti",instruction:"Quelles missions confier à l'apprenti ? (4 choix)",hint:"Les missions doivent être formatrices et encadrées.",spotlight:"L'apprenti travaillera sous la supervision de son tuteur. Ses missions seront progressives : observer et assister, puis réaliser des tâches de plus en plus complexes. Il participera à la production quotidienne, au nettoyage et au respect des normes d'hygiène.",type:"multi",maxSelections:4,options:[{id:"m1",label:"Fabrication quotidienne sous supervision",content:"Participer à la fabrication quotidienne de pains et viennoiseries sous la supervision du tuteur en entreprise.",annotation:"La mention « sous supervision » est importante : un apprenti est encadré.",analysis:"✅ Adapté : la mission est formatrice et clairement encadrée.",isOptimal:!0},{id:"m2",label:"Respect des normes d'hygiène",content:"Appliquer les règles d'hygiène et de sécurité alimentaire dans le respect des normes HACCP.",annotation:"L'hygiène est une compétence fondamentale en boulangerie.",analysis:"✅ Indispensable : c'est une mission de base.",isOptimal:!0},{id:"m3",label:"Nettoyage et entretien du matériel",content:"Assurer le nettoyage du poste de travail et l'entretien courant du matériel de boulangerie.",annotation:"Le nettoyage fait pleinement partie du métier de boulanger.",analysis:"✅ Réaliste : la propreté du fournil est une responsabilité quotidienne.",isOptimal:!0},{id:"m4",label:"Gestion des stocks",content:"Participer au suivi des stocks et à la réception des matières premières.",annotation:"Initier l'apprenti à la gestion des stocks complète sa formation.",analysis:"✅ Formateur : c'est une compétence complémentaire importante.",isOptimal:!0},{id:"m5",label:"Ouverture seul de la boulangerie à 4h",content:"Ouvrir seul la boulangerie chaque matin à 4h et lancer la production sans supervision.",annotation:"Un apprenti ne doit jamais être seul au fournil. C'est la responsabilité du tuteur.",analysis:"❌ Dangereux : laisser un apprenti ouvrir seul un commerce pose des problèmes de sécurité et de légalité.",isOptimal:!1},{id:"m6",label:"Comptabilité de l'entreprise",content:"Tenir la comptabilité et gérer la trésorerie de la boulangerie.",annotation:"La comptabilité est un métier à part entière.",analysis:"❌ Hors sujet : cela n'a rien à voir avec le métier de boulanger.",isOptimal:!1},{id:"m7",label:"Service en salle et caisse",content:"Assurer le service en salle, la prise de commandes et la tenue de caisse.",annotation:"Le CAP Boulanger forme à la production, pas à la vente.",analysis:"❌ Confusion de poste : l'apprenti est formé au fournil, pas au comptoir.",isOptimal:!1}]},{id:5,section:"workingConditions",title:"5. Conditions de travail",instruction:"Quelles conditions de travail présenter ? (3 choix)",hint:"Les conditions doivent être réalistes et adaptées au statut d'apprenti.",spotlight:"L'apprenti travaillera selon les horaires de la boulangerie (début tôt le matin). La formation théorique avec Passerelle se fait en ligne. Le rythme est de 4 jours en entreprise et 1 jour de formation. L'apprenti bénéficiera d'un coaching individuel.",type:"multi",maxSelections:3,options:[{id:"wc1",label:"Coaching individuel par Passerelle",content:"Accompagnement individuel par un coach Passerelle tout au long de la formation.",annotation:"Le coaching personnalisé aide l'apprenti à rester motivé et à surmonter les difficultés.",analysis:"✅ Différenciant : c'est un service premium qui montre l'investissement de l'école.",isOptimal:!0},{id:"wc2",label:"Horaires de boulangerie (début tôt le matin)",content:"Horaires de boulangerie : prise de poste tôt le matin, selon le planning de l'entreprise partenaire.",annotation:"Prévenir le candidat des horaires matinaux est une question d'honnêteté.",analysis:"✅ Transparent : le candidat sait à quoi s'attendre.",isOptimal:!0},{id:"wc3",label:"35 heures par semaine (entreprise + cours)",content:"35 heures par semaine au total, réparties entre la boulangerie et la formation en ligne.",annotation:"Indiquer le volume horaire global aide le candidat à comprendre l'organisation de sa semaine.",analysis:"✅ Clair : le candidat connaît son volume de travail.",isOptimal:!0},{id:"wc4",label:"Travail de nuit exclusif (22h – 6h)",content:"Travail exclusivement de nuit, de 22h à 6h, sans supervision.",annotation:"Le travail de nuit est interdit pour les apprentis mineurs et très encadré pour les majeurs.",analysis:"❌ Problématique : le travail de nuit est fortement réglementé pour les apprentis.",isOptimal:!1},{id:"wc5",label:"Repos garanti samedi et dimanche",content:"Repos garanti tous les samedis et dimanches sans exception.",annotation:"Le week-end est la période la plus chargée en boulangerie.",analysis:"❌ Irréaliste : promettre le repos systématique le week-end en boulangerie créerait une déception.",isOptimal:!1},{id:"wc6",label:"Déplacements nationaux fréquents",content:"Déplacements fréquents dans toute la France pour des missions en boulangeries partenaires.",annotation:"L'apprenti est affecté à une boulangerie précise.",analysis:"❌ Faux : l'apprenti travaille dans une seule boulangerie partenaire.",isOptimal:!1}]},{id:6,section:"salary",title:"6. Rémunération",instruction:"Comment présenter la rémunération ? (2 choix)",hint:"La rémunération suit le barème légal. Soyez transparent et précis.",spotlight:"La rémunération d'un apprenti suit le barème officiel : un pourcentage du SMIC qui varie selon l'âge et l'année de formation. Ce barème est fixé par la loi, l'employeur ne peut pas le modifier à la baisse.",type:"multi",maxSelections:2,options:[{id:"s1",label:"Pourcentage du SMIC selon l'âge",content:"Rémunération calculée sur un pourcentage du SMIC, selon l'âge et l'année de formation.",annotation:"C'est le cadre légal de la rémunération en apprentissage.",analysis:"✅ Conforme : cette information est exacte et permet au candidat de calculer son salaire.",isOptimal:!0},{id:"s2",label:"Grille officielle de l'apprentissage",content:"Rémunération selon la grille officielle de l'apprentissage, consultable sur le site du ministère du Travail.",annotation:"Renvoyer vers la grille officielle montre la transparence de l'annonce.",analysis:"✅ Transparent : le candidat peut vérifier par lui-même.",isOptimal:!0},{id:"s3",label:"Salaire fixe de 1 800 € net",content:"Salaire fixe de 1 800 € net par mois pour tous les apprentis.",annotation:"Ce montant est bien supérieur aux barèmes légaux.",analysis:"❌ Trompeur : un tel salaire ne correspond pas aux barèmes.",isOptimal:!1},{id:"s4",label:"Rémunération au mérite uniquement",content:"Rémunération uniquement au mérite, sans salaire de base garanti.",annotation:"L'apprenti a droit à un salaire fixe garanti par la loi.",analysis:"❌ Illégal : le salaire de base est un droit.",isOptimal:!1},{id:"s5",label:"Rémunération en nature (pain + logement)",content:"Rémunération sous forme d'avantages en nature : pain quotidien et logement.",annotation:"Un salarié, même apprenti, a droit à un salaire versé en argent.",analysis:"❌ Illégal : le salaire monétaire est obligatoire.",isOptimal:!1}]},{id:7,section:"requirements",title:"7. Profil recherché",instruction:"Quels sont les prérequis ? (3 choix)",hint:"L'apprentissage est ouvert aux débutants motivés.",spotlight:"L'apprentissage est par définition un dispositif pour les personnes qui veulent apprendre un métier. Il ne faut pas exiger d'expérience. Les critères importants sont : l'éligibilité légale, la motivation et l'intérêt pour le métier.",type:"multi",maxSelections:3,options:[{id:"r1",label:"Motivation et envie d'apprendre",content:"Être motivé(e) par le métier de boulanger et avoir une réelle envie d'apprendre.",annotation:"Pour un apprenti, la motivation est le critère le plus prédictif de réussite.",analysis:"✅ Essentiel : un apprenti motivé progressera plus vite.",isOptimal:!0},{id:"r2",label:"Éligible au contrat d'apprentissage",content:"Être éligible au contrat d'apprentissage (conditions d'âge ou dérogations légales).",annotation:"C'est une condition légale obligatoire.",analysis:"✅ Obligatoire : sans éligibilité, le contrat est juridiquement impossible.",isOptimal:!0},{id:"r3",label:"Ponctualité et sens du travail en équipe",content:"Faire preuve de ponctualité et apprécier le travail en équipe.",annotation:"En boulangerie, arriver à l'heure est crucial. L'esprit d'équipe favorise l'intégration.",analysis:"✅ Pertinent : ces qualités sont directement liées aux conditions de travail.",isOptimal:!0},{id:"r4",label:"Diplôme BAC+2 minimum",content:"Être titulaire d'un diplôme BAC+2 minimum en gestion ou en commerce.",annotation:"Le CAP est un diplôme de niveau 3, accessible dès la fin de 3ème.",analysis:"❌ Disproportionné : cette exigence exclut la majorité des candidats visés.",isOptimal:!1},{id:"r5",label:"5 ans d'expérience en restauration",content:"Justifier d'au moins 5 ans d'expérience en restauration ou en boulangerie.",annotation:"L'apprentissage est fait pour les débutants.",analysis:"❌ Absurde : si le candidat a 5 ans d'expérience, il n'a pas besoin d'un CAP.",isOptimal:!1},{id:"r6",label:"Maîtrise de l'anglais et de l'espagnol",content:"Maîtrise courante de l'anglais et de l'espagnol, à l'oral et à l'écrit.",annotation:"Les langues étrangères n'ont aucun rapport avec le métier de boulanger artisanal.",analysis:"❌ Sans rapport : exiger deux langues étrangères est discriminant et injustifié.",isOptimal:!1}]},{id:8,section:"benefits",title:"8. Avantages",instruction:"Quels avantages mettre en avant ? (4 choix)",hint:"Listez les avantages réels. Ne promettez rien qui n'existe pas.",spotlight:"Les avantages réels : formation gratuite (OPCO), coaching personnalisé, diplôme d'État reconnu, aide au permis de 500 € pour les majeurs. Ne mentionnez que des avantages qui existent réellement.",type:"multi",maxSelections:4,options:[{id:"b1",label:"Formation gratuite (prise en charge OPCO)",content:"Formation intégralement gratuite pour l'apprenti (financement OPCO).",annotation:"L'apprenti ne paie jamais sa formation.",analysis:"✅ Majeur : la gratuité est l'un des arguments les plus convaincants.",isOptimal:!0},{id:"b2",label:"Diplôme d'État reconnu (CAP)",content:"Obtention d'un diplôme d'État reconnu sur tout le territoire : le CAP Boulanger.",annotation:"Le CAP est un diplôme national, reconnu par tous les employeurs.",analysis:"✅ Fondamental : le diplôme est la promesse centrale.",isOptimal:!0},{id:"b3",label:"Coaching alternance dédié",content:"Accompagnement personnalisé par un coach Passerelle pour réussir votre alternance.",annotation:"Le coaching dédié est un service spécifique de Passerelle.",analysis:"✅ Différenciant : c'est un service exclusif à forte valeur ajoutée.",isOptimal:!0},{id:"b4",label:"Aide au permis (500 €)",content:"Aide au financement du permis de conduire de 500 € pour les apprentis majeurs (dispositif légal).",annotation:"Cette aide est un droit ouvert à tous les apprentis de 18 ans et plus.",analysis:"✅ Concret : un avantage financier réel.",isOptimal:!0},{id:"b5",label:"Ordinateur portable offert",content:"Ordinateur portable dernier cri offert dès la signature du contrat.",annotation:"Passerelle ne fournit pas d'ordinateur portable aux apprentis.",analysis:"❌ Inventé : promettre un avantage qui n'existe pas est trompeur.",isOptimal:!1},{id:"b6",label:"Voyage de fin de formation à l'étranger",content:"Voyage de fin de formation tous frais payés dans une capitale européenne.",annotation:"Aucun voyage n'est prévu dans le cadre de cette formation.",analysis:"❌ Fictif : inventer des avantages se retournera contre l'employeur.",isOptimal:!1}]}],Td=[{id:"louise-martin",title:"Boulanger / Boulangère",description:"Rédigez une offre d'emploi en CDI pour une boulangerie artisanale qui cherche à remplacer un salarié partant à la retraite.",role:"Responsable recrutement",companyName:"Boulangerie Louise Martin",companyType:"Boulangerie artisanale",context:`🥖 **CAS 1 — Boulangerie Louise Martin**
**📌 Contexte : Remplacement d'un départ en retraite**

La boulangerie Louise Martin est une boulangerie artisanale indépendante, installée en centre-ville depuis 8 ans. L'équipe est composée de 5 personnes : la gérante (Louise Martin), deux boulangers, une vendeuse et un apprenti.

**Le boulanger le plus ancien, Jean-Pierre, part à la retraite fin mars après 15 ans de service.** Son départ crée un vide dans l'équipe de production. Le fournil ne peut pas fonctionner normalement avec un seul boulanger et un apprenti.

Tous les produits sont fabriqués sur place : environ 150 pains, 80 viennoiseries et 30 pâtisseries boulangères par jour. Le boulanger commence à 4h du matin pour que tout soit prêt à l'ouverture à 7h.

L'entreprise a besoin d'un(e) professionnel(le) **autonome, capable de prendre en charge la production dès son arrivée**.

L'entreprise écarte donc :
- un CDD (le besoin n'est pas temporaire),
- un apprenti (le poste nécessite une autonomie immédiate),
- un intérimaire (le besoin est durable, pas ponctuel).

👉 **La boulangerie décide de recruter en CDI, à temps plein, un boulanger ou une boulangère expérimenté(e) pour assurer la continuité de la production.**`,steps:Q2},{id:"formavenir",title:"CAP Boulanger en Alternance",description:"Rédigez une offre d'apprentissage pour un CFA qui forme des boulangers en alternance, avec un réseau de boulangeries partenaires.",role:"Chargé de recrutement alternance",companyName:"CFA FormAvenir",companyType:"Centre de formation d'apprentis",context:`🎓 **CAS 2 — CFA FormAvenir**
**📌 Contexte : Recrutement d'apprentis pour la rentrée de février**

Le CFA FormAvenir est un centre de formation d'apprentis spécialisé dans les métiers de bouche : boulangerie, pâtisserie et cuisine. Il forme environ 300 apprentis par an en Île-de-France.

**Une boulangerie artisanale partenaire à Levallois souhaite accueillir un(e) apprenti(e) pour la rentrée de février 2026.** Elle veut former un futur collaborateur sur le long terme.

Le CFA FormAvenir propose une formation à distance (100 % en ligne) pour la partie théorique. La partie pratique se fait directement en boulangerie.

Le besoin est **qualifiant et anticipé** : il s'agit de former un professionnel, pas de combler un manque immédiat.

L'entreprise et le CFA privilégient :
- un contrat d'apprentissage (cadre juridique adapté),
- une formation diplômante reconnue par l'État (CAP Boulanger),
- un rythme d'alternance compatible avec l'activité,
- une rémunération encadrée par le barème légal.

👉 **Le CFA publie une offre d'alternance en CAP Boulanger, intégrant formation diplômante, entreprise partenaire et accompagnement personnalisé.**`,steps:Z2},{id:"passerelle",title:"Apprenti Boulanger / Apprentie Boulangère",description:"Rédigez une offre d'apprentissage pour une école en ligne qui doit placer rapidement un(e) apprenti(e) suite à un départ imprévu.",role:"Responsable placement alternance",companyName:"Passerelle CFA",companyType:"École en ligne",context:`🏫 **CAS 3 — Passerelle CFA**
**📌 Contexte : Besoin urgent suite à un départ imprévu**

Passerelle CFA est une école 100 % en ligne, partenaire de grands médias nationaux. Elle forme des apprentis dans les métiers de l'artisanat.

**Une boulangerie partenaire fait face à un départ imprévu d'un salarié.** L'équipe restante est en surcharge. Deux options sont envisagées :
- recruter un intérimaire pour répondre à l'urgence,
- recruter un apprenti et investir dans la formation.

**L'entreprise choisit la seconde option**, considérant que :
- la charge de travail permet d'encadrer un apprenti,
- le besoin va au-delà de l'urgence (le poste est durable),

    <div id="root"></div>
  
<script>
(function() {
  /* ── Fullscreen helpers ── */
  function requestFS(el) {
    if (el.requestFullscreen)            return el.requestFullscreen();
    if (el.webkitRequestFullscreen)      return el.webkitRequestFullscreen();
    if (el.mozRequestFullScreen)         return el.mozRequestFullScreen();
    if (el.msRequestFullscreen)          return el.msRequestFullscreen();
  }
  function exitFS() {
    if (document.exitFullscreen)         return document.exitFullscreen();
    if (document.webkitExitFullscreen)   return document.webkitExitFullscreen();
    if (document.mozCancelFullScreen)    return document.mozCancelFullScreen();
    if (document.msExitFullscreen)       return document.msExitFullscreen();
  }
  function isFS() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement ||
              document.mozFullScreenElement || document.msFullscreenElement);
  }
  function isInIframe() {
    try { return window.self !== window.top; } catch(e) { return true; }
  }

  /* ── Inject CSS ── */
  var style = document.createElement('style');
  style.textContent = [
    '#fs-btn {',
    '  position: fixed; bottom: 72px; right: 6px; z-index: 99999;',
    '  width: 40px; height: 40px; border-radius: 10px;',
    '  background: rgba(30,41,59,0.85); backdrop-filter: blur(6px);',
    '  border: 1px solid rgba(255,255,255,0.12); color: #fff;',
    '  display: flex; align-items: center; justify-content: center;',
    '  cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.3);',
    '  transition: background 0.15s, transform 0.15s;',
    '}',
    '#fs-btn:hover { background: rgba(79,70,229,0.9); transform: scale(1.08); }',
    '#fs-btn svg { width:18px; height:18px; fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }',
    /* LMS banner */
    '#fs-banner {',
    '  position: fixed; top: 0; left: 0; right: 0; z-index: 99998;',
    '  background: linear-gradient(90deg, #4f46e5, #7c3aed);',
    '  color: #fff; font-family: system-ui, sans-serif; font-size: 13px;',
    '  padding: 8px 16px; display: flex; align-items: center; gap: 10px;',
    '  box-shadow: 0 2px 8px rgba(0,0,0,0.25);',
    '}',
    '#fs-banner button {',
    '  background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);',
    '  color: #fff; border-radius: 6px; padding: 4px 12px; font-size: 12px;',
    '  cursor: pointer; font-weight: 600; white-space: nowrap;',
    '}',
    '#fs-banner button:hover { background: rgba(255,255,255,0.35); }',
    '#fs-banner .fs-close { margin-left: auto; background: none; border: none; color: rgba(255,255,255,0.7); font-size: 16px; cursor: pointer; padding: 0 4px; }',
    '.fs-active body { margin: 0; overflow: hidden; }'
  ].join('');
  document.head.appendChild(style);

  /* ── SVG icons ── */
  var iconExpand = '<svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>';
  var iconCompress = '<svg viewBox="0 0 24 24"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>';

  /* ── Build button ── */
  var btn = document.createElement('button');
  btn.id = 'fs-btn';
  btn.title = 'Plein écran';
  btn.innerHTML = iconExpand;

  function updateBtn() {
    btn.innerHTML = isFS() ? iconCompress : iconExpand;
    btn.title = isFS() ? 'Quitter le plein écran' : 'Plein écran';
  }

  btn.addEventListener('click', function() {
    if (isFS()) { exitFS(); }
    else {
      var p = requestFS(document.documentElement);
      if (p && p.catch) {
        p.catch(function() {
          /* Fallback if blocked (iframe without allow="fullscreen") */
          openNewWindow();
        });
      }
    }
  });

  document.addEventListener('fullscreenchange', updateBtn);
  document.addEventListener('webkitfullscreenchange', updateBtn);
  document.addEventListener('mozfullscreenchange', updateBtn);

  /* ── LMS iframe banner ── */
  function openNewWindow() {
    var url = window.location.href;
    if (url === 'about:blank' || url.indexOf('blob:') === 0) {
      /* Opened as local file inside iframe — clone content */
      var w = window.open('', '_blank');
      if (w) { w.document.write(document.documentElement.outerHTML); w.document.close(); }
    } else {
      window.open(url, '_blank', 'noopener');
    }
  }

  if (isInIframe()) {
    var banner = document.createElement('div');
    banner.id = 'fs-banner';
    banner.innerHTML = [
      '',
      '<button id="fs-expand-btn">⛶ Ouvrir en plein écran</button>',
      '<button class="fs-close" title="Fermer">✕</button>'
    ].join('');

    banner.querySelector('#fs-expand-btn').addEventListener('click', function() {
      var p = requestFS(document.documentElement);
      if (p && p.catch) {
        p.catch(function() { openNewWindow(); });
      } else if (!p) {
        openNewWindow();
      }
      banner.style.display = 'none';
    });
    banner.querySelector('.fs-close').addEventListener('click', function() {
      banner.style.display = 'none';
    });

    document.addEventListener('DOMContentLoaded', function() {
      document.body.appendChild(banner);
    });
  }

  /* ── Always append button ── */
  document.addEventListener('DOMContentLoaded', function() {
    document.body.appendChild(btn);
  });
})();
</script>
