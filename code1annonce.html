/* ─────────────────────────── HELPERS ─────────────────────────── */
function buildJobAd(steps, selections) {
  const ad = { title:"", companyDescription:"", contractType:"", purpose:"", missions:[], workingConditions:[], salary:"", requirements:[], benefits:[] };
  steps.forEach((step, idx) => {
    const sel = selections[idx] || [];
    const chosen = step.options.filter(o => sel.includes(o.id));
    if (Array.isArray(ad[step.section])) {
      ad[step.section] = chosen.map(o => o.content);
    } else {
      ad[step.section] = chosen.map(o => o.content).join("\n");
    }
  });
  return ad;
}

function buildOptimalAd(steps) {
  const sel = {};
  steps.forEach((step, idx) => {
    sel[idx] = step.options.filter(o => o.isOptimal).map(o => o.id);
  });
  return buildJobAd(steps, sel);
}

/* ─────────────────────────── FULLSCREEN BUTTON ─────────────────────────── */
function FullscreenButton({ id }) {
  const [isFullscreen, setIsFullscreen] = useState(false);

  useEffect(() => {
    const onFullscreenChange = () => setIsFullscreen(!!document.fullscreenElement);
    document.addEventListener('fullscreenchange', onFullscreenChange);
    return () => document.removeEventListener('fullscreenchange', onFullscreenChange);
  }, []);

  const toggle = () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(e => console.error(e));
    } else if (document.exitFullscreen) {
      document.exitFullscreen();
    }
  };

  return (
    <button id={id} onClick={toggle} className="w-8 h-8 bg-slate-800 hover:bg-slate-700 text-white rounded-lg flex items-center justify-center transition-colors ml-2 shadow-sm" title={isFullscreen ? "Quitter le plein écran" : "Plein écran"}>
      {isFullscreen ? <Minimize size={16}/> : <Maximize size={16}/>}
    </button>
  );
}

/* ─────────────────────────── ZOOM CONTROLS ─────────────────────────── */
function ZoomControls({ zoom, setZoom }) {
  return (
    <div className="fixed bottom-6 right-6 flex items-center bg-white rounded-full shadow-lg border border-slate-200 z-[9000] p-1 gap-1">
      <button onClick={() => setZoom(z => Math.max(0.5, z - 0.1))} className="p-2 hover:bg-slate-100 rounded-full text-slate-600 transition-colors" title="Dézoomer">
        <ZoomOut size={16}/>
      </button>
      <span className="text-xs font-bold text-slate-700 w-10 text-center">
        {Math.round(zoom * 100)}%
      </span>
      <button onClick={() => setZoom(z => Math.min(1.5, z + 0.1))} className="p-2 hover:bg-slate-100 rounded-full text-slate-600 transition-colors" title="Zoomer">
        <ZoomIn size={16}/>
      </button>
      <div className="w-px h-4 bg-slate-200 mx-1"/>
      <button onClick={() => setZoom(1)} className="p-2 hover:bg-slate-100 rounded-full text-slate-600 transition-colors" title="Réinitialiser le zoom">
        <RefreshCw size={14}/>
      </button>
    </div>
  );
}

/* ─────────────────────────── TOUR COMPONENT ─────────────────────────── */
function TourSpotlight({ step, onNext, isLast }) {
  const [rect, setRect] = useState(null);

  useEffect(() => {
    let timer;
    const updateRect = () => {
      const el = document.getElementById(step.targetId);
      if (el) {
        setRect(el.getBoundingClientRect());
        // Défilement doux vers l'élément si nécessaire
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
        // Mise à jour finale après le scroll
        timer = setTimeout(() => {
          const newEl = document.getElementById(step.targetId);
          if(newEl) setRect(newEl.getBoundingClientRect());
        }, 300);
      }
    };
    timer = setTimeout(updateRect, 50); // Petit délai pour laisser React faire le rendu
    window.addEventListener('resize', updateRect);
    return () => {
      window.removeEventListener('resize', updateRect);
      clearTimeout(timer);
    };
  }, [step]);

  if (!rect) return null;

  const tooltipWidth = 550; // Nouvelle largeur BEAUCOUP plus grande

  // Placement intelligent pour garder l'infobulle dans l'écran et ne pas cacher la cible
  let top = rect.bottom + 24;
  let left = rect.left + (rect.width / 2) - (tooltipWidth / 2);

  if (step.placement === 'right') {
    top = rect.top + Math.min(rect.height / 3, 100);
    left = rect.right + 32;
  } else if (step.placement === 'left') {
    top = rect.top + Math.min(rect.height / 3, 100);
    left = rect.left - tooltipWidth - 32;
  } else if (step.placement === 'bottom') {
    top = rect.bottom + 24;
    left = rect.left + (rect.width / 2) - (tooltipWidth / 2);
  }

  // Sécurité : on garde l'infobulle dans la fenêtre
  if (left < 24) left = 24;
  if (left + tooltipWidth > window.innerWidth - 24) left = window.innerWidth - tooltipWidth - 24;
  if (top < 24) top = 24;
  if (top + 260 > window.innerHeight) top = Math.max(24, window.innerHeight - 260);

  return (
    <div className="fixed inset-0 z-[9990]">
      {/* Bloqueur invisible cliquable pour empêcher les actions intempestives */}
      <div className="absolute inset-0 bg-transparent" onClick={(e) => { e.stopPropagation(); e.preventDefault(); }} />
      
      {/* Masque global assombri avec trou lumineux sur la zone (Spotlight) */}
      <div style={{
        position: 'absolute',
        top: rect.top - 8, left: rect.left - 8,
        width: rect.width + 16, height: rect.height + 16,
        boxShadow: '0 0 0 9999px rgba(15, 23, 42, 0.7), inset 0 0 0 2px #6366f1',
        borderRadius: '12px',
        pointerEvents: 'none',
        transition: 'all 0.3s ease'
      }} />

      {/* Infobulle */}
      <div style={{ position: 'absolute', top, left, width: `${tooltipWidth}px` }} 
           className="bg-white p-10 rounded-3xl shadow-[0_30px_60px_-15px_rgba(0,0,0,0.6)] border-2 border-indigo-500 fade-in transition-all duration-300 z-[9999]">
        <h4 className="text-2xl font-bold text-indigo-600 mb-4 flex items-center gap-4"><Lightbulb size={28}/> {step.title}</h4>
        <p className="text-lg text-slate-700 mb-8 leading-relaxed">{step.content}</p>
        <div className="flex justify-end">
          <button onClick={(e) => { e.stopPropagation(); onNext(); }} 
                  className="px-8 py-4 bg-indigo-600 text-white rounded-xl text-lg font-bold hover:bg-indigo-700 transition-colors shadow-xl">
            {step.nextLabel || (isLast ? "C'est compris !" : "Suivant")}
          </button>
        </div>
      </div>
    </div>
  );
}

          { label:"Offres actives", value:"3", color:"emerald", icon:<CheckCircle size={18}/> },
          { label:"Candidatures", value:"57", color:"blue", icon:<Users size={18}/> },
          { label:"Délai moyen", value:"12j", color:"amber", icon:<Clock size={18}/> },
        ].map(s => (
          <div key={s.label} className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
            <div className={`w-9 h-9 bg-${s.color}-100 text-${s.color}-600 rounded-lg flex items-center justify-center mb-3`}>{s.icon}</div>
            <div className="text-2xl font-bold text-slate-900">{s.value}</div>
            <div className="text-slate-500 text-sm">{s.label}</div>
          </div>
        ))}
      </div>

      <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <table className="w-full text-left text-sm">
          <thead className="bg-slate-50 border-b border-slate-200">
            <tr>
              {["Intitulé","Département","Statut","Candidats","Actions"].map(h => (
                <th key={h} className="px-5 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider">{h}</th>
              ))}
            </tr>
          </thead>
          <tbody className="divide-y divide-slate-100">
            {rows.map(r => (
              <tr key={r.id} className={`hover:bg-slate-50 transition-colors ${r.completed ? "cursor-pointer" : ""}`}
                onClick={() => r.completed && onReview(r.id)}>
                <td className="px-5 py-3.5 font-medium text-slate-900">
                  <div className="flex items-center gap-2">
                    {r.completed && (
                      <span className="relative flex h-2 w-2 shrink-0">
                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"/>
                        <span className="relative inline-flex h-2 w-2 rounded-full bg-red-500"/>
                      </span>
                    )}
                    {r.title}
                  </div>
                </td>
                <td className="px-5 py-3.5 text-slate-500">{r.dept}</td>
                <td className="px-5 py-3.5">
                  <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${
                    r.status==="Terminé" ? "bg-blue-100 text-blue-700 font-bold border border-blue-200" :
                    r.status==="Active" ? "bg-emerald-100 text-emerald-700" : "bg-slate-100 text-slate-600"
                  }`}>{r.status}</span>
                </td>
                <td className="px-5 py-3.5 text-slate-500 flex items-center gap-1"><Users size={13}/>{r.candidates}</td>
                <td className="px-5 py-3.5">
                  {r.completed && <span className="text-xs text-indigo-600 font-medium hover:underline">Consulter →</span>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ─────────────────────────── TEMPLATE SELECTOR ─────────────────────────── */
function TemplateSelector({ onSelect, completedScenarios }) {
  return (
    <div className="p-8 overflow-y-auto h-full">
      <div className="max-w-5xl mx-auto">
        <div className="mb-6">
          <h2 className="text-xl font-bold text-slate-900 mb-1">Modèles disponibles</h2>
          <p className="text-slate-500 text-sm">Sélectionnez un modèle pour démarrer la rédaction de votre annonce.</p>
        </div>
        <div className="grid grid-cols-3 gap-5">
          {SCENARIOS.map((sc, i) => {
            const done = completedScenarios.includes(sc.id);
            return (
              <button key={sc.id} onClick={() => onSelect(sc)}
                className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 hover:border-indigo-500 hover:shadow-md transition-all text-left group flex flex-col h-full relative overflow-hidden fade-in">
                {done && (
                  <div className="absolute top-0 right-0 bg-emerald-500 text-white text-xs font-bold px-3 py-1 rounded-bl-lg flex items-center gap-1">
                    <Check size={11}/> Terminé
                  </div>
                )}
                <div className="w-11 h-11 bg-indigo-50 text-indigo-600 rounded-lg flex items-center justify-center mb-4 group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                  <Briefcase size={20}/>
                </div>
                <h3 className="text-base font-bold text-slate-900 mb-1">{sc.title}</h3>
                <div className="text-xs font-medium text-slate-400 uppercase tracking-wider mb-2">{sc.role}</div>
                <p className="text-slate-500 text-sm mb-4 flex-1 leading-relaxed">{sc.description}</p>
                <div className="flex items-center gap-1.5 text-indigo-600 font-bold text-sm mt-auto pt-3 border-t border-slate-50 group-hover:translate-x-1 transition-transform">
                  {done ? "Recommencer" : "Utiliser ce modèle"} <ArrowRight size={14}/>
                </div>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────── HEADER ─────────────────────────── */
function Header({ title, subtitle, action, onBack }) {
  return (
    <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0 relative z-10">
      <div className="flex items-center gap-4">
        {onBack && (
          <button onClick={onBack} className="p-1.5 -ml-2 hover:bg-slate-100 rounded-lg text-slate-500 hover:text-slate-800 transition-colors" title="Retour au tableau de bord">
            <ArrowLeft size={18}/>
          </button>
        )}
        <div>
          <h1 className="text-lg font-bold text-slate-900 leading-tight">{title}</h1>
          {subtitle && <p className="text-xs text-slate-400">{subtitle}</p>}
        </div>
        {action && <div className="pl-4 border-l border-slate-200">{action}</div>}
      </div>
      <div className="flex items-center gap-3">
        <div className="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 border border-indigo-200 text-sm font-bold">S</div>
        <div className="hidden sm:block text-right">
          <div className="text-xs font-bold text-slate-800">Sophie Martin</div>
          <div className="text-[10px] text-slate-400">DRH</div>
        </div>
        <FullscreenButton id="btn-fullscreen-header" />
      </div>
    </header>
  );
}

/* ─────────────────────────── CONTEXT MODAL ─────────────────────────── */
function ContextModal({ scenario, step, onClose }) {
  return (
    <div className="fixed inset-0 z-[10010]">
      <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={onClose}/>
      <div className="relative flex items-center justify-center h-full p-4 pointer-events-none">
        <div className="bg-white w-full max-w-xl max-h-[75vh] rounded-2xl shadow-2xl overflow-hidden flex flex-col pointer-events-auto fade-in">
          <div className="bg-slate-900 p-5 text-white flex items-center justify-between">
            <div className="flex items-center gap-2">
              <BookOpen size={16} className="text-emerald-400"/>
              <div>
                <div className="font-bold text-sm">{step?.title}</div>
                <div className="text-xs text-slate-400">{scenario.companyName}</div>
              </div>
            </div>
            <button onClick={onClose} className="text-slate-400 hover:text-white transition-colors p-1"><X size={16}/></button>
          </div>
          <div className="p-5 overflow-y-auto">
            {step?.spotlight && (
              <div className="mb-4 p-4 bg-amber-50 rounded-xl border border-amber-200">
                <div className="flex items-start gap-2">
                  <Lightbulb size={16} className="text-amber-600 shrink-0 mt-0.5"/>
                  <div>
                    <div className="font-bold text-amber-900 text-xs uppercase mb-1">Éclairage — {step.title}</div>
                    <p className="text-amber-800 text-sm leading-relaxed">{step.spotlight}</p>
                  </div>
                </div>
              </div>
            )}
            <div className="text-slate-600 text-sm leading-relaxed whitespace-pre-line">
              {scenario.context.replace(/\*\*(.*?)\*\*/g, '$1')}
            </div>
          </div>
          <div className="p-4 border-t border-slate-100 flex justify-end">
            <button onClick={onClose} className="px-5 py-2 bg-slate-900 text-white rounded-xl font-bold text-sm hover:bg-slate-800 transition-colors">
              J'ai compris
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────── APP ─────────────────────────── */
function App() {
  const [zoomLevel, setZoomLevel] = useState(1.2);
  const [view, setView] = useState("welcome"); // welcome | dashboard | templates | context | editor | audit
  const [scenario, setScenario] = useState(null);
  const [stepIdx, setStepIdx] = useState(0);
  const [selections, setSelections] = useState({}); // stepIdx -> [optionIds]
  const [completedScenarios, setCompletedScenarios] = useState([]);
  const [savedData, setSavedData] = useState({});
  const [showPreview, setShowPreview] = useState(true);
  const [showContextModal, setShowContextModal] = useState(false);
  const [stepsCollapsed, setStepsCollapsed] = useState(false);
  const [maxStepReached, setMaxStepReached] = useState(0);

  // Tour States
  const [fullscreenTourDone, setFullscreenTourDone] = useState(false);
  const [dashboardTourDone, setDashboardTourDone] = useState(false);
  const [editorTourDone, setEditorTourDone] = useState(false);
  const [editorTourStep, setEditorTourStep] = useState(0);

  const editorTourSteps = [
    { targetId: "editor-steps-panel", placement: "right", title: "Plan de rédaction", content: "Voici les différentes étapes pour construire votre annonce. Vous pouvez rétracter ce panneau à l'aide de la flèche pour gagner de la place." },
    { targetId: "editor-left-panel", placement: "right", title: "Panneau de sélection", content: "C'est ici que vous sélectionnez les différents éléments qui vont constituer votre annonce, étape par étape." },
    { targetId: "editor-right-panel", placement: "left", title: "Aperçu en direct", content: "L'annonce que vous rédigez se met à jour automatiquement dans ce panneau en fonction de vos choix." },
    { targetId: "btn-context", placement: "bottom", title: "Voir le contexte", content: "À tout moment, vous pouvez relire les informations clés de l'entreprise et les détails du poste ici. Les éléments mis en avant évoluent en fonction de l’étape dans laquelle vous vous trouvez." },
    { targetId: "btn-hint", placement: "bottom", title: "Indice", content: "Ce bouton indice vous donne des éléments complémentaires." }
  ];

  // Reset editor tour progression when entering the editor view
  useEffect(() => {
    if (view === "editor" && !editorTourDone) {
      setEditorTourStep(0);
    }
  }, [view, editorTourDone]);

  const userAd = scenario ? buildJobAd(scenario.steps, selections) : {};

  const resetEditor = () => {
    setStepIdx(0);
    setMaxStepReached(0);
    setSelections({});
    setShowPreview(true);
  };

  const goToDashboard = () => {
    if (scenario) {
      setSavedData(prev => ({ ...prev, [scenario.id]: { selections, ad: userAd } }));
      if (!completedScenarios.includes(scenario.id)) setCompletedScenarios(prev => [...prev, scenario.id]);
    }
    setView("dashboard");
    setScenario(null);
    resetEditor();
  };

  const handleBack = () => {
    if (view === "editor" || view === "context") {
      goToDashboard();
    } else if (view === "templates") {
      setView("dashboard");
    }
  };

  const handleSelectScenario = (sc) => {
    setScenario(sc);
    const saved = savedData[sc.id];
    if (saved && saved.selections) {
      setSelections(saved.selections);
      if (completedScenarios.includes(sc.id)) {
        setMaxStepReached(sc.steps.length - 1);
      } else {
        const maxStep = Math.max(0, ...Object.keys(saved.selections).map(Number));
        setMaxStepReached(maxStep);
      }
      setStepIdx(0);
      setShowPreview(true);
    } else {
      resetEditor();
    }
    setView("context");
  };

  const handleReview = (id) => {
    const sc = SCENARIOS.find(s => s.id === id);
    const saved = savedData[id];
    if (sc && saved) {
      setScenario(sc);
      setSelections(saved.selections || {});
      setView("audit");
    }
  };

  const handleSelect = (opt) => {
    if (!scenario) return;
    const step = scenario.steps[stepIdx];
    const current = selections[stepIdx] || [];
    let next;
    if (step.type === "single") {
      next = [opt.id];
    } else {
      if (current.includes(opt.id)) {
        next = current.filter(id => id !== opt.id);
      } else {
        if (step.maxSelections && current.length >= step.maxSelections) return;
        next = [...current, opt.id];
      }
    }
    setSelections(prev => ({ ...prev, [stepIdx]: next }));
  };

  const handleNext = () => {
    if (!scenario) return;
    if (stepIdx < scenario.steps.length - 1) {
      const nextStep = stepIdx + 1;
      setStepIdx(nextStep);
      setMaxStepReached(prev => Math.max(prev, nextStep));
    } else {
      setSavedData(prev => ({ ...prev, [scenario.id]: { selections, ad: userAd } }));
      if (!completedScenarios.includes(scenario.id)) setCompletedScenarios(prev => [...prev, scenario.id]);
      setView("audit");
    }
  };

  const canProceed = scenario ? (selections[stepIdx] || []).length > 0 : false;
  const currentStep = scenario ? scenario.steps[stepIdx] : null;

  const titles = {
    dashboard: "Tableau de bord",
    templates: "Nouvelle offre",
    context: `Contexte : ${scenario?.title || ""}`,
    editor: `Édition : ${scenario?.title || ""}`,
    audit: "Analyse de l'annonce",
  };

  const subtitles = {
    dashboard: "Vue d'ensemble de l'activité RH",
    templates: "Sélectionnez un modèle de poste",
    context: "Comprendre les enjeux du recrutement",
    editor: currentStep ? `Étape ${stepIdx + 1} / ${scenario?.steps.length} — ${currentStep.title}` : "",
    audit: "Comparaison et corrections",
  };

  const isAudit = view === "audit";

  return (
    <div className="relative w-screen h-screen overflow-hidden bg-slate-50 font-sans">
      
      {/* SCALED APPLICATION CONTAINER */}
      <div style={{
        transform: `scale(${zoomLevel})`,
        transformOrigin: 'top left',
        width: `${100 / zoomLevel}%`,
        height: `${100 / zoomLevel}%`,
        display: 'flex',
        flexDirection: 'column',
        position: 'absolute',
        top: 0,
        left: 0
      }}>
        
        {/* Affichage de l'écran d'accueil */}
        {view === "welcome" && (
          <WelcomeScreen onStart={() => setView("dashboard")} />
        )}

        {/* Contenu principal */}
        {view !== "welcome" && (
          <div className="flex-1 flex flex-col overflow-hidden relative">
            <Header
              title={titles[view] || ""}
              subtitle={subtitles[view] || ""}
              onBack={(view === "templates" || view === "context" || view === "editor") ? handleBack : null}
              action={view === "editor" ? (
                <button id="btn-context" onClick={() => setShowContextModal(true)}
                  className="flex items-center gap-1.5 px-3 py-1.5 bg-emerald-50 text-emerald-700 rounded-lg border border-emerald-200 hover:bg-emerald-100 text-xs font-semibold transition-colors">
                  <Info size={13}/> Voir le contexte
                </button>
              ) : null}
            />

            <main className="flex-1 overflow-hidden relative">
              {view === "dashboard" && (
                <Dashboard
                  onCreateNew={() => setView("templates")}
                  completedScenarios={completedScenarios}
                  onReview={handleReview}
                />
              )}

              {view === "templates" && (
                <TemplateSelector onSelect={handleSelectScenario} completedScenarios={completedScenarios}/>
              )}

              {view === "context" && scenario && (
                <ContextView scenario={scenario} onContinue={() => setView("editor")} onBack={() => setView("templates")}/>
              )}

              {view === "editor" && scenario && currentStep && (
                <div className="flex h-full">
                  {/* Progress sidebar */}
                  <div id="editor-steps-panel" className={`${stepsCollapsed ? "w-20" : "w-64"} bg-white border-r border-slate-100 p-4 overflow-y-auto shrink-0 z-0 transition-all duration-300 flex flex-col relative`}>
                    <div className="flex items-center justify-between mb-4 px-1">
                      {!stepsCollapsed && <div className="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Étapes</div>}
                      <button onClick={() => setStepsCollapsed(!stepsCollapsed)} className={`p-1.5 hover:bg-slate-100 rounded-lg text-slate-400 transition-colors ${stepsCollapsed ? "mx-auto" : ""}`} title={stepsCollapsed ? "Agrandir le panneau" : "Réduire le panneau"}>
                        {stepsCollapsed ? <ChevronRight size={14}/> : <ChevronLeft size={14}/>}
                      </button>
                    </div>
                    <div className="flex-1 space-y-1">
                      {scenario.steps.map((s, i) => {
                        const done = (selections[i] || []).length > 0;
                        const isActive = i === stepIdx;
                        const isLocked = i > maxStepReached;
                        return (
                          <button key={i} onClick={() => !isLocked && setStepIdx(i)}
                            disabled={isLocked}
                            title={stepsCollapsed ? s.title : (isLocked ? "Terminez l'étape précédente pour y accéder" : "")}
                            className={`w-full text-left rounded-xl transition-all flex items-center ${stepsCollapsed ? "justify-center p-2.5" : "px-3 py-2.5 gap-3"} ${
                              isActive ? "bg-indigo-50 text-indigo-700 font-bold" :
                              done ? "text-emerald-700 hover:bg-emerald-50" :
                              isLocked ? "text-slate-400 cursor-not-allowed" : "text-slate-500 hover:bg-slate-50"
                            }`}>
                            <div className={`w-4 h-4 rounded-full flex items-center justify-center shrink-0 ${
                              isActive ? "bg-indigo-600" :
                              done ? "bg-emerald-500" : "border-2 border-slate-300"
                            }`}>
                              {done && !isActive && <Check size={10} className="text-white"/>}
                            </div>
                            {!stepsCollapsed && <span className="leading-snug truncate">{s.title}</span>}
                          </button>
                        );
                      })}
                    </div>
                  </div>

                  {/* Editor Left Panel - Note the addition of min-w-0 to fix the flex overflow bug! */}
                  <div id="editor-left-panel" className="flex-1 min-w-0 border-r border-slate-200 overflow-hidden relative z-0 bg-white">
                    <StepEditor
                      step={currentStep}
                      selected={selections[stepIdx] || []}
                      onSelect={handleSelect}
                      onNext={handleNext}
                      canProceed={canProceed}
                    />
                  </div>

                  {/* Preview toggle + Right panel */}
                  {showPreview && (
                    <div id="editor-right-panel" className="flex-1 min-w-0 bg-white overflow-hidden border-l border-slate-100 shrink-0 z-0 flex flex-col">
                      <div className="flex items-center justify-between px-4 py-2.5 border-b border-slate-100 bg-slate-50 shrink-0">
                        <span className="text-xs font-bold text-slate-500 uppercase tracking-wider flex items-center gap-1.5">
                          <FileText size={12}/> Aperçu
                        </span>
                        <button onClick={() => setShowPreview(false)} className="text-slate-400 hover:text-slate-600 transition-colors">
                          <X size={14}/>
                        </button>
                      </div>
                      <div className="flex-1 overflow-y-auto">
                        <JobAdPreview ad={userAd} scenario={scenario} highlight={currentStep.section}/>
                      </div>
                    </div>
                  )}
                  {!showPreview && (
                    <button onClick={() => setShowPreview(true)}
                      className="absolute right-0 top-1/2 -translate-y-1/2 bg-white border border-slate-200 py-2 px-1.5 rounded-l-lg shadow text-slate-500 hover:text-indigo-600 transition-colors text-xs writing-mode-vertical"
                      style={{ position:"absolute" }}>
                      <FileText size={14}/>
                    </button>
                  )}
                </div>
              )}

              {view === "audit" && scenario && (
                <AuditView scenario={scenario} selections={selections} userAd={userAd} onBack={goToDashboard}/>
              )}
            </main>
          </div>
        )}

        {/* Modal du contexte placée à l'intérieur pour suivre l'échelle de zoom */}
        {showContextModal && scenario && (
          <ContextModal scenario={scenario} step={currentStep} onClose={() => setShowContextModal(false)}/>
        )}
      </div>

      {/* --- ÉLÉMENTS FIXES (HORS DU CONTENEUR ZOOMÉ) --- */}
      
      {/* Affichage du Spotlight Plein Écran au tout début */}
      {view === "welcome" && !fullscreenTourDone && (
        <TourSpotlight
          step={{ 
            targetId: "btn-fullscreen-welcome", 
            placement: "bottom", 
            title: "Mode Plein Écran", 
            content: "L'activité nécessite d'être en plein écran pour un confort de lecture optimal. Cliquez ici pour l'activer et commencer l'expérience.", 
            nextLabel: "Passer en plein écran" 
          }}
          onNext={() => {
            setFullscreenTourDone(true);
            if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
              document.documentElement.requestFullscreen().catch(e => console.error("Erreur plein écran:", e));
            }
          }}
          isLast={true}
        />
      )}

      {/* Affichage du Spotlight Dashboard */}
      {view === "dashboard" && !dashboardTourDone && (
        <TourSpotlight
          step={{ targetId: "btn-new-offer", title: "À vous de jouer !", content: "Cliquez sur « Nouvelle Offre » pour choisir votre premier scénario et démarrer la rédaction." }}
          onNext={() => setDashboardTourDone(true)}
          isLast={true}
        />
      )}

      {/* Affichage du Spotlight Editeur (uniquement la première fois) */}
      {view === "editor" && !editorTourDone && editorTourSteps[editorTourStep] && (
        <TourSpotlight
          step={editorTourSteps[editorTourStep]}
          onNext={() => {
            if (editorTourStep < editorTourSteps.length - 1) {
              setEditorTourStep(s => s + 1);
            } else {
              setEditorTourDone(true);
            }
          }}
          isLast={editorTourStep === editorTourSteps.length - 1}
        />
      )}

      {/* Boutons de zoom fixés en bas à droite de la fenêtre */}
      <ZoomControls zoom={zoomLevel} setZoom={setZoomLevel} />
      
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
