// ─── CV (Thomas Durand) ────────────────────────────────────────────────────
function CV({ highlightIds=[], acceptedIds=[], selectedIds=[], onSelect, isSelectable=false, showCorrectHighlight=false }) {
  const { useEffect } = React;

  useEffect(() => {
    if (highlightIds.length > 0 && showCorrectHighlight) {
      const el = document.getElementById(highlightIds[0]);
      if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
    }
  }, [highlightIds, showCorrectHighlight]);

  const getClass = (id) => {
    const isCanonical = highlightIds.includes(id);
    const isAccepted = acceptedIds.includes(id);
    const isSelected = selectedIds.includes(id);
    let base = 'transition-all duration-300 px-1 rounded ';
    if (isSelectable && !showCorrectHighlight) base += 'cursor-pointer hover:bg-slate-100 ';
    if (showCorrectHighlight) {
      if (isCanonical) return base + 'bg-emerald-100 outline outline-2 outline-emerald-500';
      if (isSelected && !isCanonical && !isAccepted) return base + 'bg-rose-100 outline outline-2 outline-rose-400';
      if (isSelected && isAccepted) return base + 'bg-emerald-50 outline outline-2 outline-emerald-300';
    } else {
      if (isSelected) return base + 'bg-orange-100 outline outline-2 outline-orange-400';
    }
    return base + 'outline outline-2 outline-transparent';
  };

  const click = (e, id) => { e.stopPropagation(); if (isSelectable && onSelect) onSelect(id); };

  const accent = '#8B5A2B';

  return (
    <div style={{fontFamily:'DM Sans, sans-serif', fontSize:'0.85rem', lineHeight:1.6, color:'#1f2937', padding:'2rem', borderRadius:'0.75rem', maxWidth:'720px', margin:'0 auto'}}>

        <p style={{color:'#6b7280', fontSize:'0.78rem'}}>06 12 34 56 78 | t.durand@email.com | 12 rue des Boulangers, 30000 Nîmes | Permis B, véhicule</p>
      </div>

      {/* Profil */}
      <SectionTitle accent={accent}>Profil</SectionTitle>
      <p id="cv-profil" className={getClass('cv-profil')} onClick={e=>click(e,'cv-profil')} style={{marginBottom:'1.5rem', display:'block'}}>

          <span style={{color:'#9ca3af', fontStyle:'italic', fontSize:'0.75rem', whiteSpace:'nowrap', marginLeft:'1rem'}}>sept. 2019 – ce jour</span>
        </div>
        <ul style={{listStyle:'disc', paddingLeft:'1.5rem', marginTop:'0.25rem'}}>
          {[['cv-exp1-l1','Pétrissage et façonnage quotidien de 15 variétés de pains (tradition, campagne, spéciaux)'],
            ['cv-exp1-l2','Gestion de la fermentation sur levain naturel et contrôle qualité produits finis'],
            ['cv-four','Cuisson sur four à sole : maîtrise des températures et temps de cuisson'],
            ['cv-exp1-l4','Préparation de viennoiseries (croissants, pains au chocolat, brioches)'],
            ['cv-stocks','Gestion des stocks matières premières et commandes fournisseurs'],
            ['cv-crea','Création de nouvelles recettes (pain aux noix bio, focaccia, pain nordique)'],
            ['cv-encadrement','Encadrement d\'un apprenti et formation aux techniques de panification'],
            ['cv-haccp','Respect strict des normes HACCP, chaîne du froid et traçabilité allergènes'],
          ].map(([id,txt])=>(
            <li key={id} id={id} className={getClass(id)} onClick={e=>click(e,id)} style={{marginBottom:'0.2rem'}}>{txt}</li>
          ))}
        </ul>
      </div>
      <div style={{marginBottom:'1.5rem'}}>
        <div id="cv-exp2-title" className={getClass('cv-exp2-title')} onClick={e=>click(e,'cv-exp2-title')} style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:'0.25rem'}}>

// ─── QUIZ ─────────────────────────────────────────────────────────────────
function Quiz({ question, totalQuestions, currentIndex, onNext, onFeedbackChange, selectedLineIds }) {
  const { useState } = React;
  const [presence, setPresence] = useState(null);
  const [showFeedback, setShowFeedback] = useState(false);

  const needsJustification = presence === 'Oui' || presence === 'Partiellement';
  const canValidate = presence === 'Non' || (needsJustification && selectedLineIds.length > 0);

  const handleValidate = () => { setShowFeedback(true); onFeedbackChange(true); };
  const handleNext = () => { setPresence(null); setShowFeedback(false); onFeedbackChange(false); onNext(); };

  let isCorrect = false, feedbackText = '', hasPartialSuccess = false;
  if (showFeedback) {
    if (presence === question.expectedPresence) {
      if (presence === 'Non') { isCorrect=true; feedbackText=question.feedback.success; }
      else {
        const hasCorrect = selectedLineIds.some(id => question.highlightIds.includes(id)||(question.acceptedIds&&question.acceptedIds.includes(id)));
        const hasWrong = selectedLineIds.some(id => !question.highlightIds.includes(id)&&!(question.acceptedIds&&question.acceptedIds.includes(id)));
        if (hasCorrect) { isCorrect=true; if(hasWrong){hasPartialSuccess=true; feedbackText=question.feedback.success+" Attention cependant, vous avez aussi sélectionné des éléments qui ne justifient pas ce critère.";}else{feedbackText=question.feedback.success;} }
        else { feedbackText=question.feedback.errorJustification; }
      }
    } else { feedbackText=question.feedback.errorPresence; }
  }

  return (
    <div style={{background:'white', borderRadius:'1rem', border:'1px solid #e2e8f0', boxShadow:'0 4px 24px rgba(0,0,0,.08)', overflow:'hidden', display:'flex', flexDirection:'column'}}>
      {/* Header */}
      <div style={{background:'white', borderBottom:'1px solid #e2e8f0', padding:'1.5rem'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1rem'}}>
          <span style={{fontSize:'0.75rem', fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'0.05em'}}>
            Critère {currentIndex+1} sur {totalQuestions}
          </span>
          <span style={{padding:'0.25rem 0.75rem', background:'#e0e7ff', color:'#3730a3', fontSize:'0.75rem', fontWeight:600, borderRadius:'999px'}}>
            {question.category}
          </span>
        </div>
        <div style={{background:'#4f46e5', borderRadius:'0.75rem', padding:'1rem', border:'1px solid #4338ca'}}>
          <p style={{color:'#a5b4fc', fontSize:'0.8rem', fontWeight:500, marginBottom:'0.25rem'}}>{question.blockTitle}</p>
          <h2 style={{fontSize:'1.3rem', fontWeight:700, color:'white', lineHeight:1.3}}>{question.criterion}</h2>
        </div>
      </div>

      {/* Body */}
      <div style={{padding:'1.5rem', flexGrow:1}}>
        <h3 style={{fontSize:'1rem', fontWeight:600, color:'#1e293b', marginBottom:'0.75rem'}}>1. Ce critère est-il présent dans le CV ?</h3>
        <div style={{display:'flex', gap:'0.75rem', marginBottom:'1.5rem'}}>
          {['Oui','Partiellement','Non'].map(p => (
            <button key={p} onClick={() => !showFeedback && setPresence(p)} disabled={showFeedback}
              style={{flex:1, padding:'0.75rem 1rem', borderRadius:'0.75rem', border: presence===p ? '2px solid #4f46e5' : '2px solid #e2e8f0',
                background: presence===p ? '#eef2ff' : 'white', color: presence===p ? '#4338ca' : '#64748b',
                fontWeight:600, cursor:showFeedback?'default':'pointer', transition:'all 0.15s', fontFamily:'DM Sans, sans-serif', fontSize:'0.9rem'}}>
              {p}
            </button>
          ))}
        </div>

        {needsJustification && !showFeedback && (
          <div className="fade-in">
            <h3 style={{fontSize:'1rem', fontWeight:600, color:'#1e293b', marginBottom:'0.75rem'}}>2. Où exactement ?</h3>
            <div style={{padding:'1rem', borderRadius:'0.75rem', border: selectedLineIds.length>0?'2px solid #c7d2fe':'2px dashed #e2e8f0', background: selectedLineIds.length>0?'#eef2ff':'#f8fafc'}}>
              <p style={{fontWeight:500, color: selectedLineIds.length>0?'#3730a3':'#64748b'}}>Sélectionnez la ou les lignes du CV qui le justifient.</p>
              {selectedLineIds.length>0
                ? <p style={{fontSize:'0.8rem', marginTop:'0.5rem', color:'#4f46e5', display:'flex', alignItems:'center', gap:'0.25rem'}}><Check size={14}/> {selectedLineIds.length} ligne{selectedLineIds.length>1?'s':''} sélectionnée{selectedLineIds.length>1?'s':''}</p>
                : <p style={{fontSize:'0.8rem', marginTop:'0.5rem', color:'#94a3b8', fontStyle:'italic'}}>Cliquez sur un ou plusieurs éléments dans le CV à gauche...</p>}
            </div>
          </div>
        )}

        {showFeedback && (
          <div className="fade-in" style={{padding:'1.5rem', borderRadius:'1rem', border: isCorrect?'2px solid #a7f3d0':'2px solid #fecaca', background: isCorrect?'#f0fdf4':'#fff1f2', marginTop:'1rem'}}>
            <div style={{display:'flex', alignItems:'flex-start', gap:'1rem'}}>
              <div style={{padding:'0.5rem', borderRadius:'999px', background: isCorrect?'#d1fae5':'#fee2e2', color: isCorrect?'#059669':'#dc2626', flexShrink:0}}>
                {isCorrect ? <CheckCircle2 size={22}/> : <XCircle size={22}/>}
              </div>
              <div>
                <h3 style={{fontSize:'1.1rem', fontWeight:700, color: isCorrect?'#065f46':'#991b1b', marginBottom:'0.5rem'}}>
                  {isCorrect ? (hasPartialSuccess?'Correct, mais attention !':'Correct !') : 'Pas tout à fait...'}
                </h3>
                <p style={{color: isCorrect?'#047857':'#b91c1c', lineHeight:1.6}}>{feedbackText}</p>
                {question.multipleValidLocations && question.expectedPresence!=='Non' && (
                  <div style={{marginTop:'0.75rem', padding:'0.75rem', borderRadius:'0.5rem', background: isCorrect?'rgba(5,150,105,.08)':'rgba(185,28,28,.08)', fontSize:'0.85rem', display:'flex', gap:'0.5rem'}}>
                    <span>💡</span><p style={{color: isCorrect?'#065f46':'#991b1b'}}>Plusieurs éléments du CV permettent de valider ce critère (ils sont tous encadrés en vert).</p>
                  </div>
                )}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{padding:'1.5rem', borderTop:'1px solid #e2e8f0', background:'#f8fafc'}}>
        {!showFeedback ? (
          <button onClick={handleValidate} disabled={!canValidate}
            style={{width:'100%', padding:'1rem', borderRadius:'0.75rem', fontWeight:700, fontSize:'1rem', border:'none', cursor:canValidate?'pointer':'not-allowed',
              background:canValidate?'#4f46e5':'#e2e8f0', color:canValidate?'white':'#94a3b8', transition:'background 0.15s', fontFamily:'DM Sans, sans-serif'}}>
            Valider ma réponse
          </button>
        ) : (
          <button onClick={handleNext}
            style={{width:'100%', padding:'1rem', borderRadius:'0.75rem', fontWeight:700, fontSize:'1rem', border:'none', cursor:'pointer',
              background:'#0f172a', color:'white', display:'flex', justifyContent:'center', alignItems:'center', gap:'0.5rem', fontFamily:'DM Sans, sans-serif'}}>
            {currentIndex<totalQuestions-1 ? 'Critère suivant' : "Terminer l'activité"} <ArrowRight size={18}/>
          </button>
        )}
      </div>
    </div>
  );
}

        </table>
      </div>
      <div style={{padding:'1.5rem', borderTop:'1px solid #e2e8f0', background:'#f8fafc'}}>
        <button onClick={onFinish}
          style={{width:'100%', padding:'1rem', borderRadius:'0.75rem', fontWeight:700, fontSize:'1rem', border:'none', cursor:'pointer', background:'#4f46e5', color:'white', fontFamily:'DM Sans, sans-serif'}}>
          Retour à l'accueil
        </button>
      </div>
    </div>
  );

  return (
    <div style={{background:'white', borderRadius:'1rem', border:'1px solid #e2e8f0', boxShadow:'0 4px 24px rgba(0,0,0,.08)', overflow:'hidden', display:'flex', flexDirection:'column'}}>
      <div style={{background:'#f8fafc', borderBottom:'1px solid #e2e8f0', padding:'1.5rem', position:'sticky', top:0, zIndex:10}}>
        <h2 style={{fontSize:'1.3rem', fontWeight:700, color:'#0f172a'}}>Grille d'évaluation complète</h2>
        <p style={{fontSize:'0.85rem', color:'#64748b', marginTop:'0.25rem'}}>Évaluez chaque critère pour le candidat Kylian Morel. Aucun feedback intermédiaire ne vous sera donné.</p>
      </div>
      <div style={{overflowX:'auto'}} className="custom-scrollbar">
        <table style={{width:'100%', borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'white'}}>
              <th style={{padding:'1rem', fontSize:'0.8rem', fontWeight:600, color:'#94a3b8', textTransform:'uppercase', textAlign:'left', width:'50%', borderBottom:'1px solid #e2e8f0'}}>Critères d'évaluation</th>
              {['Oui','Partiel.','Non'].map(h=>(
                <th key={h} style={{padding:'1rem', fontSize:'0.8rem', fontWeight:600, color:'#94a3b8', textTransform:'uppercase', textAlign:'center', width:'16.6%', borderBottom:'1px solid #e2e8f0'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {categories.map(cat => (
              <React.Fragment key={cat}>
                <tr style={{background:'rgba(241,245,249,.8)'}}>
                  <td colSpan={4} style={{padding:'0.6rem 1rem', fontWeight:700, color:'#1e293b', borderTop:'1px solid #e2e8f0', borderBottom:'1px solid #e2e8f0', fontSize:'0.85rem'}}>{cat}</td>
                </tr>
                {gridCriteria.filter(c=>c.category===cat).map(criterion => (
                  <tr key={criterion.id} style={{borderBottom:'1px solid #f1f5f9'}}>
                    <td style={{padding:'1rem', fontSize:'0.85rem', fontWeight:500, color:'#334155'}}>{criterion.label}</td>
                    {['Oui','Partiellement','Non'].map(opt => {
                      const isSel = answers[criterion.id]===opt;
                      return (
                        <td key={opt} onClick={()=>handleAnswer(criterion.id, opt)}
                          style={{padding:0, textAlign:'center', cursor:'pointer', background:isSel?'rgba(79,70,229,.05)':'transparent', borderLeft:'1px solid #f1f5f9', transition:'background 0.15s'}}>
                          <div style={{display:'flex', alignItems:'center', justifyContent:'center', height:'100%', padding:'1rem'}}>
                            <div style={{width:'1.25rem', height:'1.25rem', borderRadius:'999px', border: isSel?'2px solid #4f46e5':'2px solid #cbd5e1',
                              background: isSel?'#4f46e5':'white', display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.15s'}}>
                              {isSel && <div style={{width:'0.5rem', height:'0.5rem', background:'white', borderRadius:'999px'}}/>}
                            </div>
                          </div>
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </React.Fragment>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{padding:'1.5rem', borderTop:'1px solid #e2e8f0', background:'#f8fafc'}}>
        <button onClick={()=>setShowResults(true)} disabled={!isComplete}
          style={{width:'100%', padding:'1rem', borderRadius:'0.75rem', fontWeight:700, fontSize:'1rem', border:'none', cursor:isComplete?'pointer':'not-allowed',
            background:isComplete?'#4f46e5':'#e2e8f0', color:isComplete?'white':'#94a3b8', display:'flex', justifyContent:'center', alignItems:'center', gap:'0.5rem', fontFamily:'DM Sans, sans-serif', transition:'background 0.15s'}}>
          {isComplete ? 'Valider mon évaluation' : 'Remplissez tous les critères pour valider'}
        </button>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────
function App() {
  const { useState, useEffect } = React;
  const [view, setView] = useState('home');
  const [qIdx, setQIdx] = useState(0);
  const [isFinished, setIsFinished] = useState(false);
  const [completed1, setCompleted1] = useState(false);
  const [isFeedbackShown, setIsFeedbackShown] = useState(false);
  const [highlightCV2, setHighlightCV2] = useState([]);
  const [selectedLineIds, setSelectedLineIds] = useState([]);
  const [isFullscreen, setIsFullscreen] = useState(false);
  const [showSpotlight, setShowSpotlight] = useState(true);

  useEffect(() => {
    const handler = () => setIsFullscreen(!!document.fullscreenElement);
    document.addEventListener('fullscreenchange', handler);
    return () => document.removeEventListener('fullscreenchange', handler);
  }, []);

  const toggleFullscreen = () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
    else document.exitFullscreen?.();
    setShowSpotlight(false);
  };

  const handleNext = () => {
    setSelectedLineIds([]);
    if (qIdx < questions.length-1) setQIdx(p=>p+1);
    else { setIsFinished(true); setCompleted1(true); }
  };

  const card = (onClick, disabled, icon, title, desc, cta, badge) => (
    <button onClick={onClick} disabled={disabled}
      style={{background:'white', padding:'2.5rem', borderRadius:'1.5rem', border: disabled?'1px solid #e2e8f0':'1px solid #e2e8f0',
        boxShadow:'0 1px 4px rgba(0,0,0,.06)', cursor:disabled?'not-allowed':'pointer', textAlign:'left', position:'relative',
        overflow:'hidden', display:'flex', flexDirection:'column', opacity:disabled?0.85:1,
        transition:'box-shadow 0.2s, border-color 0.2s'}}>
      {badge}
      <div style={{width:'4rem', height:'4rem', background:'#e0e7ff', color:'#4f46e5', borderRadius:'1rem', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:'2rem'}}>
        {icon}
      </div>
      <h2 style={{fontSize:'1.5rem', fontWeight:700, color:'#0f172a', marginBottom:'1rem', fontFamily:'DM Serif Display, serif'}}>{title}</h2>
      <p style={{color:'#64748b', fontSize:'1rem', lineHeight:1.7, flexGrow:1, marginBottom:'2rem'}}>{desc}</p>
      <div style={{color:'#4f46e5', fontWeight:700, display:'flex', alignItems:'center', gap:'0.5rem'}}>{cta} <ArrowRight size={18}/></div>
    </button>
  );

  const renderHome = () => (
    <div style={{minHeight:'100vh', background:'#f8fafc', padding:'3rem 2rem', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center'}}>
      <div style={{maxWidth:'72rem', width:'100%'}}>
        <div style={{textAlign:'center', marginBottom:'4rem'}}>
          <h1 style={{fontFamily:'DM Serif Display, serif', fontSize:'3rem', fontWeight:400, color:'#0f172a', marginBottom:'1rem', letterSpacing:'-0.02em'}}>Formation au Recrutement</h1>
          <p style={{fontSize:'1.1rem', color:'#64748b', maxWidth:'42rem', margin:'0 auto', lineHeight:1.7}}>
            Bienvenue dans votre espace d'entraînement. Sélectionnez un module pour commencer à pratiquer la méthode d'évaluation.
          </p>
        </div>
        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(min(100%, 360px), 1fr))', gap:'2rem'}}>
          {card(
            () => setView('exercise1'), false,
            <Search size={28}/>,
            "Partie 1 : Analyse de CV guidée",
            "Apprenez la méthode d'analyse de CV par la pratique. Repérez les critères évidents, déduisez les compétences techniques et inférez les qualités comportementales à partir d'un profil riche.",
            completed1 ? "Recommencer l'exercice" : "Commencer l'exercice",
            completed1 && (
              <div style={{position:'absolute', top:'1.5rem', right:'1.5rem', background:'#d1fae5', color:'#065f46', fontSize:'0.8rem', fontWeight:700, padding:'0.3rem 0.8rem', borderRadius:'999px', display:'flex', alignItems:'center', gap:'0.3rem'}}>
                <CheckCircle2 size={14}/> Terminé
              </div>
            )
          )}
          {card(
            () => completed1 && setView('exercise2'), !completed1,
            <ClipboardList size={28}/>,
            "Partie 2 : Évaluation en autonomie",
            "L'évaluation finale, comme dans la vraie vie. Face à un profil junior et piégeux, remplissez la grille complète sans aide intermédiaire. Apprenez à dire \"Non\" quand c'est nécessaire.",
            "Commencer l'exercice",
            !completed1 && (
              <div style={{position:'absolute', inset:0, background:'rgba(248,250,252,.6)', backdropFilter:'blur(2px)', zIndex:10, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', borderRadius:'1.5rem'}}>
                <div style={{background:'white', padding:'1rem', borderRadius:'999px', boxShadow:'0 2px 8px rgba(0,0,0,.1)', marginBottom:'1rem', color:'#94a3b8'}}><Lock size={28}/></div>
                <p style={{color:'#64748b', fontWeight:500, padding:'0 1.5rem', textAlign:'center', fontSize:'0.9rem'}}>Terminez la Partie 1 pour débloquer cet exercice.</p>
              </div>
            )
          )}
        </div>
      </div>
    </div>
  );

  const currentQuestion = questions[qIdx];
  const displayHighlightIds = isFeedbackShown ? currentQuestion.highlightIds : [];
  const displayAcceptedIds = isFeedbackShown ? (currentQuestion.acceptedIds||[]) : [];

  const twoColLayout = (left, right, title, subtitle, backAction) => (
    <div style={{minHeight:'100vh', background:'#f1f5f9', display:'flex', flexDirection:'column'}}>
      <header style={{background:'white', borderBottom:'1px solid #e2e8f0', padding:'1rem 2rem', position:'sticky', top:0, zIndex:20}}>
        <div style={{maxWidth:'1600px', margin:'0 auto', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <div style={{display:'flex', alignItems:'center', gap:'1rem'}}>
            <button onClick={backAction}
              style={{padding:'0.5rem', background:'transparent', border:'none', cursor:'pointer', color:'#94a3b8', borderRadius:'0.5rem', display:'flex', alignItems:'center'}}>
              <ArrowLeft size={22}/>
            </button>
            <div>
              <h1 style={{fontSize:'1.2rem', fontWeight:700, color:'#0f172a'}}>{title}</h1>
              <p style={{fontSize:'0.8rem', color:'#94a3b8'}}>{subtitle}</p>
            </div>
          </div>
          {view==='exercise1' && (
            <div style={{fontSize:'0.85rem', fontWeight:500, color:'#94a3b8', background:'#f1f5f9', padding:'0.4rem 1rem', borderRadius:'999px', marginRight:'4rem'}}>
              Progression : {Math.min(qIdx+1, questions.length)} / {questions.length}
            </div>
          )}
        </div>
      </header>
      <main style={{flexGrow:1, padding:'2rem'}}>
        <div style={{maxWidth:'1600px', margin:'0 auto', display:'grid', gridTemplateColumns:'minmax(0,1fr) minmax(0,1fr)', gap:'2rem'}}>
          <div style={{position:'sticky', top:'5rem', maxHeight:'calc(100vh - 6rem)', overflow:'hidden', borderRadius:'1rem', border:'1px solid #e2e8f0', background:'white', display:'flex', flexDirection:'column'}}>
            <div style={{padding:'0.75rem 1rem', background:'#f8fafc', borderBottom:'1px solid #e2e8f0', flexShrink:0}}>
              <h2 style={{fontSize:'0.75rem', fontWeight:700, color:'#64748b', textTransform:'uppercase', letterSpacing:'0.05em'}}>{left.label}</h2>
            </div>
            <div style={{overflowY:'auto', flexGrow:1}} className="custom-scrollbar">
              {left.content}
            </div>
          </div>
          <div style={{overflowY:'auto', maxHeight:'calc(100vh - 6rem)'}} className="custom-scrollbar">
            {right}
          </div>
        </div>
      </main>
    </div>
  );

  if (view==='exercise1') {
    const left = {
      label:"Document de référence (Thomas Durand)",
      content: <CV highlightIds={displayHighlightIds} acceptedIds={displayAcceptedIds} selectedIds={selectedLineIds}
        onSelect={(id)=>setSelectedLineIds(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id])}
        isSelectable={!isFeedbackShown} showCorrectHighlight={isFeedbackShown}/>
    };
    const right = !isFinished
      ? <Quiz question={currentQuestion} totalQuestions={questions.length} currentIndex={qIdx} onNext={handleNext}
          onFeedbackChange={setIsFeedbackShown} selectedLineIds={selectedLineIds}/>
      : (
        <div className="scale-in" style={{background:'white', borderRadius:'1rem', border:'1px solid #e2e8f0', padding:'3rem', textAlign:'center', display:'flex', flexDirection:'column', alignItems:'center'}}>
          <div style={{width:'5rem', height:'5rem', background:'#d1fae5', color:'#059669', borderRadius:'999px', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:'1.5rem'}}>
            <CheckCircle2 size={40}/>
          </div>
          <h2 style={{fontFamily:'DM Serif Display, serif', fontSize:'2rem', color:'#0f172a', marginBottom:'1rem'}}>Activité terminée !</h2>
          <p style={{color:'#64748b', fontSize:'1rem', lineHeight:1.7, marginBottom:'2rem', maxWidth:'30rem'}}>
            Vous avez analysé avec succès le CV de Thomas Durand en repérant les critères évidents, ceux à déduire et ceux à inférer.
          </p>
          <div style={{display:'flex', gap:'1rem'}}>
            <button onClick={()=>{setQIdx(0);setIsFinished(false);}}
              style={{padding:'0.75rem 1.5rem', background:'#eef2ff', color:'#4338ca', borderRadius:'0.75rem', border:'none', fontWeight:700, cursor:'pointer', fontFamily:'DM Sans, sans-serif'}}>
              Recommencer
            </button>
            <button onClick={()=>{setView('home');setQIdx(0);setIsFinished(false);}}
              style={{padding:'0.75rem 1.5rem', background:'#4f46e5', color:'white', borderRadius:'0.75rem', border:'none', fontWeight:700, cursor:'pointer', fontFamily:'DM Sans, sans-serif', boxShadow:'0 2px 8px rgba(79,70,229,.3)'}}>
              Retour à l'accueil
            </button>
          </div>
        </div>
      );
    return twoColLayout(left, right, "Partie 1 : Analyse de CV guidée", "Repérez les critères dans le CV sans aide préalable.", ()=>{ setView('home'); setQIdx(0); setIsFinished(false); });
  }

  if (view==='exercise2') {
    const left = {
      label:"Document de référence (Kylian Morel)",
      content: <CV2 highlightIds={highlightCV2}/>
    };
    return twoColLayout(left,
      <GridExercise onFinish={()=>setView('home')} onHighlight={setHighlightCV2}/>,
      "Partie 2 : Évaluation en autonomie",
      "Remplissez la grille complète pour ce profil junior.",
      ()=>setView('home')
    );
  }

  return (
    <div style={{position:'relative', minHeight:'100vh'}}>
      {/* Fullscreen button */}
      <div style={{position:'fixed', top:'1.5rem', right:'1.5rem', zIndex:50, display:'flex', flexDirection:'column', alignItems:'flex-end'}}>
        <button onClick={toggleFullscreen}
          style={{padding:'1rem', borderRadius:'999px', border: showSpotlight?'2px solid #4338ca':'1px solid #e2e8f0',
            background: showSpotlight?'#4f46e5':'white', color: showSpotlight?'white':'#334155',
            cursor:'pointer', boxShadow:'0 4px 16px rgba(0,0,0,.15)', transition:'all 0.2s'}}
          className={showSpotlight?'pulse':''}
          title={isFullscreen?"Quitter le plein écran":"Plein écran"}>
          {isFullscreen ? <Minimize size={22}/> : <Maximize size={22}/>}
        </button>
        {showSpotlight && (
          <div className="fade-in" style={{marginTop:'1rem', background:'#4f46e5', color:'white', padding:'1rem', borderRadius:'0.75rem', boxShadow:'0 8px 24px rgba(79,70,229,.4)', maxWidth:'18rem', position:'relative'}}>
            <button onClick={()=>setShowSpotlight(false)}
              style={{position:'absolute', top:'0.5rem', right:'0.5rem', background:'transparent', border:'none', cursor:'pointer', color:'rgba(255,255,255,.7)', display:'flex'}}>
              <X size={14}/>
            </button>
            <p style={{fontSize:'0.85rem', fontWeight:500, paddingRight:'1rem'}}>Astuce : Passez en plein écran pour un meilleur confort de lecture !</p>
            <div style={{position:'absolute', top:'-0.5rem', right:'1.25rem', width:'1rem', height:'1rem', background:'#4f46e5', transform:'rotate(45deg)'}}/>
          </div>
        )}
      </div>
      {renderHome()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
