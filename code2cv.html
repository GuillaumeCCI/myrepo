    function QuestionPanel({question:q, total, index, onNext, onFeedback, selected, ans, setAns, done, setDone, onRemoveSelect}) {
      const feedbackRef = useRef(null);
      const isPos = ans === "Oui" || ans === "Partiellement";
      const canVal = ans === "Non" || (isPos && selected.length > 0);
      
      const validate = () => { 
        setDone(true); 
        onFeedback(true); 
      };
      const next = () => { onNext(); };

      let ok=false, warn=false, msg="";
      if(done){
        if(ans===q.expectedPresence){
          if(ans==="Non"){ok=true;msg=q.feedback.success;}
          else{
            const hasGood=selected.some(id=>q.highlightIds.includes(id)||(q.acceptedIds||[]).includes(id));
            const hasBad=selected.some(id=>!q.highlightIds.includes(id)&&!(q.acceptedIds||[]).includes(id));
            ok=hasGood;warn=hasGood&&hasBad;
            msg=!hasGood?q.feedback.errorJustification:warn?q.feedback.success+" Attention cependant, vous avez aussi sélectionné des éléments qui ne justifient pas ce critère.":q.feedback.success;
          }
        } else {ok=false;msg=q.feedback.errorPresence;}
      }

      useEffect(() => {
        if (done && feedbackRef.current) {
          setTimeout(() => {
            // 1. Scroll vers le panneau de feedback
            feedbackRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            // 2. Si la réponse est fausse, on scroll automatiquement vers la bonne réponse dans le CV
            if (!ok && q.highlightIds && q.highlightIds.length > 0) {
              setTimeout(() => {
                const targetElement = document.getElementById(q.highlightIds[0]);
                if (targetElement) {
                  targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
              }, 300); // Léger décalage pour laisser le premier scroll se lancer proprement
            }
          }, 150); 
        }
      }, [done, ok, q.highlightIds]);

      return (
        <div className="bg-white rounded-2xl shadow-xl border border-slate-200 flex flex-col overflow-hidden">
          <div className="bg-white border-b border-slate-200 p-6">
            <div className="flex justify-between items-center mb-4">
              <span className="text-sm font-bold text-slate-500 uppercase tracking-wider">Critère {index+1} sur {total}</span>
              <span className="px-3 py-1 bg-slate-100 text-slate-600 border border-slate-200 text-xs font-semibold rounded-full">{q.category}</span>
            </div>
            <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
              <p className="text-slate-300 text-sm mb-1 font-medium">{q.blockTitle}</p>
              <h2 className="text-2xl font-bold text-white">{q.criterion}</h2>
            </div>
          </div>
          <div className="p-6 space-y-8">
            <div className="space-y-4">
              <h3 className="text-lg font-semibold text-slate-800">1. Ce critère est-il présent dans le CV ?</h3>
              <div className="flex gap-3">
                {["Oui","Partiellement","Non"].map(opt=>(
                  <button key={opt} disabled={done} onClick={()=>setAns(opt)}
                    className={`flex-1 py-3 px-4 rounded-xl border-2 font-medium transition-all
                      ${ans===opt?"border-indigo-600 bg-indigo-50 text-indigo-700":"border-slate-200 text-slate-600"}
                      ${done?"opacity-75 cursor-default":"hover:border-slate-300 hover:bg-slate-50"}`}>
                    {opt}
                  </button>
                ))}
              </div>
            </div>
            
            {isPos && !done && (
              <div className="space-y-4 fade">
                <h3 className="text-lg font-semibold text-slate-800">2. Où exactement ?</h3>
                <div className={`p-4 rounded-xl border-2 transition-colors ${selected.length ? "bg-slate-50 border-slate-300" : "bg-slate-50 border-dashed border-slate-300"}`}>
                  <p className={`font-medium ${selected.length ? "text-slate-800" : "text-slate-600"}`}>
                    Sélectionnez la ou les lignes du CV qui le justifient.
                  </p>
                  
                  {selected.length > 0 ? (
                    <div className="flex flex-wrap gap-2 mt-4">
                      {selected.map(id => (
                        <div key={id} className="flex items-center gap-1.5 bg-slate-100 text-slate-700 pl-3 pr-1 py-1.5 rounded-full text-sm font-medium fade border border-slate-200 shadow-sm">
                          <span className="truncate max-w-[220px]" title={ID_TO_TEXT[id]}>{ID_TO_TEXT[id] || "Élément sélectionné"}</span>
                          <button 
                            onClick={() => onRemoveSelect(id)} 
                            className="text-slate-400 hover:text-slate-800 hover:bg-slate-200 p-0.5 rounded-full transition-colors focus:outline-none"
                            title="Retirer la sélection"
                          >
                            <I.X/>
                          </button>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <p className="text-sm mt-3 text-slate-400 italic">Cliquez sur un ou plusieurs éléments dans le CV à gauche...</p>
                  )}
                </div>
              </div>
            )}

            {done && (
              <div ref={feedbackRef} className={`p-6 rounded-2xl border-2 fade ${ok ? "bg-emerald-50 border-emerald-200" : "bg-rose-50 border-rose-200"}`}>
                <div className="flex items-start gap-4">
                  <div className={`p-2 rounded-full mt-1 ${ok ? "bg-emerald-100 text-emerald-600" : "bg-rose-100 text-rose-600"}`}>
                    {ok ? <I.Ok/> : <I.Ko/>}
                  </div>
                  <div>
                    <h3 className={`text-xl font-bold mb-2 ${ok ? "text-emerald-800" : "text-rose-800"}`}>
                      {ok ? (warn ? "Correct, mais attention !" : "Correct !") : "Pas tout à fait..."}
                    </h3>
                    <p className={`text-base leading-relaxed ${ok ? "text-emerald-700" : "text-rose-700"}`}>{msg}</p>
                    {q.multipleValidLocations && q.expectedPresence !== "Non" && (
                      <div className={`mt-4 p-3 rounded-lg text-sm font-medium flex items-start gap-2 ${ok ? "bg-emerald-100/50 text-emerald-800" : "bg-rose-100/50 text-rose-800"}`}>
                        <span>💡</span>
                        <p>Plusieurs éléments du CV permettent de valider ce critère (ils sont tous encadrés en vert).</p>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}
          </div>
          <div className="p-6 border-t border-slate-200 bg-slate-50">
            {done ? (
              <button onClick={next} className="w-full py-4 rounded-xl font-bold text-lg bg-indigo-600 text-white hover:bg-indigo-700 transition-all flex justify-center items-center gap-2 shadow-md">
                {index < total-1 ? "Critère suivant" : "Terminer l'activité"} <I.Next/>
              </button>
            ) : (
              <button disabled={!canVal} onClick={validate}
                className={`w-full py-4 rounded-xl font-bold text-lg transition-all flex justify-center items-center gap-2
                  ${canVal ? "bg-indigo-600 text-white hover:bg-indigo-700 shadow-md" : "bg-slate-200 text-slate-400 cursor-not-allowed"}`}>
                Valider ma réponse
              </button>
            )}
          </div>
        </div>
      );
    }

          </div>
          <div className="lg:col-span-6">{right}</div>
        </div>
      </main>
    );

    const App = () => {
      const [screen,setScreen] = useState("home");
      const [qi,setQi] = useState(0);
      const [ex1Done,setEx1Done] = useState(false);
      const [ex1End,setEx1End] = useState(false);
      
      const [ans, setAns] = useState(null);
      const [done, setDone] = useState(false);
      const [feedback,setFeedback] = useState(false);
      const [sel,setSel] = useState([]);
      
      const [hl2,setHl2] = useState([]);
      const [fs,setFs] = useState(false);

      useEffect(()=>{
        const h=()=>setFs(!!document.fullscreenElement);
        document.addEventListener("fullscreenchange",h);
        return ()=>document.removeEventListener("fullscreenchange",h);
      },[]);

      const toggleFS=()=>{
        document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen().catch(()=>{});
      };
      
      const goHome=()=>{
        setScreen("home");
        setQi(0);
        setEx1End(false);
        setSel([]);
        setAns(null);
        setDone(false);
        setFeedback(false);
      };
      
      const q=Q[qi];
      const hlIds=feedback?q?.highlightIds||[]:[]; 
      const acIds=feedback?q?.acceptedIds||[]:[]; 
      
      const handleNext=()=>{
        setSel([]);
        setAns(null);
        setDone(false);
        setFeedback(false);
        if(qi<Q.length-1) setQi(i=>i+1);
        else{setEx1Done(true);setEx1End(true);}
      };

      const Header = ({title,sub}) => {
        const [tip, setTip] = useState(false);
        
        useEffect(()=>{
          if(!localStorage.getItem('fsTipSeen')) setTip(true);
        },[]);
        
        const dismissTip = () => {
          localStorage.setItem('fsTipSeen', 'true');
          setTip(false);
        };
        
        return (
          <header className="bg-white shadow-sm border-b border-slate-200 py-4 px-8 sticky top-0 z-10">
            <div className="max-w-[1600px] mx-auto flex justify-between items-center relative">
              <div className="flex items-center gap-4">
                <button onClick={goHome} className="p-2 hover:bg-slate-100 rounded-lg text-slate-500 transition-colors"><I.Back/></button>
                <div><h1 className="text-2xl font-bold text-slate-900">{title}</h1><p className="text-sm text-slate-500">{sub}</p></div>
              </div>
              <div className="flex items-center gap-6">
                {screen==="exercise1"&&(
                  <span className="text-sm font-medium text-slate-500 bg-slate-100 px-4 py-2 rounded-full">
                    Progression : {Math.min(qi+1,Q.length)} / {Q.length}
                  </span>
                )}
                <div className="relative">
                  <button onClick={()=>{dismissTip(); toggleFS();}} title={fs?"Quitter le plein écran":"Plein écran"} className="p-2 text-slate-400 hover:text-indigo-600 hover:bg-slate-100 rounded-lg transition-all">
                    {fs?<I.Min/>:<I.Max/>}
                  </button>
                  {tip&&(
                    <div className="absolute top-full right-0 mt-3 w-64 bg-slate-800 text-white text-sm p-4 rounded-xl shadow-xl z-50 fade">
                      <button onClick={dismissTip} className="absolute top-2 right-2 text-slate-400 hover:text-white"><I.X/></button>
                      <p className="pr-4">Astuce : Passez en plein écran pour un meilleur confort !</p>
                      <div className="absolute -top-2 right-3 w-4 h-4 bg-slate-800 rotate-45"/>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </header>
        );
      };

      return (
        <React.Fragment>
          {screen==="home" && (
            <div className="min-h-screen bg-slate-50 p-8 flex flex-col items-center justify-center relative">
              <div className="absolute top-6 right-8">
                <button onClick={toggleFS} title={fs?"Quitter le plein écran":"Plein écran"} className="p-2 text-slate-400 hover:text-indigo-600 hover:bg-slate-200 rounded-lg transition-all">
                  {fs?<I.Min/>:<I.Max/>}
                </button>
              </div>
              <div className="max-w-5xl w-full">
                <div className="text-center mb-16">
                  <h1 className="text-5xl font-bold text-slate-900 mb-6 tracking-tight">Formation au Recrutement</h1>
                  <p className="text-xl text-slate-600 max-w-2xl mx-auto">Bienvenue dans votre espace d'entraînement. Sélectionnez un module pour commencer à pratiquer la méthode d'évaluation.</p>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                  {/* Carte Active (Partie 1) */}
                  <button onClick={()=>{setQi(0);setEx1End(false);setSel([]);setAns(null);setDone(false);setFeedback(false);setScreen("exercise1");}}
                    className="bg-indigo-50 p-10 rounded-3xl shadow-sm border-2 border-indigo-200 hover:border-indigo-500 hover:shadow-xl transition-all text-left group flex flex-col h-full relative overflow-hidden">
                    {ex1Done&&<div className="absolute top-6 right-6 bg-emerald-100 text-emerald-700 text-sm font-bold px-4 py-2 rounded-full">✓ Terminé</div>}
                    <div className="w-16 h-16 bg-indigo-600 text-white shadow-md rounded-2xl flex items-center justify-center mb-8 group-hover:scale-110 transition-transform duration-300"><I.Search/></div>
                    <h2 className="text-3xl font-bold text-slate-900 mb-4">Partie 1 : Analyse de CV guidée</h2>
                    <p className="text-slate-600 mb-8 text-lg leading-relaxed flex-grow">Apprenez la méthode d'analyse de CV par la pratique. Repérez les critères évidents, déduisez les compétences techniques et inférez les qualités comportementales à partir d'un profil riche.</p>
                    <div className="text-indigo-600 font-bold text-lg flex items-center gap-2 group-hover:gap-4 transition-all">
                      {ex1Done?"Recommencer l'exercice":"Commencer l'exercice"} <I.Next/>
                    </div>
                  </button>

                  {/* Carte Verrouillable (Partie 2) */}
                  <button onClick={()=>ex1Done&&setScreen("exercise2")} disabled={!ex1Done}
                    className={`p-10 rounded-3xl shadow-sm border-2 text-left relative overflow-hidden flex flex-col h-full transition-all group
                      ${ex1Done?"bg-white border-indigo-200 hover:border-indigo-500 hover:shadow-xl cursor-pointer":"bg-slate-50 border-slate-200 cursor-not-allowed"}`}>
                    {!ex1Done&&(
                      <div className="absolute inset-0 bg-slate-50/80 backdrop-blur-[1px] z-10 flex flex-col items-center justify-center rounded-3xl">
                        <div className="bg-white p-4 rounded-full shadow-sm mb-4 text-slate-400"><I.Lock/></div>
                        <p className="text-slate-600 font-medium px-6 text-center mb-4">Terminez la Partie 1 pour débloquer cet exercice.</p>
                        <div className="w-48 bg-slate-200 rounded-full h-2.5 overflow-hidden mb-2">
                           <div className="bg-slate-400 h-2.5 rounded-full" style={{width: '0%'}}></div>
                        </div>
                        <span className="text-xs text-slate-500 font-bold uppercase tracking-wider">0 / 1 module terminé</span>
                      </div>
                    )}
                    <div className={`w-16 h-16 rounded-2xl flex items-center justify-center mb-8 shadow-sm transition-transform duration-300
                      ${ex1Done?"bg-indigo-600 text-white group-hover:scale-110":"bg-slate-200 text-slate-400"}`}><I.Grid/></div>
                    <h2 className="text-3xl font-bold text-slate-900 mb-4">Partie 2 : Évaluation en autonomie</h2>
                    <p className="text-slate-600 mb-8 text-lg leading-relaxed flex-grow">L'évaluation finale, comme dans la vraie vie. Face à un profil junior, remplissez la grille complète sans aide intermédiaire. Apprenez à dire "Non" quand c'est nécessaire.</p>
                    <div className={`${ex1Done?"text-indigo-600":"text-slate-400"} font-bold text-lg flex items-center gap-2 ${ex1Done?"group-hover:gap-4 transition-all":""}`}>
                      Commencer l'exercice <I.Next/>
                    </div>
                  </button>
                </div>
              </div>
            </div>
          )}

          {screen==="exercise1" && (
            <div className="min-h-screen bg-slate-100 flex flex-col overflow-x-hidden">
              <Header title="Partie 1 : Analyse de CV guidée" sub="Repérez les critères dans le CV sans aide préalable."/>
              <TwoCol
                cvTitle="Document de référence (Thomas Durand)"
                cvContent={
                  <CVThomas 
                    highlightIds={hlIds} 
                    acceptedIds={acIds} 
                    selectedIds={sel}
                    onSelect={id=>setSel(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id])}
                    selectable={(ans === "Oui" || ans === "Partiellement") && !feedback} 
                    showCorrect={feedback}
                    highlightMode={(ans === "Oui" || ans === "Partiellement") && !feedback}
                  />
                }
                right={
                  <React.Fragment>
                    {ex1End ? (
                      <div key="end" className="bg-white rounded-2xl shadow-xl border border-slate-200 p-12 text-center flex flex-col justify-center items-center fade">
                        <div className="w-24 h-24 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-6 text-5xl">✓</div>
                        <h2 className="text-3xl font-bold text-slate-900 mb-4">Activité terminée !</h2>
                        <p className="text-lg text-slate-600 mb-8 max-w-md">Vous avez analysé avec succès le CV de Thomas Durand en repérant les critères évidents, ceux à déduire et ceux à inférer.</p>
                        <div className="flex gap-4">
                          <button onClick={()=>{setQi(0);setEx1End(false);setSel([]);setAns(null);setDone(false);setFeedback(false);}}
                            className="px-6 py-3 bg-slate-100 text-slate-700 rounded-xl font-bold hover:bg-slate-200 transition-colors">Recommencer</button>
                          <button onClick={goHome} className="px-6 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-colors shadow-md">Retour à l'accueil</button>
                        </div>
                      </div>
                    ) : (
                      <div key={`q-${qi}`} className="fade">
                        <QuestionPanel 
                          question={q} 
                          total={Q.length} 
                          index={qi}
                          onNext={handleNext} 
                          onFeedback={setFeedback} 
                          selected={sel}
                          ans={ans}
                          setAns={setAns}
                          done={done}
                          setDone={setDone}
                          onRemoveSelect={(id) => setSel(p => p.filter(x => x !== id))}
                        />
                      </div>
                    )}
                  </React.Fragment>
                }
              />
            </div>
          )}

          {screen==="exercise2" && (
            <div className="min-h-screen bg-slate-100 flex flex-col">
              <Header title="Partie 2 : Évaluation en autonomie" sub="Remplissez la grille complète pour ce profil junior."/>
              <main className="flex-grow p-8">
                <div className="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
                  <div className="lg:col-span-6">
                    <div className="sticky top-24 overflow-y-auto sb rounded-2xl border border-slate-200 bg-white max-h-[calc(100vh-8rem)]">
                      <div className="p-4 bg-slate-50 border-b border-slate-200 sticky top-0 z-10">
                        <p className="text-sm font-bold text-slate-700 uppercase tracking-wider">Document de référence (Kylian Morel)</p>
                      </div>
                      <div className="p-4"><CVKylian highlightIds={hl2}/></div>
                    </div>
                  </div>
                  <div className="lg:col-span-6">
                    <EvaluationGrid onFinish={goHome} onHighlight={setHl2}/>
                  </div>
                </div>
              </main>
            </div>
          )}
        </React.Fragment>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
