<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identification des Types de Conflit</title>
    <!-- Chargement de Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :fullscreen {
        overflow: hidden;
      }
      /* Animation pour la flèche du spotlight */
      @keyframes bounceX {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(15px); }
      }
      .animate-bounce-x {
        animation: bounceX 1.5s infinite ease-in-out;
      }
      /* Animation d'apparition du calque sombre */
      @keyframes fadeIn {
        from { opacity: 0; backdrop-filter: blur(0px); }
        to { opacity: 1; backdrop-filter: blur(4px); }
      }
      .spotlight-overlay {
        animation: fadeIn 0.5s ease-out forwards;
      }
      /* Animation d'entrée de la carte */
      @keyframes popIn {
        0% { transform: scale(0.8); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }
      .animate-pop-in {
        animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Import Map -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0"
        }
      }
    </script>

    <!-- Code React -->
    <script type="text/babel" data-type="module">
      import React, { useState, useEffect } from 'react';
      import { createRoot } from 'react-dom/client';
      import { CheckCircle, AlertTriangle, GripVertical, RefreshCw, Maximize2, Minimize2, ArrowRight, ArrowLeft, ThumbsUp, ThumbsDown } from 'lucide-react';

      // --- DONNÉES PÉDAGOGIQUES ---
      const INITIAL_ITEMS = [
        { id: 1, text: "Incompatibilité dans les principes, croyances ou choix de vie des personnes concernées.", isTrue: true, explanation: "Il s'agit d'un conflit de Valeurs." },
        { id: 2, text: "Opposition collective entre la direction et les représentants du personnel.", isTrue: false, explanation: "C'est un conflit social ou syndical, qui sort de la typologie interpersonnelle classique." },
        { id: 3, text: "Intérêts divergents perçus ou réels : les personnes confondent leur propre intérêt avec celui du groupe.", isTrue: true, explanation: "Il s'agit d'un conflit d'Intérêts." },
        { id: 4, text: "Refus d'accepter une nouvelle organisation du travail par peur de l'inconnu.", isTrue: false, explanation: "Il s'agit d'un phénomène de résistance au changement, différent d'un conflit structurel." },
        { id: 5, text: "Abus de pouvoir, contrôle excessif, rôles mal définis dans l'équipe.", isTrue: true, explanation: "Il s'agit d'un conflit de Pouvoir." },
        { id: 6, text: "Divergence sur la méthode ou la procédure à suivre pour accomplir une tâche.", isTrue: false, explanation: "C'est un conflit de méthode. Ce n'est pas l'une des 5 catégories de base." },
        { id: 7, text: "Différends non résolus entre individus, mauvaises perceptions accumulées.", isTrue: true, explanation: "Il s'agit d'un conflit Interpersonnel." },
        { id: 8, text: "Tensions causées par un environnement de travail bruyant ou du matériel inadapté.", isTrue: false, explanation: "Ceci relève des conditions de travail ou de l'ergonomie, pas d'un conflit direct." },
        { id: 9, text: "Manque d'information, erreurs d'interprétation, malentendu sur les faits.", isTrue: true, explanation: "Il s'agit d'un conflit de Données." },
        { id: 10, text: "Incompatibilité liée aux différences de générations et aux habitudes de communication.", isTrue: false, explanation: "C'est une problématique générationnelle, souvent traitée à part." }
      ];

      const shuffleArray = (array) => {
        const shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
      };

      function App() {
        const [items, setItems] = useState([]);
        const [currentIndex, setCurrentIndex] = useState(0);
        const [score, setScore] = useState(0);
        const [feedback, setFeedback] = useState(null);
        const [dragState, setDragState] = useState(null);
        
        const [isFullscreen, setIsFullscreen] = useState(false);
        const [showSpotlight, setShowSpotlight] = useState(true);

        useEffect(() => {
          setItems(shuffleArray(INITIAL_ITEMS));
        }, []);

        useEffect(() => {
          const handleFullscreenChange = () => {
            const isNativeFull = !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
            if (isNativeFull) {
              setIsFullscreen(true);
              setShowSpotlight(false);
            } else {
              setIsFullscreen(false);
            }
          };
          document.addEventListener('fullscreenchange', handleFullscreenChange);
          document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
          document.addEventListener('MSFullscreenChange', handleFullscreenChange);
          
          return () => {
            document.removeEventListener('fullscreenchange', handleFullscreenChange);
            document.removeEventListener('webkitfullscreenchange', handleFullscreenChange);
            document.removeEventListener('MSFullscreenChange', handleFullscreenChange);
          };
        }, []);

        const toggleFullscreen = async () => {
          setShowSpotlight(false);
          const isNativeFull = !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);

          if (!isNativeFull && !isFullscreen) {
            let nativeSuccess = false;
            try {
              const elem = document.documentElement;
              if (elem.requestFullscreen) {
                await elem.requestFullscreen();
                nativeSuccess = true;
              } else if (elem.webkitRequestFullscreen) {
                await elem.webkitRequestFullscreen();
                nativeSuccess = true;
              } else if (elem.msRequestFullscreen) {
                await elem.msRequestFullscreen();
                nativeSuccess = true;
              }
            } catch (err) {
              console.warn("Plein écran natif refusé, utilisation du mode fenêtré simulé.", err);
              nativeSuccess = false;
            }
            if (!nativeSuccess) setIsFullscreen(true);
          } else {
            if (isNativeFull) {
              try {
                if (document.exitFullscreen) await document.exitFullscreen();
                else if (document.webkitExitFullscreen) await document.webkitExitFullscreen();
                else if (document.msExitFullscreen) await document.msExitFullscreen();
              } catch (err) {
                console.warn("Erreur en quittant le plein écran natif.", err);
              }
            }
            setIsFullscreen(false);
          }
        };

        const handleChoice = (choice) => {
          if (feedback) return;

          const currentItem = items[currentIndex];
          const isCorrect = (choice === 'VRAI' && currentItem.isTrue) || (choice === 'FAUX' && !currentItem.isTrue);
          
          if (isCorrect) {
            setScore(prev => prev + 1);
          }

          let message = "";
          if (isCorrect) {
            message = currentItem.isTrue 
              ? `Bonne réponse ! ${currentItem.explanation}`
              : `Bien vu, c'était un piège ! ${currentItem.explanation}`;
          } else {
            message = currentItem.isTrue 
              ? `Erreur ! ${currentItem.explanation}`
              : `Attention au piège ! ${currentItem.explanation}`;
          }

          setFeedback({ isCorrect, message });
          setDragState(null);
        };

        const handleNext = () => {
          setFeedback(null);
          setCurrentIndex(prev => prev + 1);
        };

        const resetActivity = () => {
          setItems(shuffleArray(INITIAL_ITEMS));
          setCurrentIndex(0);
          setScore(0);
          setFeedback(null);
          setDragState(null);
        };

        useEffect(() => {
          if (!dragState) return;

          const handlePointerMove = (e) => {
            const dx = e.clientX - dragState.startX;
            const dy = e.clientY - dragState.startY;
            if (!dragState.isDragging && Math.sqrt(dx * dx + dy * dy) > 5) {
              setDragState(prev => ({ ...prev, isDragging: true, x: e.clientX - prev.offsetX, y: e.clientY - prev.offsetY }));
            } else if (dragState.isDragging) {
              setDragState(prev => ({ ...prev, x: e.clientX - prev.offsetX, y: e.clientY - prev.offsetY }));
            }
          };

          const handlePointerUp = (e) => {
            if (dragState.isDragging) {
              const dropTarget = document.elementFromPoint(e.clientX, e.clientY);
              const zoneElement = dropTarget?.closest('[data-zone]');
              if (zoneElement) {
                const zoneId = zoneElement.getAttribute('data-zone');
                handleChoice(zoneId);
              }
            }
            setDragState(null);
          };

          window.addEventListener('pointermove', handlePointerMove);
          window.addEventListener('pointerup', handlePointerUp);

          return () => {
            window.removeEventListener('pointermove', handlePointerMove);
            window.removeEventListener('pointerup', handlePointerUp);
          };
        }, [dragState, currentIndex, feedback, items]);

        const handlePointerDown = (e) => {
          if (e.button !== undefined && e.button !== 0) return;
          if (feedback) return;

          const rect = e.currentTarget.getBoundingClientRect();
          setDragState({
            startX: e.clientX,
            startY: e.clientY,
            offsetX: e.clientX - rect.left,
            offsetY: e.clientY - rect.top,
            x: rect.left,
            y: rect.top,
            width: rect.width,
            height: rect.height,
            isDragging: false
          });
        };

        const isComplete = currentIndex >= items.length;
        const currentItem = items[currentIndex];

        return (
          <div className={`font-sans bg-gray-50 flex flex-col overflow-x-hidden ${isFullscreen ? 'fixed inset-0 z-[200] overflow-y-auto p-4 sm:p-10' : 'min-h-screen p-2 sm:p-4'}`}>
            
            {showSpotlight && (
              <div className="fixed inset-0 z-[100] bg-slate-900/80 spotlight-overlay flex flex-col">
                <div className="flex-1" onClick={() => setShowSpotlight(false)}></div>
                <div className="pb-10 flex justify-center">
                  <button 
                    onClick={() => setShowSpotlight(false)} 
                    className="text-white/60 hover:text-white underline decoration-white/40 underline-offset-4 transition-colors px-6 py-2"
                  >
                    Continuer en mode fenêtré
                  </button>
                </div>
              </div>
            )}

            {/* CONTENEUR PRINCIPAL */}
            <div className={`w-full max-w-[98%] xl:max-w-[1000px] mx-auto flex flex-col ${isFullscreen ? 'min-h-full justify-center py-8' : ''}`}>
              
              <header className="flex justify-between items-start mb-6">
                <div className="flex-1">
                  <h1 className="text-xl md:text-2xl mb-1 text-[#1a5b82] font-semibold">Les types de conflit</h1>
                  <p className="text-sm md:text-base text-gray-600">
                    S'agit-il d'un <strong className="text-emerald-600">Vrai type de conflit</strong> ou d'un <strong className="text-rose-600">Faux type / Piège</strong> ?
                  </p>
                </div>
                
                <div className={`ml-4 shrink-0 flex items-center gap-4 ${showSpotlight ? 'relative z-[101]' : ''}`}>
                  {showSpotlight && (
                    <div className="hidden sm:flex items-center gap-3 animate-bounce-x">
                      <span className="text-white font-bold text-sm bg-blue-600 px-4 py-2 rounded-xl shadow-lg border border-white/20 whitespace-nowrap">
                        Mettez en plein écran !
                      </span>
                      <ArrowRight className="text-white w-5 h-5 shrink-0" strokeWidth={3} />
                    </div>
                  )}

                  <button 
                    onClick={toggleFullscreen}
                    title={isFullscreen ? "Quitter le plein écran" : "Passer en plein écran"}
                    className={`p-2 md:p-3 rounded-xl transition-all shadow-sm shrink-0 border ${showSpotlight ? 'bg-white text-blue-600 ring-4 ring-blue-500 ring-offset-4 ring-offset-transparent border-transparent scale-110' : 'bg-white hover:bg-[#1a5b82] hover:text-white text-gray-600 border-gray-200'}`}
                  >
                    {isFullscreen ? <Minimize2 size={20} /> : <Maximize2 size={20} />}
                  </button>
                </div>
              </header>

              {!isComplete && (
                <div className="mb-4 flex justify-between items-center text-sm font-medium text-gray-500">
                  <span>Carte {currentIndex + 1} sur {items.length}</span>
                  <span>Score : {score} / {currentIndex + (feedback ? 1 : 0)}</span>
                </div>
              )}

              {/* WRAPPER POUR CENTRER L'ACTIVITÉ ET LIMITER SA HAUTEUR */}
              <div className="flex-1 flex flex-col items-center justify-center w-full">
                
                <div className={`grid ${isComplete ? 'grid-cols-1 max-w-lg' : 'grid-cols-1 md:grid-cols-[1fr_1.2fr_1fr] lg:grid-cols-[1fr_1.5fr_1fr]'} gap-4 md:gap-8 w-full max-w-6xl mx-auto items-stretch md:h-[320px] lg:h-[360px] min-h-[250px]`}>
                  
                  {isComplete ? (
                    <div className="w-full bg-white rounded-3xl shadow-lg border border-gray-200 p-8 flex flex-col items-center justify-center animate-pop-in text-center h-full">
                      <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-4">
                        <CheckCircle size={32} />
                      </div>
                      <h2 className="text-2xl font-bold text-[#1a5b82] mb-2">Exercice terminé !</h2>
                      <p className="text-gray-600 mb-6">
                        Votre score final est de <strong className="text-lg text-[#1a5b82]">{score} sur {items.length}</strong>.
                      </p>
                      <button 
                        onClick={resetActivity}
                        className="flex items-center gap-2 px-6 py-3 bg-[#1a5b82] hover:bg-[#12415d] text-white rounded-xl transition-colors shadow-sm font-semibold text-base"
                      >
                        <RefreshCw size={18} />
                        Recommencer
                      </button>
                    </div>
                  ) : (
                    <>
                      {/* COLONNE GAUCHE (VRAI) */}
                      <div 
                        data-zone="VRAI"
                        onClick={() => handleChoice('VRAI')}
                        className={`col-span-1 rounded-[2rem] border-4 border-dashed flex flex-col items-center justify-center p-4 transition-all duration-300 cursor-pointer h-[120px] md:h-full
                          ${dragState?.isDragging ? 'border-emerald-300 bg-emerald-50' : 'border-gray-200 hover:border-emerald-400 hover:bg-emerald-50/50 bg-white'}
                        `}
                      >
                        <CheckCircle size={40} className="text-emerald-500 mb-2 md:mb-3 opacity-80" />
                        <h3 className="text-lg md:text-xl font-bold text-emerald-700 text-center">Vrai type de conflit</h3>
                        <p className="text-xs md:text-sm text-emerald-600/70 mt-1 text-center hidden md:block">Glissez ici ou cliquez</p>
                      </div>

                      {/* COLONNE CENTRALE (CARTE OU FEEDBACK) */}
                      <div className="col-span-1 flex items-center justify-center relative min-h-[180px] md:h-full z-10">
                        
                        {!feedback && currentItem && (
                          <div 
                            key={currentItem.id}
                            onPointerDown={handlePointerDown}
                            className={`
                              w-full max-w-sm h-auto py-4 md:py-5
                              bg-white rounded-[1.5rem] shadow-xl border border-gray-200 px-4 md:px-5 flex flex-col justify-center gap-2
                              cursor-grab active:cursor-grabbing animate-pop-in touch-none select-none
                              ${dragState?.isDragging ? 'opacity-0' : 'opacity-100'}
                            `}
                          >
                            <div className="flex justify-center text-gray-400 shrink-0">
                              <GripVertical size={20} />
                            </div>
                            <div className="flex items-center justify-center">
                              <p className="text-sm md:text-base font-medium text-center text-gray-800 leading-relaxed pointer-events-none">
                                {currentItem.text}
                              </p>
                            </div>
                          </div>
                        )}

                        {feedback && (
                          <div className="w-full max-w-sm h-auto py-4 md:py-5 bg-white rounded-[1.5rem] shadow-xl border px-4 md:px-5 flex flex-col justify-center animate-pop-in z-20"
                               style={{ borderColor: feedback.isCorrect ? '#10b981' : '#f43f5e' }}>
                            <div className="flex items-center gap-2 mb-2 shrink-0">
                              <div className={`p-1.5 rounded-full ${feedback.isCorrect ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                                {feedback.isCorrect ? <ThumbsUp size={20} /> : <ThumbsDown size={20} />}
                              </div>
                              <h3 className={`text-lg md:text-xl font-bold ${feedback.isCorrect ? 'text-emerald-700' : 'text-rose-700'}`}>
                                {feedback.isCorrect ? "Correct !" : "Oups !"}
                              </h3>
                            </div>
                            <div className="flex items-center">
                              <p className="text-sm text-gray-700 leading-relaxed w-full">
                                {feedback.message}
                              </p>
                            </div>
                            <button 
                              onClick={handleNext}
                              className="w-full py-2.5 mt-3 bg-[#1a5b82] hover:bg-[#12415d] text-white rounded-xl font-semibold text-sm transition-colors shadow-sm flex justify-center items-center gap-2 shrink-0"
                            >
                              Suivant <ArrowRight size={16} />
                            </button>
                          </div>
                        )}

                      </div>

                      {/* COLONNE DROITE (FAUX) */}
                      <div 
                        data-zone="FAUX"
                        onClick={() => handleChoice('FAUX')}
                        className={`col-span-1 rounded-[2rem] border-4 border-dashed flex flex-col items-center justify-center p-4 transition-all duration-300 cursor-pointer h-[120px] md:h-full
                          ${dragState?.isDragging ? 'border-rose-300 bg-rose-50' : 'border-gray-200 hover:border-rose-400 hover:bg-rose-50/50 bg-white'}
                        `}
                      >
                        <AlertTriangle size={40} className="text-rose-500 mb-2 md:mb-3 opacity-80" />
                        <h3 className="text-lg md:text-xl font-bold text-rose-700 text-center">Faux / Piège</h3>
                        <p className="text-xs md:text-sm text-rose-600/70 mt-1 text-center hidden md:block">Glissez ici ou cliquez</p>
                      </div>
                    </>
                  )}

                </div>
              </div>

            </div>

            {/* CALQUE FLOTTANT DU DRAG & DROP */}
            {dragState && dragState.isDragging && currentItem && (
              <div
                className="fixed z-[250] bg-white rounded-[1.5rem] shadow-2xl border-2 border-[#1a5b82] px-4 md:px-5 py-4 md:py-5 flex flex-col justify-center gap-2 pointer-events-none opacity-90"
                style={{
                  left: dragState.x,
                  top: dragState.y,
                  width: dragState.width,
                  height: dragState.height,
                  margin: 0,
                  transform: 'scale(1.05) rotate(-2deg)',
                  transition: 'transform 0.1s'
                }}
              >
                <div className="flex justify-center text-[#1a5b82] mb-1">
                  <GripVertical size={20} />
                </div>
                <div className="flex-1 flex items-center justify-center">
                  <p className="text-sm md:text-base font-medium text-center text-gray-800 leading-relaxed">
                    {currentItem.text}
                  </p>
                </div>
              </div>
            )}

          </div>
        );
      }

      const root = createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
