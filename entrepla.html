<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Planning Sim – La Mie qui Chante</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes zoom-in-95 { from { transform: scale(0.95); } to { transform: scale(1); } }
    @keyframes slide-in-from-left-4 { from { transform: translateX(-1rem); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes msg-slide-up { 0% { opacity: 0; transform: translateY(20px) scale(0.97); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes typing-blink { 0%, 80%, 100% { transform: scale(0); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
    .animate-in { animation-duration: 300ms; animation-fill-mode: both; }
    .fade-in { animation-name: fade-in; }
    .zoom-in-95 { animation-name: zoom-in-95; }
    .slide-in-from-left-4 { animation-name: slide-in-from-left-4; }
    .duration-300 { animation-duration: 300ms; }
    .msg-enter { opacity: 0; animation: msg-slide-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .typing-dot { width: 6px; height: 6px; background: #94a3b8; border-radius: 50%; display: inline-block; animation: typing-blink 1.2s infinite both; }
    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.18s; }
    .typing-dot:nth-child(3) { animation-delay: 0.36s; }
    .thread-scroll { scroll-behavior: smooth; }
    .thread-scroll::-webkit-scrollbar { width: 6px; }
    .thread-scroll::-webkit-scrollbar-track { background: transparent; }
    .thread-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    /* ── Fullscreen spotlight ── */
    @keyframes spotlightPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(99,102,241,.7), 0 6px 24px rgba(99,102,241,.4); transform: scale(1); }
      50%      { box-shadow: 0 0 0 10px rgba(99,102,241,.2), 0 6px 24px rgba(99,102,241,.5); transform: scale(1.08); }
    }
    @keyframes spotlightArrow {
      0%,100% { opacity: 1; transform: translateY(0); }
      50%     { opacity: .7; transform: translateY(-3px); }
    }
    @keyframes spotlightFadeIn {
      from { opacity: 0; transform: translateY(6px) scale(.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes spotlight-overlay-in {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    .spotlight-btn     { animation: spotlightPulse 2s ease-in-out infinite !important; }
    .spotlight-tooltip { animation: spotlightFadeIn .4s .5s ease both; }
    .spotlight-arrow   { animation: spotlightArrow 1.2s ease-in-out infinite; }
    .spotlight-overlay { animation: spotlight-overlay-in 0.4s ease forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ─── Fullscreen helpers ─── */
    const requestFS = (el) => {
      if (el.requestFullscreen) return el.requestFullscreen();
      if (el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
      if (el.mozRequestFullScreen) return el.mozRequestFullScreen();
      if (el.msRequestFullscreen) return el.msRequestFullscreen();
    };
    const exitFS = () => {
      if (document.exitFullscreen) return document.exitFullscreen();
      if (document.webkitExitFullscreen) return document.webkitExitFullscreen();
      if (document.mozCancelFullScreen) return document.mozCancelFullScreen();
      if (document.msExitFullscreen) return document.msExitFullscreen();
    };
    const isFullscreenNow = () =>
      !!(document.fullscreenElement || document.webkitFullscreenElement ||
         document.mozFullScreenElement || document.msFullscreenElement);

    /* ─── Fullscreen Button ─── */
    const FullscreenBtn = ({ isFS, onToggle, showSpotlight }) => {
      const EnterIcon = () => (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
          <path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
        </svg>
      );
      const ExitIcon = () => (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/>
          <path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/>
        </svg>
      );

      return (
        <div style={{ position: 'relative', display: 'inline-flex', alignItems: 'center' }}>
          <button
            onClick={onToggle}
            title={isFS ? 'Quitter le plein écran' : 'Plein écran'}
            className={showSpotlight ? 'spotlight-btn' : ''}
            style={{
              width: '38px',
              height: '38px',
              borderRadius: '10px',
              border: showSpotlight ? '2px solid #6366f1' : '1px solid rgba(255,255,255,0.15)',
              background: showSpotlight ? '#ffffff' : 'rgba(255,255,255,0.08)',
              color: showSpotlight ? '#1e293b' : 'white',
              cursor: 'pointer',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              transition: 'border .2s, background .2s, color .2s',
              flexShrink: 0,
              position: 'relative',
              zIndex: 62,
            }}
          >
            {isFS ? <ExitIcon /> : <EnterIcon />}
          </button>

          {/* Tooltip apparaît en dessous du bouton */}
          {showSpotlight && (
            <div
              className="spotlight-tooltip"
              style={{
                position: 'absolute',
                top: 'calc(100% + 12px)',
                right: 0,
                background: '#1c1917',
                color: 'white',
                borderRadius: '10px',
                padding: '8px 14px',
                fontSize: '12px',
                fontWeight: '700',
                whiteSpace: 'nowrap',
                boxShadow: '0 6px 24px rgba(0,0,0,0.45)',
                pointerEvents: 'none',
                letterSpacing: '0.01em',
                zIndex: 63,
              }}
            >
              {/* Flèche vers le haut */}
              <span
                className="spotlight-arrow"
                style={{
                  position: 'absolute',
                  top: '-6px',
                  right: '11px',
                  width: 0,
                  height: 0,
                  borderLeft: '6px solid transparent',
                  borderRight: '6px solid transparent',
                  borderBottom: '6px solid #1c1917',
                }}
              />
              Passer en plein écran !
            </div>
          )}
        </div>
      );
    };

    /* ─── Spotlight Overlay (découpe sur le bouton plein écran) ─── */
    const SpotlightOverlay = ({ onDismiss }) => (
      <div
        className="spotlight-overlay"
        onClick={onDismiss}
        style={{
          position: 'fixed',
          inset: 0,
          zIndex: 59,
          background: 'transparent',
          cursor: 'pointer',
        }}
      >
        {/* Trou dans l'obscurité — box-shadow spread sur tout l'écran sauf la zone du bouton */}
        <div style={{
          position: 'absolute',
          top: '3px',
          right: '60px',
          width: '56px',
          height: '56px',
          borderRadius: '14px',
          boxShadow: '0 0 0 9999px rgba(10,15,30,0.80)',
          pointerEvents: 'none',
        }} />

        {/* Message en bas */}
        <div style={{
          position: 'absolute',
          bottom: '28px',
          left: '50%',
          transform: 'translateX(-50%)',
          color: 'rgba(255,255,255,0.55)',
          fontSize: '12px',
          fontWeight: '600',
          letterSpacing: '0.06em',
          userSelect: 'none',
          whiteSpace: 'nowrap',
        }}>
          Cliquez n'importe où pour ignorer
        </div>
      </div>
    );

    const TypingIndicator = () => (
      <div className="flex items-center gap-1.5 px-4 py-3 bg-white border border-slate-200 rounded-2xl rounded-tl-sm w-fit shadow-sm msg-enter">
        <span className="typing-dot"></span>
        <span className="typing-dot"></span>
        <span className="typing-dot"></span>
      </div>
    );

    function PhaseThread({ phaseKey, children }) {
      const [visibleCount, setVisibleCount] = useState(0);
      const [showTyping, setShowTyping] = useState(false);
      const scrollRef = useRef(null);
      const items = React.Children.toArray(children);

      const scrollToBottom = useCallback(() => {
        if (scrollRef.current) {
          const el = scrollRef.current.closest('.thread-scroll');
          if (el) el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
        }
      }, []);

      useEffect(() => {
        setVisibleCount(0);
        setShowTyping(false);
        const timers = [];
        let t = 0;
        items.forEach((_, i) => {
          const delay = i === 0 ? 300 : 700 + i * 200;
          t += delay;
          const typing = i > 0 && i < items.length;
          if (typing) {
            timers.push(setTimeout(() => { setShowTyping(true); scrollToBottom(); }, t - 500));
          }
          timers.push(setTimeout(() => {
            setShowTyping(false);
            setVisibleCount(i + 1);
            setTimeout(scrollToBottom, 50);
          }, t));
        });
        return () => timers.forEach(clearTimeout);
      }, [phaseKey]);

      return (
        <div ref={scrollRef} className="flex flex-col gap-3">
          {items.slice(0, visibleCount).map((child, i) => (
            <div key={i} className="msg-enter" style={{ animationDelay: '0ms' }}>
              {child}
            </div>
          ))}
          {showTyping && <TypingIndicator />}
        </div>
      );
    }

    const ChevronDown = ({ size = 16 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    );
    const CheckCircle = ({ size = 16 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    );
    const IconBread = ({ size = 24, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/>
        <line x1="6" y1="17" x2="18" y2="17"/>
      </svg>
    );
    const IconMic = ({ size = 16, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
    );
    const IconDroplet = ({ size = 16, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/><line x1="12" y1="22" x2="12" y2="14" strokeDasharray="2 2"/></svg>
    );
    const IconBox = ({ size = 16, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
    );
    const IconBaguette = ({ size = 16, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 20 L20 4"/><path d="M4 20 Q2 18 4 16 Q6 14 8 16 Q10 18 12 16 Q14 14 16 16 Q18 18 20 16 Q22 14 20 12 L20 4"/></svg>
    );
    const IconZzz = ({ size = 16, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 12h6l-6 8h6"/><path d="M12 4h6l-6 8h6"/></svg>
    );
    const IconTrophy = ({ size = 24, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4a2 2 0 0 1-2-2V5h4"/><path d="M18 9h2a2 2 0 0 0 2-2V5h-4"/><path d="M12 17v4"/><path d="M8 21h8"/><path d="M6 5h12v5a6 6 0 0 1-12 0V5z"/></svg>
    );
    const IconAlertTriangle = ({ size = 24, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    );
    const IconXCircle = ({ size = 24, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    );
    const IconLock = ({ size = 16, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    );
    const IconCheck = ({ size = 14, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>
    );
    const IconX = ({ size = 14, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    );
    const IconTrendingDown = ({ size = 14, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>
    );
    const IconTrendingUp = ({ size = 14, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
    );
    const IconMinus = ({ size = 14, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"/></svg>
    );

    const SysMsg = ({ children, isAlert = false, isWarning = false }) => {
      if (isAlert) {
        return (
          <div className="bg-red-50 border border-red-200 rounded-xl p-4 shadow-sm flex items-start gap-3 my-3">
            <div className="bg-red-100 p-1.5 rounded-lg shrink-0">
              <IconAlertTriangle size={16} className="text-red-600" />
            </div>
            <p className="text-[12px] text-red-800 leading-relaxed">{children}</p>
          </div>
        );
      }
      if (isWarning) {
        return (
          <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 shadow-sm flex items-start gap-3 my-3">
            <div className="bg-amber-100 p-1.5 rounded-lg shrink-0">
              <IconAlertTriangle size={16} className="text-amber-600" />
            </div>
            <p className="text-[12px] text-amber-800 leading-relaxed">{children}</p>
          </div>
        );
      }
      return (
        <div className="text-center text-[11px] font-medium my-3 px-4 py-2 rounded-lg mx-auto max-w-[90%] bg-slate-100 text-slate-500 border border-slate-200">
          {children}
        </div>
      );
    };

    const EmailMsg = ({ from, to, subject, children }) => {
      const match = from && from.match(/^(.+?)\s*<(.+)>$/);
      const fromName = match ? match[1].trim() : null;
      const fromEmail = match ? match[2].trim() : from;
      return (
        <div className="border border-slate-200 rounded-xl bg-white shadow-sm overflow-hidden">
          <div className="bg-slate-50 border-b border-slate-200 px-4 py-3 space-y-1.5">
            <div className="flex gap-3 items-baseline">
              <span className="text-slate-400 text-[13px] w-8 shrink-0">De</span>
              <span className="text-slate-800 text-[13px]">
                {fromName && <strong>{fromName}</strong>}
                {fromName && ' '}
                <span className="text-slate-400">{fromName ? `<${fromEmail}>` : fromEmail}</span>
              </span>
            </div>
            {to && (
              <div className="flex gap-3 items-baseline">
                <span className="text-slate-400 text-[13px] w-8 shrink-0">À</span>
                <span className="text-slate-700 text-[13px]">{to}</span>
              </div>
            )}
            <div className="flex gap-3 items-baseline">
              <span className="text-slate-400 text-[13px] w-8 shrink-0">Obj</span>
              <span className="text-slate-800 text-[13px] font-bold">{subject}</span>
            </div>
          </div>
          <div className="px-4 py-3 text-[13px] text-slate-700 leading-relaxed whitespace-pre-line">{children}</div>
        </div>
      );
    };

    const OutcomeTag = ({ delta, label }) => {
      const isPos = delta > 0;
      const isNeg = delta < 0;
      const colors = isPos
        ? { bg: 'bg-emerald-50', border: 'border-emerald-200', text: 'text-emerald-700', iconCls: 'text-emerald-600' }
        : isNeg
        ? { bg: 'bg-rose-50', border: 'border-rose-200', text: 'text-rose-700', iconCls: 'text-rose-600' }
        : { bg: 'bg-slate-50', border: 'border-slate-200', text: 'text-slate-500', iconCls: 'text-slate-400' };
      return (
        <span className={`inline-flex items-center gap-1 text-[11px] font-bold px-2 py-0.5 rounded border ${colors.bg} ${colors.border} ${colors.text}`}>
          {isPos ? <IconTrendingUp size={11} className={colors.iconCls} /> : isNeg ? <IconTrendingDown size={11} className={colors.iconCls} /> : <IconMinus size={11} className={colors.iconCls} />}
          {isPos ? '+' : ''}{delta} {label}
        </span>
      );
    };

    const OutcomeMsg = ({ children, isGood, impacts = [] }) => {
      const palette = isGood === true
        ? { border: 'border-emerald-500', bg: 'bg-emerald-50', badgeBg: 'bg-white border-emerald-200 text-emerald-700', text: 'text-emerald-900' }
        : isGood === false
        ? { border: 'border-rose-500', bg: 'bg-rose-50', badgeBg: 'bg-white border-rose-200 text-rose-700', text: 'text-rose-900' }
        : { border: 'border-amber-400', bg: 'bg-amber-50', badgeBg: 'bg-white border-amber-200 text-amber-700', text: 'text-amber-900' };
      return (
        <div className={`mt-2 border-l-4 ${palette.border} ${palette.bg} rounded-r-xl p-4 shadow-sm`}>
          {impacts.length > 0 && (
            <div className="flex flex-wrap gap-1.5 mb-2.5">
              {impacts.map((imp, i) => (
                <span key={i} className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-white text-[11px] font-bold border shadow-sm ${
                  imp.delta > 0 ? 'text-emerald-700 border-emerald-200' : imp.delta < 0 ? 'text-rose-700 border-rose-200' : 'text-slate-500 border-slate-200'
                }`}>
                  {imp.delta > 0 ? <IconTrendingUp size={11} /> : imp.delta < 0 ? <IconTrendingDown size={11} /> : <IconMinus size={11} />}
                  {imp.delta > 0 ? '+' : ''}{imp.delta} {imp.label}
                </span>
              ))}
            </div>
          )}
          <p className={`italic text-[12px] leading-relaxed ${palette.text}`}>{children}</p>
        </div>
      );
    };

    const ChoiceBtn = ({ children, onClick }) => (
      <button
        onClick={onClick}
        className="w-full text-left p-3.5 text-[13px] font-medium text-slate-700 bg-white border border-slate-200 hover:border-indigo-400 hover:bg-indigo-50 hover:text-indigo-900 rounded-xl transition-all shadow-sm mb-2 last:mb-0"
      >
        {children}
      </button>
    );

    const ScoreBar = ({ label, value, max = 100 }) => {
      const pct = Math.max(0, Math.min(100, (value / max) * 100));
      const color = value >= 75 ? 'bg-emerald-500' : value >= 40 ? 'bg-amber-400' : 'bg-red-500';
      const textColor = value >= 75 ? 'text-emerald-600' : value >= 40 ? 'text-amber-600' : 'text-red-600';
      return (
        <div className="mb-2">
          <div className="flex justify-between text-[12px] font-bold text-slate-700 mb-1.5">
            <span>{label}</span><span className={textColor}>{value}/100</span>
          </div>
          <div className="h-3 bg-slate-100 rounded-full overflow-hidden shadow-inner">
            <div className={`h-full rounded-full transition-all duration-1000 ease-out ${color}`} style={{ width: `${pct}%` }} />
          </div>
        </div>
      );
    };

    /* ─── Composants d'astuces (Modales) ───────────── */
    const TipModal = ({ title, text, onDismiss, icon }) => (

                            }}
                            className={`relative flex items-start gap-3 px-5 py-4 border-b border-gray-50 last:border-0 transition-colors duration-200
                              ${!unlocked && !canTransition ? 'opacity-40 cursor-not-allowed bg-white'
                              : canTransition ? 'hover:bg-indigo-50/30 cursor-pointer bg-white'
                              : done_item ? 'opacity-60 hover:bg-gray-50 cursor-pointer bg-white'
                              : 'hover:bg-gray-50 cursor-pointer bg-white'}`}
                          >
                            {(isUnread || canTransition) && <div className="absolute left-2 top-1/2 -translate-y-1/2 w-1.5 h-1.5 rounded-full bg-indigo-600" />}
                            <div className={`flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm
                              ${done_item ? 'bg-slate-100 text-slate-400' : (!unlocked && !canTransition) ? 'bg-gray-50 border border-gray-200 text-gray-400' : item.color}`}>
                              {done_item ? <CheckCircle size={16} /> : (!unlocked && !canTransition) ? <IconLock size={14} /> : item.avatar}
                            </div>
                            <div className="flex-1 min-w-0">
                              <div className="flex items-center justify-between mb-0.5">
                                <h2 className={`text-sm truncate pr-3 ${done_item ? 'text-gray-400 font-medium' : (!unlocked && !canTransition) ? 'text-gray-400 font-medium' : 'text-gray-900 font-bold'}`}>
                                  {item.label}
                                </h2>
                                <span className={`text-[11px] font-medium whitespace-nowrap ${done_item || (!unlocked && !canTransition) ? 'text-gray-300' : 'text-gray-500'}`}>
                                  {item.day}
                                </span>
                              </div>
                              <p className={`text-[13px] mb-0.5 ${done_item || (!unlocked && !canTransition) ? 'text-gray-400' : 'text-gray-800 font-semibold'}`}>
                                {item.sub}
                              </p>
                              <div className="flex items-center justify-between gap-2">
                                <p className={`text-[13px] truncate ${done_item || (!unlocked && !canTransition) ? 'text-gray-400' : 'text-indigo-500'}`}>
                                  {item.snippet}
                                </p>
                                {!unlocked && !canTransition && <span className="text-[11px] italic text-gray-400 shrink-0">En attente...</span>}
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ) : (
                  /* ── THREAD OUVERT ── */
                  <div className="flex flex-col flex-1 min-h-0">
                    {/* Back header */}
                    <div className="flex items-center gap-3 px-5 py-3 border-b border-gray-100 bg-white shrink-0">
                      <button onClick={() => setActivePhase(null)} className="flex items-center gap-2 text-indigo-600 hover:text-indigo-800 transition-colors">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                        <span className="text-sm font-bold tracking-wide uppercase">Boîte de réception</span>
                      </button>
                    </div>
                    {/* Thread content */}
                    <div id="thread-panel" className="flex-1 min-h-0 overflow-y-auto p-4 md:p-6 bg-slate-50/50 thread-scroll relative shadow-[inset_0_4px_6px_-4px_rgba(0,0,0,0.05)]">
                      {activePhase === 'cindy'   && renderCindyPhase()}
                      {activePhase === 'treolia' && renderTreoliaPhase()}
                      {activePhase === 'mairie'  && renderMairiePhase()}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* OVERLAYS D'IMMERSION */}
          {appState === 'intro' && !showSpotlight && (
            <div className="absolute inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="max-w-md w-full bg-white rounded-[2rem] shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-500 border border-slate-100">
                <div className="bg-gradient-to-br from-indigo-600 to-purple-700 p-10 text-center relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-full h-full opacity-10 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-white via-transparent to-transparent"></div>
                  <div className="mb-4 flex justify-center relative z-10 hover:scale-110 transition-transform duration-300"><IconBread size={72} className="text-white drop-shadow-xl" /></div>
                  <h1 className="text-3xl font-black tracking-tight text-white relative z-10 drop-shadow-sm">La Mie qui Chante</h1>
                  <p className="text-indigo-200 text-xs font-bold mt-3 uppercase tracking-[0.2em] relative z-10">Simulateur de gestion</p>
                </div>
                <div className="p-8 text-center bg-white relative z-20">
                  <p className="text-slate-600 text-[15px] leading-relaxed mb-8">
                    Vous venez de reprendre la gérance de cette boulangerie de quartier. Votre mission : maintenir un <strong className="text-indigo-600">Score Global</strong> élevé en équilibrant vos finances, votre équipe et votre réputation.<br/><br/>
                    Consultez vos emails, vérifiez le planning, et prenez les bonnes décisions face aux imprévus.
                  </p>
                  <button onClick={() => setAppState('playing')} className="w-full py-4 bg-slate-900 text-white rounded-2xl text-[15px] font-bold hover:bg-indigo-600 transition-all duration-300 shadow-lg hover:shadow-indigo-500/30 hover:-translate-y-0.5">
                    Ouvrir la boîte mail
                  </button>
                </div>
              </div>
            </div>
          )}

          {appState === 'transition' && transitionData && (
            <div className="absolute inset-0 z-[100] bg-slate-900 overflow-y-auto flex flex-col items-center justify-center p-6 animate-in fade-in duration-300">
              {/* Narrative header */}
              <div className="text-center mb-10 flex flex-col items-center">
                <span className="text-indigo-400 font-bold tracking-[0.2em] text-sm uppercase mb-3">{transitionData.day}</span>
                <h1 className="text-white text-7xl md:text-8xl font-extrabold tracking-tight mb-6 drop-shadow-lg">{transitionData.time}</h1>
                <p className="text-slate-300 text-lg md:text-xl italic max-w-lg leading-relaxed font-light">{transitionData.text}</p>
              </div>
              {/* Email preview */}
              {transitionData.emailPreview && (
                <div className="w-full max-w-2xl mb-10">
                  <div className="bg-white rounded-2xl shadow-2xl shadow-black/50 overflow-hidden">
                    <div className="px-8 py-6 bg-slate-50 border-b border-slate-200">
                      <div className="flex flex-col gap-2 text-[15px]">
                        <div className="grid grid-cols-[45px_1fr] items-baseline">
                          <span className="text-slate-400 font-medium text-sm text-right pr-3">De</span>
                          <div className="text-slate-900">
                            {(() => { const m = transitionData.emailPreview.from.match(/^(.+?)\s*<(.+)>$/); return m ? <><strong>{m[1].trim()}</strong><span className="text-slate-500 ml-1.5 text-sm hidden sm:inline">&lt;{m[2].trim()}&gt;</span></> : <span>{transitionData.emailPreview.from}</span>; })()}
                          </div>
                        </div>
                        <div className="grid grid-cols-[45px_1fr] items-baseline">
                          <span className="text-slate-400 font-medium text-sm text-right pr-3">À</span>
                          <span className="text-slate-700">{transitionData.emailPreview.to}</span>
                        </div>
                        <div className="grid grid-cols-[45px_1fr] items-baseline mt-2">
                          <span className="text-slate-400 font-medium text-sm text-right pr-3">Obj</span>
                          <span className="font-extrabold text-slate-900 text-lg">{transitionData.emailPreview.subject}</span>
                        </div>
                      </div>
                    </div>
                    <div className="px-8 py-8 text-slate-800 leading-relaxed text-[15px] whitespace-pre-line">{transitionData.emailPreview.body}</div>
                  </div>
                </div>
              )}
              {/* CTA */}
              <button onClick={handleContinueTransition} className="group flex items-center gap-3 px-8 py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-full font-bold text-lg shadow-lg shadow-indigo-600/30 transition-all duration-300 hover:-translate-y-1 focus:outline-none focus:ring-4 focus:ring-indigo-500/50">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="opacity-80"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                <span>Consulter les nouveaux messages</span>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="opacity-80 group-hover:translate-x-1 transition-transform"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
              </button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
