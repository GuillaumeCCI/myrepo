 }

 alt:"Bon à savoir :Que vous donniez la parole en premier à Marc ou à Leïla importe peu ici. Le vrai coup de maître managérial, c'est d'avoir le réflexe de distribuer activement la parole vers ceux qui restent silencieux.",
 text:"La transition est habile : vous valorisez d'abord Sofia, puis vous amenez Marc sur un terrain de confort (le fournil). C'est une excellente adaptation à son profil junior.",
 narratif:"Surpris qu'on s'adresse à lui, Marc se redresse. Il prend la parole prudemment et finit par évoquer des soucis de cadence sur les cuissons du jeudi."},
 C:{note:4,eng:1,cls:"ok",icon:"ok",quality:"Très bien",posture:{dir:0,par:2,fac:0},nearMiss:false,ref:null,
 alt:"Bon à savoir :Cibler Leïla (C) ou Marc (B) démontre une maîtrise équivalente de la distribution de la parole.",
 text:"Solliciter Leïla sur son domaine direct d'expertise la valorise et facilite sa prise de parole. C'est une excellente illustration du rôle d'animateur garant de l'équilibre.",
 narratif:"Leïla lève la tête, étonnée d'être sollicitée si vite. Elle prend confiance et explique que les retours clients ont été difficiles à gérer seule cette semaine."},
 D:{note:0,eng:-2,cls:"bad",icon:"bad",quality:"À retravailler",posture:{dir:2,par:0,fac:0},nearMiss:false,alt:null,ref:null,
 text:"Sacrifier le temps de parole pour grappiller deux minutes de réunion est une erreur tactique. Marc et Leïla se sentent exclus, ce qui enfreint la règle de base de la participation.",
 narratif:"Marc se replonge aussitôt dans ses notes. Leïla hoche vaguement la tête en silence. Sofia a l'air ravie d'avoir plié le sujet. La fenêtre de dialogue vient de se refermer."}
 }
 },

 // N2 : Annonce des résultats
 // CORRECTION : narratif C (Sofia plus neutre, réaction moins chargée)
 {id:2,phase:"Annonce des résultats",critere:" & crit.4",critClass:"C26",isNew:false,
 hint:"Annoncer un résultat négatif sans ouvrir de discussion crée de la défense. Posez le fait, puis invitez immédiatement à l'analyse.",
 ctx:"La semaine a été tendue en boutique et cela se ressent : le chiffre d'affaires clôture à -8 % par rapport à votre objectif. Il faut l'annoncer à l'équipe.",
 options:[
 {id:"A",label:"Annoncer le chiffre et exiger un redressement",text:"« Bon, on passe aux chiffres. On finit la semaine à -8 % sur l'objectif. C'est clairement en dessous de ce qu'on doit faire, il va falloir redresser la barre rapidement. »"},
 {id:"B",label:"Poser le constat et inviter à analyser ensemble",text:"« Côté chiffres, on est à -8 % de notre objectif cette semaine. Avant de tirer des conclusions ou de changer quoi que ce soit, j'aimerais qu'on essaie d'identifier ensemble ce qui a pu coincer. »"},
 {id:"C",label:"Partager son inquiétude personnelle",text:"« Au niveau des chiffres, on est à -8 % par rapport à nos attentes. Je vous avoue que cette baisse me préoccupe pas mal pour la dynamique du mois. »"}
 ],
 feedback:{
 A:{note:1,eng:-1,cls:"bad",icon:"bad",quality:"À retravailler",posture:{dir:2,par:0,fac:0},nearMiss:false,alt:null,ref:null,
 text:"L'injonction à « redresser la barre » crée immédiatement une crispation. Pour être efficace, il vaut mieux poser le constat de manière neutre, puis inviter l'équipe à analyser sereinement la situation.",
 narratif:"Sofia se referme en croisant les bras. Marc fuit votre regard. Leïla reste de marbre. L'équipe encaisse le coup sans mot dire."},
 B:{note:4,eng:1,cls:"ok",icon:"ok",quality:"Très bien",posture:{dir:0,par:2,fac:0},nearMiss:false,alt:null,ref:null,
 text:"En privilégiant le « ensemble », vous transformez un mauvais chiffre en un moteur d'intelligence collective. Parler « d'identifier » ce qui a coincé prouve que vous cherchez des solutions, pas des coupables.",
 narratif:"Marc redresse la tête. Sofia prend les devants en évoquant les ruptures de stocks, et Leïla approuve d'un signe de tête. La machine de l'équipe est relancée."},
 C:{note:2,eng:-1,cls:"warn",icon:"warn",quality:"Presque",posture:{dir:1,par:0,fac:0},nearMiss:true,alt:null,
 ref:"Le conseil du coach :Jouer la carte de l'honnêteté est louable, mais il manque le pont vers l'action. Pour éviter de plomber l'ambiance, il faut tout de suite basculer sur le collectif : « voici mon inquiétude, comment on gère ça ensemble ? »",
 text:"La transparence a ses limites : étaler votre inquiétude sans proposer de plan d'action génère juste de l'anxiété. Le manager doit éclairer le chemin, pas seulement constater le brouillard.",
 narratif:"Un malaise palpable s'installe. Marc triture son stylo, Leïla fixe le bois de la table, et Sofia hausse les épaules. Personne ne sait par quel bout prendre le problème."}

 },

 // N3 : Recherche des causes
 // CORRECTION : ctx neutralisé ("il est évoqué que" plutôt que "Sofia vient d'évoquer")
 // CORRECTION : narratif A (Marc ciblé, Sofia réaction plus neutre)
 {id:3,phase:"Recherche des causes",critere:" ",critClass:"C26",isNew:false,
 hint:"Avant de cibler un individu sur une difficulté, ouvrir la question à tous. Les causes systémiques remontent mieux dans un espace collectif.",
 ctx:"La discussion met en lumière un point précis : plusieurs ruptures de produits ont pénalisé les ventes de jeudi soir. Autour de la table, Marc se raidit un peu. C'est lui qui était aux commandes du fournil ce jour-là.",
 options:[
 {id:"A",label:"Interroger Marc directement sur son rôle",text:"« Marc, vu que c'est toi qui étais à la production jeudi, tu peux nous expliquer ce qui a coincé sur les stocks en fin de journée ? »"},
 {id:"B",label:"Ouvrir la question à toute l'équipe",text:"« Ok, on a un vrai sujet sur ces ruptures du jeudi. À votre avis, qu'est-ce qui provoque ça ? Comment vous l'expliquez, au comptoir comme au fournil ? »"},
 {id:"C",label:"Imposer une procédure de contrôle",text:"« Bon, ces ruptures du jeudi nous coûtent du chiffre. Pour régler ça vite, on va mettre en place une feuille de pointage des stocks à remplir tous les après-midis. »"}
 ],
 feedback:{
 A:{note:2,eng:0,cls:"warn",icon:"warn",quality:"Presque",posture:{dir:1,par:1,fac:0},nearMiss:true,alt:null,
 ref:"Le conseil du coach :Vouloir comprendre ce qui a coincé est le bon réflexe. Mais pointer directement quelqu'un du doigt devant l'équipe le mettra toujours sur la défensive. Aborder le problème de manière plus globale permet souvent de faire émerger l'info en douceur, sans froisser personne.",
 text:"Le réflexe d'interroger directement la personne en charge est compréhensible, mais il braque les projecteurs sur Marc devant toute l'équipe. L'obliger à se justifier à froid bloque la parole. Une approche plus large aurait permis de déminer le terrain.",
 narratif:"Marc se crispe. Il balbutie une explication sur le retard du fournisseur, le regard fuyant. Sofia et Leïla le regardent sans venir à son secours."},
 B:{note:4,eng:1,cls:"ok",icon:"ok",quality:"Très bien",posture:{dir:0,par:2,fac:0},nearMiss:false,alt:null,ref:null,
 text:"L'inclusion explicite de la vente et de la production (« au comptoir comme au fournil ») déplace le problème de l'individu vers le collectif. C'est un cas d'école d'intelligence collective : la solution devient l'affaire de tous.",
 narratif:"Le visage de Marc se détend. Ne se sentant plus accusé, il explique le décalage dû à la livraison de farine. Leïla enchaîne sur l'impact client, soutenue par Sofia. Le dialogue est fluide et constructif."},
 C:{note:1,eng:-1,cls:"bad",icon:"bad",quality:"À retravailler",posture:{dir:2,par:0,fac:0},nearMiss:false,alt:null,ref:null,
 text:"Dégainer une procédure (le tableau de pointage) pour masquer l'urgence ne résout rien si l'on ignore la racine du problème. En zappant l'analyse collective, vous imposez une contrainte administrative qui sera perçue comme une punition.",
 narratif:"Marc se replie sur lui-même en fixant la table. Leïla lève les yeux au ciel imperceptiblement. Sofia lâche un « comme vous voulez » qui en dit long sur son absence d'adhésion."}
 }
 },

 // N4 : Adapter son management au profil junior
 // CORRECTION : ctx ("Marc a mentionné" remplacé par formule neutre, sans supposer N1=B)
 // CORRECTION : narratif A (suppression mention Leïla hors-scène)
 {id:4,phase:"Adapter son management au profil junior",critere:" ",critClass:"C26",isNew:false,
 hint:"La culture artisanale valorise la rigueur sur le produit. Marc, junior, a besoin d'être soutenu sans être fragilisé devant ses collègues.",
 ctx:"Le sujet glisse sur l'organisation des cuissons de fin de journée, dont Marc a la charge. Vous sentez qu'il reste sur la réserve et cherche ses mots. Face à Sofia et Leïla qui ont de l'expérience, il semble mal à l'aise d'exposer ses difficultés techniques.",
 options:[
 {id:"A",label:"Recadrer Marc sur la remontée d'informations",text:"« Je comprends Marc, mais si tu as un souci technique sur la prod, n'attends pas la réunion d'équipe pour le remonter. Viens m'en parler en direct dès que ça coince. »"},
 {id:"B",label:"Proposer un aparté pour l'accompagner",text:"« C'est un bon point d'en parler. Gérer les dernières cuissons avec le rush du soir, c'est un vrai rythme à prendre. Je te propose qu'on se pose tous les deux tout à l'heure pour revoir ton organisation ? »"},
 {id:"C",label:"Rassurer par la bienveillance",text:"« Ne te prends pas trop la tête avec ça, Marc. Tu es encore en train de prendre tes marques ici, c'est tout à fait normal de tâtonner un peu sur les cuissons au début. »"}
 ],
 feedback:{
 A:{note:0,eng:-2,cls:"bad",icon:"bad",quality:"À retravailler",posture:{dir:2,par:0,fac:0},nearMiss:false,alt:null,ref:null,
 text:"L'injonction est pragmatique, mais le timing est catastrophique. Recadrer un profil junior devant ses collègues plus expérimentés pulvérise la sécurité psychologique du brief. Le message passe, mais la confiance est rompue.",
 narratif:"Marc s'empourpre, lâche un timide « excusez-moi » et se terre dans le silence. Leïla et Sofia regardent leurs chaussures. Un froid polaire s'abat sur la réunion."},
 B:{note:4,eng:2,cls:"ok",icon:"ok",quality:"Très bien",posture:{dir:0,par:1,fac:1},nearMiss:false,alt:null,ref:null,
 text:"C'est un sans-faute. En validant publiquement la difficulté technique (le fameux « rush »), vous légitimez le ressenti de Marc. La proposition d'un aparté lui offre une porte de sortie honorable et un véritable soutien.",
 narratif:"Marc redresse les épaules, visiblement soulagé de ne pas être jugé incompétent. « Avec plaisir, ça m'aiderait bien », répond-il. Leïla lui adresse un regard complice. L'équilibre de l'équipe est préservé."},
 C:{note:2,eng:0,cls:"warn",icon:"warn",quality:"Presque",posture:{dir:0,par:1,fac:0},nearMiss:true,alt:null,
 ref:"Le conseil du coach :C'est bien d'être rassurant, mais la bienveillance seule ne résout pas un problème opérationnel. Un collaborateur junior a aussi (et surtout) besoin de méthodes et de solutions concrètes pour se rassurer sur sa technique.",
 text:"La bienveillance de façade ne remplace pas l'accompagnement managérial. Banaliser le problème (« c'est normal au début ») laisse Marc seul avec sa difficulté technique. Un junior attend des repères concrets, pas juste une tape dans le dos.",
 narratif:"Marc acquiesce d'un sourire poli, mais son regard reste fuyant. Il ne se sent pas plus avancé, et le problème opérationnel reste entier."}
 }
 },

 // N5 : Transmettre le rituel d'accueil
 {id:5,phase:"Transmettre le rituel d'accueil",critere:" ",critClass:"C27",isNew:false,
 hint:"La transmission entre pairs (senior → junior) est souvent plus efficace qu'une consigne descendante. Qui maîtrise ce rituel depuis longtemps ?",
 ctx:"Vous avez remarqué que dans le feu de l'action, l'accueil client s'est un peu standardisé ces derniers temps. Vous voulez relancer le fameux « réflexe Trois Épis » : un vrai contact visuel, la phrase de bienvenue de la maison, et la mise en avant du produit phare.",
 options:[
 {id:"A",label:"Rappeler la règle de manière directive",text:"« Petite piqûre de rappel sur la vente : même quand il y a du monde, on n'oublie pas le sourire, notre petite phrase d'accueil et de toujours proposer le produit du moment. C'est la base de notre métier. »"},
 {id:"B",label:"S'appuyer sur l'expérience de Sofia",text:"« Sofia, ça fait un moment que tu es avec nous et tu as un super contact client. Comment tu fais, toi, pour glisser notre phrase d'accueil et le produit du moment naturellement, même quand ça speed ? »"},
 {id:"C",label:"Partir d'un constat partagé avec l'équipe",text:"« Côté boutique, j'ai l'impression qu'on a un peu perdu l'habitude de notre phrase de bienvenue et du produit du moment. Vous le ressentez comment au comptoir en ce moment ? »"}
 ],
 feedback:{
 A:{note:2,eng:0,cls:"warn",icon:"warn",quality:"Presque",posture:{dir:2,par:0,fac:0},nearMiss:true,alt:null,
 ref:"Le conseil du coach :La règle a le mérite d'être claire, mais l'équipe risque de l'oublier dès le prochain coup de feu. Pour que ça marque les esprits, s'appuyer sur l'expérience des plus anciens pour montrer l'exemple est souvent bien plus puissant qu'une simple injonction.",
 text:"La fameuse « piqûre de rappel » descendante a le mérite d'être claire, mais elle manque sa cible..",
 narratif:"Sofia hoche vaguement la tête par politesse. Marc griffonne un mot sur son carnet sans lever les yeux. La consigne a plané au-dessus de la table sans vraiment s'y poser."},
 B:{note:4,eng:2,cls:"ok",icon:"ok",quality:"Très bien",posture:{dir:0,par:1,fac:1},nearMiss:false,alt:null,ref:null,
 text:"Excellente manœuvre. Transformer la collaboratrice experte en mentore informelle coche toutes les cases de la transmission. Sofia se sent valorisée, et Marc apprend le métier via un vocabulaire « terrain », bien plus digeste qu'un protocole théorique.",
 narratif:"L'œil de Sofia s'allume. Flattée, elle partage volontiers son astuce pour caser la phrase d'accueil même quand la file s'allonge. Marc écoute avec attention, l'approche lui semble directement applicable."},
 C:{note:3,eng:1,cls:"ok",icon:"ok",quality:"Bien",posture:{dir:0,par:1,fac:1},nearMiss:false,ref:null,
 alt:"Bon à savoir :Faire un constat partagé avec l'équipe sur ce qui coince, ou s'appuyer directement sur l'experte du groupe pour montrer l'exemple, sont deux excellentes méthodes. Dans les deux cas, vous évitez le piège du chef qui dicte la règle.",
 text:"Partir d'un constat partagé (« j'ai l'impression que... ») est une approche d'inclusion très solide. Cela permet d'identifier les freins (la fatigue, le monde) avant de réimposer la règle, posant ainsi une bonne base pour la transmission.",
 narratif:"La glace est brisée. Marc avoue qu'il panique un peu quand le magasin est plein, et Leïla concède qu'elle oublie souvent le produit du moment en fin de journée. Le diagnostic est partagé."}
 }
 },

 // N6 : Techniques de vente multicanal
 // CORRECTION : narratif B (clarification du rôle de Marc vs pickups)
 {id:6,phase:"Techniques de vente multicanal",critere:" ",critClass:"C27",isNew:false,
 hint:"Partir des difficultés vécues par l'équipe est plus efficace que d'expliquer un concept. Qui gère concrètement les retraits en boutique en ce moment ?",
 ctx:"Le Click & Collect a été lancé il y a trois semaines et ça cartonne déjà (15 % des ventes). Mais vous observez que l'équipe gère les retraits complètement au feeling. Ça cafouille souvent quand un client internet arrive au milieu de la file d'attente classique.",
 options:[
 {id:"A",label:"Donner une consigne de rapidité",text:"« Pour les commandes internet, on ne va pas réinventer la roue. Le client a déjà payé, donc l'objectif c'est d'être ultra-rapide : vous prenez le nom, vous donnez la poche avec le sourire, et on enchaîne pour ne pas bloquer la caisse. »"},
 {id:"B",label:"Partir de l'irritant vécu par Leïla",text:"« Leïla, c'est souvent toi qui te retrouves à gérer les retraits internet le samedi matin. Concrètement, qu'est-ce qui te fait perdre le plus de temps quand un client arrive pour récupérer sa commande ? »"},
 {id:"C",label:"Poser la vision globale du Click et Collect",text:"« Attention à ne pas voir les commandes internet comme de simples retraits de colis. Le client a commandé sur son téléphone, mais quand il passe la porte, on doit lui faire le même accueil et, si possible, lui proposer la petite viennoiserie en plus. »"}
 ],
 feedback:{
 A:{note:1,eng:-1,cls:"bad",icon:"bad",quality:"À retravailler",posture:{dir:2,par:0,fac:0},nearMiss:false,alt:null,
 ref:"Le conseil du coach :On a souvent tendance à séparer le net et le physique. Or, un client Click & Collect reste un humain qui entre dans la boutique et qui peut craquer pour une viennoiserie en vitrine. Zapper l'accueil pour aller plus vite, c'est se priver d'une vente additionnelle facile.",
 text:"Confondre commerce en ligne et distribution de colis tue l'expérience client..",
 narratif:"Un léger flottement s'installe. Leïla demande timidement comment elle doit gérer si la commande internet n'est pas prête quand le client arrive. Sans cadre clair, c'est l'improvisation totale."},
 B:{note:4,eng:1,cls:"ok",icon:"ok",quality:"Très bien",posture:{dir:0,par:2,fac:0},nearMiss:false,ref:null,
 alt:"Bon à savoir :Que vous partiez du terrain (B) ou du concept global (C), vous répondez aux exigences du critère en donnant du sens à ce nouveau canal de vente.",
 text:"Partir de l'irritant terrain (la perte de temps vécue par Leïla) capte instantanément l'attention. C'est la meilleure porte d'entrée pédagogique : le besoin d'une méthode émerge directement de la frustration vécue par l'équipe.",
 narratif:"Leïla s'anime et décrit le casse-tête : préparer à l'avance et encombrer le comptoir, ou faire attendre le client. Sofia acquiesce vivement, partageant la même galère. Le sujet passionne enfin."},
 C:{note:3,eng:1,cls:"ok",icon:"ok",quality:"Bien",posture:{dir:1,par:0,fac:1},nearMiss:false,ref:null,
 alt:"Bon à savoir :Que vous partiez du terrain (B) ou du concept global (C), vous répondez aux exigences du critère en donnant du sens à ce nouveau canal de vente.",
 text:"Poser la vision stratégique (le Click & Collect reste une vente à part entière) avec des mots simples fixe un cap solide. C'est une posture plus directive, mais le sens de l'action commerciale est parfaitement transmis.",
 narratif:"Marc hoche la tête, comprenant la nuance. Leïla valide : « D'accord, on garde le même sourire même s'ils ont déjà payé. » Le principe directeur vient d'être intégré."}
 }
 },

 // N7 : Résolution collective
 // CORRECTION : ctx ("cause identifiée" nuancé pour ne pas supposer N3=B)
 {id:7,phase:"Résolution collective",critere:" ",critClass:"C26",isNew:false,
 hint:"Qui connaît le mieux les contraintes du jeudi ? Comment laisser cette personne contribuer à la solution plutôt que de la lui imposer ?",
 ctx:"Vous abordez un point noir récurrent : les ruptures de pain du jeudi soir. Tout le monde s'accorde à dire que le problème vient de la livraison de farine qui arrive trop tard. Il faut décider d'un plan d'action concret.",
 options:[
 {id:"A",label:"Prendre en charge la solution seul",text:"« Bon, pour la farine, on ne va pas tourner autour du pot. Je m'en occupe : je vais appeler le fournisseur tout à l'heure pour qu'il nous décale la livraison à mercredi au lieu de jeudi. Ça devrait régler le souci. »"},
 {id:"B",label:"Ouvrir la réflexion à toute l'équipe",text:"« Le diagnostic est clair. À votre avis, comment on s'organise concrètement pour ne plus se retrouver à sec le jeudi soir ? Toutes les idées sont bonnes à prendre. »"},
 {id:"C",label:"Consulter l'expert terrain en premier",text:"« Marc, vu que c'est toi qui gères les fournées ce jour-là, qu'est-ce qui t'arrangerait le plus pour qu'on sécurise ton stock de farine ? Comment tu verrais les choses ? »"}
 ],
 feedback:{
 A:{note:2,eng:-1,cls:"warn",icon:"warn",quality:"Presque",posture:{dir:2,par:0,fac:0},nearMiss:true,alt:null,ref:null,
 text:"La solution est logique, mais l'imposer seul prive l'équipe de toute implication. C'est le syndrome du manager pragmatique : il gagne du temps mais court-circuite l'intelligence collective.",
 narratif:"Marc dit « OK » sans enthousiasme. Sofia et Leïla ne réagissent pas. La solution est bonne, mais elle n'appartient à personne d'autre que vous."},
 B:{note:4,eng:2,cls:"ok",icon:"ok",quality:"Très bien",posture:{dir:0,par:2,fac:0},nearMiss:false,alt:null,ref:null,
 text:"« Toutes les idées sont bonnes à prendre » invite réellement à la participation. Les solutions co-construites sont mieux appliquées et c'est le cœur de l'intelligence collective.",
 narratif:"La méthode fonctionne : Marc propose de décaler l'appel au fournisseur d'un jour. Dans la foulée, Sofia suggère d'ajouter un pense-bête effaçable près de la caisse. Tout le monde a mis la main à la pâte."},
 C:{note:3,eng:1,cls:"ok",icon:"ok",quality:"Bien",posture:{dir:0,par:1,fac:1},nearMiss:false,ref:null,
 alt:"Bon à savoir :Solliciter d'abord l'expert métier (comme Marc sur le fournil) ou lancer la question à la cantonade sont deux excellentes manières de faire. L'important est de ne pas arriver avec une solution toute faite, mais de laisser l'équipe construire la sienne.",
 text:"Consulter l'expert terrain en premier est une bonne pratique. Pour activer pleinement l'intelligence collective, élargissez ensuite aux autres.",
 narratif:"Marc propose de décaler l'appel au fournisseur. Sofia complète avec une idée de suivi. Leïla hoche la tête. La solution s'enrichit progressivement."}
 }
 },

 // N8 : Détecter et nommer le différend
 // CORRECTION : ctx (ajout déclencheur narratif précis, info pauses Sofia ancrée ici)
 {id:8,phase:"Détecter et nommer le différend",critere:" ",critClass:"C28",isNew:false,
 hint:"En brief collectif, un différend interpersonnel ne se résout pas. Il se nomme et se reporte à un cadre adapté. Votre rôle est de contenir, pas de trancher.",
 ctx:"Alors que vous prenez un temps de parole, Leïla lâche à mi-voix, les yeux fixés sur son carnet : « Enfin bref... jeudi matin, j'étais quand même toute seule au comptoir pour gérer les clients mécontents. » Sofia se redresse d'un coup, piquée au vif : « C'est bon, n'exagère pas, j'étais là ! » Un silence de plomb s'installe. Cela fait écho à quelque chose que vous avez remarqué : ces derniers temps, Sofia a tendance à s'éclipser en pause sans toujours prévenir.",
 options:[
 {id:"A",label:"Esquiver en invoquant le temps",text:"« Ouh là, on ne va pas ouvrir ce dossier maintenant, on a déjà dépassé le temps du brief. On reste concentrés sur les décisions qu'on vient de prendre. »"},
 {id:"B",label:"Nommer le désaccord et proposer un cadre dédié",text:"« Je vois qu'il y a un vrai désaccord sur ce qui s'est passé jeudi. Ce n'est pas le lieu pour régler ça devant tout le monde. Sofia, Leïla, je vous propose qu'on se garde 10 minutes toutes les trois juste après le brief pour mettre ça à plat. »"},
 {id:"C",label:"Ouvrir le débat devant tout le groupe",text:"« Attendez, on va crever l'abcès tout de suite puisqu'on est tous là. Leïla, vas-y, explique-nous ce qui a coincé jeudi. Sofia, tu donneras ta version juste après. »"},
 {id:"D",label:"Déléguer la résolution aux deux parties",text:"« Écoutez, on forme une petite équipe, on n'a vraiment pas besoin de ce genre de tension au comptoir. Vous êtes des professionnelles, je vous laisse discuter de ça entre vous dans la journée. »"}
 ],
 feedback:{
 A:{note:1,eng:-1,cls:"bad",icon:"bad",quality:"À retravailler",posture:{dir:1,par:0,fac:0},nearMiss:false,alt:null,ref:null,
 text:"Utiliser le temps comme excuse pour balayer le problème est un réflexe compréhensible, mais il envoie le signal que les tensions interpersonnelles ne comptent pas. Le conflit reste entier.",
 narratif:"Leïla se renfonce dans sa chaise. Sofia tape sur la table avec son stylo. La tension reste et s'installe."},
 B:{note:4,eng:1,cls:"ok",icon:"ok",quality:"Très bien",posture:{dir:0,par:0,fac:2},nearMiss:false,alt:null,ref:null,
 text:"Nommer le désaccord sans l'amplifier en collectif, protéger l'équipe d'un déballage public, et proposer un cadre concret : c'est la séquence exacte de (identifier) et (amorcer la résolution).",
 narratif:"Leïla acquiesce doucement, soulagée d'avoir pu lâcher le morceau sans que ça tourne au drame. Sofia, encore un peu fermée, finit par hocher la tête. Vous clôturez les derniers points avec Marc."},
 C:{note:1,eng:-1,cls:"bad",icon:"bad",quality:"À retravailler",posture:{dir:1,par:1,fac:0},nearMiss:false,alt:null,ref:null,
 text:"« Crever l'abcès » en public, c'est la transparence à tout prix. Mais ouvrir un échange contradictoire devant Marc aggrave la tension et fait dériver le brief. Un différend interpersonnel se traite dans un cadre bilatéral.",
 narratif:"Sofia coupe Leïla à mi-phrase. Marc regarde fixement son téléphone. Le brief perd tout son fil."},
 D:{note:0,eng:-2,cls:"bad",icon:"bad",quality:"À retravailler",posture:{dir:1,par:0,fac:0},nearMiss:false,alt:null,ref:null,
 text:"Enrober l'abandon de poste par un faux compliment (« vous êtes des professionnelles ») ne change pas la réalité : le manager se décharge d'un conflit qui lui appartient..",
 narratif:"Leïla rougit. Sofia croise les bras. Marc ne sait plus où regarder. Le malaise s'installe pour tout le monde."}
 }
 },

 // N9 : Diagnostiquer le type de conflit
 // CORRECTION : ctx (info pauses désormais ancrée en N8, cohérent)
 {id:9,phase:"Selon vous, quel est le vrai ressort de ce conflit ?",critere:" ",critClass:"C28",isNew:false,
 hint:"Il y a deux lectures possibles : ce qui s'est passé concrètement jeudi (les faits) et ce qui existe entre elles depuis plus longtemps (la relation). Les deux coexistent souvent.",
 ctx:"Marc retourne au fournil. Pendant que Sofia et Leïla rangent leurs affaires en silence, vous prenez quelques secondes pour analyser la situation avant de démarrer l'échange. Il y a ce désaccord sur la matinée de jeudi, oui, mais vous sentez bien que c'est la goutte d'eau qui fait déborder un vase déjà plein.",
 options:[
 {id:"A",label:"Conflit de valeurs lié à l'ancienneté",text:"C'est un conflit de valeurs. Sofia, de par son ancienneté, a une vision du travail très différente de celle de Leïla. C'est cette différence de mentalité qui pose problème."},
 {id:"B",label:"Désaccord factuel sur les faits de jeudi",text:"C'est un problème purement factuel. L'une dit qu'elle était seule, l'autre affirme qu'elle était là. Mon urgence, c'est de tirer cette histoire au clair et de savoir ce qui s'est vraiment passé jeudi matin."},
 {id:"C",label:"Conflit de territoire et de rôles",text:"C'est un problème de territoire. Sofia est la plus ancienne et prend des libertés qui agacent Leïla. Il va falloir que je remette les pendules à l'heure et que je recadre les limites de chacune."},
 {id:"D",label:"Double lecture factuelle et relationnelle",text:"C'est un conflit à double fond : il y a l'événement déclencheur de jeudi qu'il faut clarifier, mais ça s'appuie clairement sur un ressentiment accumulé depuis plusieurs semaines autour des pauses de Sofia."}
 ],
 feedback:{
 A:{note:1,eng:0,cls:"warn",icon:"warn",quality:"Incomplet",posture:{dir:0,par:0,fac:1},nearMiss:true,alt:null,
 ref:"Le conseil du coach :Attention à ne pas voir un « conflit de valeurs » ou un « choc des générations » partout. Souvent, la friction part simplement d'un fait mal compris ou d'un manque de communication. Ne brûlez pas les étapes en cherchant trop loin, commencez par les faits.",
 text:"Projeter un « problème de mentalité » sur une situation qui a d'abord une dimension factuelle précise oriente la médiation dans la mauvaise direction..",
 narratif:"Vous entrez en médiation avec une grille de lecture trop large. Le risque est de passer à côté de ce qui s'est réellement passé."},
 B:{note:3,eng:1,cls:"ok",icon:"ok",quality:"Bien",posture:{dir:0,par:0,fac:2},nearMiss:false,
 alt:"Bon à savoir :Vous focaliser sur les faits bruts (B) ou prendre aussi en compte l'historique de la relation (D) sont deux points de départ tout à fait pertinents. L'essentiel est d'avoir identifié qu'il y a d'abord un désaccord sur l'événement de jeudi à traiter.",
 ref:"Le conseil du coach :Quand les versions s'opposent, le rôle du manager n'est pas de faire le détective pour trouver le coupable. Votre mission est d'abord de faire en sorte que chacun entende la version de l'autre de manière apaisée.",
 text:"Partir des faits est pertinent et oriente vers la bonne méthode de départ.. Ignorer la dimension relationnelle sous-jacente reste un angle mort qui peut freiner la résolution durable.",
 narratif:"Vous entrez dans la médiation avec un cap clair : établir ce qui s'est vraiment passé jeudi matin."},
 C:{note:2,eng:0,cls:"warn",icon:"warn",quality:"Partiel",posture:{dir:0,par:0,fac:1},nearMiss:true,alt:null,
 ref:"Le conseil du coach :Même si Sofia est plus ancienne, partir d'emblée sur l'idée qu'elle abuse de son pouvoir risque de vous rendre partial avant même le début de l'échange. Gardez l'esprit ouvert et écoutez d'abord ce qui s'est réellement passé.",
 text:"L'ancienneté de Sofia crée une asymétrie réelle, mais « remettre les pendules à l'heure » avant même d'avoir entendu les deux versions risque de cadrer prématurément la responsabilité de Sofia.",
 narratif:"Ce diagnostic vous amène à entrer en médiation avec une idée déjà faite, avant même d'avoir entendu les deux versions."},
 D:{note:4,eng:1,cls:"ok",icon:"ok",quality:"Très bien",posture:{dir:0,par:0,fac:2},nearMiss:false,
 alt:"Bon à savoir :Ce diagnostic « à double fond » (D) montre une belle finesse d'analyse. Mais se concentrer uniquement sur l'aspect factuel (B) est aussi une méthode très saine pour éviter de trop psychologiser la situation. Les deux approches fonctionnent.",
 ref:"Le conseil du coach :En médiation, on dit souvent que derrière des positions qui s'opposent, il y a des intérêts communs. Au fond, Sofia et Leïla veulent toutes les deux que le service tourne bien. C'est sur ce point commun qu'il faudra s'appuyer.",
 text:"Diagnostic précis : couche factuelle (ce qui s'est passé jeudi) et couche relationnelle (le ressentiment accumulé). Ce double diagnostic oriente vers une stratégie en deux temps : clarifier les faits, puis traiter la relation.",
 narratif:"Vous entrez dans la médiation avec une lecture complète et équilibrée. C'est le meilleur point de départ."}
 }
 },

 // N10 : Explorer la résolution amiable
 {id:10,phase:"Explorer la résolution amiable",critere:" ",critClass:"C28",isNew:false,
 hint:"Avant d'aborder le fond, assurez-vous que les deux parties acceptent le cadre de l'échange et se sentent en sécurité pour parler.",
 ctx:"Marc est retourné au fournil. Vous fermez la porte de l'arrière-boutique. Vous vous retrouvez en tête-à-tête avec Sofia et Leïla. L'ambiance est lourde et les regards s'évitent. Il va falloir amorcer la discussion.",
 options:[
 {id:"A",label:"Entrer directement dans les faits",text:"« Bon, on va reprendre depuis le début. Sofia, tu dis que tu étais là. Leïla, tu dis que tu as dû gérer seule. Moi, je veux juste qu'on m'explique factuellement ce qui s'est passé jeudi matin. »"},
 {id:"B",label:"Minimiser et encourager à vider son sac",text:"« Écoutez, on travaille ensemble tous les jours, c'est normal qu'il y ait des petits accrochages avec la fatigue. Ce n'est pas bien grave, l'important c'est de vider son sac et de repartir sur de bonnes bases. »"},
 {id:"C",label:"Poser un cadre neutre avant de commencer",text:"« Ce que je vous propose, c'est qu'on prenne un moment juste toutes les trois pour poser les choses calmement. Mon but n'est pas de faire l'arbitre, mais de vous aider à vous comprendre. Vous êtes d'accord pour qu'on en discute sur ces bases ? »"}
 ],
 feedback:{
 A:{note:3,eng:1,cls:"ok",icon:"ok",quality:"Bien",posture:{dir:1,par:0,fac:1},nearMiss:false,ref:null,
 alt:"Bon à savoir : Entrer tout de suite dans le vif du sujet (A) ou prendre le temps de sécuriser les règles du jeu avant de s'expliquer (C) sont deux méthodes valides. L'essentiel est de montrer que vous prenez le problème à bras le corps sans prendre parti.",
 text:"Entrer directement dans les faits est une bonne intention, mais cela oublie une étape cruciale en médiation : s'assurer que les deux parties sont prêtes à parler calmement. Risque de raviver la tension immédiatement.",
 narratif:"Leïla explique qu'elle était seule au comptoir pendant une vingtaine de minutes. Sofia reconnaît avoir perdu la notion du temps lors de sa pause."},
 B:{note:2,eng:0,cls:"warn",icon:"warn",quality:"Presque",posture:{dir:0,par:0,fac:1},nearMiss:true,alt:null,
 ref:"Le conseil du coach : Vouloir détendre l'atmosphère est un bon réflexe, mais attention à ne pas minimiser le problème. Dire « ce n'est pas grave » à quelqu'un qui est agacé donne l'impression que vous n'écoutez pas sa frustration. Mieux vaut poser un cadre clair.",
 text:"C'est le réflexe du manager mal à l'aise avec le conflit. L'intention est bonne, mais \"vider son sac\" sans cadre structuré ne crée pas les conditions d'une vraie résolution.",
 narratif:"Sofia dit rapidement : « C'est bon, c'est réglé. » Leïla ne dit rien. La tension reste sous la surface."},
 C:{note:4,eng:2,cls:"ok",icon:"ok",quality:"Très bien",posture:{dir:0,par:0,fac:2},nearMiss:false,ref:null,
 alt:"Bon à savoir : Poser les règles d'emblée (C) ou attaquer direct sur les faits (A) — l'important est d'avoir su créer un espace dédié à cette discussion. Votre posture de facilitateur est bien en place.",
 text:"Remplacer le vocabulaire de \"tiers neutre\" par une posture compréhensible (\"pas là pour faire l'arbitre\"), et demander le consentement explicite : c'est la base d'une médiation réussie.",
 narratif:"Sofia et Leïla acceptent le principe. L'ambiance reste tendue, mais le fait d'avoir posé un cadre neutre les rassure. Leïla commence à raconter calmement comment elle a vécu la fameuse matinée de jeudi."}
 }
 },

 // N11 : Gérer une réaction défensive
 {id:11,phase:"Gérer une réaction défensive",critere:" ",critClass:"C28",isNew:true,
 hint:"La méthode CNV recommande : Observation factuelle → Sentiment au « je » → Besoin → Demande. Le « tu » accuse et ferme ; le « je » ouvre.",
 ctx:"Alors que Leïla explique qu'elle s'est sentie abandonnée dans le rush, Sofia, qui écoutait jusque-là, se braque d'un coup : « C'est toujours la même chose, c'est toujours moi qui prends quand ça va pas ! » Elle se recule sur sa chaise, sur la défensive.",
 options:[
 {id:"A",label:"Recadrer Sofia sur les règles de politesse",text:"« Sofia, s'il te plaît, on a dit qu'on s'écoutait. Laisse Leïla finir sa phrase sans la couper, c'est la moindre des choses. »"},
 {id:"B",label:"Accuser réception de son émotion et lui redonner la parole",text:"« Je vois bien que ça te braque, Sofia, et l'idée n'est vraiment pas de te faire un procès. Comment toi, tu as perçu les choses jeudi matin quand il y a eu le rush ? »"},
 {id:"C",label:"Calmer le jeu et recentrer sur les besoins",text:"« Ok, on redescend d'un cran. Personne n'est au tribunal ici, vous avez juste vécu la même matinée de deux manières complètement différentes. L'objectif maintenant, c'est de savoir de quoi vous avez besoin pour que ça ne se reproduise pas. »"},
 {id:"D",label:"Suspendre et reporter à plus tard",text:"« Bon, je vois que les esprits s'échauffent un peu trop. On ne va pas y arriver comme ça. On va s'arrêter là pour aujourd'hui, on en reparlera demain à froid. »"}
 ],
 feedback:{
 A:{note:0,eng:-2,cls:"bad",icon:"bad",quality:"À retravailler",posture:{dir:2,par:0,fac:0},nearMiss:false,alt:null,
 ref:"Le conseil du coach : Quand le ton monte, jouer au maître d'école ne marche jamais. Faire la morale à une personne sur la défensive, c'est jeter de l'huile sur le feu. Prenez d'abord une seconde pour accuser réception de son émotion, sans la juger.",
 text:"C'est l'erreur classique du manager qui devient arbitre des règles de politesse. Face à Sofia déjà défensive, le ton moralisateur aggrave la fermeture. La posture de médiateur exige une neutralité totale.",
 narratif:"Sofia se lève : « Je ne suis pas venue pour me faire reprendre. » Elle saisit ses affaires et quitte la pièce. La médiation s'arrête net."},
 B:{note:3,eng:1,cls:"ok",icon:"ok",quality:"Bien",posture:{dir:0,par:0,fac:2},nearMiss:false,
 alt:"Bon à savoir : Creuser d'abord le ressenti de Sofia (B) ou calmer le jeu globalement en cherchant des solutions (C) : les deux approches sont d'excellents moyens de désamorcer une réaction de défense.",
 ref:"Le conseil du coach : Vous validez le ressenti (« je vois que ça te braque ») sans utiliser un jargon de psy, vous rassurez sur vos intentions (« pas là pour faire un procès »), et vous relancez la balle. Résultat : la pression retombe.",
 text:"Valider l'émotion de Sofia (\"je vois que ça te braque\") sans utiliser le jargon, puis lui redonner la parole sur son vécu factuel :.",
 narratif:"Sofia se détend légèrement. Elle dit : « Je n'étais absente que dix minutes, pas vingt. » Le dialogue peut reprendre."},
 C:{note:4,eng:2,cls:"ok",icon:"ok",quality:"Très bien",posture:{dir:0,par:0,fac:2},nearMiss:false,
 alt:"Bon à savoir : Recentrer sur les solutions (C) ou prendre le temps d'écouter la version de Sofia (B) sont deux tactiques de désamorçage qui fonctionnent parfaitement sur le terrain.",
 ref:"Le conseil du coach : Vous venez d'appliquer la Communication Non Violente sans avoir l'air de lire un manuel. Calmer le jeu sans accuser, puis orienter les cerveaux vers l'avenir (« de quoi avez-vous besoin ? ») est le meilleur moyen de sortir de l'impasse.",
 text:"Posture de médiateur exemplaire : recadrage calme, déculpabilisation des deux parties, réorientation vers la recherche de solutions. C'est la CNV complète appliquée naturellement.",
 narratif:"Sofia souffle un grand coup, la pression retombe. Leïla prend la balle au bond : « Moi, ça m'aiderait juste de savoir quand je me retrouve seule devant. » Sofia hoche la tête en signe de compréhension."},
 D:{note:1,eng:-1,cls:"bad",icon:"bad",quality:"À retravailler",posture:{dir:0,par:0,fac:1},nearMiss:false,alt:null,
 ref:"Le conseil du coach : Parfois il faut savoir faire une pause quand l'échange devient trop électrique. Mais si vous devez reporter, fixez toujours un rendez-vous précis (« On reprend à 14h dans le bureau »). Remettre à plus tard de façon vague, c'est laisser pourrir la situation.",
 text:"\"On en reparlera à froid\" est le bouclier préféré des managers qui évitent le conflit. Sofia et Leïla retournent travailler ensemble avec toute cette rancœur non purgée..",
 narratif:"Sofia repart sans un mot. Leïla regarde ses mains. Rien n'a été résolu et le sujet reste suspendu."}
 }
 },

 // N12 : Orienter vers la solution
 // CORRECTION : ctx (raccord prévu si Sofia a failli quitter, N11=A est une impasse)
 // On suppose N11 résolu (B ou C) pour arriver ici. Le ctx le précise.
 {id:12,phase:"Orienter vers la solution",critere:" ",critClass:"C28",isNew:false,
 hint:"Une solution imposée par le manager, même juste, est moins solide qu'une solution construite par les parties elles-mêmes.",
 ctx:"Le diagnostic est posé et accepté par les deux : Sofia a fait traîner sa pause, et Leïla a encaissé le rush sans appeler à l'aide. Maintenant que l'abcès est percé, il faut transformer cette prise de conscience en une règle de fonctionnement pour la boutique.",
 options:[
 {id:"A",label:"Imposer une règle ciblant Sofia",text:"« Bon, la solution est simple : Sofia, à l'avenir, tu préviens systématiquement Leïla quand tu pars en pause, même pour 5 minutes. Comme ça, plus de malentendu. »"},
 {id:"B",label:"Laisser les deux parties construire la solution",text:"« Bon, on est sur la même longueur d'onde. Concrètement, qu'est-ce que vous pourriez mettre en place, vous deux, pour que cette situation ne se reproduise plus ? Je vous écoute. »"},
 {id:"C",label:"Proposer un cadre équitable et demander validation",text:"« Écoutez, je vous propose une règle simple pour la boutique : dès que l'une de vous doit s'absenter de la surface de vente, elle fait un signe ou prévient l'autre, tout simplement. Ça vous irait de fonctionner comme ça ? »"}
 ],
 feedback:{
 A:{note:1,eng:-1,cls:"bad",icon:"bad",quality:"À retravailler",posture:{dir:2,par:0,fac:0},nearMiss:false,alt:null,
 ref:"Le conseil du coach : Trouver la solution à la place de vos collaborateurs, c'est la garantie qu'elle ne sera pas appliquée. Si vous donnez l'impression de punir l'un pour soulager l'autre, votre médiation aura fait plus de mal que de bien.",
 text:"Le manager pense être pragmatique pour gagner du temps, mais faire porter tout le poids de la solution sur une seule personne brise complètement sa neutralité. Le risque de raviver la frustration de Sofia est immense.",
 narratif:"Sofia dit « d'accord » d'un ton plat et résigné. Leïla n'a pas eu voix au chapitre. L'accord est purement formel, pas réel."},
 B:{note:4,eng:2,cls:"ok",icon:"ok",quality:"Très bien",posture:{dir:0,par:0,fac:2},nearMiss:false,alt:null,ref:null,
 text:"« On est sur la même longueur d'onde » valide positivement la compréhension mutuelle. En demandant « Je vous écoute », vous rendez la responsabilité de la solution aux collaboratrices : c'est le cœur même de la posture de médiateur.",
 narratif:"Sofia propose un signal convenu : un message sur le groupe boutique avant chaque pause. Leïla propose, elle aussi, d'alerter quand la file client dépasse quatre personnes. Les deux se regardent avec un début d'accord."},
 C:{note:3,eng:1,cls:"ok",icon:"ok",quality:"Bien",posture:{dir:1,par:0,fac:1},nearMiss:false,ref:null,
 alt:"Bon à savoir : Laisser la solution venir entièrement des parties (B) est l'idéal. Mais proposer vous-même un cadre équitable et demander leur validation (C) reste une excellente porte de sortie pour clore l'incident.",
 text:"La règle proposée s'applique aux deux vendeuses de manière équitable et le manager prend soin de demander leur consentement (« Ça vous irait ? »). C'est une posture acceptable, même si elle est moins puissante qu'une vraie co-construction.",
 narratif:"« Ça marche pour moi », glisse Leïla. Sofia hoche la tête avec un petit sourire de conciliation. L'air est nettement plus respirable."}
 }
 },

 // N13 (ex-N14) : Clôture du brief
 // INVERSION : la clôture collective précède l'aparté avec Marc
 {id:13,phase:"Clôture du brief",critere:" & crit.3",critClass:"C26",isNew:false,
 hint:"La clôture d'un brief doit consolider les décisions ET valoriser la dynamique collective. Faites en sorte que l'équipe repart avec le sentiment d'avoir vraiment contribué.",
 ctx:"L'équipe est à nouveau réunie au complet. Le temps a filé et l'heure du gros rush approche à grands pas. Il vous reste une poignée de minutes pour clôturer cet échange hebdomadaire avant que chacun reparte à son poste.",
 options:[
 {id:"A",label:"Clôturer par l'urgence opérationnelle",text:"« Bon, le devoir nous appelle, on va devoir ouvrir la boutique. Merci à tous pour ce matin, allez, on se remet au boulot ! »"},
 {id:"B",label:"Faire formuler un collaborateur pour ancrer les décisions",text:"« Avant qu'on lance la journée : Marc, on a dit pas mal de choses ce matin. Tu peux nous faire un mini-récap de ce qu'on a décidé de changer dès aujourd'hui ? »"},
 {id:"C",label:"Résumer les bénéfices et donner du sens",text:"« Merci à tous. C'était pas le brief le plus reposant, mais il était super utile : on a débloqué la prod' de Marc, on a un cap pour le net, et on a mis les choses à plat. On attaque la journée là-dessus ! »"}
 ],
 feedback:{
 A:{note:1,eng:-1,cls:"bad",icon:"bad",quality:"À retravailler",posture:{dir:1,par:0,fac:0},nearMiss:false,alt:null,
 ref:"Le conseil du coach : Fuir dans l'opérationnel est une erreur classique. Une réunion sans vraie conclusion laisse l'équipe avec l'impression d'avoir discuté dans le vide. Prenez toujours ces 30 dernières secondes.",
 text:"Le manager est happé par l'urgence de l'ouverture et oublie de verrouiller ce qui vient d'être décidé. Clôture sans consolidation ni reconnaissance de l'effort collectif..",
 narratif:"L'équipe se lève sans un mot. Marc hésite à la porte, comme s'il attendait un mot de la fin. Rien ne vient."},
 B:{note:4,eng:1,cls:"ok",icon:"ok",quality:"Très bien",posture:{dir:0,par:2,fac:0},nearMiss:false,ref:null,
 alt:"Bon à savoir : Faire formuler un collaborateur pour vérifier l'ancrage (B) ou donner vous-même du sens à la dynamique globale (C) sont les deux meilleures façons de clôturer une réunion. Les deux approches fonctionnent très bien.",
 text:"« Mini-récap » et « ce qu'on change dès aujourd'hui » : vocabulaire direct, adapté au terrain. Faire formuler Marc vérifie sa compréhension, engage son implication et ancre les décisions collectivement.",
 narratif:"Marc se prête au jeu et résume bien les trois points clés. Sofia ajoute même un petit détail pour compléter. Chacun repart à son poste en sachant exactement ce qu'il a à faire."},
 C:{note:4,eng:2,cls:"ok",icon:"ok",quality:"Très bien",posture:{dir:0,par:1,fac:1},nearMiss:false,ref:null,
 alt:"Bon à savoir : Faire formuler un collaborateur pour vérifier l'ancrage (B) ou donner vous-même du sens à la dynamique globale (C) sont les deux meilleures façons de clôturer une réunion. Les deux approches fonctionnent très bien.",
 text:"Assumer que le brief a été difficile (« pas le plus reposant ») rend le manager humain et crédible. Résumer les bénéfices concrets (« débloqué la prod' », « mis les choses à plat ») donne du sens à la présence de chacun.",
 narratif:"Sofia sourit pour la première fois du brief. Leïla glisse un sincère « Merci ». Marc comprend enfin pourquoi ce moment de réunion existe chaque semaine."}
 }
 },

 // N14 (ex-N13) : Feedback individuel à Marc
 // INVERSION : aparté après la clôture, plus cohérent chronologiquement
 // ctx précise que le brief est terminé
 {id:14,phase:"Feedback individuel à Marc",critere:" ",critClass:"C26",isNew:false,
 hint:"Un bon feedback est factuel, équilibré et orienté vers l'action. Il cite ce que vous avez observé, pas un jugement sur la personne.",
 ctx:"Les filles filent en boutique. Marc, lui, traîne un peu pour ranger son carnet. Il finit par s'approcher de vous, l'air un peu penaud : « Avec cette histoire de farine... j'ai l'impression de faire pas mal de boulettes en ce moment, non ? »",
 options:[
 {id:"A",label:"Rassurer de manière vague et générale",text:"« Mais non, ne te prends pas la tête Marc ! Globalement tu fais du bon boulot, c'est le principal. Allez, file au fournil, tout va bien se passer. »"},
 {id:"B",label:"Feedback factuel équilibré avec cap de progression",text:"« Écoute Marc, si on regarde tout le mois, tes cuissons du matin sont super régulières et la qualité est là. Là où j'attends que tu prennes un peu plus d'assurance maintenant, c'est sur l'anticipation de tes stocks. C'est ta prochaine étape. »"},
 {id:"C",label:"Pointer directement l'erreur et son impact",text:"« Je ne vais pas te mentir, l'erreur de gestion de jeudi nous a coûté du chiffre, c'est un fait. Il va vraiment falloir que tu sois plus rigoureux là-dessus à l'avenir. »"}
 ],
 feedback:{
 A:{note:1,eng:0,cls:"warn",icon:"warn",quality:"Presque",posture:{dir:0,par:1,fac:0},nearMiss:true,alt:null,
 ref:"Le conseil du coach : Le compliment vague balancé à la va-vite rassure surtout le manager. Un collaborateur junior qui doute a besoin de preuves tangibles qu'il fait bien les choses, pas juste d'une tape dans le dos.",

const SpeedometerSVG=({pct,color,size=100})=>{
 const angle=-90+pct*180,rad=angle*(Math.PI/180);
 const cx=size/2,cy=size*0.58,r=size*0.38;
 const segs=[{s:-90,e:-54,c:'#c04020'},{s:-54,e:-18,c:'#e06020'},{s:-18,e:18,c:'#d4a820'},{s:18,e:54,c:'#90b820'},{s:54,e:90,c:'#208050'}];
 const arc=(sd,ed)=>{const s2=sd*Math.PI/180,e2=ed*Math.PI/180;return`M ${(cx+r*Math.cos(s2)).toFixed(1)} ${(cy+r*Math.sin(s2)).toFixed(1)} A ${r} ${r} 0 0 1 ${(cx+r*Math.cos(e2)).toFixed(1)} ${(cy+r*Math.sin(e2)).toFixed(1)}`;};
 const t=size*0.11;
 const nx=(cx+r*0.7*Math.cos(rad)).toFixed(1),ny=(cy+r*0.7*Math.sin(rad)).toFixed(1);
 const svgH=Math.round(size*0.85);
 return(
 <svg width={size} height={svgH} viewBox={`0 0 ${size} ${svgH}`} style={{overflow:'hidden'}}>
 {segs.map((s,i)=><path key={i} d={arc(s.s,s.e)} fill="none" stroke={s.c} strokeWidth={t} strokeLinecap="butt"/>)}
 <line x1={cx} y1={cy} x2={nx} y2={ny} stroke="#2c2415" strokeWidth={(size*0.025).toFixed(1)} strokeLinecap="round"/>
 <circle cx={cx} cy={cy} r={(size*0.04).toFixed(1)} fill="#2c2415"/>
 <text x={cx} y={(cy+size*0.22).toFixed(1)} textAnchor="middle" fontSize={(size*0.13).toFixed(1)} fontWeight="700" fill={color} fontFamily="DM Sans,sans-serif">{Math.round(pct*100)}%</text>
 </svg>
 );
};

const ConfidenceChart=({history})=>{
 let eng=3;
 const pts=[{label:'Début',e:eng,delta:0}];
 history.forEach(item=>{
 eng=Math.max(0,Math.min(5,eng+(item.feedback.eng||0)));
 pts.push({label:item.round.phase,e:eng,delta:item.feedback.eng||0});
 });
 if(pts.length<2)return null;
 const W=400,H=80,PX=24,PY=10,IW=W-PX*2,IH=H-PY*2,n=pts.length;
 const toX=(i)=>PX+(i/(n-1))*IW;
 const toY=(v)=>PY+IH-(v/5)*IH;
 const linePath=pts.map((p,i)=>`${i===0?'M':'L'}${toX(i).toFixed(1)},${toY(p.e).toFixed(1)}`).join(' ');
 const areaPath=`${linePath} L${toX(n-1).toFixed(1)},${(H-PY).toFixed(1)} L${PX},${(H-PY).toFixed(1)} Z`;
 const keyMoments=pts.slice(1).map((p,i)=>({...p,origIdx:i+1})).filter(p=>Math.abs(p.delta)>=2).sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta)).slice(0,3);
 return(
 <div>
 <svg width="100%" viewBox={`0 0 ${W} ${H}`} className="overflow-visible">
 <defs><linearGradient id="engGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#b07a20" stopOpacity=".18"/><stop offset="100%" stopColor="#b07a20" stopOpacity="0"/></linearGradient></defs>
 {[1,2,3,4,5].map(v=><line key={v} x1={PX} y1={toY(v)} x2={W-PX} y2={toY(v)} stroke={v===3?"#d1d5db":"#f3f4f6"} strokeWidth="1" strokeDasharray={v===3?"4,4":"3,3"}/>)}
 {[0,1,2,3,4,5].map(v=><text key={v} x={PX-6} y={toY(v)+3} fontSize="8" fill="#9ca3af" textAnchor="end">{v}</text>)}
 <path d={areaPath} fill="url(#engGrad)"/>
 <path d={linePath} fill="none" stroke="#b07a20" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
 {pts.map((p,i)=><circle key={i} cx={toX(i)} cy={toY(p.e)} r="3" fill="white" stroke="#b07a20" strokeWidth="1.5"/>)}
 {keyMoments.map((p,i)=><circle key={i} cx={toX(p.origIdx)} cy={toY(p.e)} r="6" fill={p.delta>0?'#4a9960':'#9b3030'} stroke="white" strokeWidth="2"/>)}
 </svg>
 {keyMoments.length>0&&<div className="flex flex-wrap gap-1.5 mt-2">{keyMoments.map((p,i)=><div key={i} className={`flex items-center gap-1 px-2.5 py-1 rounded-full text-10px font-semibold border ${p.delta>0?'bg-green-50 text-green-700 border-green-200':'bg-red-50 text-red-700 border-red-200'}`}>{p.delta>0?'▲':'▼'} {p.label}</div>)}</div>}
 </div>
 );
};

 );
}

 const smoothScroll=useCallback((delay=0,toRef=false)=>{
 const run=()=>requestAnimationFrame(()=>{
 const el=chatScrollRef.current;
 if(!el)return;
 if(toRef&&myBubbleRef.current){
 const containerRect=el.getBoundingClientRect();
 const bubbleRect=myBubbleRef.current.getBoundingClientRect();
 const offset=bubbleRect.top-containerRect.top+el.scrollTop-80;
 el.scrollTo({top:Math.max(0,offset),behavior:'smooth'});
 }else{
 el.scrollTo({top:el.scrollHeight,behavior:'smooth'});
 }
 });
 if(delay)setTimeout(run,delay);else run();
 },[]);

 useEffect(()=>{
 if(!gs.subChoiceActive)smoothScroll(50);
 },[gs.history,visibleMsgs,isMenuOpen,gs.showFeedback,gs.subChoiceActive]);
 useEffect(()=>{

 const elems=[];
 if(visibleMsgs>0){
 elems.push(
 <div key="ctx" className="flex justify-center">
 <div style={slideIn} className="max-w-88p bg-stone-100 text-stone-500 px-8 py-5 rounded-2xl border border-stone-200 text-base italic text-center leading-relaxed">
 {(rd.ctxByPrev&&prevN0Opt&&rd.ctxByPrev[prevN0Opt])||rd.ctx}
 {rd.id===9&&<>{' '}Vous demandez à Marc de retourner au fournil le temps de cet échange.</>}
 {rd.id===13&&chiffresApresConflit&&<>{' '}Vous faites signe à Marc de revenir — il reste encore les chiffres à passer en revue avec toute l'équipe.</>}
 </div>
 </div>
 );
 elems.push(
 <div key="critere" className="flex justify-center">
 <div style={{...slideIn,animationDelay:'.1s'}} className="flex items-center gap-2">
 </div>
 </div>
 );
 }
 return elems;
 })()}

 {!gs.showFeedback&&rd.ctxNote&&visibleMsgs>0&&(
 <div className="flex justify-center">
 <div style={slideIn} className="max-w-88p bg-amber-50 border border-amber-100 text-amber-800 px-5 py-3 rounded-2xl text-xs leading-relaxed" dangerouslySetInnerHTML={{__html:rd.ctxNote}}/>
 </div>
 )}

 {showHint&&(
 <div className="flex justify-center anim-fadeInUp">
 <div className="max-w-88p bg-amber-50 border border-amber-200 text-amber-900 px-5 py-4 rounded-2xl text-sm leading-relaxed flex items-start gap-3">
 <Lightbulb size={16} className="shrink-0 mt-0.5 text-amber-600"/>
 <span>{rd.hint}</span>
 </div>
 </div>
 )}

 {!gs.showFeedback&&gs.subChoiceActive&&(()=>{
 const subKey=`${rd.id}_${gs.subChoiceOpt}`;
 const sub=SUB_CHOICES[subKey];
 if(!sub)return null;
 const mainOpt=rd.options.find(o=>o.id===gs.subChoiceOpt);
 return(
 <div className="space-y-8 anim-fadeInUp">
 {/* Bulle VOUS avec le choix principal */}
 <div className="flex justify-end">
 <div className="max-w-82p bg-stone-900 text-white p-5 rounded-2xl rounded-tr-none shadow-sm">
 <p className="text-xs opacity-40 mb-2 font-bold uppercase tracking-wider">Vous</p>
 <p className="text-sm font-semibold text-stone-400 mb-2">{mainOpt.label}</p>
 <p className="text-base italic leading-relaxed">{mainOpt.text}</p>
 </div>
 </div>
 {/* Réaction : silence */}
 <div className="flex justify-center">
 <div className="flex flex-col items-center gap-3" style={{animation:'fadeInUp 0.5s 0.3s ease both',opacity:0,animationFillMode:'both'}}>
 <div className="flex items-center gap-3 w-full">
 <div className="flex-1 h-px bg-stone-300"/>
 <svg viewBox="0 0 24 24" fill="none" className="w-4 h-4 text-stone-400 shrink-0"><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="6" cy="12" r="1.5" fill="currentColor"/><circle cx="18" cy="12" r="1.5" fill="currentColor"/></svg>
 <div className="flex-1 h-px bg-stone-300"/>
 </div>
 <p className="text-base font-serif italic text-stone-600 text-center px-4 leading-relaxed">{sub.ctx}</p>
 </div>
 </div>
 {/* Sous-options */}
 <div style={{animation:'fadeInUp 0.6s 0.5s ease both',opacity:0,animationFillMode:'both'}} className="max-w-2xl mx-auto">
 <p className="text-xs font-bold text-stone-400 uppercase tracking-widest mb-4 text-center">Comment réagissez-vous ?</p>
 <div className="space-y-3">
 {sub.options.map((option,oi)=>(
 <button key={option.id}
 onClick={()=>{playSound('click');setGs(prev=>({...prev,selectedOpt:option.id}));}}
 style={{animation:`fadeInUp 0.35s ${0.15+oi*0.1}s ease both`,opacity:0,animationFillMode:'both'}}
 className={`w-full text-left p-5 rounded-2xl border-2 transition-colors flex items-center gap-4 ${gs.selectedOpt===option.id?'bg-stone-900 border-stone-900 text-white shadow-lg':'bg-white border-stone-200 hover:border-stone-400 shadow-sm'}`}>
 <span className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold shrink-0 ${gs.selectedOpt===option.id?'bg-stone-700 text-stone-200':'bg-stone-100 text-stone-500'}`}>{option.id}</span>
 <p className={`text-base font-medium leading-snug ${gs.selectedOpt===option.id?'text-white':'text-stone-800'}`}>{option.label}</p>
 </button>
 ))}
 </div>
 {gs.selectedOpt&&(
 <div className="flex justify-end mt-4">
 <button onClick={()=>{playSound('click');handleSubSubmit();}} className="px-8 py-3.5 bg-stone-900 text-white rounded-xl font-semibold text-sm hover:bg-stone-800 transition-all shadow-lg flex items-center gap-2">Valider cette action <ChevronRight size={18}/></button>
 </div>
 )}
 </div>
 </div>
 );
 })()}

 {!gs.showFeedback&&!gs.subChoiceActive&&isMenuOpen&&(()=>{
 const rdOptions=(rd.optionsByPrev&&prevN0Opt&&rd.optionsByPrev[prevN0Opt])||rd.options;
 return(
 <div style={{animation:'fadeInUp 0.4s ease both'}} className="max-w-2xl mx-auto">
 <p className="text-lg font-semibold text-stone-700 mb-5 text-center leading-snug">{rd.phase}</p>
 <div className="space-y-3">
 {rdOptions.map((option,oi)=>(
 <button key={option.id}
 onClick={()=>{playSound('click');setGs(prev=>({...prev,selectedOpt:option.id}));}}
 onMouseEnter={()=>playHover(option.id)} onMouseLeave={()=>{_lastHoverOptId=null;}}
 style={{animation:`fadeInUp 0.35s ${0.15+oi*0.1}s ease both`,opacity:0,animationFillMode:'both'}}
 className={`w-full text-left p-5 rounded-2xl border-2 transition-colors flex items-center gap-4 ${gs.selectedOpt===option.id?'bg-stone-900 border-stone-900 text-white shadow-lg':'bg-white border-stone-200 hover:border-stone-400 shadow-sm'}`}>
 <span className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold shrink-0 ${gs.selectedOpt===option.id?'bg-stone-700 text-stone-200':'bg-stone-100 text-stone-500'}`}>{option.id}</span>
 <p className={`text-base font-medium leading-snug ${gs.selectedOpt===option.id?'text-white':'text-stone-800'}`}>{option.label}</p>
 </button>
 ))}
 </div>
 {gs.selectedOpt&&(
 <div className="flex justify-end mt-4">
 <button onClick={()=>{playSound('click');handleSubmit();}} className="px-8 py-3.5 bg-stone-900 text-white rounded-xl font-semibold text-sm hover:bg-stone-800 transition-all shadow-lg flex items-center gap-2">Valider cette action <ChevronRight size={18}/></button>
 </div>
 )}
 </div>
 );
 })()}


 <div className="h-4 shrink-0"/>
 </div>

 {transition&&<TransitionScreen text={typeof transition==='string'?transition:null} fading={transitionFading}/>}

 {fb&&(
 <div className="absolute bottom-0 left-0 right-0 z-20 anim-fadeInUp bg-white border-t border-gray-200 shadow-xl">
 {/* Corps */}
 <div className="px-8 py-6">
 {/* Badges + nearMiss inline */}
 <div className="flex flex-wrap items-center gap-3 mb-5" style={{animation:'fadeInUp 0.3s ease 0.1s both'}}>
 {fb.icon==='ok'&&<div className="flex items-center gap-2 px-3 py-1.5 bg-green-100 text-green-800 rounded-md font-bold text-xs uppercase tracking-wider"><svg viewBox="0 0 20 20" fill="none" className="w-4 h-4"><circle cx="10" cy="10" r="9" fill="#16a34a"/><path d="M6 10.5l3 3 5-5" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>{fb.quality}</div>}
 {fb.icon==='bad'&&<div className="flex items-center gap-2 px-3 py-1.5 bg-red-100 text-red-800 rounded-md font-bold text-xs uppercase tracking-wider"><svg viewBox="0 0 20 20" fill="none" className="w-4 h-4"><circle cx="10" cy="10" r="9" fill="#dc2626"/><path d="M7 7l6 6M13 7l-6 6" stroke="white" strokeWidth="1.8" strokeLinecap="round"/></svg>{fb.quality}</div>}
 {fb.icon==='warn'&&<div className="flex items-center gap-2 px-3 py-1.5 bg-amber-100 text-amber-800 rounded-md font-bold text-xs uppercase tracking-wider"><svg viewBox="0 0 20 20" fill="none" className="w-4 h-4"><path d="M10 2L18.5 17H1.5L10 2z" fill="#d97706"/><path d="M10 8v4" stroke="white" strokeWidth="1.8" strokeLinecap="round"/><circle cx="10" cy="14.5" r="0.9" fill="white"/></svg>{fb.quality}</div>}
 {fb.posture&&Object.entries(fb.posture).filter(([,v])=>v>0).map(([k,v])=>(
 <div key={k} className={`inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md text-sm font-semibold border ${k==='dir'?'bg-white text-red-600 border-red-300':k==='par'?'bg-white text-blue-600 border-blue-300':'bg-white text-green-600 border-green-300'}`}>
 {k==='dir'?'Directif':k==='par'?'Participatif':'Facilitateur'} <span className="font-bold">+{v}</span>
 </div>
 ))}
 {fb.nearMiss&&<span className="text-sm text-gray-500 font-medium ml-1">Vous étiez sur la bonne voie.</span>}
 </div>
 {/* Texte principal */}
 <p className="text-base font-semibold text-gray-900 leading-relaxed mb-4" style={{animation:'fadeInUp 0.3s ease 0.2s both'}}>{fb.text}</p>
 {/* Conseil du coach */}
 {fb.ref&&(
 <div className="bg-blue-50 border border-blue-100 rounded-xl px-5 py-4 flex gap-4" style={{animation:'fadeInUp 0.3s ease 0.3s both'}}>
 <div className="shrink-0 w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center mt-0.5">
 <Lightbulb size={16}/>
 </div>
 <div>
 <p className="text-xs font-bold text-blue-900 uppercase tracking-wider mb-1.5">Le conseil du coach</p>
 <p className="text-blue-900/80 text-sm leading-relaxed" dangerouslySetInnerHTML={{__html:fb.ref.replace('Le conseil du coach :','').replace('Le conseil du coach : ','')}}/>
 </div>
 </div>
 )}
 {/* Bon à savoir */}
 {fb.alt&&(
 <div className={`${fb.ref?'mt-3':''} bg-white border border-stone-200 rounded-xl px-5 py-4 flex gap-4`} style={{animation:'fadeInUp 0.3s ease 0.35s both'}}>
 <div className="shrink-0 w-8 h-8 rounded-full bg-stone-100 text-stone-400 flex items-center justify-center mt-0.5 text-base font-bold">?</div>
 <div>
 <p className="text-xs font-bold text-stone-500 uppercase tracking-wider mb-1.5">Bon à savoir</p>
 <p className="text-stone-700 text-sm leading-relaxed">{fb.alt.replace('Bon à savoir :','').replace('Bon à savoir : ','')}</p>
 </div>
 </div>
 )}
 </div>
 {/* Footer actions */}
 <div className="bg-gray-50 border-t border-gray-200 px-8 py-4 flex justify-between items-center gap-3" style={{animation:'fadeInUp 0.3s ease 0.4s both'}}>
 <div className="text-sm text-gray-500">
 {fb.nearMiss?"Rejouez ce nœud pour trouver la formulation plus efficace.":""}
 </div>
 <div className="flex items-center gap-3">
 {fb.nearMiss&&(
 <button onClick={()=>{playSound('click');handleRetry();}} className="flex items-center gap-2 px-5 py-2.5 bg-white border border-amber-300 text-amber-700 hover:bg-amber-50 rounded-lg font-medium text-sm transition-colors">
 <svg viewBox="0 0 16 16" fill="none" className="w-4 h-4"><path d="M2 2v5h5M14 14v-5H9" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/><path d="M14 9A6 6 0 1 0 9 14" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
 Rejouer
 </button>
 )}
 <button onClick={()=>{playSound('click');handleContinue();}} className="flex items-center gap-2 px-6 py-2.5 bg-stone-900 hover:bg-stone-800 text-white text-sm font-semibold rounded-lg shadow-sm transition-colors">
 Continuer
 <svg viewBox="0 0 16 16" fill="none" className="w-4 h-4"><path d="M3 8h10M9 4l4 4-4 4" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
 </button>
 </div>
 </div>
 </div>
 )}
 </section>

 {isPlanOpen&&(
 <aside className={`w-72 bg-white border-l border-stone-200 p-6 ${spotlightStep===4?'overflow-visible':'overflow-y-auto'} hidden xl:block shrink-0 custom-scrollbar relative ${spotlightStep===4?'z-[45]':'z-10'}`}>
 <h2 className={`text-xs font-bold text-stone-400 uppercase tracking-widest mb-5 ${spHL(4)}`}>Déroulé du brief</h2>
 {activeStep===4&&(
 <div className={`fixed top-1/2 -translate-y-1/2 right-72 z-[100] w-80 bg-white rounded-2xl shadow-2xl border border-gray-100 transition-opacity duration-150 ${isTransitioning?'opacity-0':'opacity-100'}`}>
 <div className="absolute top-1/2 -translate-y-1/2 -right-2 w-4 h-4 bg-white rotate-45 border-t border-r border-gray-100"/>
 <div className="p-6">
 <h3 className="text-lg font-serif font-bold text-gray-900 mb-2">Plan du brief</h3>
 <p className="text-gray-600 text-sm leading-relaxed mb-6">Ici, vous pouvez suivre l'avancée de votre réunion, étape par étape, jusqu'à la clôture et les feedbacks.</p>
 <div className="flex items-center justify-between">
 <button onClick={skipSpotlight} className="text-xs text-gray-400 hover:text-gray-600 font-medium transition-colors">Passer</button>
 <button onClick={nextSpotlight} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5 shadow-sm transition-colors">C'est parti ! <ChevronRight size={14}/></button>
 </div>
 </div>
 </div>
 )}
 <div className="space-y-1 relative">
 <div className="absolute left-10px top-3 bottom-3 w-px bg-stone-100"/>
 {agenda.filter(bid=>!skippedBlocks.includes(bid)).map(bid=>{
 const block=AGENDA_BLOCKS.find(b=>b.id===bid);
 if(!block)return null;
 const currentRoundId=roundSeq[gs.seqIdx];
 const isCurrent=block.rounds.includes(currentRoundId)&&!gs.showFeedback||block.rounds.includes(currentRoundId)&&gs.showFeedback;
 const isPlayed=block.rounds.every(rid=>gs.history.some(h=>h.roundId===rid));
 const isPartial=!isPlayed&&block.rounds.some(rid=>gs.history.some(h=>h.roundId===rid));
 const cc2=ROUNDS[block.rounds[0]];
 const critCls=cc2?CRIT_COLORS[cc2.critClass]:CRIT_COLORS.C26;
 return(
 <div key={bid} className="relative flex items-center gap-3 py-1.5">
 <div className={`relative z-10 w-6 h-6 rounded-full flex items-center justify-center border-2 shrink-0 transition-all duration-500 ${isCurrent?'bg-stone-900 border-stone-900 text-white anim-pulse-ring scale-110':isPlayed?`bg-white ${critCls.border} ${critCls.text}`:isPartial?'bg-stone-100 border-stone-300':'bg-white border-stone-200'}`}>
 {isCurrent&&<PlayIcon size={10}/>}
 {isPlayed&&!isCurrent&&<Check size={10}/>}
 {isPartial&&!isCurrent&&<div className="w-1.5 h-1.5 rounded-full bg-stone-400"/>}
 {!isCurrent&&!isPlayed&&!isPartial&&<div className="w-1.5 h-1.5 rounded-full bg-stone-300"/>}
 </div>
 <div className={`text-sm leading-snug transition-all duration-300 ${isCurrent?'font-bold text-stone-900':isPlayed||isPartial?'font-medium text-stone-500':'text-stone-400'}`}>
 {block.label}
 </div>
 </div>
 );
 })}
 {skippedBlocks.length>0&&(
 <div className="mt-3 pt-3 border-t border-stone-100">
 <p className="text-9px font-bold text-stone-300 uppercase tracking-widest mb-1.5">Non abordé</p>
 {skippedBlocks.map(bid=>{
 const block=AGENDA_BLOCKS.find(b=>b.id===bid);
 return block?(<div key={bid} className="flex items-center gap-2 py-1 text-stone-300 line-through text-xs"><span>{block.icon}</span>{block.label}</div>):null;
 })}
 </div>
 )}
 </div>
 </aside>
 )}
 </main>
 </div>
 );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
