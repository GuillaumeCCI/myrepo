const playSound = (type) => {
  const AudioContextClass = window.AudioContext || (window).webkitAudioContext;
  if (!AudioContextClass) return;
  const _ac = new AudioContextClass();
  if (_ac.state === 'suspended') _ac.resume();
  const t = _ac.currentTime;
  const g = _ac.createGain();
  g.connect(_ac.destination);

  if (type === 'click') {
    const o = _ac.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(1200, t);
    o.frequency.exponentialRampToValueAtTime(900, t + 0.03);
    g.gain.setValueAtTime(0.06, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    o.connect(g);
    o.start(t); o.stop(t + 0.05);
  } else if (type === 'correct') {
    [0, 0.13].forEach((delay, i) => {
      const o = _ac.createOscillator();
      o.type = 'sine';
      o.frequency.setValueAtTime(i === 0 ? 520 : 780, t + delay);
      const gn = _ac.createGain();
      gn.gain.setValueAtTime(0.22, t + delay);
      gn.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.18);
      o.connect(gn); gn.connect(_ac.destination);
      o.start(t + delay); o.stop(t + delay + 0.2);
    });
  } else if (type === 'wrong') {
    [0, 0.1].forEach((delay) => {
      const o = _ac.createOscillator();
      o.type = 'sine';
      o.frequency.setValueAtTime(220, t + delay);
      const gn = _ac.createGain();
      gn.gain.setValueAtTime(0.10, t + delay);
      gn.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.08);
      o.connect(gn); gn.connect(_ac.destination);
      o.start(t + delay); o.stop(t + delay + 0.09);
    });
  } else if (type === 'advance') {
    const o = _ac.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(520, t);
    o.frequency.exponentialRampToValueAtTime(780, t + 0.08);
    g.gain.setValueAtTime(0.07, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    o.connect(g);
    o.start(t); o.stop(t + 0.11);
  } else if (type === 'done') {
    [[0, 660], [0.15, 880], [0.3, 1100]].forEach(([delay, freq]) => {
      const o = _ac.createOscillator();
      o.type = 'sine';
      o.frequency.setValueAtTime(freq, t + delay);
      const gn = _ac.createGain();
      gn.gain.setValueAtTime(0.12, t + delay);
      gn.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.25);
      o.connect(gn); gn.connect(_ac.destination);
      o.start(t + delay); o.stop(t + delay + 0.28);
    });
  }
};

function TypewriterText({ text }) {
  const [displayed, setDisplayed] = useState('');
  useEffect(() => {
    setDisplayed('');
    let i = 0;
    const interval = setInterval(() => {
      setDisplayed(text.slice(0, i + 1));
      i++;
      if (i >= text.length) clearInterval(interval);
    }, 15);
    return () => clearInterval(interval);
  }, [text]);
  return <>{displayed}</>;
}

function useFullscreen() {
  const [isFullscreen, setIsFullscreen] = useState(false);

  useEffect(() => {
    const onChange = () => setIsFullscreen(!!document.fullscreenElement);
    document.addEventListener('fullscreenchange', onChange);
    return () => document.removeEventListener('fullscreenchange', onChange);
  }, []);

  const toggleFullscreen = useCallback(() => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  }, []);

  return { isFullscreen, toggleFullscreen };
}

const TOTAL = 10;

function App() {
  const [step, setStep] = useState(0);
  const [isActionDone, setIsActionDone] = useState(false);
  
  // Written State
  const [writtenEvaluations, setWrittenEvaluations] = useState({});
  const [writtenDecision, setWrittenDecision] = useState('');
  const [step4Q1Done, setStep4Q1Done] = useState(false);
  const [step4ErrorQ1, setStep4ErrorQ1] = useState(false);

  // Oral State
  const [oralEvaluations, setOralEvaluations] = useState({});
  const [oralDecision, setOralDecision] = useState('');
  const [step8Q1Done, setStep8Q1Done] = useState(false);
  const [step8ErrorQ1, setStep8ErrorQ1] = useState(false);
  const [signature, setSignature] = useState(false);

  const [showSpotlight, setShowSpotlight] = useState(true);
  const { isFullscreen, toggleFullscreen } = useFullscreen();

  const advance = () => {
    setStep(p => {
      const next = p + 1;
      playSound(next === 10 ? 'done' : 'advance');
      return next;
    });
    setIsActionDone(false);
  };

  // Written Handlers
  const handleCriterionChange = (compId, critIdx, level) => {
    if (step === 2 && compId !== 'C5') return;
    if (step > 2) return;

    setWrittenEvaluations(prev => {
      const comp = prev[compId] || {};
      return { ...prev, [compId]: { ...comp, [critIdx]: level } };
    });
    playSound('click');
  };

  const handleStatusChange = (compId, status) => {
    if (step === 2 && compId !== 'C5') return;
    if (step > 2) return;

    setWrittenEvaluations(prev => {
      const comp = prev[compId] || {};
      return { ...prev, [compId]: { ...comp, status } };
    });
    playSound('click');
  };

  // Oral Handlers
  const handleOralCriterionChange = (compId, critIdx, level) => {
    if (step === 6 && compId !== 'O2') return;
    if (step > 6) return;

    setOralEvaluations(prev => {
      const comp = prev[compId] || {};
      return { ...prev, [compId]: { ...comp, [critIdx]: level } };
    });
    playSound('click');
  };

  // Step scrolling
  useEffect(() => {
    let targetElId = null;
    if (step === 2) targetElId = 'comp-C5';
    if (step === 4 && step4Q1Done) targetElId = 'final-result';
    if (step === 6) targetElId = 'comp-O2';
    if (step === 8 && step8Q1Done) targetElId = 'oral-result';
    if (step === 9) targetElId = 'signature-block';
    
    if (targetElId) {
      setTimeout(() => {
        const el = document.getElementById(targetElId);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 150);
    }
  }, [step, step4Q1Done, step8Q1Done]);

  // Step 2 Logic: Check C5
  useEffect(() => {
    if (step === 2) {
      const c5 = writtenEvaluations['C5'];
      if (c5 && c5[0] === 4 && c5[1] === 4 && c5[2] === 4 && c5[3] === 4 && c5.status === 'Validée') {
        setIsActionDone(true);
        playSound('correct');
      } else {
        setIsActionDone(false);
      }
    }
  }, [writtenEvaluations, step]);

  // Step 3 Logic: Auto-fill Written
  useEffect(() => {
    if (step === 3 && !isActionDone) {
      const fillPlan = [
        { id: 'C1', levels: [4, 4, 4, 4, 4], status: 'Validée' },
        { id: 'C2', levels: [4, 4, 4, 4], status: 'Validée' },
        { id: 'C3', levels: [3, 3, 3, 3], status: 'Partiellement validée' }, // critical with 3
        { id: 'C4', levels: [3, 3, 3, 3], status: 'Partiellement validée' }, // critical with 3
        { id: 'C6', levels: [3, 3, 3], status: 'Partiellement validée' },
        { id: 'C7', levels: [4, 4, 4, 4], status: 'Validée' },
      ];
      let time = 400;
      fillPlan.forEach((comp) => {
        setTimeout(() => {
          setWrittenEvaluations(prev => {
            const updatedLevels = {};
            comp.levels.forEach((l, i) => (updatedLevels[i] = l));
            return { ...prev, [comp.id]: { ...updatedLevels, status: comp.status } };
          });
          playSound('click');
        }, time);
        time += 500;
      });

      setTimeout(() => {
        const el = document.getElementById('comp-C3');
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, time - 1500);

      setTimeout(() => {
        setIsActionDone(true);
        playSound('done');
      }, time + 400);
    }
  }, [step, isActionDone]);

  // Step 4 Logic: Written Decision
  useEffect(() => {
    if (step === 4 && step4Q1Done && !isActionDone) {
      if (writtenDecision === 'Validée') {
        setIsActionDone(true);
        playSound('correct');
      }
    }
  }, [step, step4Q1Done, writtenDecision, isActionDone]);

  // Step 6 Logic: Check O2
  useEffect(() => {
    if (step === 6) {
      const o2 = oralEvaluations['O2'];
      if (o2 && o2[0] === 3 && o2[1] === 3 && o2[2] === 3) {
        setIsActionDone(true);
        playSound('correct');
      } else {
        setIsActionDone(false);
      }
    }
  }, [oralEvaluations, step]);

  // Step 7 Logic: Auto-fill Oral
  useEffect(() => {
    if (step === 7 && !isActionDone) {
      const fillPlan = [
        { id: 'O1', levels: [4, 4, 4] },
        { id: 'O3', levels: [4, 4, 4] },
        { id: 'O4', levels: [4, 4, 4] },
        { id: 'O5', levels: [4, 4] },
      ];
      let time = 400;
      fillPlan.forEach((comp) => {
        setTimeout(() => {
          setOralEvaluations(prev => {
            const updatedLevels = {};
            comp.levels.forEach((l, i) => (updatedLevels[i] = l));
            return { ...prev, [comp.id]: { ...updatedLevels } };
          });
          playSound('click');
        }, time);
        time += 500;
      });

      setTimeout(() => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, time - 500);

      setTimeout(() => {
        setIsActionDone(true);
        playSound('done');
      }, time + 400);
    }
  }, [step, isActionDone]);

  // Step 8 Logic: Oral Decision
  useEffect(() => {
    if (step === 8 && step8Q1Done && !isActionDone) {
      if (oralDecision === 'Non validée') {
        setIsActionDone(true);
        playSound('correct');
      }
    }
  }, [step, step8Q1Done, oralDecision, isActionDone]);

  // Step 9 Logic: Signature
  useEffect(() => {
    if (step === 9 && !isActionDone) {
      if (signature) {
        setIsActionDone(true);
        playSound('done');
      }
    }
  }, [step, signature, isActionDone]);

  let tutTitle = '';
  let tutBody = '';
  let tutInstruction = null;
  let tutAction = null;

  switch (step) {
    case 0:
      tutTitle = "Contexte de l'évaluation";
      tutBody = "L'évaluation de la certification IA se compose de deux parties :\n\n• Une épreuve écrite (7 compétences)\n• Une épreuve orale de 30 min (5 critères)\n\nLa validation finale repose à 50% sur l'écrit et 50% sur l'oral. Tout doit être validé par le jury.";
      tutAction = (
        <button className="w-full bg-[#00529A] hover:bg-blue-800 text-white font-bold py-3 rounded-lg transition-colors shadow-lg flex items-center justify-center gap-2 mt-6" onClick={advance}>
          ÉTAPE SUIVANTE <ArrowRight className="w-5 h-5 ml-2"/>
        </button>
      );
      break;

    case 1:
      tutTitle = "1. Règles de l'écrit";
      tutBody = "Pour valider l'écrit (C1 à C7) :\n\n• Le seuil de réussite recommandé est d'atteindre le niveau 4 « Atteint ».\n• C1 à C5 sont des compétences critiques : un niveau 2 (« Non atteint ») est un échec majeur éliminatoire.\n• Un niveau 3 sur C1-C5 est toléré si la maîtrise globale est jugée suffisante par le jury.\n• Pour C6 et C7, un niveau 3 est toléré et permet de cocher explicitement la case « Partiellement validée ».";
      tutAction = (
        <button className="w-full bg-[#00529A] hover:bg-blue-800 text-white font-bold py-3 rounded-lg transition-colors shadow-lg flex items-center justify-center gap-2 mt-6" onClick={advance}>
          PASSER À LA GRILLE <ArrowRight className="w-5 h-5 ml-2"/>
        </button>
      );
      break;

    case 2:
      tutTitle = "2. Évaluation de C5 (Données)";
      tutBody = "Arrêtons-nous sur la compétence C5 : « Protéger et sécuriser les données ».\n\nLe candidat a parfaitement sécurisé les données sensibles, répondant exactement aux attendus, sans les dépasser.";
      tutInstruction = "Cochez le niveau « Atteint » pour les 4 critères de C5, puis sélectionnez « Validée » pour la compétence.";
      if (isActionDone) {
        tutAction = <OkBox title="Parfait !" body="Le candidat valide avec succès cette compétence critique." onNext={advance} />;
      } else {
        tutAction = (
          <div className="mt-8">
            <p className="text-sm text-slate-500 font-medium">
              <Info className="w-4 h-4 inline-block mr-1"/> Saisissez la notation dans la grille pour continuer.
            </p>
          </div>
        );
      }
      break;

    case 3:
      tutTitle = "3. Suite de l'évaluation écrite";
      tutBody = "Le jury a complété le reste de la grille écrite.\n\nObservez les résultats : le candidat a obtenu un niveau 3 « Partiellement atteint » sur les compétences critiques C3 et C4.";
      if (isActionDone) {
        tutAction = <OkBox title="Saisie terminée" body="La grille a été entièrement complétée." onNext={advance} />;
      } else {
        tutAction = (
          <div className="mt-8 p-6 bg-blue-50 border border-blue-200 rounded-xl animate-slide-up shadow-sm">
            <div className="flex items-center gap-3 mb-3">
              <div className="bg-[#00529A] text-white p-1.5 rounded-full"><PenTool className="w-4 h-4"/></div>
              <span className="text-[#00529A] text-[18px] font-black">Saisie en cours...</span>
            </div>
          </div>
        );
      }
      break;

    case 4:
      tutTitle = "4. Bilan de l'écrit";
      tutBody = "La grille est complétée. Le candidat a obtenu un niveau 3 sur deux compétences critiques (C3 et C4).";
      if (!step4Q1Done) {
        tutAction = (
          <div className="mt-6 flex flex-col gap-3">
            <p className="font-bold text-slate-800 mb-2">Avec deux niveaux 3 sur des compétences critiques, le candidat est-il automatiquement éliminé ?</p>
            <button 
              className={`w-full text-left p-4 rounded-xl border transition-colors ${step4ErrorQ1 ? 'border-red-500 bg-red-50' : 'border-slate-200 hover:border-blue-900 hover:bg-blue-50'}`}
              onClick={() => { playSound('wrong'); setStep4ErrorQ1(true); }}
            >
              <span className="font-bold block text-slate-800">Oui, c'est éliminatoire.</span>
            </button>
            {step4ErrorQ1 && <div className="text-red-600 text-sm font-medium animate-slide-up px-2">Faux. Un niveau 3 sur C1-C5 n'est pas bloquant en soi. Le jury décide si la maîtrise globale reste suffisante.</div>}
            <button 
              className="w-full text-left p-4 rounded-xl border border-slate-200 hover:border-blue-900 hover:bg-blue-50 transition-colors"
              onClick={() => { playSound('correct'); setStep4Q1Done(true); setStep4ErrorQ1(false); }}
            >
              <span className="font-bold block text-slate-800">Non, le jury évalue la maîtrise globale.</span>
            </button>
          </div>
        );
      } else if (!isActionDone) {
        tutInstruction = "Exact ! Le jury a décidé de tolérer ces faiblesses. Les autres compétences étant bien maîtrisées, le candidat valide cette épreuve.\n\nSaisissez « Validée » pour le résultat final de l'écrit tout en bas.";
        tutAction = (
          <div className="mt-8">
            <p className="text-sm text-slate-500 font-medium">
              <Info className="w-4 h-4 inline-block mr-1"/> Saisissez la décision finale dans la grille.
            </p>
          </div>
        );
      } else {
        tutAction = <OkBox title="Parfait !" body="L'épreuve écrite est officiellement validée." onNext={advance} />;
      }
      break;

    case 5:
      tutTitle = "5. Règles de l'oral";
      tutBody = "Passons à l'oral (30 min).\n\nPour valider l'oral, le candidat doit obtenir a minima le niveau :\n• « Atteint » (ou « Dépassé ») pour les compétences 2, 3 et 4.\n• « Partiellement atteint » pour les compétences 1 et 5.\n\nLa grille est plus simple et se concentre sur la présentation et l'argumentation.";
      tutAction = (
        <button className="w-full bg-[#00529A] hover:bg-blue-800 text-white font-bold py-3 rounded-lg transition-colors shadow-lg flex items-center justify-center gap-2 mt-6" onClick={advance}>
          PASSER À L'ORAL <ArrowRight className="w-5 h-5 ml-2"/>
        </button>
      );
      break;

    case 6:
      tutTitle = "6. Évaluation de la présentation";
      tutBody = "Le candidat a eu du mal à analyser ses prompts. Sa restitution était très partielle.";
      tutInstruction = "Pour la compétence « 2-Développer une analyse de ses prompts », cochez la colonne « Partiellement atteint » pour ses 3 critères.";
      if (isActionDone) {
        tutAction = <OkBox title="Parfait !" body="La notation est prise en compte." onNext={advance} />;
      } else {
        tutAction = (
          <div className="mt-8">
            <p className="text-sm text-slate-500 font-medium">
              <Info className="w-4 h-4 inline-block mr-1"/> Saisissez la notation dans la grille pour continuer.
            </p>
          </div>
        );
      }
      break;
      
    case 7:
      tutTitle = "7. Suite de l'oral";
      tutBody = "Le jury complète le reste de la grille orale.\n\nLe candidat s'est très bien rattrapé par la suite et a obtenu le niveau « Atteint » partout ailleurs.";
      if (isActionDone) {
        tutAction = <OkBox title="Saisie terminée" body="La grille orale a été entièrement complétée." onNext={advance} />;
      } else {
        tutAction = (
          <div className="mt-8 p-6 bg-blue-50 border border-blue-200 rounded-xl animate-slide-up shadow-sm">
            <div className="flex items-center gap-3 mb-3">
              <div className="bg-[#00529A] text-white p-1.5 rounded-full"><PenTool className="w-4 h-4"/></div>
              <span className="text-[#00529A] text-[18px] font-black">Saisie en cours...</span>
            </div>
          </div>
        );
      }
      break;

    case 8:
      tutTitle = "8. Bilan de l'oral";
      tutBody = "La grille est complétée. Le candidat a obtenu un très bon score partout, sauf pour la compétence « 2-Développer une analyse de ses prompts » (évaluée à « Partiellement atteint »).";
      if (!step8Q1Done) {
        tutAction = (
          <div className="mt-6 flex flex-col gap-3">
            <p className="font-bold text-slate-800 mb-2">L'oral est-il validé avec ce résultat ?</p>
            <button 
              className={`w-full text-left p-4 rounded-xl border transition-colors ${step8ErrorQ1 ? 'border-red-500 bg-red-50' : 'border-slate-200 hover:border-blue-900 hover:bg-blue-50'}`}
              onClick={() => { playSound('wrong'); setStep8ErrorQ1(true); }}
            >
              <span className="font-bold block text-slate-800">Oui, car il a le niveau « Atteint » partout ailleurs.</span>
            </button>
            {step8ErrorQ1 && <div className="text-red-600 text-sm font-medium animate-slide-up px-2">Faux. La compétence 2 exige un niveau « Atteint » minimum.</div>}
            <button 
              className="w-full text-left p-4 rounded-xl border border-slate-200 hover:border-blue-900 hover:bg-blue-50 transition-colors"
              onClick={() => { playSound('correct'); setStep8Q1Done(true); setStep8ErrorQ1(false); }}
            >
              <span className="font-bold block text-slate-800">Non, car la compétence 2 exige un niveau « Atteint ».</span>
            </button>
          </div>
        );
      } else if (!isActionDone) {
        tutInstruction = "Exact ! La compétence 2 exigeant le niveau « Atteint », ce résultat partiel est éliminatoire pour l'oral.\n\nSaisissez « Non validée » pour le résultat final de l'épreuve orale tout en bas.";
        tutAction = (
          <div className="mt-8">
            <p className="text-sm text-slate-500 font-medium">
              <Info className="w-4 h-4 inline-block mr-1"/> Saisissez la décision finale dans la grille.
            </p>
          </div>
        );
      } else {
        tutAction = <OkBox title="Parfait !" body="La décision a bien été enregistrée." onNext={advance} />;
      }
      break;

    case 9:
      tutTitle = "9. Bilan Global et Signature";
      tutBody = "Rappel des résultats :\n• Écrit : Validé (niveaux 3 tolérés sur C3 et C4).\n• Oral : Non validé (niveau insuffisant sur la compétence 2).\n\nPour obtenir la certification, le candidat doit obligatoirement valider ces deux épreuves. L'oral étant échoué, la certification IA n'est donc pas acquise.\n\nIl ne reste plus qu'à signer la grille orale pour officialiser le résultat du jury.";
      if (!isActionDone) {
        tutInstruction = "Cliquez sur la zone de signature dans la grille pour clôturer l'évaluation.";
        tutAction = (
          <div className="mt-8">
            <p className="text-sm text-slate-500 font-medium">
              <Info className="w-4 h-4 inline-block mr-1"/> En attente de signature...
            </p>
          </div>
        );
      } else {
        tutAction = <OkBox title="Dossier complet !" body="Félicitations, l'évaluation est terminée." onNext={advance} />;
      }
      break;

    case 10:
      tutTitle = "Activité terminée !";
      tutBody = "Vous avez terminé ce module d'évaluation avec succès.";
      tutAction = (
        <div className="mt-6">
          <button 
            className="w-full bg-[#00529A] hover:bg-blue-800 text-white font-bold py-3 rounded-lg transition-colors shadow-lg flex items-center justify-center gap-2"
            onClick={() => { playSound('advance'); window.location.reload(); }}
          >
            RECOMMENCER L'ACTIVITÉ
          </button>
        </div>
      );
      break;
  }

  const displayNum = Math.min(step, TOTAL);
  const showWritten = step <= 4;

  return (
    <>
      {showSpotlight && <SpotlightIntro onDismiss={() => setShowSpotlight(false)} toggleFullscreen={toggleFullscreen} />}
      <FullscreenButton isFullscreen={isFullscreen} toggleFullscreen={toggleFullscreen} />
      
      <div className="flex flex-1 h-screen overflow-hidden bg-[#f3f4f6] relative font-sans text-slate-800">
        
        {/* Left Panel */}
        <div className="w-[360px] bg-white border-r border-slate-200 shadow-xl z-50 flex flex-col shrink-0 relative">
          {step <= 10 && (
            <div className="relative transition-colors duration-500 shrink-0 flex flex-col">
              <div className="p-6 bg-[#00529A] text-white">
                <div className="flex justify-between items-start">
                  <div>
                    <div className="text-[10px] uppercase tracking-widest opacity-80 mb-1">Tutoriel Évaluateur</div>
                    <h1 className="text-[18px] font-bold leading-tight">{tutTitle}</h1>
                  </div>
                  <div key={`num-${step}`} className="flex items-baseline gap-1 bg-white/10 px-2 py-1 rounded">
                    <span className="text-xl font-black tracking-tighter leading-none text-white">{displayNum}</span>
                    {step > 0 && step < TOTAL && <span className="text-xs font-bold text-white/70 leading-none">/{TOTAL}</span>}
                  </div>
                </div>
              </div>
              <div className="px-6 pt-6 pb-2 transition-colors duration-500">
                <div key={`text-${step}`}>
                  <p className="text-base text-slate-700 leading-relaxed whitespace-pre-line animate-slide-up" style={{ animationDelay: '0.08s' }}>
                    <TypewriterText text={tutBody} />
                  </p>
                  {tutInstruction && (
                    <div className="mt-6 animate-slide-up bg-blue-50 border-2 border-blue-200 p-4 rounded-xl shadow-sm" style={{ animationDelay: '0.15s' }}>
                      <div className="text-[#00529A] font-bold text-sm flex items-start gap-3">
                        <span className="leading-relaxed mt-0.5 whitespace-pre-line">{tutInstruction}</span>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}
          <div className="flex-1 overflow-y-auto px-6 py-4 bg-white min-h-0 flex flex-col custom-scrollbar">
            <div key={`action-${step}`} className="animate-slide-up pb-8 w-full">
              {tutAction}
            </div>
          </div>
        </div>

        {/* Right Panel */}
        <div className="flex-1 flex flex-col overflow-x-auto overflow-y-auto relative bg-slate-100 custom-scrollbar">
          
          {/* Blocking Overlay for steps 0, 1, 5 */}
          <div className={`fixed top-0 bottom-0 right-0 z-40 bg-slate-900/60 transition-all duration-500 ${(step === 0 || step === 1 || step === 5) ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`} style={{ left: '360px' }} />

          {/* Center Modal for steps 0, 1, 5 */}
          {(step === 0 || step === 1 || step === 5) && (
            <div className="fixed top-0 bottom-0 right-0 z-50 flex items-center justify-center" style={{ left: '360px' }}>
              <div className="bg-white p-8 rounded-xl shadow-2xl flex flex-col items-center max-w-sm text-center border border-slate-200 animate-slide-up">
                 <div className="w-16 h-16 rounded-full flex items-center justify-center mb-6 text-[#00529A] bg-blue-50 shadow-sm border border-blue-100">
                    <LayoutGrid className="w-8 h-8" />
                 </div>
                 <h3 className="text-xl font-bold text-slate-900 tracking-tight">La grille d'évaluation</h3>
                 <p className="text-slate-600 text-sm mt-3 leading-relaxed font-medium">
                    {step === 5 ? "Nous passons maintenant à la grille d'évaluation orale..." : "Elle s'animera dès que vous arriverez à la partie pratique."}
                 </p>
              </div>
            </div>
          )}

          {/* Scrollable Container with the Grids */}
          <div className="min-h-full flex flex-col p-8 pt-12 relative">
             <div 
                className={`rounded-xl flex flex-col w-full max-w-5xl mx-auto transition-all duration-500 relative
                ${(step === 0 || step === 1 || step === 5) ? 'bg-white opacity-40 grayscale blur-[2px] pointer-events-none overflow-hidden z-30 border border-slate-200 shadow-sm' : ''}
                ${(step >= 2 && step !== 5) ? 'z-40' : ''}
             `}
             >
                {showWritten ? (
                  <CertifIAGrid 
                    step={step}
                    step4Q1Done={step4Q1Done}
                    evaluations={writtenEvaluations}
                    handleCriterionChange={handleCriterionChange}
                    handleStatusChange={handleStatusChange}
                    finalDecision={writtenDecision}
                    setFinalDecision={setWrittenDecision}
                  />
                ) : (
                  <CertifIAOralGrid 
                    step={step}
                    oralEvaluations={oralEvaluations}
                    handleOralCriterionChange={handleOralCriterionChange}
                    oralDecision={oralDecision}
                    setOralDecision={setOralDecision}
                    signature={signature}
                    setSignature={setSignature}
                  />
                )}
             </div>
          </div>
        </div>
      </div>
    </>
  );
}

/* =========================================================
   Contenu de src/main.tsx
   ========================================================= */
createRoot(document.getElementById('root')).render(
  <StrictMode>
    <App />
  </StrictMode>,
);
    </script>
  </body>
</html>
