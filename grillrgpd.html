<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activité - Grille RGPD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Figtree', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }

    @keyframes numIn {
      from { opacity: 0; transform: translateY(10px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .animate-num-in { animation: numIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

    @keyframes titleIn {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .animate-title-in { animation: titleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.05s both; }

    @keyframes badgePulse {
      0%   { transform: scale(1); box-shadow: 0 0 0 0 rgba(0,0,0,0.1); }
      50%  { transform: scale(1.05); box-shadow: 0 0 0 4px rgba(0,0,0,0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0,0,0,0); }
    }
    .animate-badge-flash { animation: badgePulse 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

    @keyframes rowPulse {
      0%, 100% { box-shadow: inset 4px 0 0 0 rgba(79, 70, 229, 0.35); }
      50%      { box-shadow: inset 4px 0 0 0 rgba(79, 70, 229, 0.85); }
    }
    .row-active-pulse { animation: rowPulse 2s ease-in-out infinite; }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; border: 2px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; border: 2px solid transparent; background-clip: padding-box; }

    .bg-dot-pattern {
      background-image: radial-gradient(rgba(203, 213, 225, 0.4) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadein 0.3s ease both; }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-scale-in { animation: scaleIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }

    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    .spotlight-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.88);
      backdrop-filter: blur(6px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pulse-ring {
      position: absolute;
      inset: -6px;
      border-radius: 9999px;
      border: 2px solid rgba(0,82,154,0.6);
      animation: pulse-ring 1.8s ease-out infinite;
    }
    .pulse-ring-2 {
      animation-delay: 0.9s;
    }
    .fullscreen-btn {
      position: fixed;
      top: 14px;
      right: 16px;
      z-index: 200;
      background: white;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 7px 9px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      transition: all 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .fullscreen-btn:hover {
      background: #f1f5f9;
      color: #00529A;
      border-color: #93c5fd;
    }

    html, body, #root {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Figtree', ui-sans-serif, system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>
  // ─── Fullscreen hook + components (module scope, same pattern as TypewriterText) ───
  function useFullscreen() {
    const [isFullscreen, setIsFullscreen] = React.useState(false);

    React.useEffect(() => {
      const onChange = () => setIsFullscreen(!!document.fullscreenElement);
      document.addEventListener('fullscreenchange', onChange);
      return () => document.removeEventListener('fullscreenchange', onChange);
    }, []);

    const toggleFullscreen = React.useCallback(() => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    }, []);

    return { isFullscreen, toggleFullscreen };
  }

  function FullscreenButton({ isFullscreen, toggleFullscreen }) {
    const e = React.createElement;
    const ExpandIcon = () => e('svg', { xmlns:"http://www.w3.org/2000/svg", width:16, height:16, viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", strokeWidth:2.2, strokeLinecap:"round", strokeLinejoin:"round" },
      e('path', { d:"M8 3H5a2 2 0 0 0-2 2v3" }),
      e('path', { d:"M21 8V5a2 2 0 0 0-2-2h-3" }),
      e('path', { d:"M3 16v3a2 2 0 0 0 2 2h3" }),
      e('path', { d:"M16 21h3a2 2 0 0 0 2-2v-3" })
    );
    const CompressIcon = () => e('svg', { xmlns:"http://www.w3.org/2000/svg", width:16, height:16, viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", strokeWidth:2.2, strokeLinecap:"round", strokeLinejoin:"round" },
      e('path', { d:"M8 3v3a2 2 0 0 1-2 2H3" }),
      e('path', { d:"M21 8h-3a2 2 0 0 1-2-2V3" }),
      e('path', { d:"M3 16h3a2 2 0 0 1 2 2v3" }),
      e('path', { d:"M16 21v-3a2 2 0 0 1 2-2h3" })
    );

    return e('button', {
      onClick: toggleFullscreen,
      className: "fullscreen-btn",
      title: isFullscreen ? "Quitter le plein écran" : "Plein écran"
    },
      isFullscreen ? e(CompressIcon) : e(ExpandIcon),
      isFullscreen ? "Quitter" : "Plein écran"
    );
  }

  function SpotlightIntro({ onDismiss, toggleFullscreen }) {
    const e = React.createElement;

    const handleEnterFullscreen = () => {
      toggleFullscreen();
      onDismiss();
    };

    return e('div', { className: "spotlight-overlay animate-fade-in" },
      e('div', { className: "animate-scale-in max-w-sm w-full mx-4 relative" },
        e('div', { className: "bg-white rounded-3xl p-8 text-center shadow-2xl relative overflow-hidden" },
          e('div', { className: "absolute top-0 left-0 right-0 h-1.5 rounded-t-3xl", style: { background: "linear-gradient(90deg, #00529A, #3b82f6, #93c5fd)" } }),

          e('div', { className: "relative inline-flex items-center justify-center w-20 h-20 mx-auto mb-6 mt-2" },
            e('div', { className: "pulse-ring" }),
            e('div', { className: "pulse-ring pulse-ring-2" }),
            e('div', { className: "relative w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center" },
              e('svg', { xmlns:"http://www.w3.org/2000/svg", width:36, height:36, viewBox:"0 0 24 24", fill:"none", stroke:"#00529A", strokeWidth:1.8, strokeLinecap:"round", strokeLinejoin:"round" },
                e('path', { d:"M8 3H5a2 2 0 0 0-2 2v3" }),
                e('path', { d:"M21 8V5a2 2 0 0 0-2-2h-3" }),
                e('path', { d:"M3 16v3a2 2 0 0 0 2 2h3" }),
                e('path', { d:"M16 21h3a2 2 0 0 0 2-2v-3" })
              )
            )
          ),

          e('h2', { className: "text-xl font-extrabold text-slate-900 mb-2" }, "Meilleure expérience en plein écran"),
          e('p', { className: "text-slate-500 text-sm leading-relaxed mb-8" },
            "Pour profiter pleinement de cette activité, nous vous recommandons de l'afficher en plein écran. Vous pouvez aussi continuer en mode fenêtré."
          ),

          e('div', { className: "flex flex-col gap-3" },
            e('button', {
              onClick: handleEnterFullscreen,
              className: "w-full bg-[#00529A] hover:bg-blue-800 text-white font-semibold py-3 px-6 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-md"
            },
              e('svg', { xmlns:"http://www.w3.org/2000/svg", width:18, height:18, viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", strokeWidth:2, strokeLinecap:"round", strokeLinejoin:"round" },
                e('path', { d:"M8 3H5a2 2 0 0 0-2 2v3" }),
                e('path', { d:"M21 8V5a2 2 0 0 0-2-2h-3" }),
                e('path', { d:"M3 16v3a2 2 0 0 0 2 2h3" }),
                e('path', { d:"M16 21h3a2 2 0 0 0 2-2v-3" })
              ),
              "Passer en plein écran"
            ),
            e('button', {
              onClick: onDismiss,
              className: "w-full text-slate-500 hover:text-slate-700 font-medium py-2.5 px-6 rounded-xl transition-colors text-sm hover:bg-slate-50"
            }, "Continuer en mode fenêtré")
          )
        )
      )
    );
  }

  // TypewriterText MUST be defined at module scope, NOT inside the IIFE.
  // If defined inside the closure, React treats it as a new component type
  // on every render of App, unmounting and remounting it → animation resets.
  function TypewriterText({ text }) {
    const [displayed, setDisplayed] = React.useState('');
    React.useEffect(() => {
      setDisplayed('');
      let i = 0;
      const interval = setInterval(() => {
        setDisplayed(text.slice(0, i + 1));
        i++;
        if (i >= text.length) clearInterval(interval);
      }, 15);
      return () => clearInterval(interval);
    }, [text]);
    return React.createElement(React.Fragment, null, displayed);
  }

  (function() {
    const { useState, useEffect, useRef } = React;
    const h = React.createElement;

    // ─── Icons (inline SVG) ────────────────────────────────────────────
    const ArrowRight = ({ className }) =>
      h('svg', { className, xmlns:'http://www.w3.org/2000/svg', width:24, height:24, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:2, strokeLinecap:'round', strokeLinejoin:'round' },
        h('path', { d:'M5 12h14' }),
        h('path', { d:'m12 5 7 7-7 7' })
      );

    const Info = ({ className }) =>
      h('svg', { className, xmlns:'http://www.w3.org/2000/svg', width:24, height:24, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:2, strokeLinecap:'round', strokeLinejoin:'round' },
        h('circle', { cx:12, cy:12, r:10 }),
        h('path', { d:'M12 16v-4' }),
        h('path', { d:'M12 8h.01' })
      );

    const PenTool = ({ className }) =>
      h('svg', { className, xmlns:'http://www.w3.org/2000/svg', width:24, height:24, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:2, strokeLinecap:'round', strokeLinejoin:'round' },
        h('path', { d:'M12 19l7-7 3 3-7 7-3-3z' }),
        h('path', { d:'M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z' }),
        h('path', { d:'M2 2l7.586 7.586' }),
        h('circle', { cx:11, cy:11, r:2 })
      );

    const LayoutGrid = ({ className }) =>
      h('svg', { className, xmlns:'http://www.w3.org/2000/svg', width:24, height:24, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:2, strokeLinecap:'round', strokeLinejoin:'round' },
        h('rect', { width:7, height:7, x:3, y:3, rx:1 }),
        h('rect', { width:7, height:7, x:14, y:3, rx:1 }),
        h('rect', { width:7, height:7, x:14, y:14, rx:1 }),
        h('rect', { width:7, height:7, x:3, y:14, rx:1 })
      );

    const Check = ({ className }) =>
      h('svg', { className, xmlns:'http://www.w3.org/2000/svg', width:24, height:24, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:2, strokeLinecap:'round', strokeLinejoin:'round' },
        h('path', { d:'M20 6 9 17l-5-5' })
      );

    const X = ({ className }) =>
      h('svg', { className, xmlns:'http://www.w3.org/2000/svg', width:24, height:24, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:2, strokeLinecap:'round', strokeLinejoin:'round' },
        h('path', { d:'M18 6 6 18' }),
        h('path', { d:'m6 6 12 12' })
      );

    // ─── playSound ────────────────────────────────────────────────────
    const playSound = (type) => {
      const _ac = new (window.AudioContext || window.webkitAudioContext)();
      if (_ac.state === 'suspended') _ac.resume();
      const t = _ac.currentTime;
      const g = _ac.createGain();
      g.connect(_ac.destination);

      if (type === 'click') {
        const o = _ac.createOscillator();
        o.type = 'sine';
        o.frequency.setValueAtTime(1200, t);
        o.frequency.exponentialRampToValueAtTime(900, t + 0.03);
        g.gain.setValueAtTime(0.06, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
        o.connect(g);
        o.start(t); o.stop(t + 0.05);
      } else if (type === 'correct') {
        [0, 0.13].forEach((delay, i) => {
          const o = _ac.createOscillator();
          o.type = 'sine';
          o.frequency.setValueAtTime(i === 0 ? 520 : 780, t + delay);
          const gn = _ac.createGain();
          gn.gain.setValueAtTime(0.22, t + delay);
          gn.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.18);
          o.connect(gn); gn.connect(_ac.destination);
          o.start(t + delay); o.stop(t + delay + 0.2);
        });
      } else if (type === 'wrong') {
        [0, 0.1].forEach((delay) => {
          const o = _ac.createOscillator();
          o.type = 'sine';
          o.frequency.setValueAtTime(220, t + delay);
          const gn = _ac.createGain();
          gn.gain.setValueAtTime(0.10, t + delay);
          gn.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.08);
          o.connect(gn); gn.connect(_ac.destination);
          o.start(t + delay); o.stop(t + delay + 0.09);
        });
      } else if (type === 'advance') {
        const o = _ac.createOscillator();
        o.type = 'sine';
        o.frequency.setValueAtTime(520, t);
        o.frequency.exponentialRampToValueAtTime(780, t + 0.08);
        g.gain.setValueAtTime(0.07, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        o.connect(g);
        o.start(t); o.stop(t + 0.11);
      } else if (type === 'done') {
        [[0, 660], [0.15, 880], [0.3, 1100]].forEach(([delay, freq]) => {
          const o = _ac.createOscillator();
          o.type = 'sine';
          o.frequency.setValueAtTime(freq, t + delay);
          const gn = _ac.createGain();
          gn.gain.setValueAtTime(0.12, t + delay);
          gn.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.25);
          o.connect(gn); gn.connect(_ac.destination);
          o.start(t + delay); o.stop(t + delay + 0.28);
        });
      }
    };
    window.playSound = playSound;

    // ─── Data ─────────────────────────────────────────────────────────
    const tdClass = "border border-black p-2 text-left align-top text-[13px] text-black leading-snug";
    const thClass = "border border-black p-2 text-left align-middle text-[14px] font-bold text-black bg-[#638EC6]";
    const ptsClass = "border border-black p-2 text-left align-top text-[13px] text-black bg-slate-200";

    const GRID_ROWS = [
      {
        id: 'C1', max: '10',
        title: "Analyse de la problématique de l'entreprise en matière de traitement et de protection des données personnelles",
        refText: "C1 et C2",
        col1: h('div', null,
          h('div', { className:'mb-1 italic' }, "Sont identifiés et définis :"),
          h('div', { className:'space-y-1 italic pl-2' },
            h('div', null, "- Les obligations et enjeux de l'entreprise liés à la protection des données"),
            h('div', null, "- Le projet et ses éléments constitutifs adaptés à l'entreprise : méthode de conduite de projet, plan d'action, calendrier des actions, composition de l'équipe projet.")
          )
        ),
        col2_1: h('div', { className:'space-y-2' },
          h('div', null, "- L'analyse et l'interprétation des textes légaux et règlementaires sont exactes et permettent une identification correcte des obligations incombant à l'entreprise en matière de traitement et de protection des données personnelles, selon son contexte."),
          h('div', null, "- Les rôles et missions des acteurs institutionnels (ANSSI, CNIL…) participant à l'application de la règlementation en matière de protection des données personnelles sont identifiés, ainsi que l'utilité des ressources et outils qu'ils proposent.")
        ),
        col2_2: h('div', { className:'space-y-2' },
          h('div', null, "- L'analyse de la problématique de l'entreprise permet de qualifier et de quantifier ses enjeux liés à la protection des données, au regard de la nature de son activité, de son modèle économique, de son organisation interne et de ses moyens techniques."),
          h('div', null, "- La méthodologie de projet choisie (approche agile ou prédictive, phasage, étapes…) est adaptée au contexte de l'entreprise (moyens techniques et humains, culture…) et optimise ses conditions d'aboutissement."),
          h('div', null, "- La planification des actions constitutives du projet est réaliste, adaptée aux objectifs visés concernant les échéances fixées et cohérente avec la méthodologie de projet retenue."),
          h('div', null, "- L'équipe projet est correctement dimensionnée au regard des moyens de l'entreprise et des objectifs visés, sa constitution est justifiée au regard de la position fonctionnelle et hiérarchique que ses membres occupent au sein de l'entreprise."),
          h('div', null, "- Les spécificités des collaborateurs impliqués sont prises en compte et des adaptations sont identifiées pour garantir l'inclusivité de la démarche, notamment concernant le personnel en situation de handicap."),
          h('div', null, "- Le plan projet est globalement correctement dimensionné au regard des objectifs visés et des moyens de l'entreprise.")
        )
      },
      {
        id: 'C4', max: '10',
        title: "Elaboration du registre de traitement des données personnelles",
        refText: "C4",
        col1: h('div', { className:'space-y-2 italic' },
          h('div', null, "Les activités de traitement des données personnelles sont exhaustives."),
          h('div', null, "Les informations à porter au registre satisfont les exigences réglementaires.")
        ),
        col2_1: h('div', { className:'space-y-2' },
          h('div', null, "- L'identification des activités de traitement des données personnelles opérées sur le périmètre de la fonction ou du service est exhaustive et intègre, le cas échéant, celles d'éventuels sous-traitants.")
        ),
        col2_2: h('div', { className:'space-y-2' },
          h('div', null, "- La qualité et la précision des informations portées dans le registre satisfont les exigences règlementaires. Sont notamment spécifiés pour chaque activité de traitement : l'identité et les coordonnées du responsable du traitement ; les objectifs poursuivis ; la liste exhaustive des données collectées et l'identification de celles présentant un degré de criticité particulier ; les mesures de conservation et de sécurisation des données ; les services et personnels destinataires des données en interne ; les destinataires externes des données en cas de transfert hors de l'UE."),
          h('div', null, "- La qualité du registre et de son niveau d'information permet l'évaluation du degré de conformité de l'entreprise en matière de traitement des données personnelles et d'identifier les actions à conduire pour optimiser et régulariser les pratiques usuelles.")
        )
      },
      {
        id: 'C5', max: '15',
        title: "Plan des actions de mise en conformité à réaliser, évaluation de l'opportunité de mener une AIPD",
        refText: "C5, C6",
        col1: h('div', { className:'space-y-2 italic' },
          h('div', null, "Les points de non-conformité sont identifiés et leur degré d'importance est qualifié."),
          h('div', null, "Les actions identifiées sont exhaustives, satisfont les exigences réglementaires et sont justifiées au regard des caractéristiques des données et de leur criticité."),
          h('div', null, "Les dispositions d'information des personnes concernant le traitement de leurs données sont prévues.")
        ),
        col2_1: h('div', { className:'space-y-2' },
          h('div', null, "Les points de non-conformité sont identifiés de façon exhaustive et leur degré d'importance est qualifié."),
          h('div', null, "Les actions identifiées satisfont les obligations règlementaires concernant la mise en œuvre de traitements licites, le respect des droits des personnes, les éventuels transferts vers un pays tiers, les destinataires des données collectées, la durée de conservation des données collectées."),
          h('div', null, "Les dispositions d'information des personnes concernant le traitement de leurs données sont prévues et appliquent les principes de concision, de transparence, d'intelligibilité et d'accessibilité."),
          h('div', null, "La collecte et le traitement des données sont justifiés par leur utilité au regard de la finalité du traitement ; les données et fichiers inutiles sont supprimés."),
          h('div', null, "Les données sont sécurisées en croisant différents moyens correctement dimensionnés au regard des capacités de l'entreprise : infrastructure informatique, outils de protection (antivirus), limitation d'accès aux données par des mesures de protection (mots de passe…)."),
          h('div', null, "- L'accès aux données est règlementé et restreint aux seuls opérateurs ayant un intérêt avéré à les consulter ou traiter."),
          h('div', null, "- La durée de conservation des données est justifiée et limitée."),
          h('div', null, "- Les transferts de données hors de l'UE sont encadrés."),
          h('div', null, "- Le recours à des sous-traitants pour le traitement des données est encadré et contractualisé...")
        ),
        col2_2: h('div', { className:'space-y-2' },
          h('div', null, "- Les données à caractère sensible (santé, opinion politique, conviction religieuse…) sont identifiées et leur degré de criticité est correctement évalué."),
          h('div', null, "- Les traitements porteurs de risques élevés pour les droits et libertés des personnes concernées sont identifiés."),
          h('div', null, "- Le choix de conduire ou non une AIPD est justifié par l'analyse de la nature des données personnelles et de leurs traitements ; il traduit une compréhension et une application correcte du RGPD.")
        )
      },
      {
        id: 'C7', max: '10',
        title: "Définition de procédure de traitement des données personnelles au sein de l'entreprise",

      const handleWheel = (e) => {
        if (step === 2) {
          const newY = rubberBand - e.deltaY * 0.3;
          const clamped = Math.max(-80, Math.min(80, newY));
          setRubberBand(clamped);
          if (wheelTimeout.current) clearTimeout(wheelTimeout.current);
          wheelTimeout.current = setTimeout(() => { setRubberBand(0); }, 150);
        }
      };

      return h('div', { className:'mx-auto shrink-0 transition-all duration-500 relative z-10 w-full h-full flex flex-col bg-white rounded-xl overflow-hidden' },

        h('div', {

    // ─── OralGridTable ────────────────────────────────────────────────
    function OralGridTable({ step, isActionDone, setIsActionDone, crossCount, setCrossCount, total90, setTotal90, total30, setTotal30 }) {
      const thClassOral = "border border-black p-2 text-center align-middle text-[14px] font-bold bg-[#f9fafb]";
      const tdClassOral = "border border-black p-2 text-left align-middle text-[14px]";

      const VALUES = ['--', '-', '+', '++'];
      // Whether the grid is interactive (step 5, not yet done)
      const isInteractive = step === 5 && !isActionDone;

      const handleCellClick = (rowId, colVal) => {
        if (!isInteractive) return;
        setCrossCount(p => {
          const current = p[rowId];
          // If this col is already selected, deselect; otherwise select it
          const next = current === colVal ? undefined : colVal;
          const updated = { ...p };
          if (next === undefined) delete updated[rowId];
          else updated[rowId] = next;
          playSound('click');
          return updated;
        });
      };

      const renderRow = (id, text) => {
        const isSelected = crossCount && crossCount[id];
        const rowDone = isSelected !== undefined && isSelected !== null && isSelected !== '';
        return h('tr', { key: id, className: isInteractive ? 'cursor-pointer' : '' },
          h('td', { className:tdClassOral }, text),
          ...VALUES.map(colVal =>
            h('td', {
              key: colVal,
              className:`${tdClassOral} text-center ${isInteractive ? 'hover:bg-blue-50 transition-colors' : ''} ${isSelected === colVal ? 'bg-blue-100' : ''}`,
              onClick: isInteractive ? () => handleCellClick(id, colVal) : undefined,
              style: isInteractive ? { cursor:'pointer' } : {}
            },
              h('div', { className:'flex justify-center font-bold text-lg' },
                isSelected === colVal ? 'X' : (isInteractive ? h('span', { className:'text-slate-200 text-sm select-none' }, '·') : '')
              )
            )
          )
        );
      };

      let computedTotal90 = 0;
      let counts = { '--': 0, '-': 0, '+': 0, '++': 0 };
      if (crossCount) {
        Object.values(crossCount).forEach((val) => {
          if (val === '++') { counts['++']++; computedTotal90 += 10; }
          if (val === '+') { counts['+']++; computedTotal90 += 7; }
          if (val === '-') { counts['-']++; computedTotal90 += 3; }
          if (val === '--') { counts['--']++; computedTotal90 += 0; }
        });
      }

      return h('div', { className:'mx-auto shrink-0 transition-all duration-500 relative z-10 w-full h-full flex flex-col bg-white rounded-xl overflow-hidden shadow-sm border border-slate-200' },
        // Spotlight overlay — not shown at step 5 (user interacts freely)
        h('div', {
          className:`absolute inset-0 z-30 bg-slate-900/60 ring-1 ring-slate-900/60 transition-all duration-500 pointer-events-none ${step > 5 && step < 9 && step !== 6 ? 'opacity-100' : 'opacity-0'}`
        }),
        // Header
        h('div', { className:'h-20 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0 relative z-20 transition-all duration-500' },

              h('div', { className:'text-xs text-slate-500 font-bold uppercase tracking-wider' }, 'Évaluateur'),
              h('div', { className:'font-bold text-sm text-slate-700' }, 'JEAN DUPONT')
            )
          ),
          h('div', { className:'text-right relative z-10' },
            h('div', { className:'text-xs text-slate-400 font-bold uppercase tracking-wider' }, 'Épreuve'),
            h('div', { className:'font-semibold text-sm text-[#00529A]' }, 'Mise en conformité RGPD - Oral')
          )
        ),
        // Content
        h('div', { className:'flex-1 overflow-auto bg-white relative' },
          h('div', { className:'p-8 relative min-h-full flex flex-col' },
            h('div', { className:'mb-4 relative z-20' },
              h('img', { src:'https://upload.wikimedia.org/wikipedia/fr/thumb/0/03/Logo_CCI_France.svg/1200px-Logo_CCI_France.svg.png', alt:'CCI', className:'h-8 mb-4 opacity-80' }),
              h('h1', { className:'text-[15px] font-bold text-black underline mb-2' }, "Grille d'évaluation de l'épreuve orale")
            ),
            h('div', { className:'mb-4 relative z-20 text-sm' },
              h('p', { className:'font-bold underline mb-2' }, "Pour vous aider à compléter cette grille :"),
              h('table', { className:'w-auto text-sm mb-4 border-none' },
                h('tbody', null,
                  h('tr', null, h('td', { className:'font-bold text-center w-8 border-none' }, '- -'), h('td', { className:'border-none' }, "L'apprenant n'a pas mentionné ce point")),
                  h('tr', null, h('td', { className:'font-bold text-center w-8 border-none' }, '-'), h('td', { className:'border-none' }, "L'apprenant a tenté maladroitement ou insuffisamment d'aborder ce point")),
                  h('tr', null, h('td', { className:'font-bold text-center w-8 border-none' }, '+'), h('td', { className:'border-none' }, "L'apprenant a abordé correctement ce point")),
                  h('tr', null, h('td', { className:'font-bold text-center w-8 border-none' }, '+ +'), h('td', { className:'border-none' }, "L'apprenant a abordé ce point avec la maitrise d'un professionnel"))
                )

            // Oral grid table
            h('table', {

                  h('th', { className:'w-12 text-center border border-black' }, '- -'),
                  h('th', { className:'w-12 text-center border border-black' }, '-'),
                  h('th', { className:'w-12 text-center border border-black' }, '+'),
                  h('th', { className:'w-12 text-center border border-black relative z-40 bg-white' }, '++')
                )
              ),
              h('tbody', null,
                renderRow(1, "1- Se présenter et présenter le contexte de son intervention"),
                renderRow(2, "2- Présenter le contexte et la problématique de l'entreprise"),
                renderRow(3, "3- Exposer le sens et l'importance de la démarche à conduire de manière claire, synthétique et convaincante"),

                renderRow(8, "8- Mettre en œuvre l'approche adaptée dans sa présentation pour obtenir la compréhension et l'adhésion de l'auditoire (approche pédagogique)"),
                renderRow(9, "9- Gérer le temps imparti ; dynamisme de la présentation ; clarté du ou des supports utilisés")
              )
            ),
            // Counts summary
            h('div', { className:`flex justify-end mb-4 relative ${step === 5 ? 'z-40 bg-white ring-2 ring-white' : 'z-20'}` },
              h('table', { className:'w-2/3 border-collapse' },
                h('tbody', null,
                  h('tr', null,
                    h('td', { className:'text-right font-bold w-1/2 p-1' }, "Nombre de croix :"),

                    h('td', { className:'w-12 text-center border border-black font-bold text-lg' }, counts['++'] || '')

                  h('tr', null,
                    h('td', { className:'text-right font-bold p-1' }, "Valeur d'une croix :"),
                    h('td', { className:'text-center border border-black' }, '0'),
                    h('td', { className:'text-center border border-black' }, '3'),
                    h('td', { className:'text-center border border-black' }, '7'),
                    h('td', { className:'text-center border border-black' }, '10')
                  ),
                  h('tr', null,
                    h('td', { className:'text-right font-bold p-1' }, "Total par colonne :"),
                    h('td', { className:'text-center border border-black' }, step === 5 && !isActionDone ? '' : (counts['--'] * 0 || '')),
                    h('td', { className:'text-center border border-black' }, step === 5 && !isActionDone ? '' : (counts['-'] * 3 || '')),
                    h('td', { className:'text-center border border-black' }, step === 5 && !isActionDone ? '' : (counts['+'] * 7 || '')),
                    h('td', { className:'text-center border border-black font-bold text-lg' }, step === 5 && !isActionDone ? '' : (counts['++'] * 10 || ''))

              )
            ),
            // Total

              h('div', { className:`border border-black p-2 w-48 flex flex-col font-bold ${step === 5 || step === 7 ? 'bg-white ring-2 ring-white' : ''}` },
                h('div', { className:'flex justify-between items-center border-b border-gray-300 pb-2 mb-2' },
                  h('span', null, "Total :"),
                  h('div', { className:'flex items-center gap-1' },
                    step >= 5 && !isActionDone && step === 5 && Object.keys(crossCount).filter(k => k !== 'signed').length >= 9
                      ? h('div', { className:'animate-badge-flash bg-white p-1 rounded' },
                          h('input', {
                            type:'text',
                            className:'w-12 border-b-2 border-blue-500 text-center font-bold text-lg outline-none bg-blue-50',
                            value: total90,
                            autoFocus: true,
                            onChange: (e) => {
                              const v = e.target.value;
                              setTotal90(v);
                              if (v !== '' && parseInt(v) === computedTotal90) {
                                setIsActionDone(true);
                                playSound('done');
                              }
                            }
                          }),
                          h('span', { className:'text-lg' }, ' /90')
                        )
                      : h('span', { className:'text-lg text-blue-800' },
                          (step > 5 || isActionDone ? (total90 || computedTotal90) : (computedTotal90 > 0 ? computedTotal90 : '')),
                          (step > 5 || isActionDone || computedTotal90 > 0) ? ' /90' : ''
                        )
                  )
                ),
                h('div', { className:'flex items-center justify-between' },
                  h('span', { className:'text-sm font-normal text-slate-500' }, "Note /30 :"),

                      ? h('div', { className:'animate-badge-flash bg-white p-1 rounded' },

                            type:'text',
                            className:'w-12 border-b-2 border-blue-500 text-center font-bold text-lg outline-none bg-blue-50',

                            onChange: (e) => {

                                setIsActionDone(true);
                                playSound('done');
                              }

                          })

                      : h('span', { className:'text-lg text-blue-800' },

            h('table', {
              id:'oral-signature',
              className:`h-32 mt-auto w-full relative ${step === 8 ? 'z-40 bg-white ring-2 ring-white' : 'z-20'}`
            },
              h('thead', null,
                h('tr', null,
                  h('th', { className:'text-left align-top w-1/2 border border-black p-2 bg-gray-100' }, "Nom des jurys"),
                  h('th', { className:'text-left align-top w-1/2 border border-black p-2 bg-gray-100' }, "Signatures")
                )
              ),
              h('tbody', null,
                h('tr', null,
                  h('td', { className:'border border-black align-top p-2 h-24' },
                    crossCount && crossCount.signed
                      ? h('div', { className:'text-[#00529A] font-[cursive] text-lg mt-2', style:{fontFamily:'cursive'} }, "M. Jean Dupont")
                      : null
                  ),
                  h('td', { className:'border border-black align-top p-2 h-24 relative overflow-hidden' },
                    crossCount && crossCount.signed
                      ? h('div', { className:'absolute top-2 left-4 text-[#00529A] opacity-80', style:{transform:'rotate(-10deg) scale(1.5)'} },
                          h('svg', { width:100, height:40, viewBox:'0 0 100 40', fill:'none', stroke:'currentColor', strokeWidth:2 },
                            h('path', { d:'M10,20 Q30,5 40,20 T70,20 T90,10', strokeLinecap:'round', strokeLinejoin:'round' }),
                            h('path', { d:'M45,25 Q55,40 65,25', strokeLinecap:'round', strokeLinejoin:'round' })
                          )
                        )
                      : null
                  )
                )
              )
            )
          )
        )
      );
    }

    // ─── App ──────────────────────────────────────────────────────────
    const TOTAL = 10;

    function App() {
      const [step, setStep] = useState(0);
      const [isActionDone, setIsActionDone] = useState(false);
      const [c8Error, setC8Error] = useState(false);
      const [scores, setScores] = useState({ C1:'', C4:'', C5:'', C7:'', C8:'', C9:'', CT:'' });
      const [oralCrossCount, setOralCrossCount] = useState({});
      const [oralTotal90, setOralTotal90] = useState('');
      const [oralTotal30, setOralTotal30] = useState('');
      const [step6Error1, setStep6Error1] = useState(false);
      const [step6Error2, setStep6Error2] = useState(false);
      const [step9Q1Done, setStep9Q1Done] = useState(false);
      const [step9Q2Done, setStep9Q2Done] = useState(false);
      const [step9ErrorQ1, setStep9ErrorQ1] = useState(false);
      const [step9ErrorQ2, setStep9ErrorQ2] = useState(false);
      const [showSpotlight, setShowSpotlight] = useState(true);
      const { isFullscreen, toggleFullscreen } = useFullscreen();

      const totalScore = Object.values(scores).reduce((acc, val) => acc + (parseInt(val) || 0), 0);

      const advance = () => {
        setStep(p => {
          const next = p + 1;
          playSound(next === 4 ? 'done' : 'advance');
          return next;
        });
        setIsActionDone(false);
      };

      useEffect(() => {
        let targetElId = null;
        if (step === 2) targetElId = 'row-C8';
        if (step === 3) targetElId = 'total-row';
        if (step === 5) targetElId = 'oral-grid';
        if (step === 7) targetElId = 'oral-total';
        if (step === 8) targetElId = 'oral-signature';
        if (targetElId) {
          setTimeout(() => {
            const el = document.getElementById(targetElId);
            if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
          }, 150);
        }
      }, [step]);

      useEffect(() => {
        if (step === 3 && !isActionDone) {
          const delays = [300, 600, 900, 1200, 1500, 1800];
          const updates = [
            { k:'C1', v:'3' }, { k:'C4', v:'3' }, { k:'C5', v:'5' },
            { k:'C7', v:'2' }, { k:'C9', v:'2' }, { k:'CT', v:'0' }
          ];
          updates.forEach((u, i) => {
            setTimeout(() => {
              setScores(p => ({ ...p, [u.k]: u.v }));
              playSound('click');
            }, delays[i]);
          });
          setTimeout(() => {
            setIsActionDone(true);
            playSound('done');
          }, delays[delays.length - 1] + 400);
        }

        if (step === 8 && !isActionDone) {
          setTimeout(() => {
            setOralCrossCount(p => ({ ...p, signed: true }));
            playSound('correct');
            setTimeout(() => {
              setIsActionDone(true);
              playSound('done');
            }, 1000);
          }, 800);
        }
      }, [step, isActionDone]);

      let tutTitle = '', tutBody = '', tutInstruction = null, tutAction = null;

      switch (step) {
        case 0:
          tutTitle = "Contexte de l'évaluation";
          tutBody = "L'évaluation se réalise sous forme de deux épreuves portant sur le même cas d'entreprise :\n\n• Une épreuve écrite\n• Une épreuve orale de présentation du projet et de la démarche définie\n\nLe sujet s'inspire de situations réelles ou fictives correspondant au référentiel métier et secteur d'activité.";
          tutAction = h('button', {
            className:'w-full bg-[#00529A] hover:bg-blue-800 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-blue-900/20 flex items-center justify-center gap-2 mt-6',
            onClick: advance
          }, 'ÉTAPE SUIVANTE ', h(ArrowRight, { className:'w-5 h-5' }));
          break;

        case 1:
          tutTitle = "1. Méthodologie";
          tutBody = "L'étude de cas porte sur un projet de mise en conformité de traitement des données sur un périmètre limité à une activité, une fonction ou un service.\n\nElle évalue :\n• Les connaissances théoriques (obligations, acteurs institutionnels)\n• La capacité d'analyse et de proposition de solutions (diagnostics, actions, conformité)";
          tutAction = h('button', {
            className:'w-full bg-[#00529A] hover:bg-blue-800 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-blue-900/20 flex items-center justify-center gap-2 mt-6',
            onClick: advance
          }, 'PASSER À LA GRILLE ', h(ArrowRight, { className:'w-5 h-5' }));
          break;

        case 2:
          tutTitle = "2. Évaluation de la Documentation (C8)";
          tutBody = "Arrêtons-nous sur le critère : \"Identification de la documentation technique et organisationnelle...\".\n\nLe candidat a très bien réussi cette partie, il n'a fait aucune faute :\n• La documentation obligatoire est conforme et suffisante.\n• Le choix de la documentation non obligatoire est adapté.\nDans la grille à droite (ligne C8), quelle note attribuer pour cette question ?";
          tutInstruction = "Saisissez la note dans la grille pour continuer.";
          if (isActionDone) {
            tutAction = h(OkBox, { title:"Parfait !", body:"Le candidat obtient bien la note maximale (10/10) pour cette partie.", onNext: advance });
          } else {
            tutAction = h('div', { className:'mt-8' },
              c8Error ? h(ErrBox, { text:"Ce n'est pas la note attendue. Le candidat a fait un sans faute !" }) : null,
              h('p', { className:'text-sm text-slate-500 mt-4 font-medium' },
                h(Info, { className:'w-4 h-4 inline-block mr-1' }),
                " Saisissez la note dans la grille pour continuer."
              )
            );
          }
          break;

        case 3:
          tutTitle = "3. Bilan de l'épreuve";
          tutBody = "Le candidat a totalement raté le reste des critères de l'épreuve.\n\nSes autres notes ont été saisies automatiquement dans la grille.\nObservez le total mis à jour en bas de la grille.";
          if (isActionDone) {
            tutAction = h(OkBox, { title:"Total = 25/70", body:"Le total reflète bien sa contre-performance sur le reste de l'épreuve.", onNext: advance });
          } else {
            tutAction = h('div', { className:'mt-8 p-6 bg-blue-50 border border-blue-200 rounded-xl animate-slide-up shadow-sm' },
              h('div', { className:'flex items-center gap-3 mb-3' },
                h('div', { className:'bg-[#00529A] text-white p-1.5 rounded-full' }, h(PenTool, { className:'w-4 h-4' })),
                h('span', { className:'text-blue-900 text-[18px] font-black tracking-tight' }, "Saisie en cours...")
              ),
              h('p', { className:'text-blue-800 text-[14px] font-medium leading-relaxed' }, "Les autres notes sont en train d'être complétées...")
            );
          }
          break;

        case 4:
          tutTitle = "Fin de l'épreuve écrite";
          tutBody = "La partie écrite est maintenant terminée. Le candidat a obtenu une note sur 70.\n\nNous allons maintenant passer à l'évaluation de l'épreuve orale, qui est notée sur 30 points.\n\nL'oral est organisé à la suite et à distance de l'épreuve écrite. Entre les deux épreuves, un temps suffisant de préparation doit être prévu pour le candidat, qui lui permettra d'organiser son épreuve orale (support, plan de présentation…).";
          tutAction = h('button', {
            className:'w-full bg-[#00529A] hover:bg-blue-800 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-blue-900/20 flex items-center justify-center gap-2 mt-6',
            onClick: advance
          }, "PASSER À L'ORAL ", h(ArrowRight, { className:'w-5 h-5' }));
          break;

        case 5:
          tutTitle = "4. L'épreuve orale";
          tutBody = "L'oral s'est déroulé à la perfection ! Le candidat a brillamment présenté son projet et a su répondre avec aisance à toutes les questions.\n\nSes compétences méritent la note maximale.\n\nCochez la colonne '++' pour chaque critère dans la grille, puis calculez et saisissez le total sur 90.";
          if (isActionDone) {
            tutAction = h(OkBox, { title:`${oralTotal90}/90`, body:`Le total saisi correspond bien au score calculé.`, onNext: advance });
          } else {
            const checkedCount = Object.keys(oralCrossCount).filter(k => k !== 'signed').length;
            tutAction = h('div', { className:'mt-8 animate-slide-up' },
              h('div', { className:'flex items-center gap-2 mb-3' },
                h('div', { className:`w-5 h-5 rounded-full flex items-center justify-center text-white text-xs font-bold ${checkedCount === 9 ? 'bg-green-500' : 'bg-slate-300'}` }, checkedCount === 9 ? '✓' : checkedCount),
                h('span', { className:`text-sm font-medium ${checkedCount === 9 ? 'text-green-700' : 'text-slate-500'}` },
                  checkedCount < 9 ? `${checkedCount}/9 critères cochés` : 'Tous les critères cochés !'
                )
              ),
              checkedCount === 9
                ? h('p', { className:'text-sm text-slate-500 font-medium' },
                    h(Info, { className:'w-4 h-4 inline-block mr-1' }),
                    " Calculez et saisissez le total sur 90 pour continuer."
                  )
                : h('p', { className:'text-sm text-slate-500 font-medium' },
                    h(Info, { className:'w-4 h-4 inline-block mr-1' }),
                    " Cliquez sur la colonne '++' pour chaque ligne de la grille."
                  )
            );
          }
          break;

        case 6:
          tutTitle = "5. Conversion de la note";
          tutBody = "La grille d'évaluation donne un total sur 90 points (9 critères x 10 points max).\n\nCependant, la note finale de l'épreuve orale doit être ramenée sur 30 points dans le référentiel.\n\nComment effectuer cette conversion ?";
          tutAction = h('div', { className:'mt-6 flex flex-col gap-3' },
            h('button', {
              className:`w-full text-left p-4 rounded-xl border transition-colors ${step6Error1 ? 'border-red-500 bg-red-50' : 'border-slate-200 hover:border-[#00529A] hover:bg-blue-50'}`,
              onClick: () => { playSound('wrong'); setStep6Error1(true); setStep6Error2(false); }
            },
              h('span', { className:'font-bold block text-slate-800 mb-1' }, "Je divise par 2"),
              h('span', { className:'text-sm text-slate-500' }, "90 / 2 = 45")
            ),
            step6Error1 ? h('div', { className:'text-red-600 text-sm font-medium animate-slide-up px-2' }, "Non, la note maximale doit être 30, or 45 > 30.") : null,
            h('button', {
              className:'w-full text-left p-4 rounded-xl border border-slate-200 hover:border-[#00529A] hover:bg-blue-50 transition-colors',
              onClick: () => { playSound('correct'); advance(); }
            },
              h('span', { className:'font-bold block text-slate-800 mb-1' }, "Je divise par 3"),
              h('span', { className:'text-sm text-slate-500' }, "90 / 3 = 30")
            ),
            h('button', {
              className:`w-full text-left p-4 rounded-xl border transition-colors ${step6Error2 ? 'border-red-500 bg-red-50' : 'border-slate-200 hover:border-[#00529A] hover:bg-blue-50'}`,
              onClick: () => { playSound('wrong'); setStep6Error2(true); setStep6Error1(false); }
            },
              h('span', { className:'font-bold block text-slate-800 mb-1' }, "Je retire 60 points"),
              h('span', { className:'text-sm text-slate-500' }, "90 - 60 = 30")
            ),
            step6Error2 ? h('div', { className:'text-red-600 text-sm font-medium animate-slide-up px-2' }, "Non, si le candidat a 60/90 par exemple, il aurait 0/30 avec cette méthode, ce qui n'est pas proportionnel.") : null
          );
          break;

        case 7:
          tutTitle = "6. Saisie de la note finale";
          tutBody = `C'est exact ! Il suffit de diviser le total de la grille par 3 pour obtenir la note sur 30.\n\nSachant que le candidat a obtenu ${oralTotal90}/90, quelle note sur 30 faut-il inscrire ?`;
          if (isActionDone) {
            tutAction = h(OkBox, { title:"Parfait !", body:`Le candidat obtient donc ${oralTotal30}/30 à l'oral.`, onNext: advance });
          } else {
            tutAction = h('div', { className:'mt-8' },
              h('p', { className:'text-sm text-slate-500 mt-4 font-medium' },
                h(Info, { className:'w-4 h-4 inline-block mr-1' }),
                ` Saisissez la note (${oralTotal90}/3) dans la grille pour continuer.`
              )
            );
          }
          break;

        case 8:
          tutTitle = "7. Signature";
          tutBody = "Pour finaliser l'évaluation, le document doit être signé par le ou les membres du jury.\n\nDans notre cas, M. Jean Dupont valide et signe la grille.";
          if (isActionDone) {
            tutAction = h(OkBox, { title:"Dossier complet !", body:"L'évaluation est maintenant totalement terminée.", onNext: advance });
          } else {
            tutAction = h('div', { className:'mt-8 p-6 bg-blue-50 border border-blue-200 rounded-xl animate-slide-up shadow-sm' },
              h('div', { className:'flex items-center gap-3 mb-3' },
                h('div', { className:'bg-[#00529A] text-white p-1.5 rounded-full' }, h(PenTool, { className:'w-4 h-4' })),
                h('span', { className:'text-blue-900 text-[18px] font-black tracking-tight' }, "Signature...")
              )
            );
          }
          break;

        case 9:
          tutTitle = "8. Validation globale";
          tutBody = "L'épreuve est en deux parties portant sur le même cas d'entreprise :\n- Épreuve écrite : notée sur 70 points\n- Épreuve orale : notée sur 30 points\n- Total : 100 points";
          if (!step9Q1Done) {
            tutAction = h('div', { className:'mt-6 flex flex-col gap-3' },
              h('p', { className:'font-bold text-slate-800 mb-2' }, "Les épreuves écrites et orales se compensent-elles ?"),
              h('button', {
                className:'w-full text-left p-4 rounded-xl border border-slate-200 hover:border-[#00529A] hover:bg-blue-50 transition-colors',
                onClick: () => { playSound('correct'); setStep9Q1Done(true); }
              }, h('span', { className:'font-bold block text-slate-800' }, "Oui")),
              h('button', {
                className:`w-full text-left p-4 rounded-xl border transition-colors ${step9ErrorQ1 ? 'border-red-500 bg-red-50' : 'border-slate-200 hover:border-[#00529A] hover:bg-blue-50'}`,
                onClick: () => { playSound('wrong'); setStep9ErrorQ1(true); }
              }, h('span', { className:'font-bold block text-slate-800' }, "Non")),
              step9ErrorQ1 ? h('div', { className:'text-red-600 text-sm font-medium animate-slide-up px-2' }, "C'est incorrect. Les épreuves se compensent bien, comme indiqué.") : null
            );
          } else if (!step9Q2Done) {
            const oral30 = parseInt(oralTotal30) || 0;
            const ecrit25 = totalScore; // already computed (25)
            const total100 = ecrit25 + oral30;
            tutAction = h('div', { className:'mt-6 flex flex-col gap-3 animate-slide-up' },
              h('div', { className:'text-sm text-green-700 bg-green-50 p-3 rounded-lg border border-green-200 mb-2' },
                h('strong', null, "C'est exact !"),
                " L'écrit et l'oral se compensent : le seuil de validation est l'obtention de la moyenne globale, soit 50/100 toutes épreuves confondues."
              ),
              h('p', { className:'font-bold text-slate-800 mb-2' }, `Le candidat a obtenu ${ecrit25}/70 à l'écrit et ${oral30}/30 à l'oral. Valide-t-il sa certification ?`),
              h('button', {
                className:'w-full text-left p-4 rounded-xl border border-slate-200 hover:border-[#00529A] hover:bg-blue-50 transition-colors',
                onClick: () => { playSound('correct'); setStep9Q2Done(true); }
              }, h('span', { className:'font-bold block text-slate-800' }, "Oui")),
              h('button', {
                className:`w-full text-left p-4 rounded-xl border transition-colors ${step9ErrorQ2 ? 'border-red-500 bg-red-50' : 'border-slate-200 hover:border-[#00529A] hover:bg-blue-50'}`,
                onClick: () => { playSound('wrong'); setStep9ErrorQ2(true); }
              }, h('span', { className:'font-bold block text-slate-800' }, "Non")),
              step9ErrorQ2 ? h('div', { className:'text-red-600 text-sm font-medium animate-slide-up px-2' }, `Réessayez. Calculez la somme des deux notes. ${ecrit25} + ${oral30} = ${total100}. Le seuil est 50.`) : null
            );
          } else {
            const oral30 = parseInt(oralTotal30) || 0;
            const total100 = totalScore + oral30;
            tutAction = h('div', { className:'mt-6 animate-slide-up' },
              h(OkBox, { title:"Parfait !", body:`Le candidat valide avec ${total100}/100. Vous avez terminé l'évaluation.`, onNext: advance })
            );
          }
          break;

        case 10:
          tutTitle = "Activité terminée !";
          tutBody = "Vous avez terminé ce module d'évaluation avec succès.";
          tutAction = h('div', { className:'mt-6' },
            h('button', {
              className:'w-full bg-[#00529A] hover:bg-blue-800 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-blue-900/20 flex items-center justify-center gap-2',
              onClick: () => { playSound('advance'); window.location.reload(); }
            }, "RECOMMENCER L'ACTIVITÉ")
          );
          break;
      }

      const displayNum = Math.min(step, TOTAL);

      return h(React.Fragment, null,
        showSpotlight && h(SpotlightIntro, {
          onDismiss: () => setShowSpotlight(false),
          toggleFullscreen
        }),
        h(FullscreenButton, { isFullscreen, toggleFullscreen }),
        h('div', { className:'flex flex-1 h-screen overflow-hidden bg-[#f3f4f6] relative font-sans text-slate-800' },
        // Left panel
        h('div', { className:'w-[320px] bg-white border-r border-slate-200 shadow-xl z-20 flex flex-col shrink-0 relative' },
          step <= 10 ? h('div', { className:'relative transition-colors duration-500 shrink-0 flex flex-col' },
            h('div', { className:'p-6 bg-[#00529A] text-white' },
              h('div', { className:'flex justify-between items-start' },
                h('div', null,
                  h('div', { className:'text-[10px] uppercase tracking-widest opacity-80 mb-1' }, "Tutoriel Évaluateur"),
                  h('h1', { className:'text-[18px] font-bold leading-tight' }, tutTitle)
                ),
                h('div', { key:`num-${step}`, className:'flex items-baseline gap-1 bg-white/10 px-2 py-1 rounded' },
                  h('span', { className:'text-xl font-black tracking-tighter leading-none text-white' }, displayNum),
                  step > 0 && step < 10 ? h('span', { className:'text-xs font-bold text-white/70 leading-none' }, `/${TOTAL}`) : null
                )
              )
            ),
            h('div', { className:'px-6 pt-6 pb-2 transition-colors duration-500' },
              h('div', { key:`text-${step}` },
                h('p', { className:'text-[14px] text-slate-600 leading-relaxed whitespace-pre-line animate-slide-up', style:{animationDelay:'0.08s'} },
                  h(TypewriterText, { text: tutBody })
                ),
                tutInstruction ? h('div', { className:'mt-6 animate-slide-up bg-blue-50 border-2 border-blue-200 p-4 rounded-xl shadow-sm', style:{animationDelay:'0.15s'} },
                  h('div', { className:'text-blue-900 font-bold text-[13px] flex items-start gap-3' },
                    h('span', { className:'leading-relaxed mt-0.5' }, tutInstruction)
                  )
                ) : null
              )
            )
          ) : null,
          h('div', { className:'flex-1 overflow-y-auto px-6 py-4 bg-white min-h-0 flex flex-col custom-scrollbar' },
            h('div', { key:`action-${step}`, className:'animate-slide-up pb-8 w-full' },
              tutAction
            )
          )
        ),
        // Right panel
        h('div', { className:'flex-1 flex flex-col overflow-x-auto overflow-y-auto relative bg-slate-100 custom-scrollbar' },
          // Overlay for blocked steps
          h('div', {
            className:`fixed top-0 bottom-0 z-40 bg-slate-900/60 transition-all duration-500 ${step === 0 || step === 1 || step === 2 || step === 4 ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`,
            style: { left:'320px', right:0 }
          }),
          // Center modal for info steps
          (step === 0 || step === 1 || step === 4) ? h('div', {
            className:'fixed top-0 bottom-0 right-0 z-50 flex items-center justify-center',
            style: { left:'320px' }
          },
            h('div', { className:'bg-white p-8 rounded-xl shadow-2xl flex flex-col items-center max-w-sm text-center border border-slate-200 animate-slide-up' },
              h('div', { className:'w-16 h-16 rounded-full flex items-center justify-center mb-6 text-[#00529A] bg-blue-50 shadow-sm border border-blue-100' },
                h(LayoutGrid, { className:'w-8 h-8' })
              ),
              h('h3', { className:'text-xl font-bold text-slate-900 tracking-tight' }, "La grille d'évaluation"),
              h('p', { className:'text-slate-600 text-sm mt-3 leading-relaxed font-medium' },
                step < 4 ? "Elle s'animera dès que vous arriverez à la partie pratique." :
                step === 4 ? "Nous passons à la grille de l'épreuve orale..." : ""
              )
            )
          ) : null,
          // Main content area
          h('div', { className:`min-h-full flex flex-col p-8 ${step < 10 ? 'justify-center' : ''}` },
            h('div', {
              className:`rounded-xl flex flex-col w-full max-w-[1100px] mx-auto transition-all duration-500 relative
                ${(step === 0 || step === 1 || step === 4) ? 'bg-white opacity-40 grayscale blur-[2px] pointer-events-none overflow-hidden z-30 border border-slate-200 shadow-sm' : ''}
                ${step === 2 || step === 5 || step === 7 || step === 8 ? 'bg-transparent overflow-visible z-50' : ''}
                ${step === 3 || step === 6 || step === 9 || step === 10 ? 'bg-white overflow-hidden z-30 border border-slate-200 shadow-sm' : ''}
                ${step === 2 || step === 3 || step === 5 || step === 6 || step === 7 || step === 8 || step === 9 || step === 10 ? 'scale-[1]' : 'scale-[0.98]'}
              `
            },
              step < 4
                ? h(GridTable, { step, isActionDone, setIsActionDone, scores, setScores, c8Error, setC8Error, totalScore })
                : step < 10
                  ? h(React.Fragment, null,
                      h(OralGridTable, { step, isActionDone, setIsActionDone, crossCount: oralCrossCount, setCrossCount: setOralCrossCount, total90: oralTotal90, setTotal90: setOralTotal90, total30: oralTotal30, setTotal30: setOralTotal30 }),
                      step === 9 && step9Q2Done
                        ? h('div', { className:'fixed inset-0 bg-slate-900/40 z-[100] flex items-start justify-center animate-fade-in overflow-y-auto py-12', style:{paddingLeft:'320px'} },
                            h('div', { className:'bg-white p-8 rounded-2xl shadow-2xl max-w-lg w-full mx-4 border border-slate-200 animate-slide-up' },
                              h('h2', { className:'text-2xl font-black text-slate-900 mb-6 text-center' }, "Bilan de l'évaluation"),
                              h('div', { className:'space-y-4' },
                                h('div', { className:'flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-100' },
                                  h('span', { className:'font-bold text-slate-700' }, "Épreuve écrite"),
                                  h('span', { className:'text-xl font-black text-slate-900' }, `${totalScore} `, h('span', { className:'text-sm font-bold text-slate-500' }, "/ 70"))
                                ),
                                h('div', { className:'flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-100' },
                                  h('span', { className:'font-bold text-slate-700' }, "Épreuve orale"),
                                  h('span', { className:'text-xl font-black text-[#00529A]' }, `${oralTotal30} `, h('span', { className:'text-sm font-bold text-blue-300' }, "/ 30"))
                                ),
                                h('div', { className:'h-px bg-slate-200 w-full my-2' }),
                                h('div', { className:'flex justify-between items-center p-4 bg-blue-50 rounded-xl border-2 border-[#00529A]' },
                                  h('span', { className:'font-black text-blue-900 uppercase tracking-wide' }, "Total Global"),
                                  h('span', { className:'text-2xl font-black text-blue-900' }, `${totalScore + (parseInt(oralTotal30)||0)} `, h('span', { className:'text-base font-bold text-blue-500' }, "/ 100"))
                                )
                              ),
                              h('div', { className:'mt-8 flex justify-center' },
                                h('div', { className:'bg-green-100 text-green-800 px-6 py-3 rounded-full font-bold flex items-center gap-2' },
                                  h(Check, { className:'w-5 h-5' }),
                                  "Candidat Validé"
                                )
                              )
                            )
                          )
                        : null
                    )
                  : h('div', { className:'w-full py-8 px-4 flex justify-center' },
                      h('div', { className:'bg-white p-10 rounded-2xl shadow-xl max-w-2xl w-full border border-slate-200 animate-slide-up text-center relative z-50' },
                        h('div', { className:'w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm border-4 border-white ring-4 ring-green-50' },
                          h(Check, { className:'w-10 h-10' })
                        ),
                        h('h2', { className:'text-3xl font-black text-slate-900 mb-8 tracking-tight' }, "Félicitations !"),
                        h('div', { className:'bg-slate-50 rounded-xl p-8 text-left border border-slate-200' },
                          h('strong', { className:'block mb-6 text-[#00529A] font-black text-[18px] uppercase tracking-wider text-center' }, "Règles à retenir"),
                          h('ul', { className:'list-disc pl-6 space-y-4 font-medium text-slate-700 text-lg marker:text-[#00529A]' },
                            h('li', null, "L'oral est évalué selon une grille allant jusqu'à 90 points."),
                            h('li', null, "Cette note est ensuite divisée par 3 pour obtenir une note sur 30."),
                            h('li', null, "La grille doit impérativement comporter le nom et la signature des membres du jury."),
                            h('li', null, "L'écrit (sur 70) et l'oral (sur 30) se compensent pour former une note sur 100."),
                            h('li', null, "Le seuil de validation est de 50/100, toutes épreuves confondues.")
                          )
                        )
                      )
                    )
            )
          )
        )
      )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(h(App, null));
  })();
  </script>
</body>
