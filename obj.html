<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triage de la chaîne</title>
    <!-- Chargement de Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :fullscreen {
        overflow: hidden;
      }
      /* Animation pour la flèche du spotlight */
      @keyframes bounceX {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(15px); }
      }
      .animate-bounce-x {
        animation: bounceX 1.5s infinite ease-in-out;
      }
      /* Animation d'apparition du calque sombre */
      @keyframes fadeIn {
        from { opacity: 0; backdrop-filter: blur(0px); }
        to { opacity: 1; backdrop-filter: blur(4px); }
      }
      .spotlight-overlay {
        animation: fadeIn 0.5s ease-out forwards;
      }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Import Map -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0"
        }
      }
    </script>

    <!-- Code React -->
    <script type="text/babel" data-type="module">
      import React, { useState, useEffect } from 'react';
      import { createRoot } from 'react-dom/client';
      import { Info, CheckCircle, AlertTriangle, GripVertical, RefreshCw, Maximize2, Minimize2, ArrowRight } from 'lucide-react';

      // --- DONNÉES PÉDAGOGIQUES ---
      const INITIAL_ITEMS = [
        { id: 1, text: "« Vendre 10 % de plus qu'en 2025, d'ici le 31 décembre. »", category: "OBJECTIF", status: "pool" },
        { id: 2, text: "« Ce matin, tu rappelles les trois clients dont la commande est en retard. »", category: "MISSION", status: "pool" },
        { id: 3, text: "« Marc et Julie assurent l'accueil en alternance le lundi matin. »", category: "PLANNING", status: "pool" },
        { id: 4, text: "« Sophie travaille en caisse de 9h à 13h ce samedi. »", category: "PLANNING", status: "pool" },
        { id: 5, text: "« Réduire les réclamations clients de moitié avant juin. »", category: "OBJECTIF", status: "pool" },
        { id: 6, text: "« Cet après-midi, tu présentes le nouveau produit à chaque client qui passe en caisse. »", category: "MISSION", status: "pool" }
      ];

      const ZONES = [
        { id: "OBJECTIF", title: "OBJECTIF", subtitle: "le « quoi »" },
        { id: "MISSION", title: "MISSION", subtitle: "le « comment »" },
        { id: "PLANNING", title: "PLANNING", subtitle: "le « quand » et « qui »" }
      ];

      const getFeedback = (itemId, targetZone) => {
        const item = INITIAL_ITEMS.find(i => i.id === itemId);
        if (item.category === targetZone) return null;

        const specificFeedbacks = {
          1: { MISSION: "C'est un résultat global à atteindre, pas l'action concrète pour y arriver. La mission définirait le 'comment'.", PLANNING: "C'est un but chiffré dans le temps, mais cela n'indique pas qui travaille et quand." },
          2: { OBJECTIF: "C'est une action métier très précise à réaliser, pas un résultat global mesurable visé à la fin du processus.", PLANNING: "Même s'il y a 'Ce matin', c'est avant tout une tâche concrète à accomplir, pas l'organisation des emplois du temps." },
          3: { OBJECTIF: "Aucun résultat de vente ou de performance n'est attendu ici, c'est de l'organisation pure.", MISSION: "On gère la présence et le roulement (qui/quand), mais on ne décrit pas précisément la tâche ou la consigne métier à faire pendant l'accueil." },
          4: { OBJECTIF: "Travailler de telle heure à telle heure n'est pas un but de performance mesurable, c'est de l'allocation de temps.", MISSION: "Cela indique sa présence sur une plage horaire, mais ne détaille pas la tâche spécifique à réaliser en caisse (le 'comment')." },
          5: { MISSION: "C'est le résultat global escompté. La mission correspondrait à l'action pour y parvenir (ex : 'rappeler chaque client mécontent').", PLANNING: "C'est une cible de performance et de qualité, cela ne concerne en rien l'organisation des horaires de l'équipe." },
          6: { OBJECTIF: "C'est le moyen (le 'comment') pour générer des ventes, mais ce n'est pas un résultat chiffré visé.", PLANNING: "Bien qu'on précise 'cet après-midi', c'est la description d'une consigne métier à réaliser, pas la gestion des horaires d'une personne." }
        };
        return specificFeedbacks[itemId][targetZone] || "Ce n'est pas la bonne catégorie. Réfléchissez au rôle de cette phrase.";
      };

      function App() {
        const [items, setItems] = useState(INITIAL_ITEMS);
        const [dragState, setDragState] = useState(null);
        const [selectedItemId, setSelectedItemId] = useState(null);
        const [feedback, setFeedback] = useState(null);
        const [isComplete, setIsComplete] = useState(false);
        const [isFullscreen, setIsFullscreen] = useState(false);
        const [showSpotlight, setShowSpotlight] = useState(true); // Gère le spotlight au lancement

        // --- GESTION DU PLEIN ÉCRAN ---
        useEffect(() => {
          const handleFullscreenChange = () => {
            const isFull = !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
            setIsFullscreen(isFull);
            if (isFull) setShowSpotlight(false); // Si on passe en plein écran (même via la touche F11), on coupe le spotlight
          };
          document.addEventListener('fullscreenchange', handleFullscreenChange);
          document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
          document.addEventListener('MSFullscreenChange', handleFullscreenChange);
          
          return () => {
            document.removeEventListener('fullscreenchange', handleFullscreenChange);
            document.removeEventListener('webkitfullscreenchange', handleFullscreenChange);
            document.removeEventListener('MSFullscreenChange', handleFullscreenChange);
          };
        }, []);

        const toggleFullscreen = () => {
          const elem = document.documentElement;
          const isFull = !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
          
          setShowSpotlight(false); // Désactive le spotlight dans tous les cas

          if (!isFull) {
            if (elem.requestFullscreen) {
              elem.requestFullscreen().catch(err => console.error(err));
            } else if (elem.webkitRequestFullscreen) { /* Safari / anciens navigateurs */
              elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { /* IE/Edge legacy */
              elem.msRequestFullscreen();
            }
          } else {
            if (document.exitFullscreen) {
              document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
              document.webkitExitFullscreen();
            } else if (document.msExitFullscreen) {
              document.msExitFullscreen();
            }
          }
        };

        // --- GESTION DE LA COMPLÉTION ---
        useEffect(() => {
          const allPlaced = items.every(item => item.status === item.category);
          if (allPlaced && items.length > 0) {
            setIsComplete(true);
            setFeedback({ type: 'success', text: "Parfait ! Vous avez reconstitué la chaîne complète. La distinction entre le quoi, le comment et le quand est acquise." });
          }
        }, [items]);

        // --- LOGIQUE DE DÉPLACEMENT ---
        const handleMove = (itemId, targetZone) => {
          const item = items.find(i => i.id === itemId);
          if (!item) return;

          if (item.category === targetZone) {
            setItems(prev => prev.map(i => i.id === itemId ? { ...i, status: targetZone } : i));
            setFeedback(null);
          } else {
            const errorText = getFeedback(itemId, targetZone);
            setFeedback({ type: 'error', text: errorText });
          }
          setDragState(null);
          setSelectedItemId(null);
        };

        useEffect(() => {
          if (!dragState) return;

          const handlePointerMove = (e) => {
            const dx = e.clientX - dragState.startX;
            const dy = e.clientY - dragState.startY;
            if (!dragState.isDragging && Math.sqrt(dx * dx + dy * dy) > 5) {
              setDragState(prev => ({ ...prev, isDragging: true, x: e.clientX - prev.offsetX, y: e.clientY - prev.offsetY }));
            } else if (dragState.isDragging) {
              setDragState(prev => ({ ...prev, x: e.clientX - prev.offsetX, y: e.clientY - prev.offsetY }));
            }
          };

          const handlePointerUp = (e) => {
            if (dragState.isDragging) {
              const dropTarget = document.elementFromPoint(e.clientX, e.clientY);
              const zoneElement = dropTarget?.closest('[data-zone-id]');
              if (zoneElement) {
                const zoneId = zoneElement.getAttribute('data-zone-id');
                handleMove(dragState.id, zoneId);
              }
            } else {
              if (items.find(i => i.id === dragState.id).status === 'pool') {
                setFeedback(null);
                setSelectedItemId(dragState.id === selectedItemId ? null : dragState.id);
              }
            }
            setDragState(null);
          };

          window.addEventListener('pointermove', handlePointerMove);
          window.addEventListener('pointerup', handlePointerUp);

          return () => {
            window.removeEventListener('pointermove', handlePointerMove);
            window.removeEventListener('pointerup', handlePointerUp);
          };
        }, [dragState, items, selectedItemId]);

        const handlePointerDown = (e, item) => {
          if (e.button !== undefined && e.button !== 0) return;
          if (item.status !== 'pool') return;

          const rect = e.currentTarget.getBoundingClientRect();
          setDragState({
            id: item.id,
            item: item,
            startX: e.clientX,
            startY: e.clientY,
            offsetX: e.clientX - rect.left,
            offsetY: e.clientY - rect.top,
            x: rect.left,
            y: rect.top,
            width: rect.width,
            height: rect.height,
            isDragging: false
          });
        };

        const handleZoneClick = (zoneId) => {
          if (selectedItemId) {
            handleMove(selectedItemId, zoneId);
          }
        };

        const resetActivity = () => {
          setItems(INITIAL_ITEMS);
          setIsComplete(false);
          setFeedback(null);
          setSelectedItemId(null);
          setDragState(null);
          // Optionnel: setShowSpotlight(true) si on veut forcer le spotlight à chaque reset
        };

        const renderCard = (item) => {
          const isSelected = selectedItemId === item.id;
          const isPlaced = item.status !== 'pool';
          const isBeingDragged = dragState?.id === item.id && dragState.isDragging;

          return (
            <div
              key={item.id}
              onPointerDown={(e) => handlePointerDown(e, item)}
              className={`
                relative p-4 rounded-xl border flex items-start gap-3 transition-all duration-200 select-none touch-none h-full
                ${isPlaced ? 'bg-gray-50 border-gray-200 text-gray-500 cursor-default' : 'bg-white border-gray-200 text-gray-800 cursor-grab active:cursor-grabbing hover:border-[#1a5b82] hover:shadow-md'}
                ${isSelected ? 'ring-2 ring-[#1a5b82] border-[#1a5b82] shadow-lg' : ''}
                ${isBeingDragged ? 'opacity-30 scale-95' : 'scale-100'}
              `}
            >
              {!isPlaced && (
                <div className="mt-1 text-gray-400 shrink-0">
                  <GripVertical size={16} />
                </div>
              )}
              <p className="text-sm font-medium leading-relaxed flex-1 pointer-events-none">
                {item.text}
              </p>
              {isPlaced && (
                <div className="absolute top-2 right-2 text-green-600 shrink-0">
                  <CheckCircle size={16} />
                </div>
              )}
            </div>
          );
        };

        return (
          <div className={`font-sans bg-gray-50 flex flex-col items-center overflow-x-hidden ${isFullscreen ? 'fixed inset-0 z-[200] overflow-y-auto p-4 sm:p-10' : 'min-h-screen p-2 sm:p-4 justify-center'}`}>
            
            {/* OVERLAY SPOTLIGHT ONBOARDING */}
            {showSpotlight && (
              <div className="fixed inset-0 z-[100] bg-slate-900/80 spotlight-overlay flex flex-col">
                <div className="flex-1" onClick={() => setShowSpotlight(false)}></div>
                <div className="pb-10 flex justify-center">
                  <button 
                    onClick={() => setShowSpotlight(false)} 
                    className="text-white/60 hover:text-white underline decoration-white/40 underline-offset-4 transition-colors px-6 py-2"
                  >
                    Continuer en mode fenêtré
                  </button>
                </div>
              </div>
            )}

            {/* CONTENEUR PRINCIPAL */}
            <div className={`w-full max-w-[98%] 2xl:max-w-[1400px] mx-auto relative transition-all duration-500 flex flex-col ${isFullscreen ? 'flex-1' : 'h-full space-y-6'}`}>
              
              {/* EN-TÊTE */}
              <header className="flex justify-between items-start mb-4">
                <div className="flex-1">
                  <h1 className="text-2xl mb-2 text-[#1a5b82] font-semibold">Triage de la chaîne</h1>
                  <p className="text-gray-600">
                    Faites glisser chaque situation dans la bonne case (ou cliquez sur une carte puis sur une case).
                  </p>
                </div>
                
                {/* ZONE BOUTON PLEIN ÉCRAN (Avec mise en avant si spotlight actif) */}
                <div className={`ml-4 shrink-0 flex items-center gap-4 ${showSpotlight ? 'relative z-[101]' : ''}`}>
                  
                  {/* Flèche et texte d'indication (Visible uniquement si spotlight) */}
                  {showSpotlight && (
                    <div className="hidden sm:flex items-center gap-3 animate-bounce-x">
                      <span className="text-white font-bold text-base md:text-lg bg-blue-600 px-4 py-2 rounded-xl shadow-2xl border border-white/20 whitespace-nowrap">
                        Mettez en plein écran pour commencer !
                      </span>
                      <ArrowRight className="text-white w-6 h-6 shrink-0" strokeWidth={3} />
                    </div>
                  )}

                  {/* Le vrai bouton */}
                  <button 
                    onClick={toggleFullscreen}
                    title={isFullscreen ? "Quitter le plein écran" : "Passer en plein écran"}
                    className={`
                      p-3 rounded-xl transition-all shadow-sm shrink-0 border
                      ${showSpotlight 
                        ? 'bg-white text-blue-600 ring-4 ring-blue-500 ring-offset-4 ring-offset-transparent border-transparent scale-110 hover:bg-blue-50' 
                        : 'bg-white hover:bg-[#1a5b82] hover:text-white text-gray-600 border-gray-200'
                      }
                    `}
                  >
                    {isFullscreen ? <Minimize2 size={24} /> : <Maximize2 size={24} />}
                  </button>
                </div>
              </header>

              {/* MESSAGE SPOTLIGHT MOBILE (Si l'écran est trop petit pour l'affichage à côté du bouton) */}
              {showSpotlight && (
                <div className="sm:hidden relative z-[101] mb-6 flex flex-col items-end animate-bounce-x pr-2">
                  <span className="text-white font-bold text-sm bg-blue-600 px-4 py-2 rounded-xl shadow-2xl border border-white/20 text-right">
                    Mettez en plein écran ↑
                  </span>
                </div>
              )}

              {/* POOL DE CARTES */}
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 mb-6 relative z-10">
                {items.filter(item => item.status === 'pool').map(renderCard)}
              </div>

              {/* ZONES DE DROP */}
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 pt-4 border-t border-gray-200 flex-1 relative z-10">
                {ZONES.map(zone => {
                  const zoneItems = items.filter(item => item.status === zone.id);
                  const isHighlight = selectedItemId !== null;
                  const isDraggingOver = dragState?.isDragging;

                  return (
                    <div 
                      key={zone.id}
                      data-zone-id={zone.id}
                      onClick={() => handleZoneClick(zone.id)}
                      className={`
                        flex flex-col gap-3 rounded-xl p-4 transition-colors duration-200 border-2 min-h-[220px] lg:min-h-[280px] bg-white
                        ${isHighlight ? 'border-dashed border-[#1a5b82]/50 bg-[#1a5b82]/5 cursor-pointer hover:bg-[#1a5b82]/10' : ''}
                        ${!isHighlight && isDraggingOver ? 'border-dashed border-gray-300 hover:border-[#1a5b82] hover:bg-[#1a5b82]/5' : ''}
                        ${!isHighlight && !isDraggingOver ? 'border-dashed border-gray-300' : ''}
                      `}
                    >
                      <div className="mb-2 pointer-events-none">
                        <h2 className="text-sm font-bold tracking-wider text-[#1a5b82]">{zone.title}</h2>
                        <p className="text-xs text-gray-500 italic">{zone.subtitle}</p>
                      </div>
                      
                      <div className="flex-1 flex flex-col gap-3 pointer-events-none">
                        {zoneItems.map(renderCard)}
                        {zoneItems.length === 0 && (
                          <div className="flex-1 flex items-center justify-center text-sm text-gray-400 italic">
                            Glissez ici
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* PANNEAU DE FEEDBACK */}
              {feedback && (
                <div className={`
                  fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-2xl p-4 rounded-xl shadow-2xl flex items-start gap-4 animate-in slide-in-from-bottom-5 fade-in duration-300 z-[150] border
                  ${feedback.type === 'error' ? 'bg-red-50 border-red-200 text-red-900' : 'bg-green-50 border-green-200 text-green-900'}
                `}>
                  <div className="mt-0.5 shrink-0">
                    {feedback.type === 'error' ? <AlertTriangle size={20} className="text-red-500"/> : <CheckCircle size={20} className="text-green-600"/>}
                  </div>
                  <div className="flex-1">
                    <h3 className="font-semibold mb-1 text-sm">
                      {feedback.type === 'error' ? "Analyse de la situation" : "Objectif atteint !"}
                    </h3>
                    <p className="text-sm leading-relaxed opacity-90">{feedback.text}</p>
                  </div>
                </div>
              )}

              {/* BOUTON REJOUER */}
              {isComplete && (
                <div className="flex justify-center pt-8 pb-4 relative z-10">
                  <button 
                    onClick={resetActivity}
                    className="flex items-center gap-2 px-6 py-3 bg-white hover:bg-gray-50 text-[#1a5b82] rounded-lg transition-colors border border-gray-200 shadow-sm font-medium"
                  >
                    <RefreshCw size={18} />
                    Recommencer l'exercice
                  </button>
                </div>
              )}
            </div>

            {/* CALQUE FLOTTANT DU DRAG & DROP */}
            {dragState && dragState.isDragging && (
              <div
                className="fixed z-[250] p-4 rounded-xl border border-[#1a5b82] bg-white text-gray-800 shadow-2xl flex items-start gap-3 pointer-events-none ring-2 ring-[#1a5b82] opacity-95"
                style={{
                  left: dragState.x,
                  top: dragState.y,
                  width: dragState.width,
                  height: dragState.height,
                  margin: 0,
                }}
              >
                <div className="mt-1 text-[#1a5b82] shrink-0">
                  <GripVertical size={16} />
                </div>
                <p className="text-sm font-medium leading-relaxed flex-1">
                  {dragState.item.text}
                </p>
              </div>
            )}

          </div>
        );
      }

      const root = createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
