<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulateur d'Entretien — Les Pains du Moulin</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

  <style>
    body { margin: 0; padding: 0; }
    .app-wrapper { font-family: 'DM Sans', sans-serif; }
    .font-serif { font-family: 'DM Serif Display', serif !important; }
    
    /* Custom Scrollbar */
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
    
    /* Animations */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
    @keyframes deltaFade { 0% { opacity: 0; transform: translateY(6px); } 15% { opacity: 1; transform: translateY(0); } 75% { opacity: 1; } 100% { opacity: 0; transform: translateY(-6px); } }
    @keyframes badgePop { 0% { opacity: 0; transform: scale(0.6) rotate(-8deg); } 70% { transform: scale(1.1) rotate(2deg); } 100% { opacity: 1; transform: scale(1) rotate(0); } }
    @keyframes slideDown { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 120px; } }
    @keyframes pulseRing {
      0% { box-shadow: 0 0 0 0 rgba(28, 25, 23, 0.15); }
      70% { box-shadow: 0 0 0 6px rgba(28, 25, 23, 0); }
      100% { box-shadow: 0 0 0 0 rgba(28, 25, 23, 0); }
    }
    
    .anim-fadeInUp { animation: fadeInUp 0.3s ease both; }
    .anim-fadeIn { animation: fadeIn 0.25s ease both; }
    .anim-scaleIn { animation: scaleIn 0.3s ease both; }
    .anim-delta { animation: deltaFade 3s ease both; }
    .anim-badge { animation: badgePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    .anim-slideDown { animation: slideDown 0.25s ease both; }
    .anim-pulse-ring { animation: pulseRing 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    
    .confidence-bar { transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.6s ease; }

    /* Lucas illustration transition */
    .lucas-illustration {
      transition: opacity 0.4s ease;
    }

    /* Spotlight fullscreen */
    @keyframes spotlightPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(28,25,23,0.4), 0 8px 32px rgba(0,0,0,0.25); transform: scale(1); } 50% { box-shadow: 0 0 0 8px rgba(28,25,23,0.1), 0 8px 32px rgba(0,0,0,0.25); transform: scale(1.05); } }
    @keyframes spotlightArrow { 0%, 100% { opacity: 1; transform: translateY(0); } 50% { opacity: 0.7; transform: translateY(-3px); } }
    @keyframes spotlightFadeIn { from { opacity: 0; transform: translateY(6px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .spotlight-btn { animation: spotlightPulse 2s ease-in-out infinite !important; }
    .spotlight-tooltip { animation: spotlightFadeIn 0.4s 0.5s ease both; }
    .spotlight-arrow { animation: spotlightArrow 1.2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Enums ──────────────────────────────────────────────────────────────────
    const QuestionType = { OUVERTE:"Ouverte", FERMEE:"Fermée", SITUATIONNELLE:"Situationnelle", COMPORTEMENTALE:"Comportementale", INTERDITE:"Interdite", ACTION:"Action" };
    const Intention = { TECHNIQUE:"Approfondir une compétence technique", MOTIVATION:"Explorer la motivation / le projet professionnel", VERIFIER_CV:"Vérifier / clarifier un élément du CV", SOFT_SKILL:"Évaluer un soft skill ou la personnalité", CONCLURE:"Conclure et passer à la rubrique suivante", ACCUEIL:"Gérer l'accueil et le cadre" };
    const Phase = { INTRODUCE:"Introduce", PRACTICE:"Practice", ASSESS:"Assess" };

    // ── SVG Icons ─────────────────────────────────────────────────────────────
    const ChevronRight = ({size=20,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"/></svg>;
    const AlertCircle = ({size=20,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
    const CheckCircle2 = ({size=20,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>;
    const RotateCcw = ({size=20,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.44"/></svg>;
    const Trophy = ({size=20,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>;
    const X = ({size=20,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    const MessageSquare = ({size=20,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
    const PlayIcon = ({size=12,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="none" className={className}><polygon points="5 3 19 12 5 21 5 3"/></svg>;
    const Check = ({size=12,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>;
    const GraduationCap = ({size=16,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>;
    const Briefcase = ({size=16,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>;
    const Heart = ({size=16,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>;
    const SidebarIcon = ({size=20,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="15" y1="3" x2="15" y2="21"/></svg>;
    const AlertTriangle = ({size=14,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
    const Maximize = ({size=20,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>;
    const Minimize = ({size=20,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>;

    // ── Pedagogical constants ────────────────────────────────────────────────
    const TYPE_EXPLANATIONS = {
      [QuestionType.OUVERTE]: "En choisissant une question ouverte, vous invitez le candidat à développer librement. Cela favorise les réponses riches, détaillées et beaucoup plus humaines.",
      [QuestionType.FERMEE]: "En choisissant une question fermée, vous limitez l'espace de réponse. Elle appelle un fait précis ou un 'oui/non', ce qui n'incite pas le candidat à se livrer.",
      [QuestionType.SITUATIONNELLE]: "En choisissant une question situationnelle, vous projetez le candidat dans un cas concret pour évaluer son raisonnement en direct.",
      [QuestionType.COMPORTEMENTALE]: "En choisissant une question comportementale, vous demandez un exemple réel passé pour révéler comment il a effectivement réagi.",
      [QuestionType.INTERDITE]: "Vous avez posé une question interdite. C'est une question discriminatoire et strictement illégale en entretien en France.",
      [QuestionType.ACTION]: "Votre attitude non-verbale ou vos actions posent le cadre de l'entretien."
    };

    const TYPE_COLORS = {
      [QuestionType.OUVERTE]: "bg-blue-100 text-blue-700",
      [QuestionType.FERMEE]: "bg-stone-100 text-stone-600",
      [QuestionType.SITUATIONNELLE]: "bg-violet-100 text-violet-700",
      [QuestionType.COMPORTEMENTALE]: "bg-emerald-100 text-emerald-700",
      [QuestionType.INTERDITE]: "bg-red-100 text-red-700",
      [QuestionType.ACTION]: "bg-stone-700 text-stone-200"
    };

    const INTENTION_LABELS_FR = {
      [Intention.TECHNIQUE]: "Compétences techniques",
      [Intention.MOTIVATION]: "Motivation & projet",
      [Intention.VERIFIER_CV]: "Vérification du CV",
      [Intention.SOFT_SKILL]: "Soft skills",
      [Intention.CONCLURE]: "Conduite de l'entretien",
      [Intention.ACCUEIL]: "Mise en confiance initiale"
    };

    const INTENTION_COLORS_MAP = {
      [Intention.TECHNIQUE]: "#3b82f6",
      [Intention.MOTIVATION]: "#8b5cf6",
      [Intention.VERIFIER_CV]: "#f59e0b",
      [Intention.SOFT_SKILL]: "#10b981",
      [Intention.CONCLURE]: "#94a3b8",
      [Intention.ACCUEIL]: "#64748b"
    };

    const SKIP_REASONS = {
      6: { rubrique: "L'ambition de référent", reason: "Lucas n'a jamais mentionné son envie de devenir référent technique. Ce moment d'approfondissement n'a pas pu s'ouvrir." },
      9: { rubrique: "Roland Feuillas & le four à bois", reason: "Lucas n'a pas mentionné Roland Feuillas ni son four à bois. Cet échange n'a pas pu avoir lieu." },
      17: { rubrique: "Le perfectionnisme", reason: "Lucas n'a pas évoqué son perfectionnisme. Ce moment de tension n'a pas eu lieu." }
    };

    // ── ConfidenceChart ────────────────────────────────────────────────────────
    const ConfidenceChart = ({ history }) => {
      let conf = 3;
      const points = [{ label: 'Début', c: conf, q: 0, delta: 0 }];
      history.forEach((item, i) => {
        conf = Math.max(0, Math.min(5, conf + item.cDelta));
        points.push({ label: item.rubrique, c: conf, q: i + 1, delta: item.cDelta });
      });
      if (points.length < 2) return null;

      const W = 400, H = 80, PX = 24, PY = 10;
      const IW = W - PX * 2, IH = H - PY * 2;
      const n = points.length;
      const toX = (i) => PX + (i / (n - 1)) * IW;
      const toY = (v) => PY + IH - (v / 5) * IH;
      const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${toX(i).toFixed(1)},${toY(p.c).toFixed(1)}`).join(' ');
      const areaPath = `${linePath} L${toX(n-1).toFixed(1)},${(H-PY).toFixed(1)} L${PX},${(H-PY).toFixed(1)} Z`;
      const keyMoments = points.slice(1).map((p, i) => ({ ...p, origIdx: i + 1 }))
        .filter(p => Math.abs(p.delta) >= 2).sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta)).slice(0, 3);

      return (
        <div>
          <svg width="100%" viewBox={`0 0 ${W} ${H}`} className="overflow-visible">
            <defs>
              <linearGradient id="confAreaGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#10b981" stopOpacity="0.18" />
                <stop offset="100%" stopColor="#10b981" stopOpacity="0" />
              </linearGradient>
            </defs>
            {[1,2,3,4,5].map(v => (
              <line key={v} x1={PX} y1={toY(v)} x2={W-PX} y2={toY(v)}
                stroke={v === 3 ? "#d1d5db" : "#f3f4f6"} strokeWidth="1" strokeDasharray={v === 3 ? "4,4" : "3,3"} />
            ))}
            {[0,1,2,3,4,5].map(v => (
              <text key={v} x={PX-6} y={toY(v)+3} fontSize="8" fill="#9ca3af" textAnchor="end">{v}</text>
            ))}
            <path d={areaPath} fill="url(#confAreaGrad)" />
            <path d={linePath} fill="none" stroke="#10b981" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
            {points.map((p, i) => (
              <circle key={i} cx={toX(i)} cy={toY(p.c)} r="3" fill="white" stroke="#10b981" strokeWidth="1.5" />
            ))}
            {keyMoments.map((p, i) => (
              <circle key={i} cx={toX(p.origIdx)} cy={toY(p.c)} r="6"
                fill={p.delta > 0 ? '#10b981' : '#ef4444'} stroke="white" strokeWidth="2" />
            ))}
          </svg>
          {keyMoments.length > 0 && (
            <div className="flex flex-wrap gap-1.5 mt-2">
              {keyMoments.map((p, i) => (
                <div key={i} className={`flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] font-semibold border ${
                  p.delta > 0 ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-rose-50 text-rose-700 border-rose-200'
                }`}>
                  {p.delta > 0 ? '▲' : '▼'} {p.label}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    };

    // ── Utility ────────────────────────────────────────────────────────────────
    const getOpenness = (confidence) => confidence;

    // ── Data ───────────────────────────────────────────────────────────────────
    const ROUNDS = [
      {
        id: 0, rubrique: "Mise en situation initiale",
        onEnter: () => "Vous êtes dans le bureau prévu pour l'entretien. Le téléphone sonne juste au moment où le candidat arrive. Vous décrochez par réflexe. Lucas entre dans la pièce. Il reste debout et attend que vous terminiez.",
        options: [
          { id: "A", text: "Vous lui faites signe de s'asseoir sans le regarder, tout en continuant votre conversation téléphonique.", narrative: true, type: QuestionType.ACTION, intention: Intention.ACCUEIL },
          { id: "B", text: "Vous couvrez le combiné : \"Bonjour, installez-vous je vous prie, j'en ai pour une toute petite minute.\" Vous terminez rapidement.", narrative: true, type: QuestionType.ACTION, intention: Intention.ACCUEIL },
          { id: "C", text: "Vous terminez votre appel en riant fort avec votre interlocuteur. Vous raccrochez enfin.", narrative: true, type: QuestionType.ACTION, intention: Intention.ACCUEIL }
        ],
        responses: {
          A: [{ condition: () => true, text: "…", score: 0, cDelta: -1, feedback: "Lucas s'assoit. Il attend en silence, mal à l'aise, les mains croisées. Ce manque de considération crée d'emblée un déficit de confiance." }],
          B: [{ condition: () => true, text: "Bonjour, pas de problème, merci.", score: 4, cDelta: 1, feedback: "Lucas s'installe sereinement. Vous avez su gérer l'imprévu avec politesse, ce qui le met en confiance." }],
          C: [{ condition: () => true, text: "…", score: 0, cDelta: -1, feedback: "Lucas reste debout, perplexe devant votre attitude très décontractée qui tranche avec l'enjeu du moment pour lui. Il se méfie." }]
        }
      },
      {
        id: 1, rubrique: "L'accueil formel",
        options: [
          { id: "A", text: "Je vous présente mes excuses pour l'attente. Bonjour Lucas.", spoken: true, type: QuestionType.ACTION, intention: Intention.ACCUEIL },
          { id: "B", text: "Veuillez m'excuser, c'était notre fournisseur de farine. Bonjour Lucas, vous avez trouvé nos locaux facilement ?", spoken: true, type: QuestionType.OUVERTE, intention: Intention.ACCUEIL },
          { id: "C", text: "Bonjour Lucas. Bienvenue.", spoken: true, type: QuestionType.ACTION, intention: Intention.ACCUEIL },
          { id: "D", text: "Bon, on va commencer directement, j'ai assez peu de temps ce matin.", spoken: true, type: QuestionType.ACTION, intention: Intention.ACCUEIL }
        ],
        responses: {
          A: [{ condition: () => true, text: "Bonjour, il n'y a pas de souci. Merci de me recevoir.", score: 3, cDelta: 0, feedback: "Des excuses simples et efficaces. Lucas attend la suite. Conseil : Une relance avec une question ouverte aurait permis de lancer la discussion avec plus d'énergie." }],
          B: [{ condition: () => true, text: "Aucun problème, je comprends. Et oui sans problème pour le trajet, j'habite le quartier. Je suis même passé repérer les lieux la semaine dernière pour voir l'emplacement. C'est vraiment bien situé.", score: 4, cDelta: 1, feedback: "L'explication transparente désamorce parfaitement l'attente. De plus, la question ouverte lui permet de révéler d'emblée sa motivation." }],
          C: [{ condition: () => true, text: "Bonjour. Merci.", score: 2, cDelta: 0, feedback: "Lucas répond poliment mais attendait peut-être un petit mot sur l'attente qu'il vient de subir. Il reste sur la réserve." }],
          D: [{ condition: () => true, text: "D'accord, très bien.", score: 1, cDelta: -1, feedback: "Lucas accuse le coup mais reste pro. L'absence d'excuses couplée à la pression du temps que vous annoncez va le rendre beaucoup plus économique dans ses réponses." }]
        }
      },
      {
        id: 2, rubrique: "Présentation du candidat",
        options: [
          { id: "A", text: "Pouvez-vous vous présenter ?", spoken: true, type: QuestionType.OUVERTE, intention: Intention.CONCLURE },
          { id: "B", text: "Parlez-moi de vous.", spoken: true, type: QuestionType.OUVERTE, intention: Intention.CONCLURE },
          { id: "C", text: "Pourquoi vous êtes-vous orienté vers la boulangerie au départ ?", spoken: true, type: QuestionType.OUVERTE, intention: Intention.MOTIVATION },
          { id: "D", text: "Quel âge avez-vous et quelle est votre situation familiale ?", spoken: true, type: QuestionType.INTERDITE, intention: Intention.VERIFIER_CV }
        ],
        responses: {
          A: [
            { condition: (c) => c >= 4, text: "J'ai 28 ans, boulanger de formation. J'ai fait quatre ans chez Martin à Caen, une structure de trois personnes. Le patron est parti à la retraite l'année dernière. Entre-temps j'ai travaillé en free-lance comme traiteur pour rester actif, mais c'est la boulangerie qui me manquait. Votre annonce m'a tout de suite parlé avec le levain naturel et le bio.", score: 4, cDelta: 1, feedback: "Lucas mentionne spontanément le free-lance, signe d'une confiance déjà bien installée." },
            { condition: (c) => c >= 2, text: "J'ai 28 ans, je suis boulanger depuis ma formation. J'ai travaillé quatre ans chez Boulangerie Martin à Caen, une petite structure artisanale. Le patron a fermé pour partir à la retraite. Depuis j'ai fait quelques missions, et là je cherche un poste dans une vraie boulangerie artisanale.", score: 4 },
            { condition: () => true, text: "Je suis boulanger de métier. J'ai travaillé pendant quatre ans chez la Boulangerie Martin à Caen, mais elle a fermé l'année dernière. Du coup, je suis à la recherche d'un nouveau poste aujourd'hui.", score: 4, cDelta: 1, feedback: "Réponse minimale et prudente. Comme il n'est pas encore en confiance, Lucas s'en tient strictement aux faits, mais votre approche ouverte aide à le rassurer." }
          ],
          B: [
            { condition: (c) => c >= 3, text: "Je suis boulanger depuis ma formation. J'ai travaillé quatre ans chez Boulangerie Martin à Caen, une petite structure de trois personnes. Le patron est parti à la retraite et a fermé. Depuis, j'ai fait quelques missions, et là je cherche un poste dans une boulangerie qui partage ces mêmes valeurs.", score: 3, feedback: "La formulation 'parlez-moi de vous' est légèrement plus vague, ce qui produit une réponse un peu moins précise mais très honnête." },

    // ── getLucasImage helper ────────────────────────────────────────────────────
    function getLucasImage(history, confidence) {
      // Avant toute réponse : Lucas debout
      if (history.length === 0) return { src: 'lucas-debout.png', alt: 'Lucas debout, en attente' };
      // Count consecutive negative deltas at the end of history
      let consecutiveNegative = 0;
      for (let i = history.length - 1; i >= 0; i--) {
        if (history[i].cDelta < 0) consecutiveNegative++;
        else break;
      }
      if (consecutiveNegative >= 2) return { src: 'lucas-agace.png', alt: 'Lucas agacé, bras croisés' };
      if (confidence >= 4) return { src: 'lucas-souriant.png', alt: 'Lucas souriant, détendu' };
      return { src: 'lucas-neutre.png', alt: 'Lucas neutre, attentif' };
    }

    // ── App ────────────────────────────────────────────────────────────────────
    function App() {
      const [gameState, setGameState] = useState({
        phase: Phase.INTRODUCE,
        currentRoundIndex: 0,
        confidence: 3,
        history: [],
        totalScore: 0,
        isFinished: false,
        flags: {},
        neverNegative: true,
        skippedRoundIds: [],
        unlockedBadges: [],
        hasReachedMaxConfidence: false,
        hasReachedMinConfidence: false
      });

      const [selectedOptionId, setSelectedOptionId] = useState("");
      const [feedback, setFeedback] = useState(null);
      const [lastDelta, setLastDelta] = useState(null);
      const [pendingRewards, setPendingRewards] = useState([]);
      const [showConcept, setShowConcept] = useState(false);
      const [showIntro, setShowIntro] = useState(true);
      const [isMenuOpen, setIsMenuOpen] = useState(true);
      const [isPlanOpen, setIsPlanOpen] = useState(true);
      const [pendingFollowUp, setPendingFollowUp] = useState(null);
      const [isFullscreen, setIsFullscreen] = useState(false);
      const [showSpotlight, setShowSpotlight] = useState(true);
      const chatEndRef = useRef(null);

      useEffect(() => {
        const t = setTimeout(() => setShowSpotlight(false), 6000);
        return () => clearTimeout(t);
      }, []);

      useEffect(() => {
        if (chatEndRef.current) {
            setTimeout(() => {
                chatEndRef.current.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }, 50);
        }
      }, [gameState.history, feedback, pendingFollowUp, pendingRewards, isMenuOpen]);

      useEffect(() => {
        const handleFullscreenChange = () => {
          setIsFullscreen(!!document.fullscreenElement);
        };
        document.addEventListener('fullscreenchange', handleFullscreenChange);
        return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
      }, []);

      const toggleFullscreen = () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(err => {
            console.log(`Erreur lors du passage en plein écran: ${err.message}`);
          });
        } else {
          if (document.exitFullscreen) {
            document.exitFullscreen();
          }
        }
      };

      const currentRoundData = ROUNDS[gameState.currentRoundIndex];

      const getCandidateResponse = (roundIndex, optionId, state) => {
        const round = ROUNDS[roundIndex];
        const variants = round.responses[optionId];
        if (!variants) return { text: "D'accord.", score: 1, condition: () => true };
        return variants.find(v => v.condition(state.confidence)) || variants[variants.length - 1];
      };

      const handleStart = () => { setShowIntro(false); setShowConcept(true); };
      const handleConceptNext = () => setShowConcept(false);

      const handleSubmit = () => {
        if (!selectedOptionId) return;
        const selectedOption = currentRoundData.options.find(o => o.id === selectedOptionId);
        const variant = getCandidateResponse(gameState.currentRoundIndex, selectedOptionId, gameState);
        const score = variant.score;
        const message = variant.feedback || (score >= 4 ? "Très bonne approche." : score >= 3 ? "C'est bien joué." : score >= 2 ? "Correct, mais on peut faire mieux." : "Cela a fragilisé la relation.");
        const newFlags = { ...gameState.flags };
        if (variant.setFlags) Object.assign(newFlags, variant.setFlags);

        const cDelta = variant.cDelta || 0;
        const prevConf = gameState.confidence;
        const newConf = Math.max(0, Math.min(5, prevConf + cDelta));
        const newNeverNegative = gameState.neverNegative && (cDelta >= 0);

        const newHistoryItem = {
          roundId: currentRoundData.id,
          rubrique: currentRoundData.rubrique,
          candidateResponse: variant.text,
          selectedOption,
          score,
          cDelta,
          recruiterFollowUp: selectedOption.recruiterFollowUp || null
        };

        const newRewardsQueue = [];
        let newlyReachedMax = gameState.hasReachedMaxConfidence;
        let newlyReachedMin = gameState.hasReachedMinConfidence;

        if (newConf >= 4 && prevConf < 4 && newConf !== 5) {
          newRewardsQueue.push({ type: 'confidence', icon: '📈', title: "Confiance en hausse", text: "Vous avez su rassurer Lucas. Il va désormais s'ouvrir davantage et vous donner des réponses plus riches." });
        } else if (newConf === 5 && prevConf < 5) {
          if (!gameState.hasReachedMaxConfidence) {
            newRewardsQueue.push({ type: 'confidence', icon: '🌟', title: "Confiance maximale !", text: "Le climat est idéal. Lucas est dans les meilleures dispositions pour révéler tout son potentiel." });
            newlyReachedMax = true;
          } else {
            newRewardsQueue.push({ type: 'confidence', icon: '🌟', title: "Confiance maximale retrouvée !", text: "Vous avez réussi à dissiper la tension. Lucas est à nouveau pleinement en confiance." });
          }
        } else if (newConf <= 2 && prevConf > 2) {
          if (!gameState.hasReachedMinConfidence) {
             newRewardsQueue.push({ type: 'confidence', icon: '🧊', title: "Méfiance...", text: "Lucas devient très prudent face à votre attitude. Attendez-vous à des réponses de plus en plus courtes." });
             newlyReachedMin = true;
          } else {
             newRewardsQueue.push({ type: 'confidence', icon: '🧊', title: "Tension réapparue...", text: "Lucas se referme à nouveau. Il va falloir le rassurer pour qu'il s'ouvre." });
          }
        }

        const tempNewState = { 
          ...gameState, 
          confidence: newConf, 
          history: [...gameState.history, newHistoryItem], 
          flags: newFlags, 
          neverNegative: newNeverNegative,
          hasReachedMaxConfidence: newlyReachedMax,
          hasReachedMinConfidence: newlyReachedMin
        };

        const newlyUnlockedBadges = [];
        BADGES.forEach(b => {
          if (b.id === 'no_negative') return; 
          if (!gameState.unlockedBadges.includes(b.id) && b.check(tempNewState)) {
            newlyUnlockedBadges.push(b.id);
            newRewardsQueue.push({ type: 'badge', icon: b.icon, title: "Nouveau badge débloqué : " + b.label, text: b.desc });
          }
        });

        setFeedback({ score, message });
        if (cDelta !== 0) { setLastDelta(cDelta); setTimeout(() => setLastDelta(null), 3000); }
        setPendingRewards(newRewardsQueue);

        setGameState(prev => ({
          ...prev,
          totalScore: prev.totalScore + score,
          confidence: newConf,
          history: [...prev.history, newHistoryItem],
          flags: newFlags,
          neverNegative: newNeverNegative,
          unlockedBadges: [...prev.unlockedBadges, ...newlyUnlockedBadges],
          hasReachedMaxConfidence: newlyReachedMax,
          hasReachedMinConfidence: newlyReachedMin
        }));
        
        setIsMenuOpen(false);
      };

      const handleFeedbackContinue = () => {
        setFeedback(null);
        setSelectedOptionId("");
        if (pendingRewards.length > 0) {
          return;
        }
        checkFollowUpOrAdvance();
      };

      const popReward = () => {
        const updatedRewards = pendingRewards.slice(1);
        setPendingRewards(updatedRewards);
        if (updatedRewards.length === 0) {
          checkFollowUpOrAdvance();
        }
      };

      const checkFollowUpOrAdvance = () => {
        const lastItem = gameState.history[gameState.history.length - 1];
        if (lastItem && lastItem.recruiterFollowUp) {
          setPendingFollowUp(lastItem.recruiterFollowUp);
          return;
        }
        advanceRound();
      };

      const dismissFollowUp = () => {
        setPendingFollowUp(null);
        advanceRound();
      };

      const advanceRound = () => {
        setIsMenuOpen(true);
        let nextIndex = gameState.currentRoundIndex + 1;
        const newSkipped = [];
        while (nextIndex < ROUNDS.length) {
          const nextR = ROUNDS[nextIndex];
          const tempState = { ...gameState, currentRoundIndex: nextIndex };
          if (nextR.shouldSkip && nextR.shouldSkip(tempState)) {
            newSkipped.push(nextR.id);
            nextIndex++;
          } else break;
        }
        
        if (nextIndex < ROUNDS.length) {
          setGameState(prev => ({
            ...prev,
            currentRoundIndex: nextIndex,
            skippedRoundIds: [...prev.skippedRoundIds, ...newSkipped]
          }));
        } else {
          setGameState(prev => {
            const finalState = {
              ...prev,
              isFinished: true,
              skippedRoundIds: [...prev.skippedRoundIds, ...newSkipped]
            };
            const finalBadges = [];
            BADGES.forEach(b => {
              if (!finalState.unlockedBadges.includes(b.id) && b.check(finalState)) {
                finalBadges.push(b.id);
              }
            });
            return { ...finalState, unlockedBadges: [...finalState.unlockedBadges, ...finalBadges] };
          });
        }
      };

      const resetGame = () => {
        setGameState({ phase: Phase.INTRODUCE, currentRoundIndex: 0, confidence: 3, history: [], totalScore: 0, isFinished: false, flags: {}, neverNegative: true, skippedRoundIds: [], unlockedBadges: [], hasReachedMaxConfidence: false, hasReachedMinConfidence: false });
        setFeedback(null); setSelectedOptionId(""); setIsMenuOpen(true); setShowIntro(true); setShowConcept(false);
        setPendingFollowUp(null); setPendingRewards([]);
      };

      const getScoreLevel = (score, confidence) => {
        if (score >= 55 && confidence >= 4) return { label: "Entretien maîtrisé", color: "text-emerald-500", analysis: "Vous avez conduit un entretien professionnel et bienveillant. Lucas s'est livré au-delà des questions posées : vous savez qu'il a formé un apprenti, développé une recette intégrée à la gamme, construit un four à pain chez lui pour continuer à expérimenter, et travaillé en autonomie complète les deux dernières années. Vous avez une image fidèle et complète du profil." };
        if (score >= 35) return { label: "Bon niveau, quelques ratés", color: "text-blue-500", analysis: "Vous avez obtenu les informations de base sur Lucas, mais plusieurs éléments importants ne sont pas sortis, ou pas complètement. L'apprenti, le pain aux céréales, le four à bois, la profondeur de son rapport à la fermentation : ces informations existaient dans son profil. Elles ne sont pas toutes apparues parce que certaines questions étaient trop fermées ou inadaptées." };
        return { label: "À consolider", color: "text-rose-500", analysis: "Lucas a répondu à vos questions, mais il ne s'est pas livré. Plusieurs formulations ont fragilisé la relation de confiance nécessaire à un entretien efficace. Vous avez une image partielle et probablement déformée de son profil. Recommencez en portant attention aux moments où Lucas répondait de façon laconique ou défensive." };
      };

      // ── Concept Screen ────────────────────────────────────────────────────
      if (showConcept) return (
        <div className="app-wrapper min-h-screen bg-stone-100 flex items-center justify-center p-6">

          {/* ── Bouton plein écran flottant ── */}
          <div className="fixed top-4 right-4 z-50">
            <button
              onClick={toggleFullscreen}
              className="flex items-center gap-2 px-4 py-2.5 rounded-xl font-semibold text-sm shadow-xl border bg-white text-stone-600 border-stone-200 hover:bg-stone-50 transition-all"
              title={isFullscreen ? "Quitter le plein écran" : "Passer en plein écran"}
            >
              {isFullscreen ? <Minimize size={16}/> : <Maximize size={16}/>}
              {isFullscreen ? "Quitter" : "Plein écran"}
            </button>
          </div>
          <div className="max-w-2xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-stone-200 anim-fadeInUp">
            <div className="bg-stone-900 px-12 pt-12 pb-10 text-white">
              <h1 className="text-3xl font-serif italic mb-3">Comment fonctionne cette activité ?</h1>
            </div>
            <div className="p-12 space-y-5 text-stone-700 leading-relaxed text-sm">
              <p>Lucas n'a pas de réponses fixes. Ce que vous lui dites influence réellement la suite de l'entretien.</p>
              <p>Un indicateur évolue en permanence au fil de vos choix : la <strong className="text-stone-900">confiance</strong> de Lucas envers vous. Elle conditionne directement son envie de s'ouvrir : plus elle est haute, plus il développe, fait des liens, et révèle des éléments absents de son CV.</p>
              <p>Des questions pertinentes et bienveillantes font monter la confiance. Des questions maladroites, fermées ou mal formulées la font baisser, et Lucas répondra alors brièvement, sans approfondir.</p>
              <p>Certaines informations n'apparaîtront que si vous créez les bonnes conditions.</p>
              <p className="font-medium text-stone-900">À la fin, vous verrez ce que vous avez réellement découvert et ce que vous avez manqué. Vous pourrez également débloquer des badges selon votre façon de conduire l'entretien.</p>
              <button onClick={handleConceptNext} className="w-full py-4 mt-2 bg-stone-900 text-white rounded-xl font-medium hover:bg-stone-800 transition-colors flex items-center justify-center gap-2">
                Commencer <ChevronRight size={20} />
              </button>
            </div>
          </div>
        </div>
      );

      // ── Intro Screen ─────────────────────────────────────────────────────
      if (showIntro) return (
        <div className="app-wrapper min-h-screen bg-stone-100 flex items-center justify-center p-6">

          {/* ── Bouton plein écran flottant avec spotlight ── */}
          <div className="fixed top-4 right-4 z-50 flex flex-col items-end gap-2">
            {showSpotlight && (
              <div className="spotlight-tooltip flex items-center gap-2 bg-stone-900 text-white text-xs font-semibold px-4 py-2.5 rounded-xl shadow-2xl whitespace-nowrap">
                <span className="spotlight-arrow">↑</span>
                Meilleure expérience en plein écran
              </div>
            )}
            <button
              onClick={() => { toggleFullscreen(); setShowSpotlight(false); }}
              className={`flex items-center gap-2 px-4 py-2.5 rounded-xl font-semibold text-sm shadow-xl border transition-all ${showSpotlight ? 'bg-stone-900 text-white border-stone-900 spotlight-btn' : 'bg-white text-stone-600 border-stone-200 hover:bg-stone-50'}`}
              title={isFullscreen ? "Quitter le plein écran" : "Passer en plein écran"}
            >
              {isFullscreen ? <Minimize size={16}/> : <Maximize size={16}/>}
              {showSpotlight ? "Plein écran" : (isFullscreen ? "Quitter" : "Plein écran")}
            </button>
          </div>
          <div className="max-w-2xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-stone-200 anim-fadeInUp">
            <div className="bg-stone-900 p-12 text-white">
              <p className="text-stone-400 text-xs uppercase tracking-widest font-medium mb-4">Simulation</p>
              <h1 className="text-4xl font-serif italic mb-3">Simulateur d'Entretien</h1>
              <p className="text-stone-400">Boulangerie Artisanale «&nbsp;Les Pains du Moulin&nbsp;»</p>
            </div>
            <div className="p-12 space-y-8">
              <div className="space-y-4">
                <h2 className="text-lg font-semibold text-stone-800">Votre mission</h2>
                <p className="text-stone-600 leading-relaxed text-sm">
                  Vous êtes chargé(e) du recrutement d'un <strong>Boulanger</strong> pour une structure de 6 personnes spécialisée en pains traditionnels et bio. Le poste est un CDI, avec prise de poste immédiate.
                  <br /><br />
                  <strong>Lucas Moreau</strong>, 28 ans, vient d'entrer dans la pièce. Vous avez 45 minutes pour évaluer son profil.
                </p>
              </div>
              <button onClick={handleStart} className="w-full py-4 bg-stone-900 text-white rounded-xl font-medium hover:bg-stone-800 transition-colors flex items-center justify-center gap-2">
                Commencer la simulation <ChevronRight size={20} />
              </button>
            </div>
          </div>
        </div>
      );

      // ── Finished Screen ──────────────────────────────────────────────────
      if (gameState.isFinished) {
        const level = getScoreLevel(gameState.totalScore, gameState.confidence);
        const earnedBadges = BADGES.filter(b => gameState.unlockedBadges.includes(b.id));
        const missingFlags = [
          !gameState.flags.mentionedWoodOven && "le four à bois personnel",
          !gameState.flags.mentionedFeuillas && "les inspirations théoriques",
          !gameState.flags.mentionedCerealBread && "la capacité d'innovation",
          !gameState.flags.mentionedApprentice && "l'envie de transmettre"
        ].filter(Boolean).slice(0, 3);

        const categoryScores = {};
        gameState.history.forEach(item => {
          const cat = item.selectedOption.intention;
          if (!cat) return;
          if (!categoryScores[cat]) categoryScores[cat] = { score: 0, count: 0 };
          categoryScores[cat].score += item.score;
          categoryScores[cat].count++;
        });

        const skippedWithReasons = gameState.skippedRoundIds.filter(id => SKIP_REASONS[id]);

        return (
          <div className="app-wrapper min-h-screen bg-stone-100 flex items-center justify-center p-4">

          {/* ── Bouton plein écran flottant ── */}
          <div className="fixed top-4 right-4 z-50">
            <button
              onClick={toggleFullscreen}
              className="flex items-center gap-2 px-4 py-2.5 rounded-xl font-semibold text-sm shadow-xl border bg-white text-stone-600 border-stone-200 hover:bg-stone-50 transition-all"
              title={isFullscreen ? "Quitter le plein écran" : "Passer en plein écran"}
            >
              {isFullscreen ? <Minimize size={16}/> : <Maximize size={16}/>}
              {isFullscreen ? "Quitter" : "Plein écran"}
            </button>
          </div>
            <div className="max-w-4xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-stone-200 anim-scaleIn">
              {/* Header */}
              <div className="bg-stone-900 p-10 text-white text-center">
                <div className="text-4xl mb-4">🏆</div>
                <h2 className="text-3xl font-serif italic mb-1">Simulation Terminée</h2>
                <p className="text-stone-400 text-sm">Voici votre bilan de recrutement</p>
              </div>

              {/* Confidence Trajectory */}
              {gameState.history.length >= 2 && (
                <div className="px-8 pt-6 pb-5 border-b border-stone-100 bg-stone-50/50">
                  <p className="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-3">Trajectoire de confiance au fil de l'entretien</p>
                  <ConfidenceChart history={gameState.history} />
                  <p className="text-[10px] text-stone-400 mt-2">Les points colorés marquent les moments de variation forte (±2 ou plus). La ligne pointillée représente le niveau de départ (3/5).</p>
                </div>
              )}

              {/* Two-column */}
              <div className="p-8 grid grid-cols-1 md:grid-cols-2 gap-10">
                <div className="space-y-6">
                  {/* Score card */}
                  <div className="p-7 bg-stone-50 rounded-2xl border border-stone-100">
                    <div className="text-center mb-4">
                      <div className="text-5xl font-serif mb-1">{gameState.totalScore}<span className="text-xl text-stone-400">/{ROUNDS.length * 4}</span></div>
                      <div className={`text-lg font-medium ${level.color} mb-3`}>{level.label}</div>
                      <div className="flex items-center gap-2 justify-center">
                        <span className="text-xs text-stone-500 font-medium">Confiance finale</span>
                        <div className="flex gap-1">
                          {[1,2,3,4,5].map(i => (
                            <div key={i} className={`w-2.5 h-2.5 rounded-full ${i <= gameState.confidence ? 'bg-emerald-500' : 'bg-stone-200'}`} />
                          ))}
                        </div>
                      </div>
                    </div>

                    {/* Category breakdown */}
                    {Object.keys(categoryScores).length > 0 && (
                      <div className="mt-4 pt-4 border-t border-stone-200 space-y-2.5">
                        <p className="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-3">Par dimension évaluée</p>
                        {Object.entries(categoryScores)
                          .sort((a, b) => (b[1].score / b[1].count) - (a[1].score / a[1].count))
                          .map(([cat, data]) => {
                            const pct = Math.round((data.score / (data.count * 4)) * 100);
                            const color = INTENTION_COLORS_MAP[cat] || '#94a3b8';
                            return (
                              <div key={cat}>
                                <div className="flex justify-between items-center mb-1">
                                  <span className="text-[10px] font-semibold text-stone-600">{INTENTION_LABELS_FR[cat] || cat}</span>
                                  <span className="text-[10px] text-stone-400">{data.score}/{data.count * 4} · {pct}%</span>
                                </div>
                                <div className="w-full h-1.5 bg-stone-200 rounded-full overflow-hidden">
                                  <div className="h-full rounded-full transition-all duration-700" style={{ width: `${pct}%`, backgroundColor: color }} />
                                </div>
                              </div>
                            );
                          })}
                      </div>
                    )}
                  </div>

                  {/* Badges */}
                  <div>
                    <p className="text-xs font-bold text-stone-400 uppercase tracking-widest mb-3">Badges</p>
                    <div className="space-y-2">
                      {BADGES.map((badge, i) => {
                        const earned = earnedBadges.includes(badge);
                        return (
                          <div key={badge.id}
                            className={`flex items-start gap-3 p-3 rounded-xl border transition-all ${earned ? 'bg-amber-50 border-amber-200 anim-badge' : 'bg-stone-50 border-stone-100 opacity-50'}`}
                            style={earned ? { animationDelay: `${i * 0.12}s` } : {}}>
                            <span className="text-xl shrink-0">{badge.icon}</span>
                            <div>
                              <p className={`text-sm font-semibold ${earned ? 'text-amber-900' : 'text-stone-500'}`}>{badge.label}</p>
                              <p className="text-xs text-stone-500 mt-0.5">{badge.desc}</p>
                            </div>
                            {earned && <CheckCircle2 size={16} className="text-amber-500 shrink-0 mt-0.5 ml-auto" />}
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* Analysis */}
                  <div className="space-y-3">
                    <p className="text-xs font-bold text-stone-400 uppercase tracking-widest">Analyse</p>
                    <p className="text-stone-600 text-sm leading-relaxed">{level.analysis}</p>
                    {missingFlags.length > 0 && (
                      <div className="mt-3 p-4 bg-amber-50 rounded-xl border border-amber-100">
                        <p className="text-xs font-bold text-amber-800 uppercase mb-1.5">Pistes d'amélioration</p>
                        <p className="text-xs text-amber-700 leading-relaxed">
                          Certains aspects du profil de Lucas n'ont pas été pleinement explorés : {missingFlags.join(", ")}. Recommencez pour tenter de débloquer toutes les informations.
                        </p>
                      </div>
                    )}
                  </div>

                  {/* Skipped rounds */}
                  {skippedWithReasons.length > 0 && (
                    <div className="p-4 bg-stone-50 rounded-xl border border-stone-200">
                      <p className="text-xs font-bold text-stone-500 uppercase tracking-widest mb-2.5">Rubriques non atteintes</p>
                      <div className="space-y-2.5">
                        {skippedWithReasons.map(id => {
                          const info = SKIP_REASONS[id];
                          return (
                            <div key={id} className="flex items-start gap-2">
                              <span className="text-stone-300 mt-0.5 shrink-0">-</span>
                              <div>
                                <p className="text-xs font-semibold text-stone-600">{info.rubrique}</p>
                                <p className="text-[10px] text-stone-400 mt-0.5 leading-relaxed">{info.reason}</p>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  <button onClick={resetGame} className="w-full py-3 border-2 border-stone-900 text-stone-900 rounded-xl font-medium hover:bg-stone-50 transition-colors flex items-center justify-center gap-2 text-sm">

                <div className="space-y-3 overflow-y-auto max-h-[560px] pr-3 custom-scrollbar">

                  {gameState.history.map((item, idx) => (
                    <div key={idx} className="p-3.5 border-b border-stone-100 last:border-0">
                      <div className="flex justify-between items-start mb-1">
                        <span className="text-xs font-bold text-stone-400 uppercase tracking-wider">A{idx + 1}</span>
                        <span className={`text-xs font-bold ${item.score >= 3 ? 'text-emerald-600' : 'text-amber-600'}`}>+{item.score} pts</span>
                      </div>
                      <p className="text-xs text-stone-800 font-medium mb-1">{item.rubrique}</p>
                      <p className="text-xs text-stone-500 italic mb-1">«&nbsp;{item.selectedOption.text}&nbsp;»</p>
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className={`px-1.5 py-0.5 rounded text-[9px] font-bold uppercase tracking-wide ${TYPE_COLORS[item.selectedOption.type] || 'bg-stone-100 text-stone-500'}`}>
                          {item.selectedOption.type === QuestionType.ACTION ? "ACTION / AFFIRMATION" : item.selectedOption.type}
                        </span>
                        {item.cDelta !== 0 && (
                          <span className={`text-xs font-medium ${item.cDelta > 0 ? 'text-emerald-600' : 'text-rose-500'}`}>
                            {item.cDelta > 0 ? `▲ +${item.cDelta}` : `▼ ${item.cDelta}`}
                          </span>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ── Main Game ────────────────────────────────────────────────────────
      const confidencePct = (gameState.confidence / 5) * 100;
      const confColor = gameState.confidence >= 4 ? '#10b981' : gameState.confidence >= 2 ? '#f59e0b' : '#ef4444';
      const lastHistoryItem = gameState.history[gameState.history.length - 1];
      const isAction = lastHistoryItem?.selectedOption?.type === QuestionType.ACTION;

      // ── Determine Lucas illustration ─────────────────────────────────────
      const lucasImg = getLucasImage(gameState.history, gameState.confidence);

      return (
        <div className="app-wrapper h-screen bg-stone-100 flex flex-col relative">
          
          {/* Header */}
          <header className="bg-white border-b border-stone-200 px-6 py-3 flex justify-between items-center sticky top-0 z-40 shrink-0">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 bg-stone-900 rounded-lg flex items-center justify-center text-white font-serif italic text-lg">M</div>
              <div>
                <h1 className="font-semibold text-stone-800 text-sm">Les Pains du Moulin</h1>
                <p className="text-xs text-stone-400 uppercase tracking-widest">Recrutement Boulanger</p>
              </div>
            </div>
            <div className="flex items-center gap-5">
              <div className="relative group cursor-help">
                <div className="flex items-center gap-3 bg-stone-50 border border-stone-100 rounded-xl px-4 py-2">
                  <div>
                    <div className="flex items-center gap-2 mb-1.5">
                      <p className="text-xs text-stone-400 font-semibold uppercase tracking-wider">Confiance de Lucas</p>
                      {lastDelta !== null && (
                        <span className={`text-xs font-bold anim-delta ${lastDelta > 0 ? 'text-emerald-600' : 'text-rose-500'}`}>
                          {lastDelta > 0 ? `+${lastDelta}` : lastDelta}
                        </span>
                      )}
                    </div>
                    <div className="w-40 h-2 bg-stone-200 rounded-full overflow-hidden">
                      <div className="h-full rounded-full confidence-bar" style={{ width: `${confidencePct}%`, backgroundColor: confColor }} />
                    </div>
                  </div>
                  <span className="text-lg font-serif font-bold text-stone-700">{gameState.confidence}<span className="text-stone-300 text-sm">/5</span></span>
                </div>
                <div className="absolute top-full right-0 mt-2 w-56 p-3 bg-stone-900 text-white text-xs rounded-xl shadow-xl opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-20 leading-relaxed">
                  La confiance conditionne directement l'envie de Lucas de s'ouvrir. Plus elle est haute, plus ses réponses seront développées et révélatrices.
                </div>
              </div>
              <div className="text-right hidden sm:block">
                <p className="text-xs text-stone-400 uppercase font-semibold tracking-wider">Étape</p>
                <p className="text-xl font-serif">{gameState.currentRoundIndex + 1}<span className="text-stone-300 text-sm">/{ROUNDS.length}</span></p>
              </div>
              <div className="h-8 w-px bg-stone-200 hidden md:block"></div>
              
              {/* Fullscreen Toggle */}
              <button onClick={toggleFullscreen}
                className={`flex items-center justify-center p-2 rounded-lg transition-colors ${isFullscreen ? 'bg-stone-100 text-stone-800' : 'bg-white text-stone-400 hover:bg-stone-50 hover:text-stone-600'}`}
                title={isFullscreen ? "Quitter le plein écran" : "Plein écran"}>
                {isFullscreen ? <Minimize size={20} /> : <Maximize size={20} />}
              </button>

              <button onClick={() => setIsPlanOpen(!isPlanOpen)}
                className={`hidden md:flex items-center justify-center p-2 rounded-lg transition-colors ${isPlanOpen ? 'bg-stone-100 text-stone-800' : 'bg-white text-stone-400 hover:bg-stone-50 hover:text-stone-600'}`}
                title="Afficher/Masquer le plan">
                <SidebarIcon size={20} />
              </button>
            </div>
          </header>

          <main className="flex-1 flex overflow-hidden">

            {/* ── LEFT SIDEBAR : Illustration de Lucas ── */}
            <aside className="w-72 bg-stone-50 border-r border-stone-200 hidden lg:flex flex-col items-stretch justify-end shrink-0 z-10 overflow-hidden">
              <img
                key={lucasImg.src}
                src={lucasImg.src}
                alt={lucasImg.alt}
                className="w-full h-full object-cover object-top anim-fadeIn"
              />
            </aside>

            {/* Center: Chat */}
            <section className="flex-1 flex flex-col bg-stone-50 relative overflow-hidden">
              <div className="flex-1 overflow-y-auto p-8 space-y-7 custom-scrollbar" style={{ paddingBottom: isMenuOpen ? '380px' : '220px', transition: 'padding-bottom 0.3s ease' }}>
                {/* Context intro */}
                {gameState.history.length === 0 && !feedback && currentRoundData.onEnter && (
                  <div className="space-y-5 anim-fadeInUp">
                    <div className="flex justify-center">
                      <div className="max-w-[90%] bg-stone-100 text-stone-600 px-6 py-4 rounded-2xl border border-stone-200 text-sm italic text-center leading-relaxed">
                        {currentRoundData.onEnter()}
                      </div>
                    </div>
                  </div>
                )}
                
                {/* History */}
                {gameState.history.map((item, idx) => (
                  <div key={idx} className="space-y-5 anim-fadeInUp">
                    <div className="flex justify-end">
                      {item.selectedOption.narrative ? (
                        <div className="max-w-[82%] bg-stone-700/80 text-stone-200 p-4 rounded-2xl rounded-tr-none shadow-sm border border-stone-600">
                          <p className="text-[10px] opacity-50 mb-1.5 font-bold uppercase tracking-wider italic">Action du recruteur</p>
                          <p className="text-sm italic leading-relaxed text-stone-100">{item.selectedOption.text}</p>
                        </div>
                      ) : (
                        <div className="max-w-[82%] bg-stone-900 text-white p-4 rounded-2xl rounded-tr-none shadow-sm">
                          <p className="text-[10px] opacity-40 mb-1.5 font-bold uppercase tracking-wider">Vous</p>
                          <p className="text-sm italic leading-relaxed">{item.selectedOption.text}</p>
                        </div>
                      )}
                    </div>
                    <div className="flex justify-start">
                      <div className="max-w-[82%] bg-white text-stone-800 p-4 rounded-2xl rounded-tl-none shadow-sm border border-stone-200">
                        <p className="text-[10px] text-stone-400 mb-1.5 font-bold uppercase tracking-wider">Lucas Moreau</p>
                        <p className="text-sm leading-relaxed">{item.candidateResponse}</p>
                      </div>
                    </div>
                    {item.recruiterFollowUp && idx < gameState.history.length - 1 && (
                      <div className="flex justify-end">
                        <div className="max-w-[82%] bg-stone-900 text-white p-4 rounded-2xl rounded-tr-none shadow-sm">
                          <p className="text-[10px] opacity-40 mb-1.5 font-bold uppercase tracking-wider">Vous</p>
                          <p className="text-sm italic leading-relaxed">{item.recruiterFollowUp}</p>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
                {gameState.history.length === 0 && !feedback && !currentRoundData.onEnter && (
                  <div className="space-y-5 anim-fadeInUp">
                    <div className="flex justify-start">
                      <div className="max-w-[82%] bg-white text-stone-800 p-5 rounded-2xl rounded-tl-none shadow-md border border-stone-200">
                        <p className="text-[10px] text-stone-400 mb-2 font-bold uppercase tracking-wider">Lucas Moreau</p>
                        <p className="text-base leading-relaxed">Bonjour. Je suis Lucas Moreau. Merci de me recevoir.</p>
                      </div>
                    </div>
                  </div>
                )}
                {pendingFollowUp && (
                  <div className="flex justify-end anim-fadeInUp">
                    <div className="max-w-[82%] bg-stone-900 text-white p-4 rounded-2xl rounded-tr-none shadow-sm">
                      <p className="text-[10px] opacity-40 mb-1.5 font-bold uppercase tracking-wider">Vous</p>
                      <p className="text-sm italic leading-relaxed">{pendingFollowUp}</p>
                    </div>
                  </div>
                )}
                {/* Scroll target anchor */}
                <div ref={chatEndRef} className="h-[360px] shrink-0" />
              </div>

              {/* Overlay Modal for Rewards (Level up / Badges) */}
              {pendingRewards.length > 0 && !feedback && (
                <div className="absolute inset-0 z-50 flex items-center justify-center bg-stone-100/80 backdrop-blur-sm anim-fadeIn">
                  <div className="bg-white p-8 rounded-3xl shadow-2xl border border-amber-200 max-w-sm w-full mx-4 text-center anim-scaleIn flex flex-col items-center">
                    <div className="text-6xl mb-4">{pendingRewards[0].icon}</div>
                    <h3 className="text-xl font-bold text-stone-800 mb-3 font-serif">{pendingRewards[0].title}</h3>
                    <p className="text-sm text-stone-600 leading-relaxed mb-6">{pendingRewards[0].text}</p>
                    <button onClick={popReward} className="px-8 py-3.5 bg-stone-900 text-white rounded-full font-semibold hover:bg-stone-800 transition-colors w-full shadow-lg">
                      Continuer
                    </button>
                  </div>
                </div>
              )}

              {/* Controls Overlay */}
              <div className="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-stone-50 via-stone-50/95 to-transparent pointer-events-none z-20">
                <div className="max-w-3xl mx-auto pointer-events-auto">

                  {/* ── Feedback panel ── */}
                  {feedback ? (
                    <div className={`rounded-2xl border shadow-2xl anim-fadeInUp overflow-hidden ${
                      feedback.score === 0 ? 'border-rose-200' : feedback.score >= 4 ? 'border-emerald-200' : 'border-stone-200'
                    }`}>
                      {/* Main row */}
                      <div className={`p-5 flex items-center justify-between gap-5 ${
                        feedback.score === 0 ? 'bg-rose-50 text-rose-800' : feedback.score >= 4 ? 'bg-emerald-50 text-emerald-800' : 'bg-white text-stone-800'
                      }`}>
                        <div className="flex items-center gap-4 min-w-0">
                          {feedback.score === 0
                            ? <AlertCircle size={28} className="text-rose-400 shrink-0" />
                            : <CheckCircle2 size={28} className="text-emerald-500 shrink-0" />
                          }
                          <div className="min-w-0">
                            <p className="font-semibold text-sm leading-snug">{feedback.message}</p>
                            <p className="text-xs opacity-70 mt-1">
                              {isAction ? "Score de l'action :" : "Score accordé :"} +{feedback.score} pts
                            </p>
                          </div>
                        </div>
                        <button onClick={handleFeedbackContinue} className="px-6 py-3 bg-stone-900 text-white rounded-xl font-medium text-sm hover:bg-stone-800 transition-colors shrink-0 shadow-md">
                          Continuer
                        </button>
                      </div>

                      {/* Type label row (Hidden for Actions) */}
                      {lastHistoryItem && !lastHistoryItem.selectedOption.narrative && !isAction && (
                        <div className={`px-5 py-3 border-t flex items-start gap-3 ${
                          lastHistoryItem.selectedOption.type === QuestionType.INTERDITE
                            ? 'bg-red-50 border-red-200'
                            : 'bg-stone-50 border-stone-100'
                        }`}>
                          <span className={`px-2 py-1 rounded text-[9px] font-bold uppercase tracking-wide shrink-0 mt-0.5 ${TYPE_COLORS[lastHistoryItem.selectedOption.type] || 'bg-stone-100 text-stone-600'}`}>
                            {lastHistoryItem.selectedOption.type}
                          </span>
                          <p className="text-xs text-stone-500 leading-relaxed">
                            {TYPE_EXPLANATIONS[lastHistoryItem.selectedOption.type]}
                          </p>
                        </div>
                      )}

                      {/* INTERDITE legal warning */}
                      {lastHistoryItem?.selectedOption.type === QuestionType.INTERDITE && (
                        <div className="px-5 py-4 bg-red-50 border-t border-red-100 flex items-start gap-2.5">
                          <AlertTriangle size={16} className="text-red-500 shrink-0 mt-0.5" />
                          <p className="text-xs text-red-800 leading-relaxed">
                            <strong>Cadre légal :</strong> L'article L1132-1 du Code du travail interdit de fonder une décision de recrutement sur l'âge, la situation de famille ou tout critère non lié aux compétences. Cette question expose l'employeur à des poursuites pour discrimination.
                          </p>
                        </div>
                      )}
                    </div>

                  ) : pendingFollowUp ? (
                    <div className="p-5 rounded-2xl border border-stone-200 bg-white flex items-center justify-between gap-5 shadow-xl anim-fadeInUp">
                      <p className="text-sm text-stone-600 italic">Vous venez de prendre la parole. Lucas attend votre prochaine question.</p>
                      <button onClick={dismissFollowUp} className="px-6 py-3 bg-stone-900 text-white rounded-xl font-medium text-sm hover:bg-stone-800 transition-colors shrink-0 shadow-md">
                        Continuer
                      </button>
                    </div>

                  ) : pendingRewards.length === 0 && isMenuOpen ? (
                    <div className="bg-white rounded-3xl shadow-2xl border border-stone-200 overflow-hidden anim-fadeInUp">
                      <div className="px-5 py-3.5 bg-stone-50 border-b border-stone-100 flex justify-between items-center">
                        <div>
                          <p className="text-[10px] font-bold text-stone-400 uppercase tracking-widest">Rubrique en cours</p>
                          <p className="text-sm font-semibold text-stone-800">{currentRoundData.rubrique}</p>
                        </div>
                        <button onClick={() => setIsMenuOpen(false)} className="p-2 hover:bg-stone-200 rounded-full transition-colors text-stone-400">
                          <X size={18} />
                        </button>
                      </div>
                      <div className="p-4 grid grid-cols-1 gap-2 max-h-[40vh] overflow-y-auto custom-scrollbar bg-stone-50/30">
                        {currentRoundData.options.map((option) => {
                          const isDisabled = option.disabled ? option.disabled(gameState) : false;
                          return (
                            <div key={option.id} className="relative group">
                              <button onClick={() => !isDisabled && setSelectedOptionId(option.id)} disabled={isDisabled}
                                className={`w-full text-left p-4 rounded-2xl border-2 transition-all flex items-start gap-3.5 ${
                                  selectedOptionId === option.id ? 'bg-stone-900 border-stone-900 text-white shadow-lg' :
                                  isDisabled ? 'bg-stone-50 border-stone-100 text-stone-300 cursor-not-allowed' :
                                  'bg-white border-transparent hover:border-stone-300 hover:bg-white shadow-sm'
                                }`}
                              >
                                <span className={`w-6 h-6 rounded-full flex items-center justify-center text-[11px] font-bold shrink-0 mt-0.5 ${
                                  selectedOptionId === option.id ? 'bg-stone-700 text-stone-200' : 'bg-stone-100 text-stone-500'
                                }`}>{option.id}</span>
                                <p className={`text-sm font-medium leading-snug pt-0.5 ${option.narrative ? 'italic' : ''} ${
                                  selectedOptionId === option.id 
                                    ? (option.narrative ? 'text-stone-300' : 'text-white') 
                                    : (option.narrative ? 'text-stone-500' : 'text-stone-800')
                                }`}>{option.text}</p>
                              </button>
                              {/* Disabled tooltip */}
                              {isDisabled && option.disabledReason && (
                                <div className="absolute bottom-full left-4 mb-2 w-72 p-3 bg-stone-800 text-white text-xs rounded-xl shadow-xl opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-30 leading-relaxed">
                                  {option.disabledReason}
                                  <div className="absolute -bottom-1.5 left-4 w-3 h-3 bg-stone-800 rotate-45" />
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                      <div className="px-5 py-4 bg-white border-t border-stone-100 flex justify-end">
                        <button onClick={handleSubmit} disabled={!selectedOptionId}
                          className="px-8 py-3.5 bg-stone-900 text-white rounded-xl font-semibold text-sm hover:bg-stone-800 disabled:opacity-40 disabled:cursor-not-allowed transition-all shadow-lg flex items-center gap-2">
                          {currentRoundData.options.find(o => o.id === selectedOptionId)?.narrative ? "Faire cette action" : "Poser la question"} <ChevronRight size={18} />
                        </button>
                      </div>
                    </div>

                  ) : pendingRewards.length === 0 && !isMenuOpen && (
                    <div className="flex justify-center anim-scaleIn">
                      <button onClick={() => setIsMenuOpen(true)}
                        className="px-8 py-4 bg-stone-900 text-white rounded-full font-bold shadow-2xl hover:bg-stone-800 transition-all flex items-center gap-3 text-sm border-4 border-white">
                        <MessageSquare size={18} /> Agir ou poser une question
                      </button>
                    </div>
                  )}
                </div>
              </div>
            </section>

            {/* Right Sidebar: Plan */}
            {isPlanOpen && (
              <aside className="w-72 bg-white border-l border-stone-200 p-6 overflow-y-auto hidden xl:block shrink-0 custom-scrollbar z-10">
                <div className="space-y-6">
                  <h2 className="text-[10px] font-bold text-stone-400 uppercase tracking-widest">Plan de l'entretien</h2>
                  <div className="space-y-1 relative">
                    <div className="absolute left-[11px] top-3 bottom-3 w-px bg-stone-100" />
                    {SECTIONS.map((section) => {
                      const isCurrent = section.roundIds.includes(gameState.currentRoundIndex);
                      const isPast = Math.max(...section.roundIds) < gameState.currentRoundIndex;
                      const hasPlayed = section.roundIds.some(id => gameState.history.some(h => h.roundId === id));
                      const isCompleted = isPast && hasPlayed;
                      const isSkipped = isPast && !hasPlayed;
                      return (
                        <div key={section.id} className="relative flex items-start gap-3 py-1.5">
                          <div className={`relative z-10 w-6 h-6 rounded-full flex items-center justify-center border-2 shrink-0 transition-all duration-500 ease-out ${
                            isCurrent ? 'bg-stone-900 border-stone-900 text-white anim-pulse-ring scale-110 shadow-sm' :
                            isCompleted ? 'bg-white border-emerald-500 text-emerald-600 scale-100' :
                            isSkipped ? 'bg-stone-50 border-stone-300 text-stone-400 scale-100' :
                            'bg-white border-stone-200 text-stone-300 scale-100'
                          }`}>
                            {isCurrent && <PlayIcon size={10} />}
                            {isCompleted && <Check size={10} />}
                            {!isCurrent && !isCompleted && <div className="w-1.5 h-1.5 rounded-full bg-stone-300 transition-colors" />}
                          </div>
                          <div className={`transition-all duration-500 ease-out leading-snug mt-0.5 ${
                            isCurrent ? 'font-bold text-stone-900 text-sm translate-x-1' : 
                            isCompleted ? 'font-medium text-emerald-700 text-sm translate-x-0' : 
                            isSkipped ? 'font-medium text-stone-400 text-sm line-through decoration-stone-300 translate-x-0' : 
                            'font-medium text-stone-400 text-sm translate-x-0'
                          }`}>{section.title}</div>
                        </div>
                      );
                    })}
                  </div>

                  {/* Badges preview */}
                  <div className="pt-6 border-t border-stone-100">
                    <p className="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-3">Badges à débloquer</p>
                    <div className="space-y-2">
                      {BADGES.map(badge => {
                        const earned = gameState.unlockedBadges.includes(badge.id);
                        return (
                          <div key={badge.id} className={`group cursor-help flex flex-col rounded-xl border transition-all duration-300 ${earned ? 'border-amber-200 bg-amber-50' : 'border-transparent hover:border-stone-200 hover:bg-stone-50'}`}>
                            <div className={`flex items-center gap-3 p-2.5 rounded-xl transition-all ${earned ? '' : 'opacity-60 group-hover:opacity-100'}`}>
                              <span className="text-lg">{badge.icon}</span>
                              <p className={`text-xs font-semibold leading-tight ${earned ? 'text-amber-900' : 'text-stone-600'}`}>{badge.label}</p>
                              {earned && <CheckCircle2 size={14} className="text-amber-500 ml-auto shrink-0" />}
                            </div>
                            <div className="max-h-0 opacity-0 group-hover:max-h-32 group-hover:opacity-100 transition-all duration-300 overflow-hidden">
                              <p className="px-3 pb-3 text-[10px] text-stone-500 leading-relaxed border-t border-stone-100 pt-2 mx-2 mt-1">{badge.desc}</p>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              </aside>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
