<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gérer une situation de handicap au travail</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

  <style>
    body { margin: 0; padding: 0; }
    .app-wrapper { font-family: 'DM Sans', sans-serif; }
    .font-serif { font-family: 'DM Serif Display', serif !important; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
    @keyframes deltaFade { 0% { opacity:0; transform:translateY(6px); } 15% { opacity:1; transform:translateY(0); } 75% { opacity:1; } 100% { opacity:0; transform:translateY(-6px); } }
    @keyframes badgePop { 0% { opacity:0; transform:scale(0.6) rotate(-8deg); } 70% { transform:scale(1.1) rotate(2deg); } 100% { opacity:1; transform:scale(1) rotate(0); } }
    @keyframes pulseRing { 0%{box-shadow:0 0 0 0 rgba(28,25,23,.15);}70%{box-shadow:0 0 0 6px rgba(28,25,23,0);}100%{box-shadow:0 0 0 0 rgba(28,25,23,0);} }
    @keyframes msgSlideIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes newMsgPulse { 0%{box-shadow:0 0 0 0 rgba(16,185,129,.35),0 1px 4px rgba(0,0,0,.08);}50%{box-shadow:0 0 0 6px rgba(16,185,129,.10),0 1px 4px rgba(0,0,0,.08);}100%{box-shadow:0 0 0 0 rgba(16,185,129,0),0 1px 4px rgba(0,0,0,.08);} }
    @keyframes spotlightPulse { 0%,100%{box-shadow:0 0 0 0 rgba(28,25,23,.4),0 8px 32px rgba(0,0,0,.25);transform:scale(1);}50%{box-shadow:0 0 0 8px rgba(28,25,23,.1),0 8px 32px rgba(0,0,0,.25);transform:scale(1.05);} }
    @keyframes spotlightArrow { 0%,100%{opacity:1;transform:translateY(0);}50%{opacity:.7;transform:translateY(-3px);} }
    @keyframes spotlightFadeIn { from{opacity:0;transform:translateY(6px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);} }
    .anim-fadeInUp{animation:fadeInUp .3s ease both;}
    .anim-fadeIn{animation:fadeIn .25s ease both;}
    .anim-scaleIn{animation:scaleIn .3s ease both;}
    .anim-delta{animation:deltaFade 3s ease both;}
    .anim-badge{animation:badgePop .5s cubic-bezier(.34,1.56,.64,1) both;}
    .anim-pulse-ring{animation:pulseRing 2s cubic-bezier(.4,0,.6,1) infinite;}
    .spotlight-btn{animation:spotlightPulse 2s ease-in-out infinite!important;}
    .spotlight-tooltip{animation:spotlightFadeIn .4s .5s ease both;}
    .spotlight-arrow{animation:spotlightArrow 1.2s ease-in-out infinite;}
    .confidence-bar{transition:width .6s cubic-bezier(.34,1.56,.64,1),background-color .6s ease;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Enums ──────────────────────────────────────────────────────────────────
const ChoiceType = {
  BONNE_PRATIQUE:"Bonne pratique",
  PREJUGE:"Préjugé",
  SURPROTECTION:"Surprotection",
  DISCRIMINATION:"Discrimination",
  ACTION:"Action",
  NEUTRE:"Neutre"
};

// ── Icons ──────────────────────────────────────────────────────────────────
const ChevronRight=({size=20,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"/></svg>;
const AlertCircle=({size=20,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
const CheckCircle2=({size=20,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>;
const RotateCcw=({size=20,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.44"/></svg>;
const X=({size=20,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
const MessageSquare=({size=20,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
const PlayIcon=({size=12,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="none" className={className}><polygon points="5 3 19 12 5 21 5 3"/></svg>;
const Check=({size=12,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>;
const AlertTriangle=({size=14,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
const Maximize=({size=20,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>;
const Minimize=({size=20,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>;
const SidebarIcon=({size=20,className=""})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="15" y1="3" x2="15" y2="21"/></svg>;

// ── Type colors ────────────────────────────────────────────────────────────
const TYPE_COLORS = {
  [ChoiceType.BONNE_PRATIQUE]:"bg-emerald-100 text-emerald-700",
  [ChoiceType.PREJUGE]:"bg-amber-100 text-amber-700",
  [ChoiceType.SURPROTECTION]:"bg-violet-100 text-violet-700",
  [ChoiceType.DISCRIMINATION]:"bg-red-100 text-red-700",
  [ChoiceType.ACTION]:"bg-stone-700 text-stone-200",
  [ChoiceType.NEUTRE]:"bg-stone-100 text-stone-600"
};
const TYPE_EXPLANATIONS = {
  [ChoiceType.BONNE_PRATIQUE]:"Cette réponse illustre la posture juste : écouter avant de décider, impliquer la personne, s'appuyer sur les bons interlocuteurs.",
  [ChoiceType.PREJUGE]:"Un préjugé consiste à associer automatiquement un trait (ici la RQTH ou le handicap) à une conclusion non vérifiée. C'est un biais cognitif, pas un jugement conscient.",
  [ChoiceType.SURPROTECTION]:"La surprotection traite la personne comme un objet de soin plutôt que comme un acteur de sa propre situation. Elle peut être aussi limitante que l'indifférence.",
  [ChoiceType.DISCRIMINATION]:"Une discrimination par omission expose l'employeur à des sanctions légales, même si l'intention n'était pas mauvaise.",
  [ChoiceType.ACTION]:"Votre posture et vos décisions non-verbales influencent directement la relation de confiance.",
  [ChoiceType.NEUTRE]:"Cette réaction est neutre - elle ne résout pas la situation mais ne l'aggrave pas non plus."
};

// ── Confidence Chart ────────────────────────────────────────────────────────
const ConfidenceChart = ({ history }) => {
  let conf = 3;
  const points = [{ label:'Début', c:conf, q:0, delta:0 }];
  history.forEach((item,i) => {
    conf = Math.max(0, Math.min(5, conf + item.cDelta));
    points.push({ label:item.rubrique, c:conf, q:i+1, delta:item.cDelta });
  });
  if (points.length < 2) return null;
  const W=400,H=80,PX=24,PY=10,IW=W-PX*2,IH=H-PY*2,n=points.length;
  const toX=(i)=>PX+(i/(n-1))*IW;
  const toY=(v)=>PY+IH-(v/5)*IH;
  const linePath=points.map((p,i)=>`${i===0?'M':'L'}${toX(i).toFixed(1)},${toY(p.c).toFixed(1)}`).join(' ');
  const areaPath=`${linePath} L${toX(n-1).toFixed(1)},${(H-PY).toFixed(1)} L${PX},${(H-PY).toFixed(1)} Z`;
  const keyMoments=points.slice(1).map((p,i)=>({...p,origIdx:i+1})).filter(p=>Math.abs(p.delta)>=2).sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta)).slice(0,3);
  return (
    <div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} className="overflow-visible">
        <defs><linearGradient id="cg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#10b981" stopOpacity=".18"/><stop offset="100%" stopColor="#10b981" stopOpacity="0"/></linearGradient></defs>
        {[1,2,3,4,5].map(v=><line key={v} x1={PX} y1={toY(v)} x2={W-PX} y2={toY(v)} stroke={v===3?"#d1d5db":"#f3f4f6"} strokeWidth="1" strokeDasharray={v===3?"4,4":"3,3"}/>)}
        {[0,1,2,3,4,5].map(v=><text key={v} x={PX-6} y={toY(v)+3} fontSize="8" fill="#9ca3af" textAnchor="end">{v}</text>)}
        <path d={areaPath} fill="url(#cg2)"/>
        <path d={linePath} fill="none" stroke="#10b981" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {points.map((p,i)=><circle key={i} cx={toX(i)} cy={toY(p.c)} r="3" fill="white" stroke="#10b981" strokeWidth="1.5"/>)}
        {keyMoments.map((p,i)=><circle key={i} cx={toX(p.origIdx)} cy={toY(p.c)} r="6" fill={p.delta>0?'#10b981':'#ef4444'} stroke="white" strokeWidth="2"/>)}
      </svg>
      {keyMoments.length>0&&<div className="flex flex-wrap gap-1.5 mt-2">{keyMoments.map((p,i)=><div key={i} className={`flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] font-semibold border ${p.delta>0?'bg-emerald-50 text-emerald-700 border-emerald-200':'bg-rose-50 text-rose-700 border-rose-200'}`}>{p.delta>0?'▲':'▼'} {p.label}</div>)}</div>}
    </div>
  );
};

// ── ROUNDS ─────────────────────────────────────────────────────────────────
// Architecture : 3 chemins distincts A/B/C avec nœuds partagés uniquement à la fin
// path flag : "A" | "B" | "C" - détermine quel sous-arbre afficher
//
// CHEMIN A : rounds 0→1→2→3→4→5→6→7→[FIN_A]   (tous actifs sauf si skipped)
// CHEMIN B : rounds 0→8→9→10→[FIN_B]
// CHEMIN C : rounds 0→11→12→13→[FIN_C]
// Écran de fin : round 14 (commun)

const ROUNDS = [
  // ── ROUND 0 : Annonce de Yasmine - nœud initial commun ────────────────
  {
    id: 0,
    rubrique: "L'annonce de Yasmine",
    path: null,
    onEnter: () => "Ce matin, avant l'ouverture. Yasmine vous attend près du pétrin. Elle prend une grande inspiration et commence à parler.",
    contextBefore: "Yasmine : « Patron, j'ai besoin de vous parler d'une chose. Depuis quelques mois, j'ai des douleurs dans le dos - les lombaires. J'ai vu un médecin. Ce sont des TMS, des troubles musculo-squelettiques. J'ai obtenu une RQTH la semaine dernière. Je ne sais pas exactement ce que cela change pour vous, mais je ne pouvais plus garder ça pour moi. »",
    question: "Que décidez-vous ?",
    options: [
      { id:"A", text:"Rassurer Yasmine et chercher des informations sur la démarche à suivre", type:ChoiceType.BONNE_PRATIQUE, narrative:true,
        fullText:"« Yasmine, vous avez bien fait de m'en parler. Votre place ici n'est pas remise en question. Je vais me renseigner sur la démarche - je ne connais pas bien la RQTH, je vais contacter l'AGEFIPH ou la médecine du travail pour comprendre ce que nous pouvons mettre en place ensemble. »" },
      { id:"B", text:"Lui proposer d'arrêter le fournil et de la mettre uniquement en vente", type:ChoiceType.SURPROTECTION, narrative:true,
        fullText:"« Yasmine, j'entends ce que vous me dites. Pour vous protéger, je vais vous retirer du fournil. Vous serez affectée uniquement à la vente - le comptoir, les clients. Les gestes lourds seront supprimés. »" },
      { id:"C", text:"Lui dire que vous avez besoin de réfléchir avant de vous prononcer", type:ChoiceType.NEUTRE, narrative:true,
        fullText:"« Yasmine, c'est noté. C'est beaucoup d'informations d'un coup. Laissez-moi un peu de temps pour réfléchir à tout cela. Nous en reparlons d'ici une semaine ou deux. »" }
    ],
    responses: {
      A: [{ condition:()=>true, text:"Yasmine relève la tête. Elle hoche la tête, soulagée. Elle ne dit rien d'autre, mais repart travailler avec quelque chose de différent dans la posture.", score:4, cDelta:1, setFlags:{ path:"A" }, feedback:"C'est la posture appropriée. Vous ne prenez aucune décision précipitée - ni en retirant Yasmine d'un poste, ni en ignorant la situation. Vous reconnaissez la RQTH comme une démarche sérieuse et vous cherchez à vous appuyer sur les bons interlocuteurs avant d'agir. L'AGEFIPH accompagne spécifiquement les entreprises de moins de vingt salariés dans ces démarches." }],
      B: [{ condition:()=>true, text:"Yasmine hésite. « D'accord... si vous pensez que c'est mieux. » Elle semble soulagée d'un côté, mais aussi désorientée. Elle ne dit rien d'autre.", score:1, cDelta:-1, setFlags:{ path:"B" }, feedback:"Votre réflexe est protecteur. Mais en décidant seul, sans consulter Yasmine ni passer par la médecine du travail, vous créez deux problèmes : vous modifiez unilatéralement les conditions de son apprentissage, ce qui peut compromettre la validation de ses compétences par le CFA ; et vous postulez que la vente lui convient mieux, sans vérification médicale préalable." }],
      C: [{ condition:()=>true, text:"Yasmine hoche la tête doucement. « D'accord. » Elle repart travailler sans rien ajouter. Elle ne relancera pas - elle ne veut pas déranger.", score:0, cDelta:-1, setFlags:{ path:"C" }, feedback:"Prendre le temps de réfléchir peut sembler prudent. Mais pour Yasmine, qui a eu besoin de courage pour vous parler, ce délai sera presque certainement vécu comme un signal négatif. Dans une petite structure sans service RH, les situations non traitées se dégradent rapidement." }]
    }
  },

  // ══ CHEMIN A ══════════════════════════════════════════════════════════════

  // ROUND 1 : Dr. Fontaine - nœud A2 - type d'aménagement
  {
    id: 1, rubrique: "Le type d'aménagement", path:"A",
    shouldSkip: (state) => state.flags.path !== "A",
    onEnter: () => "Deux jours plus tard. Vous avez contacté la médecine du travail interentreprises.",
    characterIntro: { name:"Dr. Fontaine", role:"Médecin du travail", detail:"Elle a réalisé une visite de poste au fournil et vous présente ses observations.", img:"dr-fontaine.jpg" },
    contextBefore: "Dr. Fontaine : « Monsieur Karim, lors de la visite de poste, j'ai identifié plusieurs contraintes critiques pour Yasmine : le pétrissage manuel sur longue durée, le port des sacs de farine de 25 kilogrammes, et la posture courbée au laminoir. Ce sont précisément les gestes qui aggravent les lombalgies chroniques. Des aménagements simples et finançables existent. Nous pouvons agir sur plusieurs axes. Par lequel souhaitez-vous commencer ? »",
    question: "Par quoi commencer ?",
    options: [
      { id:"A", text:"L'aménagement technique et matériel (équipements adaptés)", type:ChoiceType.NEUTRE, narrative:true,
        fullText:"« Nous commençons par les équipements. Je veux identifier ce que nous pouvons acquérir ou adapter pour réduire les contraintes physiques. »" },
      { id:"B", text:"L'aménagement organisationnel (horaires, répartition des tâches)", type:ChoiceType.BONNE_PRATIQUE, narrative:true,
        fullText:"« Nous commençons par l'organisation. Je vais revoir la répartition des tâches lourdes dans l'équipe et adapter le planning pour que Yasmine ne soit plus seule sur les manutentions. »" },
      { id:"C", text:"Les deux en même temps", type:ChoiceType.BONNE_PRATIQUE, narrative:true,
        fullText:"« Nous traitons les deux simultanément. L'organisation du travail dès maintenant, les équipements en parallèle avec un financement AGEFIPH. »" }
    ],
    responses: {
      A: [{ condition:()=>true, text:"Le Dr. Fontaine acquiesce. « C'est un point de départ. Notez cependant que les mesures organisationnelles - rotation des tâches, pauses structurées - peuvent être mises en place dès demain, sans financement. Les deux leviers combinés donnent généralement les meilleurs résultats. »", score:2, cDelta:0, feedback:"Investir dans des équipements adaptés est une démarche pertinente. Cependant, engager des achats sans avoir préalablement examiné l'organisation du travail peut conduire à des situations où les équipements ne sont pas utilisés faute de temps ou de procédure. L'aménagement organisationnel ne nécessite aucun financement externe et produit des effets immédiats." }],
      B: [{ condition:()=>true, text:"Le Dr. Fontaine hoche la tête. « C'est la bonne priorité. La rotation des tâches et les pauses structurées au laminoir peuvent être effectives dès demain, sans aucun financement, et constituent souvent la mesure la plus tangible au quotidien. »", score:4, cDelta:1, feedback:"L'aménagement organisationnel est le levier le plus rapide et le moins coûteux. En contexte de boulangerie, cela se traduit par : rotation des tâches pour que Yasmine ne soit plus seule sur les manutentions lourdes, ajustement des horaires, réattribution de certains gestes à d'autres membres de l'équipe. Aucun financement externe n'est requis." }],
      C: [{ condition:()=>true, text:"Le Dr. Fontaine approuve. « C'est la démarche la plus complète. Mesures organisationnelles dès demain, dossier AGEFIPH cette semaine. Nous travaillons sur les deux axes en parallèle. »", score:4, cDelta:1, feedback:"C'est la démarche la plus complète. Les quatre types d'aménagement - technique et matériel, organisationnel, accompagnement humain, adaptation de l'environnement de travail - ne s'excluent pas. L'AGEFIPH peut prendre en charge une part significative du coût des équipements adaptés." }]
    }
  },

  // ROUND 2 : Djamel pose des questions (chemin A)
  {
    id: 2, rubrique: "La question de Djamel", path:"A",
    shouldSkip: (state) => state.flags.path !== "A",
    onEnter: () => "Une semaine plus tard. Djamel, votre employé le plus expérimenté, vous interpelle en fin de service.",
    characterIntro: { name:"Djamel", role:"Employé de fournil", detail:"Le plus ancien de l'équipe. Il connaît bien Yasmine et observe les changements dans l'organisation.", img:"djamel.jpg" },
    contextBefore: "Djamel : « Patron, je voulais vous poser une question. Yasmine, depuis quelques jours elle ne porte plus les sacs. Les livraisons non plus. Qu'est-ce qui se passe ? Les autres membres de l'équipe se posent des questions. »",
    question: "Que lui répondez-vous ?",
    options: [
      { id:"A", text:"Répondre de façon neutre sans entrer dans les détails", spoken:true, type:ChoiceType.BONNE_PRATIQUE,
        fullText:"« J'ai adapté l'organisation pour des raisons médicales. C'est confidentiel. Pour l'équipe, ce qui compte, c'est que chacun sache ce qu'il a à faire - c'est précisé dans le planning. »" },
      { id:"B", text:"Être transparent avec lui : lui expliquer que Yasmine a un problème de dos, pour qu'il comprenne et soit solidaire", spoken:true, type:ChoiceType.PREJUGE,
        fullText:"« Elle a un problème de dos, quelque chose de reconnu médicalement. Je lui ai adapté les tâches. Je vous le dis pour que vous compreniez la situation et que vous soyez solidaire avec elle. »" },
      { id:"C", text:"Lui demander de ne pas en parler aux autres", spoken:true, type:ChoiceType.NEUTRE,
        fullText:"« Je vous demande de ne pas en parler aux autres. C'est une affaire entre Yasmine et moi. »" }
    ],
    responses: {
      A: [{ condition:()=>true, text:"Djamel hoche la tête. « D'accord, c'est clair. » Il n'insiste pas et repart vers le fournil.", score:4, cDelta:1, feedback:"C'est la posture appropriée. Vous ne dissimulez rien - vous confirmez qu'une adaptation a eu lieu. Vous ne divulguez aucune information - ni la RQTH, ni le diagnostic, ni aucun élément médical. La RQTH est une information strictement confidentielle qui appartient à Yasmine. Même si elle vous l'a confiée, vous n'êtes pas autorisé à la transmettre sans son accord explicite." }],

// ── Audio ──────────────────────────────────────────────────────────────────
let _audioCtx = null;
const getCtx = () => {
  if(!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
};
const playSound = (type) => {
  try {
    const ctx = getCtx();
    const master = ctx.createGain();
    master.gain.setValueAtTime(0, ctx.currentTime);
    master.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.02);
    master.connect(ctx.destination);

    const note = (freq, start, dur) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g); g.connect(master);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
      g.gain.setValueAtTime(1, ctx.currentTime + start);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur + 0.05);
    };

    if (type === 'success') {
      // Accord majeur montant — mi, sol#, si
      note(330, 0,    0.35);
      note(415, 0.1,  0.30);
      note(494, 0.22, 0.40);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.75);
    } else if (type === 'neutral') {
      // Ton unique, doux
      note(370, 0, 0.30);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.45);
    } else if (type === 'fail') {
      // Deux tons descendants
      note(370, 0,    0.28);
      note(294, 0.18, 0.35);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.60);
    } else if (type === 'badge') {
      // Accord parfait brillant — do, mi, sol, do
      note(523, 0,    0.30);
      note(659, 0.08, 0.28);
      note(784, 0.16, 0.30);
      note(1047,0.26, 0.40);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.80);
    } else if (type === 'conf_up') {
      // Deux notes douces montantes (tierce majeure) — chime léger
      note(440, 0,    0.40);
      note(554, 0.20, 0.45);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.80);
    } else if (type === 'conf_down') {
      // Deux notes douces descendantes — glissement doux
      note(349, 0,    0.40);
      note(277, 0.22, 0.45);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.80);
    } else if (type === 'msg') {
      // Message entrant — bulle très courte et douce
      master.gain.linearRampToValueAtTime(0.07, ctx.currentTime + 0.01);
      note(620, 0, 0.12);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.18);
    } else if (type === 'click') {
      master.gain.linearRampToValueAtTime(0.06, ctx.currentTime + 0.005);
      note(520, 0, 0.08);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.12);
    } else if (type === 'choices') {
      // Apparition des choix — légèrement plus grave, invitation subtile
      master.gain.linearRampToValueAtTime(0.07, ctx.currentTime + 0.01);
      note(440, 0,    0.10);
      note(520, 0.08, 0.12);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.25);
    } else if (type === 'hover') {
      master.gain.linearRampToValueAtTime(0.03, ctx.currentTime + 0.005);
      note(480, 0, 0.07);
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.10);
    }
  } catch(e) {}
};

let _lastHoverOptionId = null;
const playHover = (id) => {
  if (_lastHoverOptionId === id) return;
  _lastHoverOptionId = id;
  playSound('hover');
};

// ── Transition screen ───────────────────────────────────────────────────────
function TransitionScreen({ data, fading }) {
  const [visible, setVisible] = React.useState(false);
  React.useEffect(()=>{
    const t = requestAnimationFrame(()=>setVisible(true));
    return ()=>cancelAnimationFrame(t);
  }, []);
  const ci = data.charIntro;
  return (
    <div className="absolute inset-0 z-40 flex flex-col items-center justify-center bg-stone-900"
      style={{opacity: (visible && !fading) ? 1 : 0, transition:'opacity 0.6s ease', pointerEvents:'none'}}>
      {ci?.img&&<img src={ci.img} alt={ci.name} className="w-24 h-24 rounded-full object-cover object-top border-4 border-stone-600 mb-6 shadow-xl" onError={e=>{e.target.style.display='none';}}/>}
      {ci&&!ci.img&&<div className="w-24 h-24 rounded-full bg-stone-600 flex items-center justify-center text-3xl font-serif font-bold text-white mb-6">{ci.name.charAt(0)}</div>}
      {data.text&&<p className="text-stone-300 text-base italic text-center max-w-md leading-relaxed px-8 mb-4">{data.text}</p>}
      {ci&&(
        <div className="text-center mt-2">
          <p className="text-[10px] font-bold uppercase tracking-widest text-stone-500 mb-1">{ci.role}</p>
          <p className="text-white font-semibold text-lg">{ci.name}</p>
          {ci.detail&&<p className="text-stone-400 text-xs mt-1 max-w-xs mx-auto leading-snug">{ci.detail}</p>}
        </div>
      )}
    </div>
  );
}

function App() {
  const [gameState, setGameState] = useState({
    currentRoundIndex:0, confidence:3, history:[], totalScore:0,
    isFinished:false, flags:{}, noPrejudice:true, skippedRoundIds:[],
    unlockedBadges:[], hasReachedMaxConfidence:false
  });
  const [selectedOptionId, setSelectedOptionId] = useState("");
  const [feedback, setFeedback] = useState(null);
  const [lastDelta, setLastDelta] = useState(null);
  const [pendingRewards, setPendingRewards] = useState([]);
  const [showIntro, setShowIntro] = useState(true);
  const [showConcept, setShowConcept] = useState(false);
  const [gameStarted, setGameStarted] = useState(false);
  const [isMenuOpen, setIsMenuOpen] = useState(false);
  const [isPlanOpen, setIsPlanOpen] = useState(true);
  const [isFullscreen, setIsFullscreen] = useState(false);
  const [showSpotlight, setShowSpotlight] = useState(true);
  const [yasmineImgSrc, setYasmineImgSrc] = useState('yasmine-neutre.png');
  const [visibleMsgs, setVisibleMsgs] = useState(0);
  const [transition, setTransition] = useState(null); // { text, charIntro } | null
  const [transitionFading, setTransitionFading] = useState(false);
  const chatScrollRef = useRef(null);
  const lastMsgRef = useRef(null);
  const scrollRaf = useRef(null);

  const smoothScrollToBottom = React.useCallback((delay=0)=>{
    if(scrollRaf.current) cancelAnimationFrame(scrollRaf.current);
    const run = ()=>{
      scrollRaf.current = requestAnimationFrame(()=>{
        const el = chatScrollRef.current;
        if(!el) return;
        el.scrollTo({top: el.scrollHeight, behavior:'smooth'});
      });
    };
    if(delay) setTimeout(run, delay); else run();
  },[]);

  useEffect(()=>{ const t=setTimeout(()=>setShowSpotlight(false),6000); return()=>clearTimeout(t); },[]);

  // Scroll vers le bas à chaque changement de contenu
  useEffect(()=>{ smoothScrollToBottom(50); },[gameState.history, feedback, visibleMsgs, isMenuOpen]);

  // Stagger pre-round messages then open choices
  useEffect(()=>{
    if(!gameStarted || gameState.isFinished) return;
    const rd = ROUNDS[gameState.currentRoundIndex];
    if(!rd) return;
    const alreadyAnswered = gameState.history.some(h=>h.roundId===rd.id);
    if(alreadyAnswered){ setVisibleMsgs(99); setIsMenuOpen(false); setTransition(null); setTransitionFading(false); return; }
    const msgs = [rd.onEnter, rd.characterIntro, rd.contextBefore].filter(Boolean);
    setVisibleMsgs(0);
    setIsMenuOpen(false);
    const timers = [];
    if(msgs.length===0){
      setTransition(null);
      timers.push(setTimeout(()=>{ setIsMenuOpen(true); playSound('choices'); }, 400));
      return ()=>timers.forEach(clearTimeout);
    }
    // Afficher écran de transition si onEnter ou characterIntro
    const hasTransition = !!(rd.onEnter || rd.characterIntro);
    if(hasTransition){
      setTransitionFading(false);
      setTransition({ text: rd.onEnter ? rd.onEnter() : null, charIntro: rd.characterIntro || null });
      // Après 4s : fondu sortant 700ms, puis messages dans le chat
      timers.push(setTimeout(()=>setTransitionFading(true), 4000));
      timers.push(setTimeout(()=>{
        setTransition(null); setTransitionFading(false);
        const chatMsgs = [rd.onEnter, rd.characterIntro, rd.contextBefore].filter(Boolean);
        chatMsgs.forEach((_,i)=>{ timers.push(setTimeout(()=>{ setVisibleMsgs(i+1); playSound('msg'); }, i*800)); });
        timers.push(setTimeout(()=>{ setIsMenuOpen(true); playSound('choices'); }, (chatMsgs.length-1)*800 + 2000));
      }, 4700));
    } else {
      setTransition(null);
      msgs.forEach((_,i)=>{ timers.push(setTimeout(()=>{ setVisibleMsgs(i+1); playSound('msg'); }, i*800)); });
      timers.push(setTimeout(()=>{ setIsMenuOpen(true); playSound('choices'); }, (msgs.length-1)*800 + 2000));
    }
    return ()=>{ timers.forEach(clearTimeout); };
  },[gameState.currentRoundIndex, gameState.isFinished, gameStarted]);
  useEffect(()=>{ const h=()=>setIsFullscreen(!!document.fullscreenElement); document.addEventListener('fullscreenchange',h); return()=>document.removeEventListener('fullscreenchange',h); },[]);

  const toggleFullscreen=()=>{ if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{}); else document.exitFullscreen(); };

  const currentRoundData = ROUNDS[gameState.currentRoundIndex];

  const getCandidateResponse=(roundIndex,optionId,state)=>{
    const round=ROUNDS[roundIndex];
    const variants=round.responses[optionId];
    if(!variants) return {text:"D'accord.",score:1,cDelta:0};
    return variants.find(v=>v.condition(state.confidence))||variants[variants.length-1];
  };

  const handleStart=()=>{ setShowIntro(false); setShowConcept(true); };
  const handleConceptNext=()=>{ setShowConcept(false); setVisibleMsgs(0); setIsMenuOpen(false); setTransition(null); setTransitionFading(false); setGameStarted(true); };

  const handleSubmit=()=>{
    if(!selectedOptionId) return;
    const selectedOption=currentRoundData.options.find(o=>o.id===selectedOptionId);
    const variant=getCandidateResponse(gameState.currentRoundIndex,selectedOptionId,gameState);
    const score=variant.score;
    const message=variant.feedback||(score>=4?"Très bonne posture.":score>=3?"C'est bien joué.":score>=2?"Correct, mais on peut faire mieux.":"Cette décision fragilise la situation.");
    const newFlags={...gameState.flags};
    if(variant.setFlags) Object.assign(newFlags,variant.setFlags);

    const cDelta=variant.cDelta||0;
    const prevConf=gameState.confidence;
    const newConf=Math.max(0,Math.min(5,prevConf+cDelta));
    const isPrejudice=selectedOption.type===ChoiceType.PREJUGE||selectedOption.type===ChoiceType.DISCRIMINATION;
    const newNoPrejudice=gameState.noPrejudice&&!isPrejudice;

    const newHistoryItem={ roundId:currentRoundData.id, rubrique:currentRoundData.rubrique,
      candidateResponse:variant.text, selectedOption, score, cDelta,
      banner:variant.banner||null,
      preOnEnter: currentRoundData.onEnter ? currentRoundData.onEnter() : null,
      preCharIntro: currentRoundData.characterIntro || null,
      preContextBefore: currentRoundData.contextBefore || null };

    const newHistory=[...gameState.history,newHistoryItem];
    let consNeg=0;
    for(let i=newHistory.length-1;i>=0;i--){ if(newHistory[i].cDelta<0)consNeg++; else break; }
    if(consNeg>=2) setYasmineImgSrc('yasmine-agacee.png');
    else if(newConf>=4) setYasmineImgSrc('yasmine-souriante.png');
    else setYasmineImgSrc('yasmine-neutre.png');

    const newRewardsQueue=[];
    let newlyReachedMax=gameState.hasReachedMaxConfidence;
    if(newConf>=4&&prevConf<4&&newConf!==5) newRewardsQueue.push({type:'confidence',icon:'up',title:"Confiance en progression",text:"Yasmine se sent écoutée. La relation de travail se consolide."});
    else if(newConf===5&&prevConf<5&&!gameState.hasReachedMaxConfidence){ newRewardsQueue.push({type:'confidence',icon:'max',title:"Confiance maximale",text:"La relation professionnelle avec Yasmine est solide. Elle sait qu'elle peut vous faire confiance."}); newlyReachedMax=true; }
    else if(newConf<=2&&prevConf>2) newRewardsQueue.push({type:'confidence',icon:'down',title:"Relation fragilisée",text:"Yasmine se referme. Les étapes suivantes seront plus difficiles à conduire."});

    const tempNewState={...gameState,confidence:newConf,history:newHistory,flags:newFlags,noPrejudice:newNoPrejudice,hasReachedMaxConfidence:newlyReachedMax};
    const newlyUnlockedBadges=[];
    BADGES.forEach(b=>{ if(b.id==='sans_prejuge') return; if(!gameState.unlockedBadges.includes(b.id)&&b.check(tempNewState)){ newlyUnlockedBadges.push(b.id); newRewardsQueue.push({type:'badge',icon:b.icon,title:"Badge débloqué : "+b.label,text:b.desc}); } });

    playSound(score>=4?'success':score>=2?'neutral':'fail');
    setIsMenuOpen(false);
    setSelectedOptionId("");
    setFeedback({score,message,banner:variant.banner||null});
    if(cDelta!==0){ setLastDelta(cDelta); setTimeout(()=>setLastDelta(null),3000); }
    setPendingRewards(newRewardsQueue);
    setGameState(prev=>({...prev,totalScore:prev.totalScore+score,confidence:newConf,history:newHistory,flags:newFlags,noPrejudice:newNoPrejudice,unlockedBadges:[...prev.unlockedBadges,...newlyUnlockedBadges],hasReachedMaxConfidence:newlyReachedMax}));
  };

  const rewardSound=(r)=>r.type==='badge'?'badge':r.icon==='up'||r.icon==='max'?'conf_up':r.icon==='down'?'conf_down':'neutral';
  const handleFeedbackContinue=()=>{
    setFeedback(null);
    if(pendingRewards.length>0){ playSound(rewardSound(pendingRewards[0])); return; }
    advanceRound();
  };
  const popReward=()=>{
    const u=pendingRewards.slice(1);
    if(u.length>0) playSound(rewardSound(u[0]));
    setPendingRewards(u); if(u.length===0) advanceRound();
  };

  const advanceRound=()=>{
    let nextIndex=gameState.currentRoundIndex+1;
    const newSkipped=[];
    while(nextIndex<ROUNDS.length){
      const nextR=ROUNDS[nextIndex];
      const tempState={...gameState,currentRoundIndex:nextIndex};
      if(nextR.shouldSkip&&nextR.shouldSkip(tempState)){ newSkipped.push(nextR.id); nextIndex++; } else break;
    }
    if(nextIndex<ROUNDS.length){
      setGameState(prev=>({...prev,currentRoundIndex:nextIndex,skippedRoundIds:[...prev.skippedRoundIds,...newSkipped]}));
    } else {
      setGameState(prev=>{
        const finalState={...prev,isFinished:true,skippedRoundIds:[...prev.skippedRoundIds,...newSkipped]};
        const finalBadges=[];
        BADGES.forEach(b=>{ if(!finalState.unlockedBadges.includes(b.id)&&b.check(finalState)) finalBadges.push(b.id); });
        return{...finalState,unlockedBadges:[...finalState.unlockedBadges,...finalBadges]};
      });
    }
  };

    setShowIntro(true); setShowConcept(false); setPendingRewards([]);
    setYasmineImgSrc('yasmine-neutre.png');

          <p>Chaque décision a des <strong className="text-stone-900">conséquences réelles et persistantes</strong> : une erreur au premier nœud déclenche une alerte du CFA ou une intervention du médecin du travail. Ce n'est pas juste un feedback différent - c'est une situation différente à gérer.</p>

              {/* Badges */}

            {/* Historique des échanges (avec pré-messages stockés) */}

                const avatar = ci.img

                  </div>

              if(rd.characterIntro){
                const i = msgIdx++;
                if(visibleMsgs > i){
                  const ci = rd.characterIntro;
                  const avatar = ci.img
                    ? <img src={ci.img} alt={ci.name} className="w-12 h-12 rounded-full object-cover object-top shrink-0 border-2 border-stone-600" onError={e=>{e.target.style.display='none';}}/>
                    : <div className="w-12 h-12 rounded-full bg-stone-600 flex items-center justify-center text-base font-serif font-bold shrink-0">{ci.name.charAt(0)}</div>;

                    <div key={`charintro-${visibleMsgs}`} ref={lastMsgRef} className="flex justify-center">

                      </div>

              }
              if(rd.contextBefore){
                const i = msgIdx++;

                      <p className="text-[10px] text-stone-400 mb-1.5 font-bold uppercase tracking-wider">{getSpeaker(rd.id)}</p>

              return elems;

                      <p className={`text-sm font-medium leading-snug pt-0.5 ${selectedOptionId===option.id?'text-white':'text-stone-800'}`}>{option.text}</p>

                    </button>
                  </div>
                )}
              </div>
            )}

            <div className="h-4 shrink-0"/>

          {transition&&<TransitionScreen data={transition} fading={transitionFading}/>}

          {/* Reward overlay */}

            const r=pendingRewards[0];

            const borderCls=isDown?'border-rose-200':isMax?'border-emerald-200':'border-stone-200';

            <div className="absolute inset-0 z-50 flex items-center justify-center bg-stone-100/80 backdrop-blur-sm anim-fadeIn">

                  {isDown&&<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke={iconColor} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>}
                  {isBadge&&!isUp&&!isMax&&!isDown&&<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke={iconColor} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>}
                </div>
                <h3 className="text-xl font-bold text-stone-800 mb-3 font-serif">{r.title}</h3>
                <p className="text-sm text-stone-600 leading-relaxed mb-6">{r.text}</p>
                <button onClick={()=>{ playSound('click'); popReward(); }} className="px-8 py-3.5 bg-stone-900 text-white rounded-full font-semibold hover:bg-stone-800 transition-colors w-full shadow-lg">Continuer</button>
              </div>
            </div>
            );
          })()}

          {/* Feedback bannière */}
          {feedback&&(
            <div className="absolute bottom-0 left-0 right-0 z-20 anim-fadeInUp">
              <div className={`border-t overflow-hidden ${feedback.score===0?'border-rose-200 bg-rose-50':feedback.score>=4?'border-emerald-200 bg-emerald-50':'border-stone-200 bg-white'}`}>
                <div className={`px-6 py-4 flex items-center justify-between gap-5 ${feedback.score===0?'text-rose-800':feedback.score>=4?'text-emerald-800':'text-stone-800'}`}>
                  <div className="flex items-center gap-4 min-w-0">
                    {feedback.score===0?<AlertCircle size={24} className="text-rose-400 shrink-0"/>:<CheckCircle2 size={24} className="text-emerald-500 shrink-0"/>}
                    <div className="min-w-0"><p className="font-semibold text-sm leading-snug">{feedback.message}</p><p className="text-xs opacity-70 mt-0.5">Score : +{feedback.score} pts</p></div>
                  </div>
                  <button onClick={()=>{ playSound('click'); handleFeedbackContinue(); }} className="px-6 py-2.5 bg-stone-900 text-white rounded-xl font-medium text-sm hover:bg-stone-800 transition-colors shrink-0">Continuer</button>
                </div>
                {lastHistoryItem&&(
                  <div className={`px-6 py-2.5 border-t flex items-start gap-3 ${lastHistoryItem.selectedOption.type===ChoiceType.DISCRIMINATION?'bg-red-50 border-red-200':lastHistoryItem.selectedOption.type===ChoiceType.PREJUGE?'bg-amber-50 border-amber-100':'bg-stone-50 border-stone-100'}`}>
                    <span className={`px-2 py-1 rounded text-[9px] font-bold uppercase tracking-wide shrink-0 mt-0.5 ${TYPE_COLORS[lastHistoryItem.selectedOption.type]||'bg-stone-100 text-stone-600'}`}>{lastHistoryItem.selectedOption.type}</span>
                    <p className="text-xs text-stone-500 leading-relaxed">{TYPE_EXPLANATIONS[lastHistoryItem.selectedOption.type]}</p>
                  </div>
                )}
                {lastHistoryItem?.selectedOption.type===ChoiceType.DISCRIMINATION&&(
                  <div className="px-6 py-3 bg-red-50 border-t border-red-100 flex items-start gap-2.5">
                    <AlertTriangle size={15} className="text-red-500 shrink-0 mt-0.5"/>
                    <p className="text-xs text-red-800 leading-relaxed"><strong>Cadre légal :</strong> Ne pas donner suite à une demande liée à une RQTH peut être qualifié de discrimination par omission (article L1132-1 du Code du travail). Le médecin du travail peut émettre des préconisations contraignantes et alerter l'inspection du travail.</p>
                  </div>
                )}
              </div>
            </div>
          )}
        </section>

        {/* Plan */}
        {isPlanOpen&&(
          <aside className="w-72 bg-white border-l border-stone-200 p-6 overflow-y-auto hidden xl:block shrink-0 custom-scrollbar z-10">
            <div className="space-y-6">
              <h2 className="text-[10px] font-bold text-stone-400 uppercase tracking-widest">Déroulé de la situation</h2>
              <div className="space-y-1 relative">
                <div className="absolute left-[11px] top-3 bottom-3 w-px bg-stone-100"/>
                {SECTIONS.map(section=>{
                  const isCurrent=section.roundIds.includes(gameState.currentRoundIndex);
                  const isPast=Math.max(...section.roundIds)<gameState.currentRoundIndex;
                  const hasPlayed=section.roundIds.some(id=>gameState.history.some(h=>h.roundId===id));
                  const isCompleted=isPast&&hasPlayed;
                  const isSkipped=isPast&&!hasPlayed;
                  return(
                    <div key={section.id} className="relative flex items-start gap-3 py-1.5">
                      <div className={`relative z-10 w-6 h-6 rounded-full flex items-center justify-center border-2 shrink-0 transition-all duration-500 ease-out ${isCurrent?'bg-stone-900 border-stone-900 text-white anim-pulse-ring scale-110 shadow-sm':isCompleted?'bg-white border-emerald-500 text-emerald-600 scale-100':isSkipped?'bg-stone-50 border-stone-300 text-stone-400 scale-100':'bg-white border-stone-200 text-stone-300 scale-100'}`}>
                        {isCurrent&&<PlayIcon size={10}/>}
                        {isCompleted&&<Check size={10}/>}
                        {!isCurrent&&!isCompleted&&<div className="w-1.5 h-1.5 rounded-full bg-stone-300"/>}
                      </div>
                      <div className={`transition-all duration-500 ease-out leading-snug mt-0.5 ${isCurrent?'font-bold text-stone-900 text-sm translate-x-1':isCompleted?'font-medium text-emerald-700 text-sm translate-x-0':isSkipped?'font-medium text-stone-400 text-sm line-through decoration-stone-300 translate-x-0':'font-medium text-stone-400 text-sm translate-x-0'}`}>{section.title}</div>
                    </div>
                  );
                })}
              </div>

              {getPath()&&<div className="p-3 rounded-xl bg-stone-50 border border-stone-100 text-xs text-stone-500">
                <span className="font-semibold text-stone-700">Chemin actif : </span>
                {getPath()==="A"?"A - Rassurance & recherche":getPath()==="B"?"B - Erreur corrigée":"C - Temporisation"}
              </div>}

              <div className="pt-4 border-t border-stone-100">
                <p className="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-3">Badges à débloquer</p>
                <div className="space-y-2">
                  {BADGES.map(badge=>{
                    const earned=gameState.unlockedBadges.includes(badge.id);
                    return(<div key={badge.id} className={`group cursor-help flex flex-col rounded-xl border transition-all duration-300 ${earned?'border-amber-200 bg-amber-50':'border-transparent hover:border-stone-200 hover:bg-stone-50'}`}>
                      <div className={`flex items-center gap-3 p-2.5 rounded-xl transition-all ${earned?'':'opacity-40 group-hover:opacity-80'}`}>
                        <span className="shrink-0">{BADGE_SVGS[badge.icon]}</span>
                        <p className={`text-xs font-semibold leading-tight ${earned?'text-amber-900':'text-stone-600'}`}>{badge.label}</p>
                        {earned&&<CheckCircle2 size={14} className="text-amber-500 ml-auto shrink-0"/>}
                      </div>
                      <div className="max-h-0 opacity-0 group-hover:max-h-32 group-hover:opacity-100 transition-all duration-300 overflow-hidden">
                        <p className="px-3 pb-3 text-[10px] text-stone-500 leading-relaxed border-t border-stone-100 pt-2 mx-2 mt-1">{badge.desc}</p>
                      </div>
                    </div>);
                  })}
                </div>
              </div>
            </div>
          </aside>
        )}
      </main>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
